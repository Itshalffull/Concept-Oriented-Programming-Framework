type WorkItemState {
  """All ws in this concept"""
  ws: [ID!]!
}

type WorkItemEntry {
  w: ID!
  step_ref: String!
  status: String!
  assignee: String!
  candidate_pool: [String!]!
  form_schema: String!
  form_data: String!
  priority: Int!
  due_at: String!
  claimed_at: String!
  completed_at: String!
}

extend type Query {
  workitem_entry(w: ID!): WorkItemEntry
  workitem_entries: [WorkItemEntry!]!
}

type WorkItemItems {
  w: ID!
  value: ID!
}
