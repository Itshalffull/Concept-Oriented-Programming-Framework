tags:
  - name: SpecParser
    description: Parse . concept files into structured ASTs
  - name: SchemaGen
    description: Transform parsed concept ASTs into rich , language neutral ConceptManifests . The manifest contains everything a code generator needs : relation schemas ( after merge grouping ) , fully typed action signatures , structured invariants with test values , GraphQL schema fragments , and JSON Schemas
  - name: SyncParser
    description: Parse . sync files into structured ASTs and validate against concept manifests
  - name: SyncCompiler
    description: Compile parsed synchronizations into executable registrations
  - name: FlowTrace
    description: Build and render interactive debug traces from action log records . Each flow becomes a navigable tree showing the causal chain of actions , syncs , and completions with timing and failure status
  - name: DeploymentValidator
    description: Parse and validate deployment manifests against compiled concepts and syncs . Produce deployment plans with transport assignments , runtime mappings , and sync to engine bindings
  - name: ProjectScaffold
    description: Initialize new Clef projects with the standard directory structure , example concept specs , and configuration files
  - name: DevServer
    description: Coordinate the local development server lifecycle : start , stop , and query status . File watching is delegated to Resource ( change detection ) , recompilation is triggered by syncs ( Resource changes generation pipeline ) , and output is written through Emitter ( content addressed writes )
  - name: SuiteManager
    description: Manage suites scaffold new suites , validate suite manifests and cross suite references , run suite tests , list active suites , and check app overrides
  - name: KernelBoot
    description: Bootstrap a Clef kernel instance by discovering concept handlers , compiling routing syncs , and exposing the kernel for action dispatch . Provides the runtime foundation that all CLI commands , API endpoints , and MCP tools require before they can invoke concept actions
  - name: DeployPlan
    description: Compute , validate , and execute deployment plans for suites . Constructs a dependency graph from concept specs , syncs , and the deploy manifest , then executes operations in topological order with parallelism on independent branches
  - name: VercelRuntime
    description: Manage Vercel project deployments . Owns project configurations , deployment URLs , edge regions , and serverless function settings
  - name: DeployOrchestrator
    description: End to end deployment orchestrator that boots a kernel with all deployment concepts , compiles routing syncs , and executes the full deploy pipeline . Provider agnostic runtime selection is driven by the deploy manifest and routed via syncs
  - name: SuiteScaffoldGen
    description: Generate suite manifest ( suite . yaml ) scaffolds and directory structures for new Clef suites from provided configuration
  - name: DeployScaffoldGen
    description: Generate deployment manifest ( deploy . yaml ) scaffolds from provided configuration including runtimes , concepts , and infrastructure settings
  - name: InterfaceScaffoldGen
    description: Generate interface manifest ( interface . yaml ) scaffolds with target configurations , SDK settings , spec output options , and per concept overrides . Supports the dual manifest Bind architecture where a single application is represented by two manifests : a config manifest ( developer facing admin concepts ) and a content manifest ( user facing content concepts ) , each with its own target configuration and auth policy
  - name: ConceptScaffoldGen
    description: Generate concept specification ( . concept ) file scaffolds from provided configuration including name , type parameters , state fields , actions , and invariants
  - name: SyncScaffoldGen
    description: Generate synchronization rule ( . sync ) file scaffolds from provided configuration including trigger patterns , guard conditions , and effect actions
  - name: HandlerScaffoldGen
    description: Generate TypeScript concept handler ( . handler . ts ) implementation scaffolds from provided configuration including concept name , action signatures , and storage patterns . Defaults to functional ( StorageProgram ) style ; falls back to imperative style only when explicitly requested . Optionally generates a conformance test file
  - name: StorageAdapterScaffoldGen
    description: Generate ConceptStorage adapter implementation scaffolds for various persistence backends : SQLite , PostgreSQL , Redis , DynamoDB , and in memory
  - name: TransportAdapterScaffoldGen
    description: Generate ConceptTransport adapter implementation scaffolds for various communication protocols : HTTP , WebSocket , Worker , and in process
  - name: SurfaceComponentScaffoldGen
    description: Generate Clef Surface headless component scaffolds including widget specifications with anatomy , state machines , accessibility , affordance bindings , props , connect mappings , compose declarations , and invariants . Follows the Zag . js Ark UI pattern where behavior and rendering agree on part names
  - name: SurfaceThemeScaffoldGen
    description: Generate Clef Surface design system theme scaffolds including palette ( oklch color scales ) , typography ( modular ratio ) , spacing tokens , motion definitions ( with reduced motion ) , elevation scale , radius tokens , and light dark theme manifests . Supports theme extension via extends . Follows WCAG accessibility guidelines for contrast ratios
  - name: SurfaceWidgetHandlerGen
    description: Generate functional StorageProgram handlers for Clef Surface widgets . Takes a parsed WidgetManifest and produces a handler that builds RenderPrograms from widget specs , dispatches to framework specific interpreters , and integrates with WidgetComponentTest for automated conformance testing
  - name: DerivedScaffoldGen
    description: Generate derived concept specification ( . derived ) file scaffolds from provided configuration including name , type parameters , composed concepts , syncs boundary , surface actions , surface queries , and operational principle
  - name: ExternalHandlerGen
    description: Generate a handler implementation from an ingest manifest that uses perform ( http , ... ) for each action . Reads the manifest s action mappings and field transforms at runtime , building a StorageProgram that performs HTTP calls with the correct method , path , body ( via FieldTransform ) , and auth headers so external REST APIs can be integrated as first class Clef concepts without hand writing handler code
  - name: IntegrationTestGen
    description: Generate a ProcessSpec from concept spec fixtures for integration testing against real external APIs . Walks fixture after chains , emits a ProcessSpec where each fixture becomes a step with type external-call , $ fixture . field references become step output bindings , and -> error -> notfound annotations become CheckVerification assertions on the expected variant outcome
  - name: Generator
    description: Orchestrate multi target interface generation from concept projections . Plans which targets and SDK languages to generate and coordinates the generation pipeline . History tracking is handled by GenerationPlan ; file output by Emitter
  - name: Projection
    description: Bidirectional interface mapping between concepts and external APIs . Forward ( outbound ) : enrich ConceptManifests with interface generation metadata for producing REST GraphQL CLI MCP endpoints . Reverse ( inbound ) : map external API endpoints back to concept actions for consuming third party APIs as concept backends . The same Projection data structure serves both directions the mapping between concept actions and API endpoints is inherently bidirectional
  - name: ApiSurface
    description: Compose generated interfaces from multiple concepts into a cohesive , unified API surface per target . For REST : a single router with concept namespaced routes . For GraphQL : a merged schema with shared types . For CLI : a command tree with concept subcommands . For MCP : a combined tool set . For SDKs : a single client with concept namespaced methods . Renamed from Surface to avoid collision with concept interface suites surface render surface . concept ( runtime rendering target for DOM , terminal , etc . )
  - name: Symbol
    description: Globally unique , cross file identifier for any named entity in the project . Provides hierarchical symbol strings ( e . g . clef/concept/Article , ts/function/src/handlers/article.ts/createArticle ) that unify identity across languages , file formats , and project layers
  - name: SymbolOccurrence
    description: Records where a Symbol appears in a file exact location and semantic role . Enables go to definition , find references , and rename refactoring across the entire project
  - name: ScopeGraph
    description: Lexical scoping , visibility , and name resolution model for a file or module . Models nested scopes , declarations , references , and import edges to support cross file resolution and rename refactoring
  - name: SymbolRelationship
    description: Typed semantic relationships between Symbols beyond simple reference implements , extends , overrides , generates , configures , tests , documents . Extends the Linking Suite s Reference Relation vocabulary with program analysis specific edge types
  - name: ConceptEntity
    description: Queryable representation of a parsed concept , linking its declaration to generated artifacts and runtime behavior . Enables semantic queries like what syncs participate in this concept? and what artifacts were generated from it?
  - name: ActionEntity
    description: Action declaration with full lifecycle tracing from spec through sync participation , implementation , interface exposure , to runtime invocation . Enables queries like what syncs trigger on this action? and where is this action implemented?
  - name: VariantEntity
    description: Action return variant as a first class branching point in sync chains . Enables dead variant detection and sync coverage analysis identifying variants that no sync pattern matches on
  - name: StateField
    description: Single state declaration in a concept , traced through code generation and storage mapping . Enables impact analysis if I change this field's type, what generated code and storage schemas are affected?
  - name: SyncEntity
    description: Compiled sync rule as a queryable node the semantic glue connecting concepts . Stores resolved when patterns , where clauses , and then actions with full concept action references . Enables flow tracing , dead end detection , and orphan variant analysis
  - name: WidgetEntity
    description: Queryable representation of a parsed widget spec the Clef Surface counterpart to ConceptEntity . Links anatomy , state machines , props , slots , accessibility contracts , affordance declarations , and composition references as a traversable structure
  - name: AnatomyPartEntity
    description: Named part within a widget s anatomy each carries a semantic role and connects to props via the connect section . Enables tracing from rendered UI elements back to concept state fields and actions
  - name: WidgetStateEntity
    description: A state in a widget s finite state machine , with transitions , entry exit actions , and guards . Enables static analysis of widget behavior reachability , dead states , unhandled events
  - name: WidgetPropEntity
    description: A declared prop on a widget typed , with default value , connected to anatomy parts and ultimately to concept state fields via Binding . Enables tracing from concept fields through props to rendered anatomy parts
  - name: ThemeEntity
    description: Queryable representation of a parsed theme spec token hierarchy , palette , typography , motion , elevation as a traversable structure . Enables token resolution tracing , contrast auditing , and theme change impact analysis
  - name: InteractorEntity
    description: Queryable representation of a registered interactor type the abstract interaction taxonomy as a traversable node . Enables queries like what fields classify as this interactor? and what widgets match this interactor in a given context?
  - name: RuntimeFlow
    description: Enriched execution flow that correlates ActionLog events with static semantic entities the resolved version of FlowTrace . Enables comparing actual runtime paths against static FlowGraph predictions to find deviations , missing syncs , and unexpected branches
  - name: RuntimeCoverage
    description: Tracks which static entities have been exercised at runtime the bridge between declared structure and observed behavior . Answers which declared syncs/variants/widget states have actually fired in production? Combined with static dead variant analysis , gives the complete picture : statically dead vs dynamically dead
  - name: PerformanceProfile
    description: Aggregate performance data per static entity connecting slow operations to their declared structure for optimization . Supports timing breakdown for syncs ( when where then phases ) , selection pipeline ( classify resolve spawn connect render ) , and widget rendering ( render count , unnecessary renders , mount unmount timing )
  - name: ErrorCorrelation
    description: Links runtime errors to their static context which concept , action , variant , sync , widget , file , and line produced the error , and what was the state of the flow at failure time . The root_cause action walks backward through the flow to find the earliest deviation from the expected FlowGraph path
  - name: DerivedEntity
    description: Queryable representation of a parsed derived concept a named composition of base concepts and syncs . Enables trace rollup by linking derivedContext tags to the composition hierarchy , and powers queries like what concepts does this derived concept compose? and what syncs wire it together?
  - name: HandlerEntity
    description: Queryable representation of a concept handler implementation file the TypeScript ( or other language ) code that implements a concept s actions . Links handler source to its concept entity , action entities , parsed AST , dependencies , and runtime behavior . Enables queries like which handler implements User/create? , show me the handler source for this failing action , and what are the handler's dependencies? Bridges the gap between concept specs and their executable code , enabling stack trace correlation , error root cause analysis , and implementation coverage tracking
  - name: WidgetImplementationEntity
    description: Queryable representation of a generated widget implementation file the React , Vue , Svelte , or other framework specific code generated from a . widget spec . Links the generated component back to its WidgetEntity source , tracks the full AST of the generated code , and enables stack trace correlation for widget rendering errors . Bridges the gap between framework agnostic widget specs and their concrete framework implementations
  - name: ThemeImplementationEntity
    description: Queryable representation of a generated theme implementation file CSS custom properties , React Native StyleSheet , Design Token Community Group JSON , or other platform specific output generated from a . theme spec . Links the generated output back to its ThemeEntity source , tracks the full AST token tree , and enables token resolution tracing from component styling back to theme spec declarations
  - name: DeploymentEntity
    description: Queryable representation of a parsed deployment manifest ( deploy . yaml ) the runtime topology , concept to runtime assignments , storage adapter bindings , transport adapter bindings , sync engine configurations , and environment overlays . Enables queries like which runtime hosts User? , what storage backend does Article use? , what transport connects api to worker? , and show me the full deployment topology
  - name: SuiteManifestEntity
    description: Queryable representation of a parsed suite manifest ( suite . yaml ) the package of related concepts , syncs , type parameter alignment , dependencies , and versioning . Enables queries like what concepts are in the auth suite? , what syncs does identity depend on? , which suites compose into this app? , and cross suite dependency analysis
  - name: InterfaceEntity
    description: Queryable representation of a parsed interface manifest ( interface . yaml ) and the API endpoints , CLI commands , MCP tools , and SDK methods generated from it . Bridges concept specs and their external facing interfaces enables queries like what REST endpoints expose User/create? , which MCP tools map to this concept? , show me all GraphQL mutations , and trace this API call back to the concept action that handles it
  - name: DeploymentHealth
    description: Live deployment monitoring runtime health , transport connectivity , storage adapter status , sync delivery rates , concept instance counts , and cross runtime latency . Connects live operational data to the static deployment topology ( DeploymentEntity ) and concept structure ( ConceptEntity , SyncEntity ) . Enables queries like is the api runtime healthy? , what's the sync delivery failure rate? , which storage adapters are degraded? , and what's the p99 cross-runtime latency?
  - name: InfrastructureEntity
    description: Queryable representation of storage and transport adapter configurations which adapters are registered , what backends they connect to , their configuration , and their relationship to concepts and runtimes . Enables queries like what storage adapter does User use? , which concepts share a PostgreSQL connection? , and what transport protocol connects api to worker?
  - name: GenerationProvenance
    description: Tracks which generator produced which file , from what source spec , with what configuration . Enables queries like what generated this handler? , if I change the scaffold generator, which files will be regenerated? , is this file hand-written or generated? , and show the generation chain from spec to final artifact
  - name: TestEntity
    description: Queryable representation of test suites , conformance checks , and validation rules . Links tests to the concepts , syncs , handlers , and widgets they validate . Enables queries like what tests cover User/create? , which invariants are tested? , what's the test coverage for this concept? , and which tests are failing?
  - name: EnvironmentEntity
    description: Queryable representation of environment configuration , secret bindings , and config overrides across deployment environments . Enables queries like what config values differ between staging and production? , which secrets does the api runtime need? , and what environment variables affect User/create?
  - name: DependenceGraph
    description: Data and control dependency edges between program elements , within and across files . Enables forward and backward slicing , impact analysis , and dependency queries at file , module , or project scope
  - name: DataFlowPath
    description: Traced flow of data from source to sink through the program . Enables taint tracking , config value propagation tracing , and data provenance analysis
  - name: ProgramSlice
    description: Minimal subgraph of the dependence graph preserving behavior with respect to a slicing criterion . Identifies the exact set of symbols and files relevant to understanding or modifying a specific program point
  - name: AnalysisRule
    description: Declarative analysis rule for deriving facts from program entities custom queries , linting , and architectural constraint validation . Supports multiple engine backends ( datalog , graph traversal , pattern match )
  - name: SemanticEmbedding
    description: Vector representation of DefinitionUnits for similarity search and natural language code search . Cached by content digest so embeddings are recomputed only when the underlying code changes
  - name: ScoreApi
    description: Unified facade over the five Score suites ( parse , symbol , semantic , analysis , discovery ) providing a single LLM friendly surface for querying any Clef project s structure , symbols , semantics , data flows , and search indexes . Every Clef app gets ScoreApi registered automatically LLMs can immediately ask questions about the codebase without configuration . Actions are designed for natural language invocation : parameter names read as English , results are structured for tool use consumption , and error variants include actionable suggestions
  - name: ScoreIndex
    description: Materialized index backing ScoreApi queries . Maintains denormalized views of the five Score layers ( parse , symbol , semantic , analysis , discovery ) optimized for fast LLM friendly lookups . Rebuilt incrementally as project files change . Auto registered as a built in concept in every Clef runtime
  - name: Branch
    description: Named parallel lines of development with lifecycle management . Branches are mutable pointers over immutable DAG history advancing the head , protecting against direct writes , and tracking upstream relationships
  - name: ChangeStream
    description: Ordered , resumable stream of atomic change events from a data source . Events are immutable once appended . Consumers track their position independently via acknowledged offsets , enabling replay and exactly once processing
  - name: ContentHash
    description: Identify content by cryptographic digest , enabling deduplication , integrity verification , and immutable references . All versioned content is stored once and referenced by hash
  - name: DAGHistory
    description: Organize versions into a directed acyclic graph supporting branching , merging , and topological traversal . Nodes reference content by hash and track parent relationships for full history reconstruction
  - name: Diff
    description: Compute the minimal representation of differences between two content states , using a pluggable algorithm selected by content type and context
  - name: Merge
    description: Combine two divergent versions of content that share a common ancestor , producing a unified result or identifying conflicts . Strategy is selected by content type and configuration
  - name: Patch
    description: Represent a change as a first class , invertible , composable object . Patches have algebraic properties they can be applied , inverted , composed sequentially , and commuted when independent
  - name: Ref
    description: Provide mutable , human readable names for immutable content addressed objects . The only mutable state in the versioning system is naming all content and history are immutable once created
  - name: RetentionPolicy
    description: Govern how long versions and records must be kept and when they may be disposed , including legal hold suspension of normal disposition . A record under active legal hold can never be disposed regardless of retention period expiration
  - name: SchemaEvolution
    description: Manage versioned structural definitions with compatibility guarantees . Supports backward , forward , and full compatibility modes with upcast transformations between schema versions
  - name: TemporalVersion
    description: Track content versions with bitemporal semantics when recorded ( system time ) and when valid ( application time ) . Enables time travel queries across both dimensions independently
  - name: Attribution
    description: Bind agent identity to content regions , tracking who created or modified each piece . Supports blame queries , per region authorship history , and CODEOWNERS style ownership patterns
  - name: CausalClock
    description: Track happens before ordering between events across distributed participants . Vector clocks provide the universal ordering primitive for OT delivery , CRDT consistency , DAG traversal , provenance chains , and temporal queries
  - name: ConflictResolution
    description: Detect and resolve incompatible concurrent modifications using a pluggable strategy selected by data type and domain policy
  - name: InlineAnnotation
    description: Embed change markers directly within content structure , enabling accept reject review workflows where the document simultaneously holds both before and after states . Content type agnostic scope is opaque bytes resolved by the content system
  - name: PessimisticLock
    description: Prevent conflicts by granting exclusive write access to a resource , serializing edits rather than reconciling them after the fact . Complementary to ConflictResolution use locking for non mergeable content ( binary files , legal documents ) and resolution for mergeable content ( text , structured data ) . checkOut may complete after an arbitrarily long wait if the resource is locked and the requester is queued
  - name: Replica
    description: Maintain an independent , locally modifiable copy of shared state that synchronizes with peers . Sync may complete after arbitrarily long delay due to network partitions or offline operation
  - name: Signature
    description: Cryptographic proof of authorship , integrity , and temporal existence . Provides signing , verification , and RFC 3161 timestamping against a set of trusted signer identities
  - name: ActionGuide
    description: Organize concept actions into ordered , annotated workflow sequences for interface targets . The concept owns step ordering ( structural ) and opaque content passthrough for decorations . Each target reads the content keys it understands ( checklists , design principles , anti patterns , validation commands , etc . ) and ignores the rest . New decoration kinds require only a new YAML key and a renderer in the target provider zero concept changes . Renamed from Workflow to avoid collision with suites automation workflow . concept ( FSM with guarded transitions ) . See Architecture doc Section 1.8
  - name: EnrichmentRenderer
    description: Render opaque enrichment JSON into formatted output strings using data driven templates . Handlers are declarative each maps an enrichment key to a built in render pattern ( list , checklist , code list , callout , heading body , bad good , etc . ) plus a template config with { { field } } interpolation . Patterns are the small code surface shipped once ; handlers are pure data that can live in YAML manifests . New enrichment kinds need only a YAML entry zero code changes . Renamed from Renderer to avoid collision with suites presentation renderer . concept ( cache aware rendering pipeline ) . See Architecture doc Section 1.8
  - name: StorageProgram
    description: Build sequences of storage instructions as inspectable , composable data . A StorageProgram describes what a handler intends to do without executing side effects . Programs can be logged , diffed , serialized , composed , and handed to an interpreter or analyzer
  - name: FunctionalHandler
    description: Register concept handlers that produce StoragePrograms instead of directly executing storage effects . A FunctionalHandler is the migration point between imperative and monadic handler models
  - name: ProgramInterpreter
    description: Execute a StorageProgram against a ConceptStorage backend , managing transaction boundaries , producing completions , and recording execution traces for rollback
  - name: ProgramAnalysis
    description: Dispatch named analysis queries against StoragePrograms to registered providers and return structured results . Each provider implements a specific analysis strategy ; this concept provides the uniform dispatch and result tracking interface
  - name: ProgramCache
    description: Memoize StorageProgram execution results keyed by program fingerprint and storage state hash . Enables incremental re evaluation where only changed programs or changed state invalidates cached results
  - name: Lens
    description: Typed , composable reference to a location within concept state , replacing untyped string based storage access with first class optics that can be composed into paths , decomposed into segments , and validated against concept state declarations
  - name: EffectHandler
    description: Register and resolve protocol level effect handlers that the interpreter uses to execute abstract perform instructions the bridge between a handler s declared transport effects and concrete transport implementations
  - name: CompletionCoverage
    description: Verify that every variant a handler can produce is matched by at least one sync when pattern , and that every sync when pattern with a variant filter matches a variant that actually exists the static bridge between handler behavior and sync wiring
  - name: ReadWriteSetProvider
    description: Extract the set of storage relations a program reads and writes by walking its instruction sequence , and classify the program s purity as pure , read only , or read write
  - name: CommutativityProvider
    description: Determine whether two StoragePrograms commute , meaning they produce the same result regardless of execution order . Enables safe concurrent execution and parallel FlowTrace branch tracing
  - name: ParallelismProvider
    description: Analyze a StorageProgram s instruction list to identify independent instruction groups that can execute concurrently . Builds a dependency graph from binding writes ( bindAs ) to binding reads ( closure functions ) , partitions instructions into parallel layers via topological sort , and reports the maximum parallelism and theoretical speedup ratio
  - name: DeadBranchProvider
    description: Identify conditional branches in a StorageProgram that can never be taken given type constraints and concept state invariants . Enables FlowTrace pruning and handler optimization
  - name: InvariantExtractionProvider
    description: Extract verifiable formal properties from a StorageProgram given its concept specification . Produces property candidates relating pre state to post state for the formal verification pipeline
  - name: LensExtractionProvider
    description: Extract implicit lens references from StorageProgram instruction trees , converting string based storage access patterns into first class typed StateLens values for traceability and analysis
  - name: LensStructuralDiffProvider
    description: Compare two versions of a concept s state declarations and produce a structural diff expressed as lens operations , enabling the Diff Patch pipeline to generate invertible schema migrations
  - name: VariantExtractionProvider
    description: Extract the set of completion variant tags reachable from a StorageProgram s branch structure by walking its instruction tree enabling static verification of sync coverage against the handler s actual behavior
  - name: TransportEffectProvider
    description: Extract the set of transport effects ( protocol : operation pairs ) from a StorageProgram s instruction tree enabling static verification that every declared transport effect has a registered EffectHandler before execution
  - name: RenderTransform
    description: Registry and dispatcher for composable render program transformations . Manages named transforms with kind based routing to provider concepts through sync wiring the functorial mapping hub that makes theme switching , a11y variants , and style adaptations composable first class operations without hardcoding transform logic
  - name: TokenRemapProvider
    description: Rewrite theme token path references in RenderProgram instruction sequences mapping old token paths to new ones so that theme switching becomes a pure instruction rewrite over the program
  - name: A11yAdaptProvider
    description: Apply accessibility adaptations to RenderProgram instruction sequences modifying existing ARIA attributes and injecting new keyboard , focus , and ARIA instructions so that a11y variants become composable program transformations
  - name: BindRewriteProvider
    description: Rewrite data binding expressions in RenderProgram instruction sequences remapping binding expression strings so that component data sources can be swapped through a pure instruction rewrite over the program
  - name: CustomTransformProvider
    description: Apply generic pattern match and replace transformations to RenderProgram instruction sequences matching arbitrary instruction field patterns and merging replacement fields , serving as the extensibility escape hatch for transform kinds not covered by specialized providers
  - name: TransformExtractionProvider
    description: Extract the list of transforms that have been applied to a RenderProgram by reading its appliedTransforms metadata enabling provenance queries ( what transformations produced this output? ) and compliance verification ( was the a11y transform applied before rendering? )
  - name: QueryProgram
    description: Build sequences of query instructions as inspectable , composable data . A QueryProgram describes what a view intends to fetch and transform without executing side effects . Programs capture scan , filter , sort , group , project , limit , and pure termination steps as an ordered instruction list . Programs can be analyzed for the fields they read , composed via monadic bind , and handed to an interpreter or optimizer
  - name: QueryExecution
    description: Registry and dispatcher for query execution providers that run structured query programs against a named backend . Manages named provider registrations with kind based routing and capability declarations through sync wiring the coordination hub that lets kernel , in memory , remote , and federated backends all accept the same query program language without coupling to one another
  - name: FilterSpec
    description: Represent reusable , composable predicate trees that determine which records pass a filter . Each filter holds a serialized FilterNode AST , the set of fields it references ( for pushdown analysis ) , the bound context variables it expects , and its source classification . Filters can be composed algebraically into AND trees , evaluated directly against JSON row arrays , normalized to canonical forms , validated against a schema , and have parameter nodes substituted with concrete values at runtime
  - name: SortSpec
    description: Manage named , ordered sequences of sort keys that determine record ordering in a view . Each sort spec captures one or more sort keys ( field , direction , null handling , collation ) as a serialized JSON array . Sort specs can be composed to produce a combined ordering where the secondary spec acts as a tiebreaker , and can be evaluated directly against a JSON row array to return the rows in sorted order
  - name: GroupSpec
    description: Define named grouping specifications that cluster records into hierarchical groups and compute aggregations over each group . Each group spec captures a serialized GroupingConfig ( type , fields , and optional set memberships ) , an AggregationDef [ ] describing functions and aliases to compute per group , and an optional post aggregation FilterNode for HAVING style pruning . Group specs can be evaluated directly against a JSON row array , returning a structured result containing the group key , the matching rows , and the computed aggregates for each bucket
  - name: ProjectionSpec
    description: Manage named field selection specifications that control which columns appear in a view , in what order , and how they are formatted or computed . Each projection captures a JSON serialized ProjectionField [ ] describing key , optional label , visibility , formatter , computed expression , and weight . Projections can be merged so that overlay fields win on key conflict and new fields are appended , and can be evaluated directly against a JSON row array to produce projected rows containing only the specified fields in the specified order
  - name: DataSourceSpec
    description: Declare the base dataset for a view : what concept action to invoke , what external source to query , or what inline data to use . Each source records its kind , serialized configuration , and the template variables it expects at bind time , so the view layer can resolve the right data without knowing the source s internal structure
  - name: PresentationSpec
    description: Name a display strategy and carry opaque , display specific hints for rendering a view . Each presentation captures a display type ( an open , uninterpreted string such as table , card-grid , board , or any registered custom type ) , a JSON hints blob interpreted only by the matching display component , and a display mode policy that controls whether a DisplayMode system drives the render or is bypassed entirely . PresentationSpec does not enumerate or constrain which display types are valid that is the responsibility of the display component registry
  - name: InteractionSpec
    description: Manage named interaction configurations that govern controls , row actions , navigation , and picker behaviors for a view . Each interaction spec captures whether a create form is available ( as a serialized CreateFormConfig JSON ) , a row click navigation rule ( as a serialized RowClickConfig JSON ) , a list of per row action buttons ( as a serialized RowActionConfig [ ] JSON ) , and whether the view operates in picker mode . Interaction specs are independent of data source , filter , sort , and presentation concerns they describe only what a user can do with the rows displayed
  - name: ViewShell
    description: Name and bind the user facing identity of a view by holding references to all subordinate configuration concepts filter , sort , group , projection , presentation , interaction , and data source . ViewShell owns no query or render logic itself ; it is a composition point that lets a view be addressed by a single stable name and resolved into a complete , hydrated ViewConfig at runtime . A nullable legacyConfig field supports migration from monolithic JSON based view records without breaking existing callers
  - name: FilterRepresentation
    description: Registry and dispatcher for bidirectional conversion between authoring representations and canonical FilterNode IR . Manages named representation providers with kind based routing through sync wiring the coordination hub that lets toggle groups , text DSL inputs , URL param codecs , and visual builders all speak the same FilterNode language without coupling to one another
  - name: RemoteQueryProvider
    description: Execute query programs against external APIs by mapping query instructions to HTTP calls via Projection and FieldTransform . Handles planPushdown by identifying which predicates the remote API supports natively ( via query params or request body ) and which must run as residual in memory filtering after the response
  - name: Connection
    description: Establish and manage a session with a running Clef kernel instance , providing discovery , invocation , and observation of registered concepts . Transport agnostic : the same concept works over WebSocket , HTTP , IPC , or in process . Each connection carries a session identity that the kernel s existing auth concepts evaluate on every invocation
  - name: Credential
    description: Manage named client side connection profiles , each binding a kernel endpoint to stored authentication credentials . Supports multiple profiles for different environments and multiple auth methods , enabling users and agents to switch between connections without re entering credentials each time
  - name: PageMap
    description: Maintain a labeled inventory of interactive elements within a hosted view , addressable by semantic label , role , or concept binding . Independently useful for accessibility auditing , integration testing , dev tools , and agent driven UI navigation
  - name: ClefBase
    description: The complete Clef Base application platform a hierarchical composition 
 of all content , infrastructure , LLM , process , view / surface , and 
 integration concepts . ClefBase is the root derived concept that 
 represents everything needed to run a full Clef application : 
 content management with schemas and transclusions , version control 
 with branching and merging , real-time collaboration , identity and 
 access control , LLM agents with content-native personas , multi-step 
 process execution , data-driven views with composable queries , 
 headless UI rendering , composable diagramming with pluggable notations 
 and graph analysis , plugin extensibility , offline-first support , 
 HTTP routing , and package management . Every concept in clef-base 
 is reachable through this hierarchy .
  - name: InfrastructureCore
    description: Platform infrastructure primitives that underpin every clef-base 
 feature : plugin discovery and registration ( PluginRegistry ) , tag-based 
 caching ( Cache ) , URL alias generation ( Pathauto ) , configuration 
 synchronization ( ConfigSync ) , event pub / sub ( EventBus ) , input validation 
 ( Validator ) , entity reflection to the content system ( EntityReflector ) , 
 and file system artifact discovery ( FileCatalog ) .
  - name: RuntimeInfrastructure
    description: Complete runtime infrastructure monadic execution pipeline 
 ( StorageProgram , interpreter , effects ) , storage and transport 
 adapters ( in-memory , SQL , cloud , HTTP , WebSocket , serverless ) , 
 and application-level infrastructure primitives ( cache , plugin 
 registry , event bus ) . The layer between concept handlers and 
 the physical world .

