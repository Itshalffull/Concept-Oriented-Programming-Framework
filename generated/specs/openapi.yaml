components:
  schemas:
    SpecParser:
      type: object
      properties:
        ast:
          type: string
        value:
          type: string
      required: [ast, value]
    SpecParserParseInput:
      type: object
      properties:
        source:
          type: string
      required: [source]
    SpecParserParseOkResponse:
      type: object
      properties:
        variant:
          type: string
          enum: [ok]
        spec:
          type: string
        ast:
          type: string
      required: [variant, spec, ast]
    SpecParserParseErrorResponse:
      type: object
      properties:
        variant:
          type: string
          enum: [error]
        message:
          type: string
        line:
          type: integer
      required: [variant, message, line]
    SchemaGen:
      type: object
      properties:
        manifests:
          type: string
      required: [manifests]
    SchemaGenGenerateInput:
      type: object
      properties:
        spec:
          type: string
        ast:
          type: string
      required: [spec, ast]
    SchemaGenGenerateOkResponse:
      type: object
      properties:
        variant:
          type: string
          enum: [ok]
        manifest:
          type: string
      required: [variant, manifest]
    SchemaGenGenerateErrorResponse:
      type: object
      properties:
        variant:
          type: string
          enum: [error]
        message:
          type: string
      required: [variant, message]
    SchemaGenRegisterOkResponse:
      type: object
      properties:
        variant:
          type: string
          enum: [ok]
        name:
          type: string
        inputKind:
          type: string
        outputKind:
          type: string
        capabilities:
          type: array
          items:
            type: string
      required: [variant, name, inputKind, outputKind, capabilities]
    SyncParser:
      type: object
      properties:
        ast:
          type: string
        value:
          type: string
      required: [ast, value]
    SyncParserParseInput:
      type: object
      properties:
        source:
          type: string
        manifests:
          type: array
          items:
            type: string
      required: [source, manifests]
    SyncParserParseOkResponse:
      type: object
      properties:
