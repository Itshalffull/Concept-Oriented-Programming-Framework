app:
  name: clef-account
  version: "0.1.0"
  uri: urn:clef:account

runtimes:
  vercel:
    type: VercelRuntime
    engine: true
    transport: http
    storage: vercel-kv
    secrets: vercel-env
    config:
      framework: nextjs
      buildCommand: "next build"
      outputDirectory: ".next"

infrastructure:
  storage:
    vercel-kv:
      type: vercel-kv
      config:
        url: "${KV_REST_API_URL}"
        token: "${KV_REST_API_TOKEN}"

  secrets:
    vercel-env:
      type: vercel-env
      config:
        projectId: "${VERCEL_PROJECT_ID}"

concepts:
  Authentication:
    spec: ../repertoire/concepts/identity/authentication.concept
    implementations:
      - language: typescript
        path: handlers/ts/authentication.handler.ts
        runtime: vercel
        storage: vercel-kv
        queryMode: lite

  Authorization:
    spec: ../repertoire/concepts/identity/authorization.concept
    implementations:
      - language: typescript
        path: handlers/ts/authorization.handler.ts
        runtime: vercel
        storage: vercel-kv
        queryMode: lite

  AccessControl:
    spec: ../repertoire/concepts/identity/access-control.concept
    implementations:
      - language: typescript
        path: handlers/ts/access-control.handler.ts
        runtime: vercel
        storage: vercel-kv
        queryMode: lite

  Session:
    spec: ../repertoire/concepts/identity/session.concept
    implementations:
      - language: typescript
        path: handlers/ts/session.handler.ts
        runtime: vercel
        storage: vercel-kv
        queryMode: lite

syncs:
  - path: syncs/required/auth-session.sync
    engine: engine
    annotations: [eager]

  - path: syncs/required/permission-check.sync
    engine: engine
    annotations: [eager]

  - path: syncs/required/role-on-register.sync
    engine: engine
    annotations: [eager]

  - path: syncs/required/admin-role-bootstrap.sync
    engine: engine
    annotations: [eager]

build:
  typescript:
    compiler: tsc
    testRunner: vitest
    testTypes:
      - unit
