# CLEF DevTools — Interface Generation Manifest
#
# Generates Claude Skills, CLI commands, and an MCP server from
# framework concept specs. Uses workflow and annotation
# metadata to produce rich, step-based skills that
# match the hand-written originals.
#
# Usage:
#   clef interface generate --manifest examples/devtools/devtools.interface.yaml

interface:
  name: clef-devtools
  version: 0.2.0

# ─── GENERATION TARGETS ──────────────────────────────
targets:
  claude-skills:
    name: clef-devtools
    grouping: per-concept
    outputDir: ./.claude/skills
    copies:
      - ./.codex/skills
      - ./.gemini/skills

  cli:
    name: clef
    outputDir: ./cli/src

  mcp:
    name: clef-devtools
    transport: stdio
    outputDir: ./.claude/mcp
    configOutputs:
      - path: ./.mcp.json
        format: claude-mcp-config
      - path: ./.codex/config.toml
        format: codex-mcp-config
      - path: ./.gemini/settings.json
        format: gemini-mcp-config
      - path: ./.claude/settings.json
        format: claude-settings-config
    description: >
      Clef DevTools MCP server — exposes framework concepts,
      Score queries, and code generation tools for any
      MCP-compatible LLM client.

  claude-agents:
    name: clef-devtools
    outputDir: ./.claude/agents
    copies:
      - ./.codex/agents
      - ./.gemini/agents
    include:
      - ConceptScaffoldGen
      - SyncScaffoldGen
      - HandlerScaffoldGen
      - SurfaceComponentScaffoldGen
      - SurfaceWidgetHandlerGen
      - ContentTypeScaffoldGen
      - ClefBase
      - InfrastructureCore
      - RuntimeInfrastructure
      - InterfaceScaffoldGen

  openapi:
    name: clef-devtools
    outputDir: ./generated/specs
    version: 0.2.0
    description: >
      OpenAPI 3.1 specification for the Clef DevTools API.
      Generated from concept specs — all actions exposed as REST endpoints.

  asyncapi:
    name: clef-devtools
    outputDir: ./generated/specs
    version: 0.2.0
    description: >
      AsyncAPI 3.0 specification for Clef DevTools events.
      Generated from concept specs — write actions produce async events.

  project-instructions:
    description: >
      Generate project instruction files for AI coding assistants.
      All three files share the same content — Clef architecture overview,
      app creation workflow, feature addition workflow, and skill/MCP
      usage mandates.
    outputDir: ./
    outputs:
      - path: ./CLAUDE.md
        format: markdown
        description: "Claude Code project instructions"
      - path: ./AGENTS.md
        format: markdown
        description: "OpenAI Codex CLI project instructions"
      - path: ./GEMINI.md
        format: markdown
        description: "Google Gemini CLI project instructions"

