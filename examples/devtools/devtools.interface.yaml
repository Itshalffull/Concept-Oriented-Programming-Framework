  SurfaceComponentScaffoldGen:
    concept:
      tool-permissions: [Read, Write, Bash]
      argument-template: "--name <ComponentName>"
      trigger-description: >
        Use when creating a new Clef Surface headless component. Generates a
        .widget spec (anatomy, states with transitions, accessibility, affordance,
        props, connect, compose, invariant), anatomy definition, machine
        implementation, and suite manifest.
      intro-template: >
        Scaffold a Clef Surface headless component **$ARGUMENTS** with .widget spec
        (anatomy, FSM states, accessibility, affordance, props, connect, compose),
        anatomy parts, machine implementation, and suite manifest.
      companion-docs:
        - path: examples/scaffold-surface-component.md
          label: "Clef Surface component scaffolding walkthrough"
          content: |
            # Walkthrough: Scaffolding a Clef Surface Component

            This walkthrough creates a `Dialog` headless component.

            ## Step 1: Generate the Component Scaffold

            ```bash
            clef scaffold component --name Dialog \
              --parts root,trigger,backdrop,content,title,closeTrigger \
              --states closed,open \
              --events open,close,escape \
              --role dialog
            ```

            Output:
            ```
            Created surface-dialog/dialog.stub.widget
            Created surface-dialog/dialog-anatomy.stub.concept
            Created surface-dialog/suite.stub.yaml
            Created surface-dialog/dialog-machine.stub.handler.ts
            ```

            ## Step 2: Refine the Widget Spec

            Edit `dialog.stub.widget`:

            ```
            widget dialog {
              purpose {
                A modal dialog that overlays content and
                traps focus until dismissed.
              }

              anatomy {
                root: container { The outermost wrapper. }
                trigger: interactive { Opens the dialog. }
                backdrop: container { Overlay behind dialog. }
                content: container { The dialog content area. }
                title: container { Dialog title for aria-labelledby. }
                closeTrigger: interactive { Closes the dialog. }
              }

              states {
                closed [initial] {
                  on open -> open;
                }
                open {
                  on close -> closed;
                  on escape -> closed;
                }
              }

              accessibility {
                role: dialog;
                keyboard {
                  Escape -> CLOSE;
                  Tab -> FOCUS_NEXT;
                }
                focus {
                  trap: true; initial: content; roving: false
                }
              }

              affordance {
                hover: trigger -> visual-highlight;
                press: closeTrigger -> dismiss;
              }

              props {
                open: Bool (default: false)
                modal: Bool (default: true)
                closeOnEsc: Bool (default: true)
                disabled: Bool (default: false)
              }

              connect {
                root -> { data-part: "root"; data-state: context.state; }
                backdrop -> { data-part: "backdrop"; aria-hidden: "true"; }
                content -> { data-part: "content"; role: "dialog"; aria-modal: "true"; }
              }

              compose {
                FocusTrap -> content;
              }

              invariant {
                when open: focus must be trapped inside content;
              }
            }
            ```

            ## Step 3: Customize the Machine

            Add guards and transition side effects in
            `dialog-machine.stub.handler.ts`.

            ## Step 4: Register with Widget Catalog

            The generated widget auto-registers via the surface-component
            suite's Widget/register action.

            ## Standard Component Library

            | Component | Parts | States |
            |-----------|-------|--------|
            | Button | root | idle, pressed |
            | Dialog | root, trigger, backdrop, content | closed, open |
            | Tabs | root, list, trigger, content | idle, focused |
            | Accordion | root, item, trigger, content | collapsed, expanded |
            | Menu | root, trigger, content, item | closed, open |
            | Select | root, trigger, content, item | closed, open |
            | Tooltip | root, trigger, content | hidden, visible |
    register:
      examples:
        - label: "Register the component scaffold generator"
          language: typescript
          code: |
            const result = await surfaceComponentScaffoldGenHandler.register({}, storage);
    generate:
      examples:
        - label: "Generate a dialog component"
          language: bash
          code: "clef scaffold component --name Dialog --parts root,trigger,content --states closed,open"
        - label: "Generate a tabs component"
          language: bash
          code: "clef scaffold component --name Tabs --parts root,list,trigger,content,indicator --states idle,focused,selected --events focus,select,blur"
      references:
        - path: references/surface-component-guide.md
          label: "Clef Surface headless component architecture"

  SurfaceThemeScaffoldGen:
    concept:
      tool-permissions: [Read, Write, Bash]
      argument-template: "--name <theme-name>"
      trigger-description: >
        Use when creating a new Clef Surface design system theme. Generates a
        .theme spec file with @version annotation, palette (oklch color scales),
        typography (modular ratio, fonts, weights, line-heights, tracking),
        spacing (base multiplier), motion (durations, easing, reduced-motion),
        elevation (shadow layers), radius tokens, and extends support for
        theme variants. Follows WCAG accessibility guidelines for contrast.
      intro-template: >
        Scaffold a Clef Surface design system theme **$ARGUMENTS** with oklch palette,
        typography scale, spacing tokens, motion definitions, elevation shadows,
        and radius tokens in .theme format.
      companion-docs:
        - path: examples/scaffold-surface-theme.md
          label: "Clef Surface theme scaffolding walkthrough"
          content: |
            # Walkthrough: Scaffolding a Clef Surface Theme

            This walkthrough creates an `ocean` design system theme.

            ## Step 1: Generate the Theme Scaffold

            ```bash
            clef scaffold theme --name ocean \
              --primary 220 \
              --font "Inter, sans-serif" \
              --base-size 16 \
              --scale 1.25
            ```

            Output:
            ```
            Created theme-ocean/ocean.stub.theme
            Created theme-ocean/suite.stub.yaml
            ```

            ## Step 2: Refine the Theme Spec

            Edit `ocean.stub.theme`:

            ```
            @version(1)
            theme ocean {
              purpose {
                A cool, ocean-inspired design system with blue tones.
              }

              palette {
                primary: oklch(0.60 0.15 220);
                secondary: oklch(0.55 0.12 180);
                neutral: oklch(0.50 0.01 220);
                success: oklch(0.65 0.20 145);
                warning: oklch(0.75 0.15 85);
                error: oklch(0.55 0.22 27);
              }

              typography {
                family: "Inter, sans-serif";
                base: 16px;
                scale: 1.25;
                weights: [300, 400, 500, 600, 700];
                line-heights: [1.2, 1.4, 1.6];
                tracking: [-0.02em, 0, 0.02em, 0.05em];
              }

              spacing {
                base: 4px;
              }

              motion {
                duration-fast: 100ms;
                duration-normal: 200ms;
                duration-slow: 400ms;
                easing-default: cubic-bezier(0.4, 0, 0.2, 1);
                easing-in: cubic-bezier(0.4, 0, 1, 1);
                easing-out: cubic-bezier(0, 0, 0.2, 1);
                reduced-motion: duration 0ms;
              }

              elevation {
                level-1: 0 1px 2px oklch(0 0 0 / 0.05);
                level-2: 0 2px 4px oklch(0 0 0 / 0.10);
                level-3: 0 4px 8px oklch(0 0 0 / 0.15);
              }

              radius {
                sm: 0.25rem;
                md: 0.375rem;
                lg: 0.5rem;
                full: 9999px;
              }
            }
            ```

            ## Step 3: Create a Theme Variant

            Use `extends` to derive a variant:

            ```
            @version(1)
            theme ocean-compact [extends ocean] {
              purpose {
                Compact variant of ocean with tighter spacing.
              }
              spacing {
                base: 2px;
              }
              typography {
                base: 14px;
              }
            }
            ```

            ## Step 4: Check WCAG Contrast

            The palette generator ensures AA compliance (4.5:1 for
            normal text, 3:1 for large text).

            ## Token Hierarchy

            ```
            Primitive          → Semantic          → Component
            color.blue.500       color.primary        button.bg
            font.size.base       font.body            input.fontSize
            spacing.4            spacing.md           card.padding
            ```
    register:
      examples:
