  # ─── SurfaceThemeScaffoldGen: create-theme ─────
  create-theme:
    concept: SurfaceThemeScaffoldGen
    steps:
      - action: register
        title: "Register Generator"
        prose: "Self-register with PluginRegistry so KindSystem can track ThemeConfig → SurfaceTheme transformations. Registration is also handled automatically by register-generator-kinds.sync."
      - action: preview
        title: "Preview Changes"
        prose: "Dry-run the generation using Emitter content-addressing to classify each output file as new, changed, or unchanged. No files are written."
      - action: generate
        title: "Generate Clef Surface Theme"
        prose: "Generate a complete design system theme scaffold including palette configuration (OKLCH color scales with WCAG contrast), typography scale (modular ratio), motion definitions (with reduced-motion support), elevation scale (shadow layers), and light/dark theme manifests. Sync rules then cascade: create-theme-emit.sync routes files through Emitter, create-theme-record-cache.sync records output in BuildCache, and create-theme-observer.sync tracks the run in GenerationPlan."
      - title: "Edit the Theme Specification"
        prose: >
          Open the generated .theme file and refine each section:
          1. Write a purpose block describing the theme's design intent.
          2. Define palette colors using oklch() for perceptual uniformity.
          3. Set typography scale with font families, sizes (modular ratio), weights, line-heights, and tracking.
          4. Configure spacing tokens with a consistent base multiplier.
          5. Define motion durations and easing curves (respect prefers-reduced-motion).
          6. Set elevation shadow scale (0-5 levels).
          7. Define radius tokens for border rounding.
          8. Verify all text/background pairs meet WCAG AA contrast (4.5:1).
          9. If extending a base theme, only override changed tokens.
    checklists:
      generate:
        - "Theme name is kebab-case?"
        - "Primary color generates full 50-950 scale?"
        - "Palette has semantic roles (primary, secondary, error, etc.)?"
        - "WCAG contrast ratios meet AA standard (4.5:1 normal, 3:1 large)?"
        - "Typography uses modular ratio scale?"
        - "Motion respects prefers-reduced-motion?"
        - "Elevation scale covers 0-5 levels?"
        - "Light and dark themes are generated (if mode=both)?"
        - "Palette uses oklch() for perceptual uniformity?"
        - "Spacing follows a consistent base multiplier?"
        - "Radius tokens defined?"
        - "All files written through Emitter (not directly to disk)?"
        - "Source provenance attached to each file?"
        - "Generation step recorded in GenerationPlan?"
    design-principles:
      - title: "Token-Based Design"
        rule: "Every visual value is a named design token — no hardcoded colors, sizes, or shadows anywhere in component code."
      - title: "WCAG Compliance"
        rule: "Every color pair must meet WCAG 2.1 AA contrast (4.5:1 normal text, 3:1 large text). The generator validates at generation time."
      - title: "Reduced Motion Respect"
        rule: "All motion durations collapse to 0ms when prefers-reduced-motion is active. This is built into the motion token system, not opt-in."
      - title: "Theme Layering"
        rule: "Themes are layered: base + variants. Multiple variants can be active simultaneously, resolved by priority then activation order."
    references:
      - path: references/surface-theme-guide.md
        label: "Clef Surface design system and theme architecture"
        tier: reference
        content: |
          # Clef Surface Theme Architecture

          How the design system works in the Clef Surface.

          ## Token Hierarchy

          ```
          Primitive Tokens     →  Semantic Tokens    →  Component Tokens
          color.blue.500           color.primary          button.background
          font.size.base           font.body              input.fontSize
          spacing.4                spacing.md             card.padding
          ```

          ## Palette Generation

          Colors are generated from a seed hue using OKLCH perceptual color space:

          ```json
          {
            "primary": {
              "seed": "220",
              "scale": {
                "50": "hsl(220, 65%, 97%)",
                "100": "hsl(220, 65%, 93%)",
                "500": "hsl(220, 65%, 50%)",
                "900": "hsl(220, 65%, 18%)",
                "950": "hsl(220, 65%, 12%)"
              },
              "roles": {
                "default": "500",
                "hover": "600",
                "active": "700",
                "subtle": "100"
              }
            }
          }
          ```

          ## Typography Scale

          Uses modular ratio (default: major third, 1.25):

          | Name | Scale Factor | Size (16px base) |
          |------|-------------|------------------|
          | xs | 0.64 | 10.24px |
          | sm | 0.80 | 12.80px |
          | base | 1.00 | 16.00px |
          | lg | 1.25 | 20.00px |
          | xl | 1.56 | 25.00px |
          | 2xl | 1.95 | 31.25px |
          | 3xl | 2.44 | 39.06px |

          ## Motion System

          ```json
          {
            "durations": {
              "instant": "0ms",
              "fast": "100ms",
              "normal": "200ms",
              "slow": "300ms"
            },
            "reducedMotion": {
              "respectPreference": true,
              "fallbackDuration": "0ms"
            }
          }
          ```

          ## Elevation Scale

          | Level | Use Case | Shadow |
          |-------|----------|--------|
          | 0 | Flat | none |
          | 1 | Raised (card) | subtle |
          | 2 | Floating (dropdown) | medium |
          | 3 | Overlay (popover) | strong |
          | 4 | Modal (dialog) | heavy |
          | 5 | Top (toast) | maximum |

          ## WCAG Contrast Requirements

          | Standard | Normal Text | Large Text |
          |----------|------------|------------|
          | AA | 4.5:1 | 3:1 |
          | AAA | 7:1 | 4.5:1 |
      - path: references/theme-grammar.md
        label: "Theme specification grammar"
        tier: reference
        content: |
          # Theme Grammar Reference

          ## Top-Level Structure

          ```
          [@version(N)]
          theme theme-name [extends base-theme] {
            purpose { ... }
            palette { colorName: oklch(L C H / A) }
            typography {
              fontVar: "Name", fallback
              styleKey: { size: 1rem; weight: 600; lineHeight: 1.5; tracking: 0.01em; family: var }
            }
            spacing { key: 4px }
            motion {
              durationKey: 250ms
              easingKey: cubic-bezier(0.2, 0, 0, 1)
            }
            elevation { key: shadow-spec }
            radius { key: 8px }
          }
          ```

          Color formats: `oklch()`, `hsl()`, `#RRGGBB`.
          Extends: `theme dark extends light { ... }` — only override changed tokens.
    validation-commands:
      - label: "Generate a Clef Surface theme scaffold"
        command: "npx tsx cli/src/index.ts scaffold theme --name ocean --primary 220 --font 'Inter, sans-serif'"
      - label: "Run scaffold generator tests"
        command: "npx vitest run tests/scaffold-generators.test.ts"
    quick-reference:
      heading: "Quick Reference"
      body: |
        | Input | Type | Purpose |
        |-------|------|---------|
        | name | String | Theme name (kebab-case) |
        | primaryColor | String | Primary color hue or hex value |
        | secondaryColor | String | Secondary color hue or hex |
        | fontFamily | String | Primary font stack |
        | baseSize | Int | Base font size in pixels (default: 16) |
        | scale | Float | Modular ratio (default: 1.25 major third) |
        | borderRadius | String | Default border radius |
        | mode | String | light, dark, or both (default: both) |

        **Output Files:**
        | File | Purpose |
        |------|---------|
        | `suite.yaml` | Theme suite manifest |
        | `themes/{name}-light.json` | Light theme tokens |
        | `themes/{name}-dark.json` | Dark theme tokens |
        | `tokens/palette.json` | Color scale configuration |
        | `tokens/typography.json` | Type scale and font stacks |
        | `tokens/motion.json` | Animation timing and easing |
        | `tokens/elevation.json` | Shadow scale |
    related-workflows:
      - name: create-widget
        description: "Generate components to use the theme tokens"
      - name: create-suite
        description: "Generate suite manifests for theme packages"
    anti-patterns:
      - title: "Hardcoded colors in components"
        description: "Component uses raw hex values instead of design tokens."
        bad: |
          .button { background: #3b82f6; color: #ffffff; }
        good: |
          .button {
            background: var(--color-primary);
            color: var(--color-on-primary);
          }
      - title: "Ignoring reduced motion"
        description: "Animations play regardless of prefers-reduced-motion setting."
        bad: |
          .dialog { transition: transform 300ms ease; }
        good: |
          .dialog {
            transition: transform var(--motion-duration-slow) var(--motion-ease-default);
          }
          @media (prefers-reduced-motion: reduce) {
            .dialog { transition-duration: 0ms; }
          }

  # ─── ScoreApi: score-navigator ───────────────────────
  score-navigator:
    concept: ScoreApi
    steps:
      - action: listConcepts
        title: "Survey the Architecture"
        prose: "List all concepts to understand the application's domain model and concept graph."
      - action: getConcept
        title: "Inspect a Concept"
        prose: "Get full details of a concept — purpose, type parameters, actions, state fields, invariants."
      - action: listSyncs
        title: "Map the Sync Network"
        prose: "List all syncs to understand cross-concept coordination rules."
      - action: getFlow
        title: "Trace Action Flows"
        prose: "Follow the chain of effects from any starting action through syncs to downstream actions."
      - action: search
        title: "Search the Codebase"
        prose: "Use natural language search across the project. Combines embeddings, text, and symbols."
      - action: getDependencies
        title: "Analyze Dependencies"
        prose: "Trace dependencies and dependents to understand impact before making changes."
    design-principles:
      - title: "Query, Don't Grep"
        rule: "Score provides structured queries — use them instead of raw file reading."
      - title: "Concepts Are Independent"
        rule: "No concept references another — all coupling is through syncs."
      - title: "Variants Over Exceptions"
        rule: "Every action outcome is an explicit named variant."
    anti-patterns:
      - title: "Bypassing Score for raw file access"
        description: "Reading .concept files directly instead of using Score queries — misses parsing, validation, and cross-references."
        bad: |
          # Manually grep for concept actions
          grep -r "action create" repertoire/
        good: |
          # Use Score API
          score listConcepts
          score getConcept --name User
          score getFlow --from User/create
      - title: "Assuming concept coupling"
        description: "Looking for direct references between concepts — concepts are independent by design."
        bad: |
          # Wrong: searching for concept-to-concept imports
          grep "import.*from.*User" repertoire/profile/
        good: |
          # Right: find syncs that connect User and Profile
          score listSyncs --involves User,Profile

  # ─── StorageProgram: functional-handler-builder ─────
  functional-handler-builder:
    concept: StorageProgram
    steps:
      - action: create
        title: "Build a Storage Program"
        prose: "Construct a StorageProgram<A> using the free monad DSL — a pure data description of storage operations with no side effects."
      - action: get
        title: "Read State via Get/Find"
        prose: "Append get() or find() instructions to read from concept storage. Each binds a result name for downstream use."
      - action: put
        title: "Write State via Put/Merge/Del"
        prose: "Append put(), merge(), or del() instructions to write concept storage. Write effects are tracked structurally."
      - action: getLens
        title: "Access State via Lenses"
        prose: "Use typed, composable lenses instead of raw string keys: relation('users').at(id).field('email'). Lenses enable impact analysis and automatic migration scripts."
      - action: branch
        title: "Branch on Conditions"
        prose: "Use branch() for conditional logic — effects from both arms are merged conservatively for purity analysis."
      - action: complete
        title: "Terminate with Variant Completion"
        prose: "Use complete(variant, output) to terminate the program with a tracked completion variant for algebraic effect coverage."
      - action: compose
        title: "Compose Programs (Monadic Bind)"
        prose: "Use compose(first, bindAs, second) for monadic bind — run first, bind result, then run second. Effects are merged."
    checklists:
      create:
        - "Program uses the DSL (createProgram, get, put, etc.) — never calls storage directly?"
        - "All read operations bind a result name for downstream use?"
        - "Program terminates with complete() or pure()?"
        - "Declared purity matches actual effects (pure < read-only < read-write)?"
        - "Completion variants match the concept spec's declared variants?"
        - "Lenses used for state field access where possible?"
        - "Independent reads identified for applicative parallelism?"
    design-principles:
      - title: "Programs Are Data, Not Effects"
        rule: "A StorageProgram is a pure data structure describing operations. No side effects occur until the interpreter executes it. This enables inspection, analysis, caching, and replay."
      - title: "Structural Effect Tracking"
        rule: "Effects (reads, writes, completions, transport) are accumulated during DSL construction in O(1). Purity is a first-class, build-time property — not a post-hoc analysis."
      - title: "Lens Over Strings"
        rule: "Use typed lenses (relation/at/field) instead of raw string keys. Lenses compose, invert, and enable DataFlowPath analysis, schema migration, and change impact detection."
      - title: "Applicative Parallelism (Haxl/Stitch Pattern)"
        rule: "Independent get/find operations that don't share bindings can be batched into a single round-trip. The ParallelismProvider detects these automatically."
      - title: "Algebraic Effect Coverage"
        rule: "Use complete() instead of pure() for terminal values. This tracks completion variants structurally, enabling CompletionCoverage to verify every variant has a matching sync handler."
    references:
      - path: references/storage-program-dsl.md
        label: "StorageProgram DSL reference"
        tier: reference
        content: |
          # StorageProgram — Free Monad DSL Reference

          A `StorageProgram<A>` is a pure data description of storage operations
          that produces a value of type `A` when interpreted. Handlers build
          programs using DSL functions; the interpreter executes them against
          a real ConceptStorage backend.

          ## Core DSL Functions

          | Function | Effect | Description |
          |----------|--------|-------------|
          | `createProgram()` | — | Create empty program |
          | `get(p, relation, key, bindAs)` | read | Read one record |
          | `find(p, relation, criteria, bindAs)` | read | Query by criteria |
          | `put(p, relation, key, value)` | write | Create/update record |
          | `merge(p, relation, key, fields)` | read+write | Partial update |
          | `del(p, relation, key)` | write | Delete record |
          | `branch(p, condition, then, else)` | both | Conditional logic |
          | `pure(p, value)` | — | Terminate with value |
          | `complete(p, variant, output)` | — | Terminate with tracked variant |
          | `compose(first, bindAs, second)` | both | Monadic bind |

          ## Lens Functions

          | Function | Description |
          |----------|-------------|
          | `relation(name)` | Lens focusing on a storage relation |
          | `at(lens, key)` | Narrow to a specific record |
          | `field(lens, name)` | Narrow to a specific field |
          | `composeLens(outer, inner)` | Compose two lenses |
          | `getLens(p, lens, bindAs)` | Read through a lens |
          | `putLens(p, lens, value)` | Write through a lens |
          | `modifyLens(p, lens, fn)` | Read-modify-write through a lens |

          ## Transport Effects

          | Function | Description |
          |----------|-------------|
          | `perform(p, protocol, op, payload, bindAs)` | Abstract transport effect |
          | `performFrom(p, protocol, op, payloadFn, bindAs)` | Transport from bindings |

          ## Binding-Aware Variants

          | Function | Description |
          |----------|-------------|
          | `putFrom(p, relation, key, valueFn)` | Put with value from bindings |
          | `mergeFrom(p, relation, key, fieldsFn)` | Merge with fields from bindings |
          | `delFrom(p, relation, keyFn)` | Delete with key from bindings |
          | `mapBindings(p, fn, bindAs)` | Pure computation on bindings |
          | `pureFrom(p, fn)` | Terminate with value from bindings |

          ## Effect Set & Purity

          ```typescript
          interface EffectSet {
            reads: ReadonlySet<string>;       // Relations read
            writes: ReadonlySet<string>;      // Relations written
            completionVariants: ReadonlySet<string>; // Variant tags
            performs: ReadonlySet<string>;     // protocol:operation pairs
          }

          type Purity = 'pure' | 'read-only' | 'read-write';
          ```

          - `purityOf(program)` — derive purity from structural effects
          - `classifyPurity(program)` — with fallback for deserialized programs
          - `validatePurity(program, declared)` — check declared vs actual

          ## Example: Functional Create Handler

          ```typescript
          import { createProgram, find, put, branch, complete } from '../runtime/storage-program';

          const createUser = (input: Record<string, unknown>) => {
            const name = input.name as string;
            const email = input.email as string;
            const id = input.user as string;

            let p = createProgram();
            p = find(p, 'user', { email }, 'existing');

            const alreadyExists = createProgram();
            const done = complete(alreadyExists, 'error', { message: 'email taken' });

            const doCreate = createProgram();
            const created = put(doCreate, 'user', id, { name, email });
            const ok = complete(created, 'ok', { user: id });

            return branch(p, (b) => (b.existing as unknown[]).length > 0, done, ok);
          };
          ```

          ## Example: Lens-Based Access

          ```typescript
          import { createProgram, getLens, modifyLens, complete, relation, at, field } from '../runtime/storage-program';

          const updateEmail = (input: Record<string, unknown>) => {
            const userId = input.user as string;
            const newEmail = input.email as string;
            const userLens = at(relation('user'), userId);
            const emailLens = field(userLens, 'email');

            let p = createProgram();
            p = getLens(p, userLens, 'current');
            p = modifyLens(p, emailLens, () => ({ email: newEmail }));
            return complete(p, 'ok', { user: userId });
          };
          ```
      - path: references/monadic-analysis.md
        label: "Program analysis providers"
        tier: reference
        content: |
          # Monadic Program Analysis Providers

          Pluggable analysis providers registered with ProgramAnalysis
          and dispatched by sync wiring.

          ## ReadWriteSetProvider
          Extracts the set of relations read and written by a program.
          Used by CommutativityProvider and purity validation.

          ## CommutativityProvider
          Determines whether two StoragePrograms commute:
          `!(A.writes ∩ B.reads) && !(B.writes ∩ A.reads) && !(A.writes ∩ B.writes)`

          ## ParallelismProvider (Applicative Analysis)
          Analyzes instruction dependency graphs to find independent
          operations that can execute concurrently (Haxl/Stitch pattern).
          Returns: layers, dependency edges, critical path, max parallelism,
          speedup ratio.

          ## DeadBranchProvider
          Identifies unreachable branches in a program's branch tree.

          ## InvariantExtractionProvider
          Extracts properties suitable for formal verification.

          ## LensExtractionProvider
          Extracts implicit lenses from get/put/del string-based access patterns.

          ## LensStructuralDiffProvider
          Computes structural diffs between lens schemas for migration.

          ## VariantExtractionProvider
          Extracts completion variant tags reachable from branch structure.
          Enables dead-variant detection and sync coverage analysis.

          ## TransportEffectProvider
          Extracts protocol:operation pairs from perform instructions.
          Enables static verification that every transport effect has
          a registered EffectHandler.
    validation-commands:
      - label: "Run monadic handler tests"
        command: "npx vitest run tests/monadic-handlers.test.ts"
      - label: "Run effect typing tests"
        command: "npx vitest run tests/effect-typing.test.ts"
      - label: "Run parallelism provider tests"
        command: "npx vitest run tests/parallelism-provider.test.ts"
      - label: "Run lens tests"
        command: "npx vitest run tests/lens.test.ts"
      - label: "Run algebraic effects tests"
        command: "npx vitest run tests/algebraic-effects.test.ts"
    quick-reference:
      heading: "StorageProgram DSL Quick Reference"
      body: |
        | Operation | DSL Function | Effect Tracking |
        |-----------|-------------|-----------------|
        | Read one | `get(p, rel, key, bind)` | reads += rel |
        | Query | `find(p, rel, criteria, bind)` | reads += rel |
        | Write | `put(p, rel, key, value)` | writes += rel |
        | Partial update | `merge(p, rel, key, fields)` | reads += rel, writes += rel |
        | Delete | `del(p, rel, key)` | writes += rel |
        | Lens read | `getLens(p, lens, bind)` | reads += lens.relation |
        | Lens write | `putLens(p, lens, value)` | writes += lens.relation |
        | Lens modify | `modifyLens(p, lens, fn)` | reads += rel, writes += rel |
        | Branch | `branch(p, cond, then, else)` | union of both arms |
        | Transport | `perform(p, proto, op, payload, bind)` | performs += proto:op |
        | Complete | `complete(p, variant, out)` | completionVariants += variant |
        | Bind | `compose(first, bind, second)` | union of both programs |
    related-workflows:
      - name: implementation-builder
        description: "Imperative handler style (ConceptHandler with async/await)"
      - name: concept-designer
        description: "Design the concept spec that functional handlers implement"
      - name: sync-designer
        description: "Write syncs — CompletionCoverage verifies all variants have sync handlers"
      - name: score-navigator
        description: "Score queries for navigating monadic handler entities"
    anti-patterns:
      - title: "Calling storage directly in a functional handler"
        description: "Functional handlers must return StoragePrograms, never call storage.get()/put() directly."
        bad: |
          const createUser: FunctionalConceptHandler = {
            create(input) {
              // WRONG: directly calling storage
              const existing = await storage.find('user', { email });
              await storage.put('user', id, data);
              return { variant: 'ok', user: id };
            },
          };
        good: |
          const createUser: FunctionalConceptHandler = {
            create(input) {
              let p = createProgram();
              p = find(p, 'user', { email }, 'existing');
              return branch(p,
                (b) => (b.existing as unknown[]).length > 0,
                complete(createProgram(), 'error', { message: 'email taken' }),
                complete(put(createProgram(), 'user', id, data), 'ok', { user: id })
              );
            },
          };
      - title: "Declaring wrong purity level"
        description: "Claiming read-only but the program actually writes — purity validation catches this at build time."
        bad: |
          { id: 'user-create', concept: 'User', action: 'create',
            purity: 'read-only',  // WRONG: create writes!
            factory: createUser }
        good: |
          { id: 'user-create', concept: 'User', action: 'create',
            purity: 'read-write',  // Correct: create writes user relation
            factory: createUser }
      - title: "Using string keys instead of lenses"
        description: "Raw string keys lose type safety, composability, and impact analysis."
        bad: |
          p = get(p, 'user', userId, 'record');
          // No type checking, no migration support, no impact analysis
        good: |
          const userLens = at(relation('user'), userId);
          p = getLens(p, userLens, 'record');
          // Typed, composable, enables automatic migration scripts

  # ─── RenderTransform: functorial-render ────────────
  functorial-render:
    concept: RenderTransform
    steps:
      - action: registerKind
        title: "Register Transform Kind"
        prose: "Register a transform kind provider (token-remap, a11y-adapt, bind-rewrite, custom)."
      - action: register
        title: "Register a Named Transform"
        prose: "Register a named transform instance with a kind and spec configuration."
      - action: apply
        title: "Apply Transform (Functor fmap)"
        prose: "Apply a transform to a render program. Satisfies functor identity law: apply(p, kind, emptySpec) = p."
      - action: compose
        title: "Compose Transforms (Functor Composition)"
        prose: "Compose multiple transforms. Satisfies functor composition law: apply(p, compose([f, g])) = apply(apply(p, f), g)."
    checklists:
      apply:
        - "Transform satisfies functor identity law (empty spec = identity)?"
        - "Composed transforms satisfy functor composition law?"
        - "Accessibility transforms preserve WCAG compliance?"
        - "Theme token remaps cover all referenced tokens?"
    design-principles:
      - title: "Functorial Composition"
        rule: "Theme switching and a11y variants are composable transformations over render programs — not separate code paths. apply(p, compose([f,g])) = apply(apply(p, f), g)."
      - title: "Provider Dispatch via Syncs"
        rule: "Transform kinds (token-remap, a11y-adapt, etc.) are registered as providers and dispatched through sync wiring — zero hardcoding."
    references:
      - path: references/render-transform-providers.md
        label: "Render transform provider reference"
        tier: reference
        content: |
          # Render Transform Providers

          ## TokenRemapProvider
          Maps design tokens from one palette to another. Used for
          theme switching: `palette.primary → palette.primary-dark`.

          ## A11yAdaptProvider
          Accessibility adaptations: high contrast mode, reduced motion,
          focus indicators. Transforms preserve WCAG compliance.

          ## BindRewriteProvider
          Rewrites data bindings in render programs. Used when concept
          state field names change but the widget spec hasn't been updated.

          ## CustomTransformProvider
          Arbitrary transformations via user-supplied functions.

          ## TransformExtractionProvider
          Extracts which transforms have been applied to a render program
          for auditing and debugging.
    related-workflows:
      - name: functional-handler-builder
        description: "StorageProgram monad — the handler-side equivalent of render program transforms"

  # ─── View Query Pipeline: create-view-query ────────
  create-view-query:
    concept: QueryProgram
    steps:
      - action: create
        title: "Create QueryProgram"
        prose: "Initialize an empty query program. The program starts with no instructions, no bindings, and terminated=false."
      - action: scan
        title: "Scan Data Source"
        prose: "Append a Scan instruction that reads all records from a named source relation. The record set is bound to a bindAs name."
      - action: filter
        title: "Apply Filter"
        prose: "Append a Filter instruction with a serialized FilterNode predicate. Only records satisfying the predicate are kept."
      - action: sort
        title: "Apply Sort"
        prose: "Append a Sort instruction ordering records by a JSON SortKey array. Empty keys preserve existing order."
      - action: group
        title: "Apply Grouping"
        prose: "Append a Group instruction partitioning records by key fields with aggregation options (count, sum, list)."
      - action: project
        title: "Project Fields"
        prose: "Append a Project instruction selecting a subset of fields from each record. Unselected fields are dropped."
      - action: join
        title: "Join Relations"
        prose: "Append a Join instruction enriching records by joining against a second relation on matching fields (e.g., schema membership joins)."
      - action: limit
        title: "Limit Records"
        prose: "Append a Limit instruction truncating to at most N records."
      - action: offset
        title: "Offset (Skip) Records"
        prose: "Append an Offset instruction skipping the first N records. Used with Limit for pagination: offset(20) + limit(10) returns records 20-29. Both offset and limit are kernel capabilities — pushed to backend (SQL OFFSET/LIMIT, API query params)."
      - action: pure
        title: "Terminate Program"
        prose: "Seal the program with a terminal variant and output binding. No further instructions may be appended. The program's terminated flag becomes true."
      - action: compose
        title: "Compose Programs"
        prose: "Monadic bind: chain two programs — run first, bind its output to bindAs, then continue with second. Inherits the union of both readFields."
      - action: fixture
        title: "Add .view Fixtures"
        prose: "Add fixture blocks to the .view file declaring ViewShell + child spec data for testing invariants. Each fixture names a specType (dataSource, filter, sort, group, projection, presentation, interaction, pagination) with key-value fields. The test generator seeds mock storage from fixtures, then runs compileAndAnalyze to assert invariants."
    checklists:
      create:
        - "Does the view have a DataSourceSpec defining where data comes from?"
        - "Are FilterSpec, SortSpec, GroupSpec, ProjectionSpec defined as independent concepts?"
        - "Is the ViewShell wired to assemble individual specs via view-resolve.sync?"
        - "Does the query terminate with pure (sealed)?"
        - "For joined views, is join before filter (not after)?"
      filter:
        - "FilterNode tree is valid JSON?"
        - "Field references in the tree match the data source schema?"
        - "Parameters use {{varName}} syntax for runtime substitution?"
        - "Filters composed via FilterSpec/compose, not manual AND trees?"
      sort:
        - "Sort key direction is 'asc' or 'desc'?"
        - "Composition order correct? (primary sort first, tiebreaker second)"
    design-principles:
      - title: "Decomposed View Configuration"
        rule: "Each view concern (filter, sort, group, project, data source, presentation) is its own independent concept. They compose through syncs into ViewShell, not through imports or coupling."
      - title: "QueryProgram is Sealed After Pure"
        rule: "Once pure() is called, the program is terminated. No further instructions can be appended. This is the monadic return — it enables safe caching/memoization and prevents accidental mutation."
      - title: "FilterSpec is Algebraic"
        rule: "Filters compose via AND trees. The identity filter is {type:'true'}. Composition is associative. This enables incremental filter building in UIs."
      - title: "SortSpec Composition is Ordered"
        rule: "Sort composition is NOT commutative. compose(byName, byDate) means sort by name then break ties by date. This matches user mental models."
      - title: "Schema-Scoped Data Sources"
        rule: "When a view shows data from a single schema, ALWAYS use listBySchema in the DataSourceSpec instead of list + client-side schema filter. listBySchema does a server-side join returning pre-filtered, schema-enriched results in one query. Use list only when the view genuinely shows all content types with interactive schema toggles."
      - title: "PaginationSpec for Paginated Views"
        rule: "When a view needs pagination, include 'pagination' in the ViewShell features set and provide a PaginationSpec ref. The PaginationSpec manages mode (offset, cursor, keyset), page size, and position. compile-query injects offset+limit from PaginationSpec/evaluate. paginate-on-execute updates the spec's totalCount after query execution."
      - title: "ViewShell Selective Features"
        rule: "Views declare which specs they need via the features field: a JSON array of enabled feature names (filter, sort, group, projection, interaction, pagination). Always-on: dataSource, presentation. view-resolve.sync only fetches child specs for enabled features. .view files declare features in a features {} block."
      - title: "Per-Schema Denormalized Relations"
        rule: "schema-index-on-apply.sync maintains denormalized schema:{name} relations. listBySchema reads from these directly instead of joining membership + node tables. This eliminates the O(M+N) full-table join — a single find('schema:Article', {}, { limit: 50 }) suffices."
      - title: "Split Execution by sourceType"
        rule: "Filters are partitioned by sourceType for split execution: system + contextual push to backend, interactive + search run locally in-memory. This lets views fetch pre-filtered data from the kernel while keeping toggle filters responsive without round-trips. For E2EE (encrypted-local kind), ALL processing runs locally after client-side decrypt."
      - title: "Pushdown for Remote Sources"
        rule: "RemoteQueryProvider splits a QueryProgram into pushdown (sent to API) and residual (executed in-memory). Views over REST APIs get the same composable experience as local queries."
    references:
      - path: references/query-program-grammar.md
        label: "QueryProgram instruction grammar and pipeline reference"
        tier: reference
        content: |
          # QueryProgram — Instruction Grammar Reference

          A `QueryProgram` is an ordered sequence of query instructions describing
          what a view fetches and transforms, without executing side effects.

          ## Instruction Types

          | Instruction | Action | Parameters | Effect |
          |-------------|--------|-----------|--------|
          | Scan | `scan` | source, bindAs | Read all records from source relation |
          | Filter | `filter` | node (FilterNode JSON), bindAs | Keep only matching records |
          | Sort | `sort` | keys (SortKey[] JSON), bindAs | Order records |
          | Group | `group` | keys, config (aggregation), bindAs | Partition and aggregate |
          | Project | `project` | fields (field[] JSON), bindAs | Select subset of fields |
          | Limit | `limit` | count, output | Truncate to N records |
          | Offset | `offset` | count, output | Skip first N records (for pagination) |
          | Join | `join` | source, localField, foreignField, bindAs | Enrich via relation join |
          | Pure | `pure` | variant, output | Seal program (terminal) |
          | Compose | `compose` | first, second, bindAs | Monadic bind (chain) |

          ## FilterNode Types

          ```json
          { "type": "eq", "field": "kind", "value": "concept" }
          { "type": "neq", "field": "status", "value": "archived" }
          { "type": "gt", "field": "count", "value": 10 }
          { "type": "gte", "field": "count", "value": 10 }
          { "type": "lt", "field": "count", "value": 100 }
          { "type": "lte", "field": "count", "value": 100 }
          { "type": "contains", "field": "name", "value": "auth" }
          { "type": "in", "field": "status", "value": ["active", "draft"] }
          { "type": "exists", "field": "metadata.tags" }
          { "type": "and", "children": [ <FilterNode>, ... ] }
          { "type": "or", "children": [ <FilterNode>, ... ] }
          { "type": "not", "child": <FilterNode> }
          { "type": "true" }    // identity — matches everything
          ```

          ## SortKey Format

          ```json
          [
            { "field": "name", "direction": "asc" },
            { "field": "updatedAt", "direction": "desc" }
          ]
          ```

          Empty array `[]` = identity sort (preserves existing order).

          ## Pipeline Shapes

          **Simple**: `scan → filter → sort → project → pure`

          **With schema join**: `scan → join(membership) → filter → sort → project → pure`

          **With grouping**: `scan → filter → group(aggregation) → sort → project → pure`

          **Remote pushdown**: QueryProgram → `planPushdown` → API call + residual in-memory

          **Composed**: `compose(programA, programB, bindAs)` — chain two programs

          ## View Suite Concepts

          | Concept | Role |
          |---------|------|
          | DataSourceSpec | Declares where data comes from (concept-action, remote-api, search-index, inline) |
          | FilterSpec | Named predicate trees with algebraic composition and normalization |
          | SortSpec | Ordered sort keys with non-commutative composition |
          | GroupSpec | Hierarchical grouping with aggregation and HAVING |
          | ProjectionSpec | Field selection, formatting, computed fields, weights |
          | PresentationSpec | Display type (table, card-grid, board, etc.) and hints |
          | InteractionSpec | Row actions, bulk operations, user controls |
          | ViewShell | Assembles all specs into a resolved view config |
          | FilterRepresentation | Converts FilterNode IR ↔ UI formats (toggle-group, DSL, URL params) |
          | QueryExecution | Dispatches programs to kernel/in-memory/remote/federated providers |
          | RemoteQueryProvider | External API execution with pushdown optimization |

          ## Syncs

          | Sync | Tier | What it does |
          |------|------|-------------|
          | view-resolve | required | Assembles specs into ViewShell |
          | compose-filters | recommended | Composes FilterSpec predicates with FilterRepresentation |
          | compile-query | optional | Builds QueryProgram from ViewShell |
          | execute-query | optional | Dispatches QueryProgram to QueryExecution |
          | filter-from-dsl | optional | Parses DSL string → FilterSpec |
          | filter-to-dsl | optional | Serializes FilterSpec → DSL string |
          | execute-remote-query | optional | Routes to RemoteQueryProvider |
          | compile-remote-query | optional | Compiles for remote data sources |
      - path: references/view-grammar.md
        label: ".view file grammar reference"
        tier: reference
        content: |
          # .view File Grammar Reference

          The `.view` file format is parsed by a recursive descent parser at `handlers/ts/framework/view-spec-parser.ts`. This document describes the complete grammar.

          ## Top-Level Structure

          ```
          view "<name>" {
            shell: "<view-shell-name>"

            features {
              <feature-name>
              ...
            }

            fixture <name> {
              <specType>: {
                <key>: "<value>"
                ...
              }
              ...
            }

            purpose {
              <free-text description>
            }

            invariants {
              <invariant blocks>
            }
          }
          ```

          A `.view` file is an assertion manifest over a compiled QueryProgram. It references a ViewShell by name, optionally restricts which features are active, declares fixtures for test data, and declares invariants that the compiled query must satisfy.

          ## View Header

          ```
          view "<name>" {
          ```

          - `name` is a string literal identifying this view manifest (must be unique across the project)

          ## Shell Reference

          ```
          shell: "<view-shell-name>"
          ```

          - Required. References a ViewShell by name. The ViewShell is compiled into a QueryProgram at test time.

          ## Features Section

          ```
          features {
            filter
            sort
            pagination
            projection
          }
          ```

          - Optional. Declares which ViewShell features are active for this view.
          - When omitted, all features are enabled (backward-compatible default).
          - When present, only the listed features are enabled; the ViewShell's child spec slots for disabled features are ignored during query compilation.
          - Feature names may appear one per line or space/comma separated.
          - **Valid feature names:** `filter`, `sort`, `group`, `projection`, `interaction`, `pagination`
          - Two features are always-on and cannot appear in this block: `dataSource` and `presentation`.
          - Invalid feature names produce a parse error with the line and column.

          ### Features and ViewAnalysis

          The `features` block affects the `ViewAnalysis` record available to invariants:

          | Target | Type | Description |
          |---|---|---|
          | `enabledFeatures` | set String | Features listed in the block (or all features if block omitted) |
          | `disabledFeatures` | set String | Features absent from the block |

          When a feature is disabled, its corresponding field set in `ViewAnalysis` is always empty:
          - `filter` disabled -> `filterFields = []`
          - `sort` disabled -> `sortFields = []`
          - `group` disabled -> `groupFields = []`
          - `projection` disabled -> `projectedFields = []`
          - `interaction` disabled -> `invokedActions = []`, `invokeCount = 0`

          ## Fixture Section

          ```
          fixture <name> {
            <specType>: {
              <key>: "<value>"
              ...
            }
            ...
          }
          ```

          Fixtures declare ViewShell + child spec data for testing invariants. Each fixture is a named data state -- the test generator seeds mock storage from the fixture, then runs `compileAndAnalyze` and asserts the invariants against it.

          - `<name>` is an identifier (e.g., `default`, `minimal`, `paginated`)
          - Each `<specType>` block declares fields for a child spec record
          - Valid spec types: `dataSource`, `filter`, `sort`, `group`, `projection`, `presentation`, `interaction`, `pagination`
          - Values must be double-quoted strings (the tokenizer does not support single quotes)
          - JSON values must use escaped double quotes: `"{\"field\":\"name\"}"`
          - Multiple fixtures are allowed -- each creates an independent test scenario
          - No `after` keyword (fixtures are data declarations, not action sequences)
          - No `-> variant` (invariants handle assertions, not fixtures)

          ### Spec Type Fields

          | Spec Type | Common Fields |
          |-----------|--------------|
          | `dataSource` | `kind` ("concept-action", "remote-api"), `config` (JSON string) |
          | `filter` | `node` (FilterNode JSON) |
          | `sort` | `keys` (SortKey[] JSON) |
          | `group` | `fields` (field names), `config` (aggregation JSON) |
          | `projection` | `fields` (ProjectionField[] JSON) |
          | `presentation` | `displayType` ("table", "card-grid", etc.), `hints` (JSON) |
          | `interaction` | `createForm` (JSON), `rowClick` (JSON), `rowActions` (JSON) |
          | `pagination` | `mode` ("offset", "cursor"), `pageSize` (number) |

          ### Fixture Example

          ```
          fixture default {
            dataSource: {
              kind: "concept-action",
              config: "{\"concept\":\"ContentNode\",\"action\":\"listBySchema\",\"params\":{\"schema\":\"Concept\"}}"
            }
            filter: {
              node: "{\"type\":\"eq\",\"field\":\"kind\",\"value\":\"concept\"}"
            }
            sort: {
              keys: "[{\"field\":\"name\",\"direction\":\"asc\"}]"
            }
            projection: {
              fields: "[{\"key\":\"name\",\"label\":\"Name\"},{\"key\":\"kind\",\"label\":\"Kind\"}]"
            }
            presentation: {
              displayType: "table",
              hints: "{}"
            }
          }
          ```

          ### Test Generation from Fixtures

          The `generate-view-tests.ts` script reads fixtures and generates `storage.put()` calls:
          1. Each child spec becomes a record in the appropriate relation
          2. A ViewShell record is created pointing to all child spec refs
          3. `compileAndAnalyze(shellName, storage)` builds the QueryProgram
          4. Each invariant assertion runs against the analysis result

          Views without fixtures generate test stubs with a `// No fixture declared` comment.

          ## Purpose Section

          ```
          purpose {
            <free-text description of the view's intent and usage>
          }
          ```

          - Optional. Free-text block describing what the view does.
          - Parsed as all tokens between `{` and matching `}`, joined with spaces and whitespace-normalized.

          ## Invariants Section

          ```
          invariants {
            <invariant blocks>
          }
          ```

          Contains one or more named invariant blocks.

          ### `always` -- Universal property

          ```
          always "<name>": {
            <assertion>
          }
          ```

          Asserts that a property holds for every compiled QueryProgram from this view.

          ### `never` -- Negated property

          ```
          never "<name>": {
            <assertion>
          }
          ```

          Asserts that a condition must never hold.

          ### `example` -- Concrete test case

          ```
          example "<name>": {
            after compile
            then <assertion>
            and  <assertion>
          }
          ```

          A concrete test scenario. The `after compile` step triggers QueryProgram compilation. `then` and `and` steps assert properties of the compiled result.

          ### `forall` -- Quantified property

          ```
          forall <var> in <collection>:
          <assertion using var>
          ```

          Can appear as a top-level invariant or inline within `always`/`never` bodies.

          ## Assertion Targets

          View invariants operate on a `ViewAnalysis` record:

          | Target | Type | Source |
          |---|---|---|
          | `purity` | String | QueryPurityProvider |
          | `readFields` | set String | QueryPurityProvider |
          | `invokedActions` | set String | QueryPurityProvider |
          | `invocations` | set String | InvokeEffectProvider |
          | `invokeCount` | Int | InvokeEffectProvider |
          | `coveredVariants` | set String | QueryCompletionCoverage |
          | `uncoveredVariants` | set String | QueryCompletionCoverage |
          | `totalVariants` | Int | QueryCompletionCoverage |
          | `coveredCount` | Int | QueryCompletionCoverage |
          | `sourceFields` | set String | DataSourceSpec |
          | `filterFields` | set String | FilterSpec (empty when filter disabled) |
          | `sortFields` | set String | SortSpec (empty when sort disabled) |
          | `groupFields` | set String | GroupSpec (empty when group disabled) |
          | `projectedFields` | set String | ProjectionSpec (empty when projection disabled) |
          | `enabledFeatures` | set String | Features active for this view |
          | `disabledFeatures` | set String | Features absent from the `features {}` block |

          ## Predicate Operators

          ```
          # Equality
          purity = "read-only"
          invokeCount = 0

          # Inequality
          invokedActions != {}
          purity != "read-write"

          # Set membership
          "Task/escalate" in invokedActions
          f in sourceFields

          # Set emptiness
          uncoveredVariants = []
          invokedActions != {}

          # Subset
          projectedFields subset readFields

          # String prefix
          ia startsWith "Task/"

          # Quantifiers
          forall f in readFields: f in sourceFields
          exists ia in invokedActions: ia startsWith "Admin/"

          # Logical connectives
          purity = "read-write" implies invokedActions != {}
          purity = "read-only" and invokeCount = 0
          ```

          ## Comments

          Both `#` and `//` styles are supported, matching the concept parser.

          ## Complete Example

          ```
          view "task-board-actions" {
            shell: "task-board"

            features {
              filter
              sort
              interaction
            }

            fixture default {
              dataSource: {
                kind: "concept-action",
                config: "{\"concept\":\"Task\",\"action\":\"list\"}"
              }
              filter: {
                node: "{\"type\":\"true\"}"
              }
              sort: {
                keys: "[{\"field\":\"priority\",\"direction\":\"desc\"}]"
              }
              presentation: {
                displayType: "board",
                hints: "{}"
              }
              interaction: {
                rowActions: "[{\"key\":\"escalate\",\"concept\":\"Task\",\"action\":\"escalate\"}]"
              }
            }

            purpose {
              Task board with bulk escalate and archive actions. Read-write
              view dispatching through Task concept via the sync engine.
            }

            invariants {
              always "purity is read-write": {
                purity = "read-write"
              }

              always "invokes only Task concept": {
                forall ia in invokedActions:
                ia startsWith "Task/"
              }

              always "all invoke variants covered": {
                uncoveredVariants = []
              }

              never "read-only purity with invokes": {
                purity = "read-only" and invokedActions != {}
              }
            }
          }
          ```

          ## Test Generation

          `.view` files generate tests via `scripts/generate-view-tests.ts`:

          ```bash
          npx tsx scripts/generate-view-tests.ts              # all views
          npx tsx scripts/generate-view-tests.ts --filter task # filter by name
          ```

          Generated tests go to `generated/tests/<view-name>.view.test.ts`.
