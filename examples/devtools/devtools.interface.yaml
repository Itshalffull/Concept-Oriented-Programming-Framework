    concept:
      tool-permissions: [Read, Write, Bash]
      argument-template: "--name <ConceptName>"
      trigger-description: >
        Use when creating a new concept specification from scratch. Generates
        a .concept file with annotations (@version, @category, @visibility,
        @gate), purpose, state (with groups, enum types, record types),
        actions with typed variants, invariants, capabilities block, and a
        register() action following Jackson's methodology.
      intro-template: >
        Scaffold a concept spec for **$ARGUMENTS** with annotations, state
        declarations (groups, enums, records), typed action signatures,
        capabilities, and a register() action.
      companion-docs:
        - path: examples/scaffold-concept.md
          label: "Concept spec scaffolding walkthrough"
          content: |
            # Walkthrough: Scaffolding a Concept Spec

            This walkthrough creates a `Bookmark` concept from inputs.

            ## Step 1: Generate the Concept Scaffold

            ```bash
            clef scaffold concept --name Bookmark \
              --param B \
              --purpose "Allow users to save and organize references to items." \
              --actions add,remove,list \
              --version 2 \
              --category domain
            ```

            ## Step 2: Refine Annotations and State

            Edit `bookmark.concept`:

            ```
            @version(2)
            @category("domain")
            @visibility("public")
            concept Bookmark [B] {
              purpose {
                Allow users to save and organize references to items.
              }

              state {
                bookmarks: set B
                owner: B -> U        # who owns it
                item: B -> I         # what it references
                label: B -> option String

                group timestamps {
                  created: B -> String
                  updated: B -> option String
                }
              }
            }
            ```

            ## Step 3: Add Enum and Record Types

            ```
            state {
              status: B -> enum { active, archived, deleted }
              metadata: B -> record { tags: list String, priority: Int }
            }
            ```

            ## Step 4: Refine Action Signatures

            ```
            action add(item: I, label: option String) {
              -> ok(bookmark: B) { Bookmark created. }
              -> duplicate(item: I) { Item already bookmarked. }
            }
            ```

            ## Step 5: Add Invariants

            ```
            invariant {
              after add(item: i) -> ok(bookmark: b)
              then add(item: i) -> duplicate(item: i)
            }
            ```

            ## Step 6: Add Capabilities (optional)

            ```
            capabilities {
              search
              export
              bulk-operations
            }
            ```

            ## Step 7: Add Gate Annotation (optional)

            For async-gated concepts:
            ```
            @gate
            concept Approval [A] { ... }
            ```

            ## Step 8: Validate

            ```bash
            clef check specs/app/bookmark.concept
            ```
