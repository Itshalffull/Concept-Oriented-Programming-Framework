  # ─── FlowTrace: trace-debugger ────────────────────
  trace-debugger:
    concept: FlowTrace
    steps:
      - action: build
        title: "Build Execution Trace"
        prose: "Build a trace from a flow ID showing which concepts were invoked, what syncs fired, and data flow between them."
      - action: render
        title: "Render Trace Output"
        prose: "Render the trace tree as a human-readable output with timing, success/failure status, and data flow arrows."
    checklists:
      build:
        - "Flow ID exists in action log?"
        - "All causal links followed (action → sync → action)?"
        - "Timing data captured for each node?"
      render:
        - "Tree indentation correct?"
        - "Failed nodes highlighted?"
        - "Data flow arrows show variable propagation?"
    design-principles:
      - title: "Causal Completeness"
        rule: "The trace shows the complete causal chain — every action that fired because of the initial trigger, not just the immediate effects."
      - title: "Non-Intrusive"
        rule: "Tracing reads the action log — it never modifies runtime behavior or adds overhead to normal execution."
    references:
      - path: references/debugging.md
        label: "Debugging with FlowTrace"
        tier: reference
        content: |
          # Debugging with FlowTrace

          FlowTrace builds causal execution trees from the action log,
          showing every concept action and sync firing triggered by
          an initial action.

          ## Reading a Trace

          ```
          Flow abc-123
          ├─ User/create => ok [user: u1]        2ms
          │  ├─ [sync: CreateProfile] eager
          │  │  └─ Profile/create => ok [profile: p1]  1ms
          │  └─ [sync: WelcomeEmail] eventual
          │     └─ Email/send => ok               45ms
          └─ total: 48ms
          ```

          **Reading the tree:**
          - Root node is the initial action.
          - Indented children are syncs that fired from the parent.
          - `[sync: Name]` shows which sync rule triggered the action.
          - Timing shows per-node and total duration.

          ## Common Debugging Scenarios

          ### Sync didn't fire
          1. Check the when-clause variant matches the actual completion.
          2. Verify variable bindings — a misspelled binding silently fails.
          3. Check sync mode — eventual syncs execute asynchronously.

          ### Unexpected cascade
          1. Look for broad pattern matches (missing variant name).
          2. Check if multiple syncs react to the same completion.
          3. Look for circular chains: A→B→C→A.

          ### Slow execution
          1. Look for deep nesting (long sync chains).
          2. Check eventual syncs for slow external calls.
          3. Look for N+1 patterns in where-clause queries.

          ## Trace Commands

          | Command | Purpose |
          |---------|---------|
          | `clef trace <flow-id>` | Build and display a trace |
          | `clef trace <flow-id> --json` | Output trace as JSON |
          | `clef trace --recent` | Show last 10 flow traces |
    validation-commands:
      - label: "Build a trace"
        command: "npx tsx cli/src/index.ts trace <flow-id>"
    quick-reference:
      heading: "Quick Reference"
      body: |
        | Action | Command | Purpose |
        |--------|---------|---------|
        | build | `clef trace <flow-id>` | Build trace from a flow ID |
        | render | (automatic) | Render trace as tree output |
    related-workflows:
      - name: sync-designer
        description: "Design the syncs whose execution traces debug"
      - name: concept-validator
        description: "Validate specs before debugging runtime issues"
      - name: dev-workflow
        description: "Run the dev server to generate flow IDs for tracing"
  # ─── DeploymentValidator: deployment-config ────────
  deployment-config:
    concept: DeploymentValidator
    steps:
      - action: validate
        title: "Validate Deployment Manifest"
        prose: "Validate that deployment manifests correctly map concepts to runtimes, assign syncs to engines, and satisfy capability requirements."
    checklists:
      validate:
        - "Every concept mapped to a runtime?"
        - "Sync engine assignments cover all syncs?"
        - "Transport adapters match concept locations?"
        - "Capability requirements satisfied by target runtimes?"
    design-principles:
      - title: "Declarative Deployment"
        rule: "The deployment manifest declares intent (what runs where), not imperative steps — the framework resolves transport and engine assignments."
      - title: "Capability Matching"
        rule: "Each runtime declares capabilities (storage types, transport protocols) and the validator checks that every concept's needs are met."
    references:
      - path: references/deployment-guide.md
        label: "Deployment configuration guide"
        tier: reference
        content: |
          # Deployment Configuration Guide

          A deployment manifest maps concepts to runtimes, assigns syncs
          to engines, and configures transport between runtimes.

          ## Manifest Structure

          ```yaml
          deployment:
            name: my-app
            version: 1.0.0

          runtimes:
            api:
              type: node
              concepts: [User, Article, Comment]
              capabilities: [storage-postgres, transport-http]
            worker:
              type: node
              concepts: [Email, Notification]
              capabilities: [storage-redis, transport-amqp]

          engines:
            default:
              type: in-process
              syncs: [CreateProfile, UpdateCache]
            async:
              type: queue
              syncs: [WelcomeEmail, NotifyOnComment]

          transports:
            api-to-worker:
              type: http
              from: api
              to: worker
              endpoint: http://worker:3001
          ```

          ## Runtime Configuration

          Each runtime declares:
          - **type** — Execution environment (node, deno, edge)
          - **concepts** — Which concepts run in this runtime
          - **capabilities** — Available storage and transport types

          ## Engine Assignment

          Sync engines execute sync rules. Types:
          - `in-process` — Runs within the concept's runtime. For eager syncs.
          - `queue` — Uses a message queue. For eventual syncs.
          - `distributed` — Cross-runtime engine. For multi-runtime syncs.

          ## Validation Rules

          The validator checks:
          1. Every concept is assigned to exactly one runtime.
          2. Every sync is assigned to an engine.
          3. Cross-runtime syncs have a transport adapter configured.
          4. Runtime capabilities satisfy concept requirements.
      - path: references/transport-adapters.md
        label: "Transport adapter configuration"
        tier: reference
        content: |
          # Transport Adapter Reference

          Transport adapters enable cross-runtime communication when
          concepts in different runtimes need to interact through syncs.

          ## Adapter Types

          | Type | Use Case | Latency |
          |------|----------|---------|
          | `http` | REST-based communication | Medium |
          | `websocket` | Bidirectional real-time | Low |
          | `amqp` | Message queue (RabbitMQ) | Medium |
          | `in-process` | Same runtime (no transport) | None |

          ## HTTP Adapter

          ```yaml
          transports:
            api-to-worker:
              type: http
              from: api
              to: worker
              endpoint: http://worker:3001
              timeout: 5000
              retries: 3
          ```

          ## WebSocket Adapter

          ```yaml
          transports:
            realtime:
              type: websocket
              from: api
              to: client
              path: /ws
          ```

          ## AMQP Adapter

          ```yaml
          transports:
            async-bridge:
              type: amqp
              from: api
              to: worker
              url: amqp://rabbitmq:5672
              exchange: clef-events
              queue: worker-tasks
          ```

          ## When to Use Transports

          - **Same runtime**: No transport needed. Syncs run in-process.
          - **Two runtimes, same machine**: Use `http` or `in-process` IPC.
          - **Distributed**: Use `amqp` for reliability or `websocket` for
            low-latency bidirectional communication.
    validation-commands:
      - label: "Validate deployment manifest"
        command: "npx tsx cli/src/index.ts deploy --validate"
      - label: "Run deployment validator tests"
        command: "npx vitest run tests/deployment-validator.test.ts"
    quick-reference:
      heading: "Quick Reference"
      body: |
        | Section | Purpose | Required |
        |---------|---------|----------|
        | runtimes | Map concepts to execution environments | Yes |
        | engines | Assign sync engines to sync groups | Yes |
        | transports | Configure cross-runtime communication | If multi-runtime |
        | capabilities | Declare runtime capabilities | Recommended |
    related-workflows:
      - name: concept-validator
        description: "Validate concept specs before deployment"
      - name: cache-build
        description: "Pre-compile artifacts for faster deployment"
      - name: suite-lifecycle
        description: "Manage suites that bundle deployed concepts"
    anti-patterns:
      - title: "Missing transport for cross-runtime sync"
        description: "Two concepts in different runtimes connected by a sync but no transport adapter configured."
        bad: |
          runtimes:
            api: { concepts: [User] }
            worker: { concepts: [Email] }
          syncs:
            - SendWelcome  # User -> Email, but no transport!
        good: |
          runtimes:
            api: { concepts: [User] }
            worker: { concepts: [Email] }
          transports:
            api-to-worker: { type: http, from: api, to: worker }
          syncs:
            - SendWelcome  # Now has a transport path

  # ─── ProjectScaffold: project-initializer ──────────
  project-initializer:
    concept: ProjectScaffold
    steps:
      - action: scaffold
        title: "Scaffold New Project"
        prose: "Create a new CLEF project directory with specs, syncs, implementations, and configuration files."
    checklists:
      scaffold:
        - "Project name is valid (kebab-case, no conflicts)?"
        - "Directory structure created correctly?"
        - "Example concept spec is parseable?"
        - "Configuration files have sensible defaults?"
    design-principles:
      - title: "Minimal Viable Structure"
        rule: "Scaffold the minimum needed to run `clef check` and `clef generate` — don't overload with unused templates."
      - title: "Convention Over Configuration"
        rule: "Project follows standard directory layout (specs/, syncs/, implementations/) so tools work without configuration."
    references:
      - path: references/project-structure.md
        label: "Standard project directory layout"
        tier: reference
        content: |
          # Standard Project Directory Layout

          A CLEF project follows a convention-over-configuration directory
          structure. Tools expect this layout to work without extra config.

          ## Directory Tree

          ```
          my-app/
          ├── specs/                 # Concept specifications
          │   ├── user.concept
          │   ├── article.concept
          │   └── comment.concept
          ├── syncs/                 # Synchronization rules
          │   ├── create-profile.sync
          │   └── welcome-email.sync
          ├── implementations/       # Handler code
          │   ├── user.handler.ts
          │   ├── article.handler.ts
          │   └── comment.handler.ts
          ├── suites/                  # Reusable concept packages
          │   └── auth-suite/
          │       ├── suite.yaml
          │       ├── concepts/
          │       └── syncs/
          ├── tests/                 # Conformance and integration tests
          │   ├── user.test.ts
          │   └── syncs.test.ts
          ├── generated/             # Auto-generated output (do not edit)
          │   ├── manifests/
          │   └── types/
          ├── deploy.yaml            # Deployment manifest
          └── clef.config.yaml       # Project configuration
          ```

          ## Key Directories

          | Directory | Purpose | File Types |
          |-----------|---------|------------|
          | `specs/` | Concept definitions | `.concept` |
          | `syncs/` | Sync rules | `.sync` |
          | `implementations/` | Handler code | `.handler.ts` |
          | `suites/` | Reusable packages | `suite.yaml` + subdirs |
          | `generated/` | Auto-generated (gitignored) | `.ts`, `.json` |
          | `tests/` | Tests | `.test.ts` |

          ## Configuration File

          ```yaml
          # clef.config.yaml
          project:
            name: my-app
            version: 0.1.0
          specs:
            dir: ./specs
          syncs:
            dir: ./syncs
          output:
            dir: ./generated
          ```
    validation-commands:
      - label: "Validate scaffolded project"
        command: "npx tsx cli/src/index.ts check"
    quick-reference:
      heading: "Quick Reference"
      body: |
        | Directory | Purpose | Contains |
        |-----------|---------|----------|
        | specs/ | Concept specifications | .concept files |
        | syncs/ | Synchronization rules | .sync files |
        | implementations/ | Handler code | .handler.ts files |
        | suites/ | Suite manifests | suite.yaml + concepts + syncs |
    related-workflows:
      - name: concept-designer
        description: "Design concepts for the new project"
      - name: suite-lifecycle
        description: "Bundle concepts into reusable suites"
      - name: dev-workflow
        description: "Start the dev server for the new project"

  # ─── SuiteManager: suite-lifecycle ─────────────────────
  suite-lifecycle:
    concept: SuiteManager
    steps:
      - action: init
        title: "Create Suite"
        prose: "Scaffold a new suite directory with suite.yaml, concept and sync subdirectories, and example files."
      - action: validate
        title: "Validate Suite"
        prose: "Validate a suite manifest, its concept specs, sync definitions, and cross-suite references."
      - action: test
        title: "Test Suite"
        prose: "Run conformance and integration tests for the suite."
      - action: list
        title: "List Active Suites"
        prose: "List all suites used by the current application."
      - action: checkOverrides
        title: "Check Overrides"
        prose: "Verify that application sync overrides reference valid syncs in the target suite."
    checklists:
      init:
        - "Suite name follows naming convention?"
        - "Suite.yaml has required fields (name, version, description)?"
        - "Example concept spec is valid?"
      validate:
        - "All concept specs parse successfully?"
        - "All sync files compile?"
        - "Cross-suite references resolve?"
        - "Type parameters align across concepts?"
      test:
        - "Conformance tests pass?"
        - "Integration tests pass?"
        - "No failing assertions?"
      checkOverrides:
        - "Override references valid syncs?"
        - "Override parameters match original sync signature?"
    design-principles:
      - title: "Suite as Reusable Unit"
        rule: "A suite bundles related concepts and syncs into a single distributable package — like an npm package for CLEF."
      - title: "Cross-Suite Isolation"
        rule: "Concepts in one suite never reference concepts in another suite directly — cross-suite integration happens through syncs and type parameter alignment."
      - title: "Required vs Recommended Syncs"
        rule: "Suite syncs are tiered: required syncs are load-bearing, recommended syncs provide useful defaults, integration syncs wire to other suites."
    references:
      - path: references/suite-structure.md
        label: "Suite manifest and directory structure"
        tier: reference
        content: |
          # Suite Manifest and Directory Structure

          A suite bundles related concepts and syncs into a reusable package.

          ## Suite Directory

          ```
          my-suite/
          ├── suite.yaml              # Suite manifest
          ├── concepts/             # Concept specs
          │   ├── user.concept
          │   └── profile.concept
          ├── syncs/                # Internal syncs
          │   └── create-profile.sync
          ├── implementations/      # Default implementations
          │   ├── user.handler.ts
          │   └── profile.handler.ts
          └── tests/                # Suite tests
              └── conformance.test.ts
          ```

          ## Suite Manifest (suite.yaml)

          ```yaml
          suite:
            name: auth
            version: 1.0.0
            description: Authentication and identity management

          concepts:
            - concepts/user.concept
            - concepts/password.concept
            - concepts/session.concept

          syncs:
            required:
              - syncs/validate-session.sync
            recommended:
              - syncs/create-profile.sync
            integration:
              - syncs/audit-login.sync

          typeParameters:
            User: [U]
            Session: [S, U]

          dependencies: []
          ```

          ## Sync Tiers

          | Tier | Meaning | Override? |
          |------|---------|-----------|
          | `required` | Load-bearing, must be active | No |
          | `recommended` | Useful defaults | Yes |
          | `integration` | Wire to other suites | Yes |

          ## Suite vs Application Syncs

          Suite syncs wire concepts *within* the suite. Application syncs
          wire *across* suites. Applications can override recommended
          and integration syncs but not required syncs.
      - path: references/suite-publishing.md
        label: "Publishing and versioning suites"
        tier: reference
        content: |
          # Publishing and Versioning Suites

          ## Versioning

          Suites follow semantic versioning:
          - **Major** — Breaking changes to concept specs or required syncs.
          - **Minor** — New concepts, new optional syncs, new actions.
          - **Patch** — Bug fixes, documentation, implementation improvements.

          ## Publishing Workflow

          1. **Validate** — `clef suite validate ./suites/my-suite`
          2. **Test** — `clef suite test ./suites/my-suite`
          3. **Version** — Update `suite.yaml` version field.
          4. **Package** — `clef suite pack ./suites/my-suite`
          5. **Publish** — `clef suite publish ./suites/my-suite`

          ## Registry

          Suites are published to a registry (npm-compatible):

          ```bash
          # Publish to default registry
          clef suite publish ./suites/my-suite

          # Publish to custom registry
          clef suite publish ./suites/my-suite --registry https://my-registry.com
          ```

          ## Installing Suites

          ```bash
          clef suite add auth@1.0.0
          ```

          This adds the suite to the project's `clef.config.yaml`:

          ```yaml
          suites:
            - name: auth
              version: 1.0.0
              overrides:
                syncs:
                  - syncs/custom-profile.sync  # Override recommended sync
          ```

          ## Breaking Change Guidelines

          When making a breaking change:
          1. Bump major version.
          2. Document migration steps.
          3. Provide a migration sync if state schema changed.
    anti-patterns:
      - title: "Cross-suite concept reference"
        description: "Suite A's concept imports Suite B's types directly instead of using type parameters."
        bad: |
          # In suite-a/concepts/order.concept
          concept Order [O] {
            state { customer: O -> kit_b.User }  # Direct reference!
          }
        good: |
          # In suite-a/concepts/order.concept
          concept Order [O, U] {
            state { customer: O -> U }  # Type parameter, wired by sync
          }
      - title: "Monolithic suite"
        description: "Suite bundles unrelated concepts — violates the reusable unit principle."
        bad: |
          # suite.yaml
          suite: { name: everything }
          concepts: [User, Article, Payment, Analytics, Email, Notification]
        good: |
          # Split into focused suites
          suite: { name: content }   # concepts: [Article, Tag, Comment]
          suite: { name: commerce }  # concepts: [Payment, Invoice, Refund]
    validation-commands:
      - label: "Validate a suite"
        command: "npx tsx cli/src/index.ts suite validate ./suites/my-suite"
      - label: "Run suite tests"
        command: "npx tsx cli/src/index.ts suite test ./suites/my-suite"
      - label: "List active suites"
        command: "npx tsx cli/src/index.ts suite list"
    quick-reference:
      heading: "Quick Reference"
      body: |
        | Action | Command | Purpose |
        |--------|---------|---------|
        | init | `clef suite init <name>` | Scaffold a new suite |
        | validate | `clef suite validate <path>` | Validate suite manifest |
        | test | `clef suite test <path>` | Run suite tests |
        | list | `clef suite list` | List active suites |
        | checkOverrides | `clef suite check-overrides <path>` | Verify sync overrides |
    related-workflows:
      - name: concept-designer
        description: "Design concepts to include in the suite"
      - name: sync-designer
        description: "Write syncs that wire suite concepts together"
      - name: deployment-config
        description: "Deploy suites to production runtimes"

  # ─── DevServer: dev-workflow ───────────────────────
  dev-workflow:
    concept: DevServer
    steps:
      - action: start
        title: "Start Dev Server"
        prose: "Start a local development server that watches for changes and auto-recompiles."
      - action: status
        title: "Check Status"
        prose: "Check whether the dev server is running and view uptime stats."
      - action: stop
        title: "Stop Server"
        prose: "Stop the running development server."
    checklists:
      start:
        - "Port is available?"
        - "Specs and syncs directories exist?"
        - "Initial compilation succeeds?"
      status:
        - "Server is responsive?"
        - "Last recompile was successful?"
    design-principles:
      - title: "Watch and Recompile"
        rule: "The dev server watches .concept and .sync files for changes and recompiles automatically — no manual rebuild step."
      - title: "Fast Feedback Loop"
        rule: "Recompilation should complete in under a second for typical projects — parse errors show immediately."
    references:
      - path: references/dev-workflow.md
        label: "Development workflow guide"
        tier: reference
        content: |
          # Development Workflow Guide

          The CLEF dev server provides a fast feedback loop for iterating
          on concept specs and sync rules.

          ## Starting the Dev Server

          ```bash
          clef dev --port 3000
          ```

          The dev server:
          1. Parses all `.concept` files in `specs/`.
          2. Compiles all `.sync` files in `syncs/`.
          3. Generates manifests and types.
          4. Watches for file changes and re-runs on save.

          ## Development Cycle

          1. **Edit a .concept file** — Save triggers reparse + validation.
          2. **Edit a .sync file** — Save triggers recompile + binding check.
          3. **Edit a .handler.ts file** — Save triggers type check against manifest.
          4. **View errors** — Parse/compile errors show in terminal immediately.

          ## Watch Mode Behavior

          | File Change | Action Taken |
          |-------------|-------------|
          | `.concept` modified | Reparse spec, regenerate manifest |
          | `.sync` modified | Recompile sync, recheck bindings |
          | `.handler.ts` modified | Type-check against manifest |
          | `clef.config.yaml` modified | Full restart |

          ## Debugging During Dev

          The dev server assigns flow IDs to every action invocation.
          Use `clef trace <flow-id>` to debug execution chains.

          ## Performance

          - Incremental recompilation: only changed files are reprocessed.
          - Typical recompile time: under 100ms for small-medium projects.
          - Full rebuild on config change or first start.
    validation-commands:
      - label: "Start dev server"
        command: "npx tsx cli/src/index.ts dev --port 3000"
      - label: "Check dev server status"
        command: "npx tsx cli/src/index.ts dev status"
    quick-reference:
      heading: "Quick Reference"
      body: |
        | Action | Command | Purpose |
        |--------|---------|---------|
        | start | `clef dev --port <port>` | Start dev server |
        | status | `clef dev status` | Check if running |
        | stop | `clef dev stop` | Stop the server |
    related-workflows:
      - name: concept-validator
        description: "Validate specs that the dev server watches"
      - name: trace-debugger
        description: "Debug flows generated during dev server sessions"
      - name: cache-build
        description: "Pre-compile for production after dev iteration"
  # ─── SuiteScaffoldGen: create-suite ──────────────────
  create-suite:
    concept: SuiteScaffoldGen
    steps:
      - action: register
        title: "Register Generator"
        prose: "Self-register with PluginRegistry so KindSystem can track KitConfig → KitManifest transformations. Registration is also handled automatically by register-generator-kinds.sync."
      - action: preview
        title: "Preview Changes"
        prose: "Dry-run the generation using Emitter content-addressing to classify each output file as new, changed, or unchanged. No files are written."
      - action: generate
        title: "Generate Suite Manifest"
        prose: "Generate a suite.yaml manifest with concept declarations, sync tier groupings, type parameter alignment, and directory structure stubs. Sync rules then cascade: suite-scaffold-emit.sync routes files through Emitter, suite-scaffold-record-cache.sync records output in BuildCache, and suite-scaffold-observer.sync tracks the run in GenerationPlan."
      - action: edit
        title: "Edit the Suite Manifest"
        prose: "Refine the generated suite.yaml: add concept specs with type parameters and `as` tags, declare syncs grouped by tier (required, recommended, integration), set dependencies with semver constraints, and add infrastructure declarations for domain suites."
    checklists:
      generate:
        - "Suite name is kebab-case?"
        - "Version is valid semver?"
        - "All listed concepts have matching .concept stub files?"
        - "Syncs are grouped by tier (required/recommended/integration)?"
        - "Type parameter `as` tags are kebab-case with -ref suffix?"
        - "Dependencies use semver constraints?"
        - "All files written through Emitter (not directly to disk)?"
        - "Source provenance attached to each file?"
        - "Generation step recorded in GenerationPlan?"
    design-principles:
      - title: "Convention Over Configuration"
        rule: "Generated suite.yaml follows the standard layout — concepts at top, syncs by tier, uses for external references. Tools work without extra configuration."
      - title: "Type Parameter Alignment"
        rule: "Every concept's type parameter has an `as` tag that enables cross-concept type alignment. Concepts sharing the same `as` tag share the same entity type."
      - title: "Sync Tier Discipline"
        rule: "Required syncs protect data integrity. Recommended syncs provide useful defaults. Integration syncs wire to external suites. Never promote a recommended sync to required without justification."
    references:
      - path: references/suite-manifest-schema.md
        label: "Suite manifest (suite.yaml) schema reference"
        tier: reference
        content: |
          # Suite Manifest Schema Reference

          Complete schema for `suite.yaml` manifest files.

          ## Root Structure

          ```yaml
          suite:
            name: my-suite           # kebab-case
            version: 0.1.0         # semver
            description: >         # Multi-line description
              What this suite provides.
          ```

          ## Concepts Section

          ```yaml
          concepts:
            ConceptName:
              spec: ./concept-name.concept
              params:
                T: { as: concept-ref, description: "Reference to a ConceptName" }
          ```

          **Rules:**
          - Concept names are PascalCase
          - File names are kebab-case
          - Type parameters are single capital letters
          - The `as` tag enables cross-concept type alignment

          ## Syncs Section

          ```yaml
          syncs:
            required:
              - path: ./syncs/validate-before-save.sync
                description: "Prevents invalid state — removal causes corruption."
            recommended:
              - path: ./syncs/notify-on-change.sync
                name: NotifyOnChange
                description: "Sends notifications — apps can override or disable."
            integration:
              - path: ./syncs/audit-log.sync
                name: AuditLog
                description: "Logs changes — activated by audit suite."
          ```

          | Tier | Overridable | Disableable | When to Use |
          |------|------------|-------------|-------------|
          | required | No | No | Removal causes data corruption |
          | recommended | Yes | Yes | Useful defaults apps can customize |
          | integration | Yes | Depends | Cross-suite wiring |

          ## Uses Section

          ```yaml
          uses:
            - suite: auth
              concepts:
                - name: User
                  params: { U: { as: user-ref } }
            - suite: storage
              optional: true
              concepts:
                - name: Database
          ```

          ## Infrastructure Section (domain suites only)

          ```yaml
          infrastructure:
            transports:
              - name: http
                path: ./transports/http-transport.ts
            storage:
              - name: sqlite
                path: ./storage/sqlite-storage.ts
            deployTemplates:
              - path: ./deploy-templates/default.deploy.yaml
          ```

          ## Dependencies

          ```yaml
          dependencies:
            - auth: ">=1.0.0"
            - surface-core: ">=0.2.0"
          ```
      - path: references/type-alignment.md
        label: "Cross-concept type parameter alignment"
        tier: reference
        content: |
          # Type Parameter Alignment

          Type parameters connect concepts without violating independence.

          ## How It Works

          1. Concept A declares `params: { U: { as: user-ref } }`
          2. Concept B declares `params: { X: { as: user-ref } }`
          3. Both use `user-ref` — the framework unifies A's `U` with B's `X`

          ## Example

          ```yaml
          concepts:
            User:
              spec: ./user.concept
              params:
                U: { as: user-ref }
            Session:
              spec: ./session.concept
              params:
                S: { as: session-ref }
                U: { as: user-ref }    # Same tag → same entity type
          ```

          Now `Session`'s `U` and `User`'s `U` refer to the same entity,
          enabling syncs to pass user references between them.
    validation-commands:
      - label: "Generate a suite scaffold"
        command: "npx tsx cli/src/index.ts scaffold suite --name my-suite --concepts User,Session"
      - label: "Validate generated suite"
        command: "npx tsx cli/src/index.ts suite validate ./suites/my-suite"
      - label: "Run scaffold generator tests"
        command: "npx vitest run tests/scaffold-generators.test.ts"
    quick-reference:
      heading: "Quick Reference"
      body: |
        | Input | Type | Purpose |
        |-------|------|---------|
        | name | String | Suite name (kebab-case) |
        | description | String | Suite purpose description |
        | concepts | list String | PascalCase concept names |
        | syncs | list {name, tier} | Sync declarations with tiers |
        | dependencies | list String | External suite dependencies |
        | isDomain | Boolean | Include infrastructure section |
    related-workflows:
      - name: suite-lifecycle
        description: "Manage suite versions and dependencies after scaffolding"
      - name: create-concept
        description: "Generate concept specs for the suite's concepts"
      - name: create-sync
        description: "Generate sync rules for the suite's syncs"
    anti-patterns:
      - title: "Missing type parameter alignment"
        description: "Concepts in the same suite lack `as` tags, preventing cross-concept type unification."
        bad: |
          concepts:
            User:
              spec: ./user.concept
              params:
                U: {}
            Session:
              spec: ./session.concept
              params:
                S: {}
        good: |
          concepts:
            User:
              spec: ./user.concept
              params:
                U: { as: user-ref }
            Session:
              spec: ./session.concept
              params:
                S: { as: session-ref }
                U: { as: user-ref }
      - title: "Flat sync list without tiers"
        description: "All syncs listed without tier annotation — impossible to know which are safe to override."
        bad: |
          syncs:
            - syncs/validate.sync
            - syncs/notify.sync
            - syncs/audit.sync
        good: |
          syncs:
            required:
              - path: ./syncs/validate.sync
            recommended:
              - path: ./syncs/notify.sync
                name: Notify

  # ─── DeployScaffoldGen: create-deployment ────────────
  create-deployment:
    concept: DeployScaffoldGen
    steps:
      - action: register
        title: "Register Generator"
        prose: "Self-register with PluginRegistry so KindSystem can track DeployConfig → DeployManifest transformations. Registration is also handled automatically by register-generator-kinds.sync."
      - action: preview
        title: "Preview Changes"
        prose: "Dry-run the generation using Emitter content-addressing to classify each output file as new, changed, or unchanged. No files are written."
      - action: generate
        title: "Generate Deploy Manifest"
        prose: "Generate a deploy.yaml manifest with runtime configurations, infrastructure declarations, concept-to-runtime assignments, and build settings. Sync rules then cascade: deploy-scaffold-emit.sync routes files through Emitter, deploy-scaffold-record-cache.sync records output in BuildCache, and deploy-scaffold-observer.sync tracks the run in GenerationPlan."
      - action: edit
        title: "Edit the Deployment Manifest"
        prose: "Refine the generated deploy.yaml: map concepts to runtimes, assign syncs to engines, configure transport adapters for cross-runtime communication, and declare runtime capabilities and resource limits."
    checklists:
      generate:
        - "App name is valid?"
        - "Every runtime has a type and transport?"
        - "Infrastructure storage backends match runtime storage refs?"
        - "Every listed concept has a runtime assignment?"
        - "IaC provider is set (terraform, cloudformation, pulumi, docker-compose)?"
        - "Build section specifies compiler and test runner?"
        - "All files written through Emitter (not directly to disk)?"
        - "Source provenance attached to each file?"
        - "Generation step recorded in GenerationPlan?"
    design-principles:
      - title: "Declarative Over Imperative"
        rule: "The deploy manifest declares intent (what runs where) — the framework resolves transport, storage, and engine assignments."
      - title: "Runtime Isolation"
        rule: "Each concept runs in exactly one runtime. Cross-runtime communication uses transport adapters configured in the infrastructure section."
      - title: "Infrastructure as Code"
        rule: "The IaC provider setting enables `clef deploy` to generate Terraform, CloudFormation, or Pulumi resources from the manifest."
    references:
      - path: references/deploy-manifest-schema.md
        label: "Deploy manifest (deploy.yaml) schema reference"
        tier: reference
        content: |
          # Deploy Manifest Schema Reference

          Complete schema for `deploy.yaml` manifest files.

          ## Root Structure

          ```yaml
          app:
            name: my-app
            version: "0.1.0"
          ```

          ## Runtimes

          ```yaml
          runtimes:
            api:
              type: node
              transport: http
              storage: postgresql
              iac: terraform
              config:
                cpu: 256
                memory: 512
                replicas: 2
            worker:
              type: node
              transport: sqs
              storage: redis
            engine:
              engine: true
              transport: http
          ```

          | Field | Required | Description |
          |-------|----------|-------------|
          | type | Yes | Runtime type (node, deno, edge) |
          | transport | Yes | Communication protocol |
          | storage | No | Persistence backend |
          | iac | No | IaC provider for this runtime |
          | config | No | Resource limits and scaling |

          ## Infrastructure

          ```yaml
          infrastructure:
            storage:
              postgresql:
                type: postgresql
                config:
                  host: localhost
                  port: 5432
            transports:
              http:
                type: http
                config:
                  port: 3000
            iac:
              provider: terraform
          ```

          ## Concepts

          ```yaml
          concepts:
            User:
              spec: ./specs/app/user.concept
              implementations:
                - language: typescript
                  path: ./handlers/ts/app/user.handler.ts
                  runtime: api
                  storage: postgresql
          ```

          ## Build

          ```yaml
          build:
            typescript:
              compiler: tsc
              testRunner: vitest
          ```
    validation-commands:
      - label: "Generate a deploy scaffold"
        command: "npx tsx cli/src/index.ts scaffold deploy --app my-app"
      - label: "Validate deploy manifest"
        command: "npx tsx cli/src/index.ts deploy --validate"
      - label: "Run scaffold generator tests"
        command: "npx vitest run tests/scaffold-generators.test.ts"
    quick-reference:
      heading: "Quick Reference"
      body: |
        | Input | Type | Purpose |
        |-------|------|---------|
        | appName | String | Application name |
        | version | String | Semver version |
        | runtimes | list Runtime | Runtime configs (name, type, transport, storage) |
        | concepts | list Assignment | Concept-to-runtime mappings |
        | iacProvider | String | IaC provider (terraform, cloudformation, pulumi) |
    related-workflows:
      - name: deployment-config
        description: "Validate and refine generated deploy manifests"
      - name: create-suite
        description: "Generate suites referenced by the deploy manifest"
      - name: build-orchestration
        description: "Build concepts for the declared runtimes"
    anti-patterns:
      - title: "Concept without runtime assignment"
        description: "Concept listed in deploy manifest but not assigned to any runtime."
        bad: |
          concepts:
            User:
              spec: ./specs/user.concept
              # No implementations or runtime!
        good: |
          concepts:
            User:
              spec: ./specs/user.concept
              implementations:
                - language: typescript
                  runtime: api
                  storage: postgresql
      - title: "Mismatched storage backends"
        description: "Runtime references a storage backend not declared in infrastructure."
        bad: |
          runtimes:
            api: { storage: mongodb }  # Not in infrastructure!
          infrastructure:
            storage:
              postgresql: { type: postgresql }
        good: |
          runtimes:
            api: { storage: postgresql }
          infrastructure:
            storage:
              postgresql: { type: postgresql }

  # ─── DeployPlan: deploy ─────────────────────────
  deploy:
    concept: DeployPlan
    steps:
      - action: plan
        title: "Create Deployment Plan"
        prose: "Parse a deploy.yaml manifest, resolve environment overlays, and construct the deployment DAG. The plan is stored for inspection before execution. The ValidateBeforeExecute sync automatically triggers validation."
      - action: validate
        title: "Validate Deployment Plan"
        prose: "Validate pre-deployment invariants: sync completeness, transport compatibility, storage migration safety, and dependency ordering. The ExecuteAfterValidation sync triggers artifact builds."
      - action: execute
        title: "Execute Deployment"
        prose: "Execute the deployment plan. The sync engine routes Runtime/provision to the correct provider (e.g., route-to-vercel.sync routes runtimeType 'vercel' to VercelRuntime/provision). Progress is tracked in the plan's DAG."
      - action: status
        title: "Check Deployment Status"
        prose: "Query the current execution status of a deployment plan, including phase, progress, active nodes, completed nodes, and failed nodes."
      - action: rollback
        title: "Rollback Deployment"
        prose: "Reverse a deployment by executing compensating actions in reverse dependency order. Runtime/rollback is routed to providers via syncs."
    checklists:
      plan:
        - "Manifest YAML/JSON is valid?"
        - "All runtimes have a type defined?"
        - "All concepts reference valid runtimes?"
        - "No circular dependencies in the DAG?"
      execute:
        - "Plan has been validated?"
        - "Environment variables set (VERCEL_TOKEN, etc.)?"
        - "Source directories exist for each app?"
    design-principles:
      - title: "Sync-Driven Orchestration"
        rule: "DeployPlan never calls runtime providers directly. It emits completions that the sync engine routes to the correct provider via routing syncs (route-to-vercel.sync, route-to-lambda.sync, etc.)."
      - title: "Provider Agnostic"
        rule: "The deploy plan handler contains zero provider-specific code. All provider logic lives in the provider handlers (VercelRuntime, LambdaRuntime, etc.)."
    related-workflows:
      - name: create-deployment
        description: "Generate the deploy.yaml manifest that this plan reads"
      - name: deployment-config
        description: "Validate manifests before planning"

  # ─── VercelRuntime: vercel-deploy ──────────────────
  vercel-deploy:
    concept: VercelRuntime
    steps:
      - action: provision
        title: "Provision Vercel Project"
        prose: "Create a Vercel project via the Vercel REST API. Requires VERCEL_TOKEN env var. The project is created with the specified framework (nextjs, etc.)."
      - action: deploy
        title: "Deploy to Vercel"
        prose: "Deploy the source directory to Vercel using the Vercel CLI. The deployment URL is captured and stored for traffic management and rollback."
      - action: rollback
        title: "Rollback Vercel Deployment"
        prose: "Roll back to a previous deployment by pointing the production alias to the target deployment ID."
      - action: destroy
        title: "Destroy Vercel Project"
        prose: "Delete the Vercel project and all its deployments."
    checklists:
      provision:
        - "VERCEL_TOKEN environment variable set?"
        - "VERCEL_TEAM_ID set (if using team scope)?"
        - "Project name is URL-safe?"
      deploy:
        - "Source directory exists and contains package.json?"
        - "next build succeeds locally?"

  # ─── InterfaceScaffoldGen: create-interface ──────
  create-interface:
    concept: InterfaceScaffoldGen
    steps:
      - action: register
        title: "Register Generator"
        prose: "Self-register with PluginRegistry so KindSystem can track InterfaceConfig → InterfaceManifest transformations. Registration is also handled automatically by register-generator-kinds.sync."
      - action: preview
        title: "Preview Changes"
        prose: "Dry-run the generation using Emitter content-addressing to classify each output file as new, changed, or unchanged. No files are written."
      - action: generate
        title: "Generate Interface Manifest"
        prose: "Generate an interface.yaml manifest with target configurations (REST, GraphQL, gRPC, CLI, MCP, Claude Skills), SDK settings, spec outputs, and per-concept overrides. Sync rules then cascade: interface-scaffold-emit.sync routes files through Emitter, interface-scaffold-record-cache.sync records output in BuildCache, and interface-scaffold-observer.sync tracks the run in GenerationPlan."
      - action: edit
        title: "Edit the Interface Manifest"
        prose: "Refine the generated interface.yaml: configure targets (CLI, REST, MCP, Claude Skills, SDK), set per-concept overrides for routing and grouping, define workflows with steps and prose, and add annotations for generation control."
    checklists:
      generate:
        - "Interface name is valid?"
        - "At least one target is specified?"
        - "Each target has sensible defaults?"
        - "SDK package names are unique per language?"
        - "Per-concept overrides reference valid concepts?"
        - "Grouping strategy is set?"
        - "All files written through Emitter (not directly to disk)?"
        - "Source provenance attached to each file?"
        - "Generation step recorded in GenerationPlan?"
    design-principles:
      - title: "Target Independence"
        rule: "Each target (REST, GraphQL, CLI, etc.) generates independently — they share concept specs but produce separate output trees."
      - title: "Layered Configuration"
        rule: "Configuration flows from global defaults → target defaults → per-concept overrides. Specific settings override general ones."
      - title: "SDK Completeness"
        rule: "Each SDK target should generate a fully-functional client library — types, methods, error handling, and documentation."
    references:
      - path: references/interface-manifest-schema.md
        label: "Interface manifest (interface.yaml) schema reference"
        tier: reference
        content: |
          # Interface Manifest Schema Reference

          Complete schema for `interface.yaml` manifest files.

          ## Root Structure

          ```yaml
          interface:
            name: my-api
            version: "0.1.0"
          ```

          ## Targets

          ```yaml
          targets:
            rest:
              basePath: /api
              framework: hono
              versioning: url
            graphql:
              path: /graphql
              relay: true
              subscriptions: true
            grpc:
              package: app.v1
            cli:
              name: my-cli
              shell: [bash, zsh, fish]
            mcp:
              name: my-mcp-server
              transport: stdio
            claude-skills:
              name: my-skills
              progressive: true
          ```

          ## SDKs

          ```yaml
          sdk:
            typescript:
              packageName: "@app/sdk"
              moduleSystem: esm
            python:
              packageName: app-sdk
              asyncSupport: true
            go:
              modulePath: github.com/org/app-sdk-go
            rust:
              packageName: app-sdk
            java:
              packageName: com.org.app.sdk
            swift:
              packageName: AppSDK
          ```

          ## Specs

          ```yaml
          specs:
            openapi: true
            asyncapi: false
          ```

          ## Per-Concept Overrides

          ```yaml
          concepts:
            User:
              rest:
                basePath: /api/users
              graphql:
                typeName: User
            Article:
              rest:
                basePath: /api/articles
          ```

          ## Output

          ```yaml
          output:
            dir: ./generated/interface
            clean: true
          grouping:
            strategy: per-concept
          ```
    validation-commands:
      - label: "Generate an interface scaffold"
        command: "npx tsx cli/src/index.ts scaffold interface --name my-api --targets rest,graphql"
      - label: "Generate interfaces from manifest"
        command: "npx tsx cli/src/index.ts interface generate --manifest my-api.interface.yaml"
      - label: "Run scaffold generator tests"
        command: "npx vitest run tests/scaffold-generators.test.ts"
    quick-reference:
      heading: "Quick Reference"
      body: |
        | Input | Type | Purpose |
        |-------|------|---------|
        | name | String | Interface name |
        | targets | list String | Target types (rest, graphql, grpc, cli, mcp, claude-skills) |
        | sdks | list String | SDK languages (typescript, python, go, rust, java, swift) |
        | concepts | list String | Concepts with per-concept overrides |
        | openapi | Boolean | Generate OpenAPI spec (default: true) |
        | asyncapi | Boolean | Generate AsyncAPI spec (default: false) |
    related-workflows:
      - name: create-suite
        description: "Generate suites whose concepts the interface exposes"
      - name: create-concept
        description: "Generate concept specs for interface concepts"
      - name: deployment-config
        description: "Deploy the service that hosts the generated interface"
    anti-patterns:
      - title: "Targets without concept overrides"
        description: "All concepts use the same REST base path — collision risk."
        bad: |
          targets:
            rest: { basePath: /api }
          # No per-concept overrides — all concepts share /api
        good: |
          targets:
            rest: { basePath: /api }
          concepts:
            User:
              rest: { basePath: /api/users }
            Article:
              rest: { basePath: /api/articles }

  # ─── ConceptScaffoldGen: create-concept ──────────
  create-concept:
    concept: ConceptScaffoldGen
    steps:
      - action: register
        title: "Register Generator"
        prose: "Self-register with PluginRegistry so KindSystem can track ConceptConfig → ConceptSpec transformations. Registration is also handled automatically by register-generator-kinds.sync."
      - action: preview
        title: "Preview Changes"
        prose: "Dry-run the generation using Emitter content-addressing to classify each output file as new, changed, or unchanged. No files are written."
      - action: generate
        title: "Generate Concept Spec"
        prose: "Generate a .concept specification file with annotations (@version, @gate, @category, @visibility), purpose block, typed state declarations (sets, mappings, option/list wrappers, enum types, record types, state groups), action signatures with variant returns, invariants, and capabilities block."
      - action: edit
        title: "Edit the Concept Spec"
        prose: >
          Refine the generated .concept file:
          1. Add annotations: @version(N) for versioning, @gate for async gates, @category("domain") for grouping, @visibility("public"|"internal").
          2. Write a purpose block explaining why the concept exists (not how it works).
          3. Design state fields: sets (set T), mappings (T -> Type), option/list wrappers, enum types ({Active | Inactive | Pending}), record types ({key: String, value: String}), state groups for related fields.
          4. Define actions with typed params and variant returns. All primitives: String, Int, Float, Bool, Bytes, DateTime, ID.
          5. Write invariants comprehensively using all six constructs: example (named conformance tests), forall (quantified properties with given/in), always (state predicates), never (safety properties), eventually (liveness), action requires/ensures (contracts). Use property assertions (d.status = "complete") and when guard clauses. Aim for 2-5 invariants covering: core purpose, error paths, constraint enforcement, state transitions, boundary conditions.
          6. Add capabilities block if the concept is a generator or plugin.
          7. Add fixtures to every action. CRITICAL: error-case fixtures (names containing empty_, invalid_, duplicate_, missing_, bad_, etc.) MUST include an explicit `-> error` or `-> <specific_variant>` annotation. Omitting the arrow defaults to `-> ok`, generating wrong conformance tests. ok fixtures for non-creator actions need `after` chains to seed prerequisite data.
      - action: test-gen
        title: "Generate Tests from Invariants"
        prose: >
          After writing invariants, generate comprehensive tests using TestGen.
          Invoke `/create-implementation --concept <Name>` first to create the handler,
          then generate tests from invariants:
          1. Run `TestGen/generate` (MCP: `test_gen_generate`) with concept_ref and language to compile all six invariant construct types into tests:
             - example blocks → conformance test vectors (1:1 after/then mapping)
             - forall blocks → property-based tests with generated domains
             - always blocks → stateful sequence tests checking state predicates
             - never blocks → violation-attempt tests trying to reach bad states
             - eventually blocks → bounded liveness tests
             - requires/ensures → contract-constrained PBT with pre/postconditions
          2. Review generated test files — they should NOT need manual editing for example/forall/always/never constructs. Contract tests (requires/ensures) may need manual generator tuning for complex domain types.
          3. Run `TestGen/coverage` (MCP: `test_gen_coverage`) to verify all invariant constructs have generated tests. Check the construct_coverage breakdown — each kind should show covered > 0.
          4. Run `npx vitest run generated/tests/<concept>.*` to verify generated tests pass.
          5. If coverage gaps exist, add more invariants to the concept spec (go back to the edit step) and re-run `TestGen/regenerate`.
    checklists:
      generate:
        - "Concept name is PascalCase?"
        - "Type parameter is a single capital letter?"
        - "Purpose block describes why, not what?"
        - "State fields use correct relation types (set, ->, option, list)?"
        - "Every action has at least one variant?"
        - "register() action is included for PluginRegistry?"
        - "Annotations (@category, @visibility) are present?"
        - "@version annotation included if this is a versioned spec?"
        - "State fields use enum types for fixed value sets?"
        - "State groups organize related fields?"
        - "Capabilities block present for generator/plugin concepts?"
        - "Variant descriptions explain outcomes, not just echo variant names?"
        - "All files written through Emitter (not directly to disk)?"
        - "Source provenance attached to each file?"
        - "Generation step recorded in GenerationPlan?"
    design-principles:
      - title: "Singularity"
        rule: "Each concept serves exactly one purpose — if the purpose has 'and', it's two concepts."
      - title: "Independence"
        rule: "A concept never references another concept's types or calls another concept's actions. Use type parameters and syncs."
      - title: "Sufficiency & Necessity"
        rule: "Every state field is needed by at least one action. Every action serves the concept's purpose. No dead state."
      - title: "Invariant Completeness"
        rule: "Use all six invariant constructs comprehensively: example (named tests), forall (quantified properties), always (state predicates), never (safety), eventually (liveness), action requires/ensures (contracts). Cover core purpose, error paths, constraints, state transitions, and boundary conditions. Aim for 2-5 invariants per concept."
      - title: "Success is ok"
        rule: "The happy-path variant must always be named `ok`. Do not use domain-specific success names like `created`, `configured`, `registered`, `updated`. Domain context belongs in the output fields. Exception: actions with multiple distinct success outcomes that syncs need to distinguish (e.g., `ok`/`miss` for cache lookup, `clean`/`conflicts` for merge)."
      - title: "Description Quality"
        rule: "Every variant description must explain the outcome in domain terms — never echo the variant name ('Created.') or use vague text ('Failed.'). Error variants explain what went wrong; ok variants explain what is now true."
    references:
      - path: references/concept-spec-guide.md
        label: "Concept specification writing guide"
        tier: reference
        content: |
          # Concept Specification Guide

          How to write well-formed `.concept` files.

          ## Structure

          ```
          @version(1)
          @gate
          @category("domain")
          @visibility("public")
          concept Name [T] {
            purpose { ... }
            state { ... }
            actions { ... }
            invariant { ... }
            capabilities { ... }
          }
          ```

          ## Annotations

          | Annotation | Purpose |
          |-----------|---------|
          | `@version(N)` | Spec version number |
          | `@gate` | Marks async gate concept |
          | `@category("name")` | Grouping category |
          | `@visibility("public")` | Visibility level |

          ## State Relations

          | Syntax | Meaning | Example |
          |--------|---------|---------|
          | `set T` | Collection | `users: set U` |
          | `T -> V` | Total function | `name: U -> String` |
          | `T -> option V` | Partial function | `email: U -> option String` |
          | `T -> list V` | Multi-valued | `tags: U -> list String` |
          | `T -> {A \| B}` | Enum type | `status: U -> {Active \| Inactive}` |
          | `T -> {k: V, ...}` | Record type | `meta: U -> {key: String, value: String}` |

          ## State Groups

          ```
          state {
            group credentials {
              username: T -> String
              password: T -> String
            }
          }
          ```

          ## Primitives

          `String`, `Int`, `Float`, `Bool`, `Bytes`, `DateTime`, `ID`

          ## Capabilities Block

          ```
          capabilities { "storage", "transport", "auth" }
          ```

          ## Action Signatures

          ```
          action create(name: String, email: String) {
            description { Create a new user with the given name and email. }
            -> ok(user: U) { New user registered and ready for authentication setup. }
            -> duplicate(email: String) { Another user is already registered with this email address. }
            -> error(message: String) { Creation failed due to a storage or validation error. }
          }
          ```

          **Rules:**
          - Every parameter must have a type
          - At least one variant per action
          - Variant names are lowercase
          - **Success is always `ok`.** Do not use domain-specific names like `created`, `configured`, `registered`, `updated`. Domain context belongs in the output fields, not the variant name
          - **Exception — multiple distinct success branches.** When an action has two or more success outcomes that syncs need to distinguish (e.g., `ok`/`miss` for cache lookup, `clean`/`conflicts` for merge, `valid`/`invalid` for verification), use domain-specific variant names. This should be rare

          ## Register Action

          Every generator concept includes `register()`:

          ```
          action register() {
            -> ok(name: String, inputKind: String, outputKind: String,
                  capabilities: list String) {
              Return static metadata for PluginRegistry.
            }
          }
          ```

          ## Invariants

          Six invariant constructs are supported (see docs/plans/clef-fv.md Section 1):

          ### `example` — Named conformance test (Tier 1)
          ```
          example "happy path": {
            after create(name: "alice") -> ok(user: u)
            then get(user: u) -> ok(user: u, name: "alice")
          }
          ```
          Bare `invariant { ... }` blocks default to kind=example with no name.

          ### `forall` — Universally quantified property (Tier 2-3)
          ```
          forall "valid kinds accepted": {
            given kind in {"invariant", "precondition", "postcondition"}
            after define(kind: kind) -> ok(property: _)
          }
          ```

          ### `always` — State predicate (Tier 2-3)
          ```
          always "status consistency": {
            forall p in items:
              p.status in ["active", "inactive", "archived"]
          }
          ```

          ### `never` — Safety property (Tier 2-3)
          ```
          never "orphaned items": {
            exists p in items:
              p.status = "deleted"
          }
          ```

          ### `eventually` — Liveness property (Tier 3)
          ```
          eventually "runs terminate": {
            forall r in runs where r.status = "running":
              r.status in ["completed", "timeout", "cancelled"]
          }
          ```

          ### `action requires/ensures` — Pre/postcondition contracts (Tier 2-3)
          ```
          invariant {
            action define {
              requires: kind in ["invariant", "precondition"]
              requires: propertyText.length > 0
              ensures ok: result.kind = kind
              ensures invalid: kind != "invariant"
            }
          }
          ```

          ### Property assertions in then-chains
          ```
          invariant {
            after configure(endpoint: "api", threshold: 5) -> ok(breaker: b)
            then b.failureCount = 0
            and  b.status != "open"
          }
          ```
          Operators: `=`, `!=`, `>`, `<`, `>=`, `<=`, `in`

          ### Comprehensive coverage
          Invariants should cover: core purpose, state correctness, error paths,
          constraint enforcement, idempotency, boundary conditions, state transitions,
          and composition readiness. Aim for 2-5 invariants per concept.
    validation-commands:
      - label: "Generate a concept scaffold"
        command: "npx tsx cli/src/index.ts scaffold concept --name User --actions create,update,delete"
      - label: "Validate generated concept"
        command: "npx tsx cli/src/index.ts check specs/app/user.concept"
      - label: "Generate tests from invariants"
        command: "npx tsx cli/src/index.ts test-gen --concept User --language typescript"
      - label: "Run generated invariant tests"
        command: "npx vitest run generated/tests/User.*"
      - label: "Check invariant coverage"
        command: "npx tsx cli/src/index.ts test-gen --coverage --concept User"
      - label: "Run scaffold generator tests"
        command: "npx vitest run tests/scaffold-generators.test.ts"
    quick-reference:
      heading: "Quick Reference"
      body: |
        | Input | Type | Purpose |
        |-------|------|---------|
        | name | String | PascalCase concept name |
        | typeParam | String | Type parameter letter (default: T) |
        | purpose | String | Purpose description |
        | category | String | Annotation category (domain, devtools, etc.) |
        | version | Int | @version annotation number |
        | gate | Bool | @gate annotation for async gates |
        | stateFields | list StateField | State declarations (with group, enum, record support) |
        | actions | list ActionDef | Action signatures with variants |
        | capabilities | list String | Capabilities block entries |
        | invariants | list String | Invariant steps |
    related-workflows:
      - name: concept-designer
        description: "Design concepts using Jackson's methodology before generating"
      - name: create-handler
        description: "Generate handler implementations for the concept"
      - name: create-sync
        description: "Generate sync rules connecting the concept"
      - name: test-gen
        description: "Generate tests from invariants (TestGen/generate, TestGen/coverage)"
      - name: create-view-query
        description: "For view-layer concepts, compose with QueryProgram/FilterSpec/SortSpec instead of ad-hoc data fetching"
    anti-patterns:
      - title: "Purpose describes implementation"
        description: "Purpose block says how the concept works instead of why it exists."
        bad: |
          purpose {
            Store users in a Map<string, User> and provide CRUD operations
            via async handler methods.
          }
        good: |
          purpose {
            Manage user identity and profile information.
          }
      - title: "Missing variants"
        description: "Action only has ok variant — no error handling path."
        bad: |
          action create(name: String) {
            -> ok(user: U) { Created. }
          }
        good: |
          action create(name: String) {
            -> ok(user: U) { New user registered and ready for profile setup. }
            -> duplicate(name: String) { A user with this name already exists. }
            -> error(message: String) { Creation failed due to a storage or validation error. }
          }
      - title: "Terse or echo descriptions"
        description: "Variant descriptions that echo the variant name or use a single generic word — they tell the reader nothing about the actual outcome."
        bad: |
          action create(name: String) {
            -> ok(user: U) { Created. }
            -> error(message: String) { Failed. }
          }
        good: |
          action create(name: String) {
            -> ok(user: U) { New user registered and ready for authentication setup. }
            -> error(message: String) { Creation failed due to a storage or validation error. }
          }

  # ─── SyncScaffoldGen: create-sync ────────────────
  create-sync:
    concept: SyncScaffoldGen
    steps:
      - action: register
        title: "Register Generator"
        prose: "Self-register with PluginRegistry so KindSystem can track SyncConfig → SyncSpec transformations. Registration is also handled automatically by register-generator-kinds.sync."
      - action: preview
        title: "Preview Changes"
        prose: "Dry-run the generation using Emitter content-addressing to classify each output file as new, changed, or unchanged. No files are written."
      - action: generate
        title: "Generate Sync Rule"
        prose: "Generate a .sync file with when clause (trigger pattern with variable bindings), optional where clause (bind, query, filter, guard, any, not conditions), and one or more then clauses (effect actions)."
      - action: edit
        title: "Edit the Sync Rule"
        prose: >
          Refine the generated .sync file:
          1. Set the tier annotation: [eager], [required], or [recommended].
          2. Write a purpose clause explaining why this sync exists (the causal chain).
          3. Define the when clause: Concept/action with input field bindings and => variant result.
          4. Add where-clause conditions: bind(?expr as ?local), query(Concept/action: [...] as ?result), filter(?var = "value"), guard(?condition), any(cond1; cond2), not(cond).
          5. Define one or more then clauses with effect actions and ?variable references.
          6. Verify all variables used in then are bound in when or where.
    checklists:
      generate:
        - "Sync name is PascalCase?"
        - "Tier annotation matches intended behavior ([eager], [required], [recommended])?"
        - "When clause references a valid concept/action?"
        - "Variable bindings in where clause use ?prefix?"
        - "Then clause references a valid concept/action?"
        - "Purpose statement explains the causal chain?"
        - "Where clause uses filter()/guard() for simple conditions?"
        - "Multiple then blocks used for sequential effects?"
        - "All files written through Emitter (not directly to disk)?"
        - "Source provenance attached to each file?"
        - "Generation step recorded in GenerationPlan?"
    design-principles:
      - title: "Declarative Wiring"
        rule: "Syncs declare what happens when — they never contain imperative logic, loops, or conditionals beyond pattern matching."
      - title: "Concept Independence"
        rule: "Syncs reference concepts by name but concepts never know about syncs. The sync is the only place where concept names appear together."
      - title: "Pattern Completeness"
        rule: "The when clause must match specific action completions (concept/action with variant). The then clause invokes specific actions."
      - title: "Purpose Clause Quality"
        rule: "Every sync must have a purpose clause that explains the causal chain — 'When X happens, do Y because Z'. Never just restate the sync name or omit the purpose entirely."
    references:
      - path: references/sync-rule-guide.md
        label: "Sync rule writing guide"
        tier: reference
        content: |
          # Sync Rule Guide

          How to write well-formed `.sync` files.

          ## Structure

          ```
          sync SyncName [eager]
            purpose: "Why this sync exists — explain the causal chain."
          when {
            SourceConcept/action: [
              field: ?var
            ] => ok(result: ?value)
          }
          where {
            bind(?var.property as ?local)
            query(OtherConcept/find: [criteria: ?local] as ?results)
            any(?local = "value1"; ?local = "value2")
            not(?local = "forbidden")
          }
          then {
            TargetConcept/action: [
              field: ?var;
              other: ?local
            ]
          }
          ```

          ## When Clause

          Matches completions of concept actions:
          - `Concept/action: [params] => variant(results)`
          - Variables use `?` prefix: `?user`, `?name`
          - Can destructure: `metadata: ?meta`

          ## Where Clause (optional)

          Guard conditions:
          - `bind(?expr as ?local)` — Extract nested values
          - `query(Concept/action: [...] as ?result)` — Query state
          - `filter(?var = "value")` — Filter by expression
          - `guard(?condition)` — Guard with boolean expression
          - `any(cond1; cond2)` — OR conditions
          - `not(cond)` — Negation
          - `?a = ?b` — Equality check

          ## Then Clause

          Actions to invoke:
          - `Concept/action: [field: ?var]`
          - Multiple actions allowed
          - Variables from when/where are available

          ## Tier Annotations

          | Annotation | Meaning |
          |-----------|---------|
          | `[eager]` | Fires immediately (same as required) |
          | `[required]` | Cannot be disabled or overridden |
          | `[recommended]` | Can be overridden by application |
    validation-commands:
      - label: "Generate a sync scaffold"
        command: "npx tsx cli/src/index.ts scaffold sync --name CreateProfile --from User/create --to Profile/init"
      - label: "Validate generated sync"
        command: "npx tsx cli/src/index.ts sync validate syncs/create-profile.sync"
      - label: "Run scaffold generator tests"
        command: "npx vitest run tests/scaffold-generators.test.ts"
    quick-reference:
      heading: "Quick Reference"
      body: |
        | Input | Type | Purpose |
        |-------|------|---------|
        | name | String | PascalCase sync name |
        | tier | String | Sync tier (required, recommended) |
        | eager | Boolean | Fire immediately (default: true) |
        | trigger | Trigger | When clause (concept, action, params, variant) |
        | conditions | list Condition | Where clause guards |
        | effects | list Effect | Then clause actions |
    related-workflows:
      - name: sync-designer
        description: "Design syncs using formal patterns before generating"
      - name: create-concept
        description: "Generate concept specs referenced by the sync"
      - name: sync-validator
        description: "Validate compiled syncs"
    anti-patterns:
      - title: "Missing or restated purpose"
        description: "Sync has no purpose clause, or the purpose just restates the sync name — readers can't understand why the sync exists."
        bad: |
          sync CreateProfile [eager]
          when { ... }
          then { Profile/create: [owner: ?u] }
        good: |
          sync CreateProfile [eager]
            purpose: "Initialize an empty profile automatically when a new user registers"
          when { ... }
          then { Profile/create: [owner: ?u] }
      - title: "Sync with imperative logic"
        description: "Sync tries to express conditionals or loops instead of pattern matching."
        bad: |
          # Pseudo-code in sync — not valid!
          if user.isAdmin then
            AdminPanel/grant: [user: ?u]
        good: |
          where {
            bind(?meta.role as ?role)
            any(?role = "admin")
          }
          then {
            AdminPanel/grant: [user: ?u]
          }

  # ─── DerivedScaffoldGen: create-derived ──────────
  create-derived:
    concept: DerivedScaffoldGen
    steps:
      - action: register
        title: "Register Generator"
        prose: "Self-register with PluginRegistry so KindSystem can track DerivedConfig → DerivedSpec transformations. Registration is also handled automatically by register-generator-kinds.sync."
      - action: preview
        title: "Preview Changes"
        prose: "Dry-run the generation using Emitter content-addressing to classify each output file as new, changed, or unchanged. No files are written."
      - action: generate
        title: "Generate Derived Concept"
        prose: "Generate a .derived specification file with purpose block, composes list, syncs boundary, surface actions (three match types: matches/Concept/action, entry+triggers, derivedContext), surface queries (inline arrow or block reads: form), and principle block."
      - title: "Edit the Derived Concept"
        prose: >
          Open the generated .derived file and refine each section:
          1. Write a clear purpose describing emergent behavior (not just grouping).
          2. List composed concepts in the composes block. Use `derived` prefix for derived-of-derived.
          3. Declare syncs boundary — required syncs are mandatory, recommended are optional.
          4. Define surface actions with `matches:` (direct), `entry:`+`triggers:` (multi-step), or `derivedContext` (derived-of-derived).
          5. Define surface queries: inline form `query name() -> Concept/action(args)` or block form `query name() { reads: Concept/action(arg: ?binding) }`.
          6. Write a principle block describing the after/then/and execution chain.
          7. Validate: no independent state, emergent purpose, DAG composition graph.
    checklists:
      generate:
        - "Derived concept name is PascalCase?"
        - "Type parameters are single capital letters?"
        - "Purpose block describes emergent value, not mechanics?"
        - "All composed concepts exist (or are marked derived)?"
        - "Syncs list only includes semantically-inside sync names?"
        - "Surface actions have valid matches clauses?"
        - "Surface queries delegate to real concept actions?"
        - "Principle uses surface action/query names, not primitive concept names?"
        - "Composition graph is a DAG (no cycles)?"
        - "Type parameters unify correctly across composed concepts?"
        - "All surface queries are on a SINGLE LINE (no newline before ->)?"
        - "Principle block uses after/then/and syntax (NOT prose-style quoted strings)?"
    design-principles:
      - title: "No Independent State"
        rule: "A derived concept deliberately fails the concept test — it has no state of its own. All state is held by composed concepts."
      - title: "Semantic Boundary"
        rule: "Only syncs that are semantically inside the derived concept are claimed. derivedContext tags only propagate through claimed syncs."
      - title: "Emergent Purpose"
        rule: "The purpose describes the emergent value of the composition, not just 'groups X and Y'. If there's no emergent purpose, use a suite."
      - title: "Hierarchical Composition"
        rule: "Derived concepts can compose other derived concepts using the derived keyword. The composition graph must be a DAG."
      - title: "Single-Line Queries"
        rule: "Surface queries MUST be on a single line — the `->` arrow must appear on the same line as the closing `)` of the parameter list. The derived parser does not call skipSeps() before expecting ARROW, so a newline between `)` and `->` produces a parse error. Write: `query name(p: T) -> Concept/action(p: p)` NOT `query name(p: T)\\n  -> Concept/action(p: p)`."
      - title: "Principle Uses after/then/and Syntax"
        rule: "The principle block MUST use `after surfaceAction(arg: value)` / `then description` / `and description` syntax. Prose-style principles like `\"Name\": description` cause parse errors — the parser expects the keyword `after` or `then`, not a quoted string."
    references:
      - path: references/derived-concept-guide.md
        label: "Derived concept writing guide"
        tier: reference
        content: |
          # Derived Concept Guide

          How to write well-formed `.derived` files.

          ## Structure

          ```
          derived Name [T] {
            purpose { ... }
            composes { Concept [T], derived OtherDerived [T] }
            syncs { required: [sync-a, sync-b] }
            surface {
              action name(params) { matches: Concept/action(field: "value") }
              query name(params) -> Concept/action(args)
            }
            principle { after ... then ... }
          }
          ```

          ## Surface Actions

          Two kinds of matches:
          - Field matching: `matches: Concept/action(field: "value")`
          - derivedContext matching: `matches: derivedContext "DerivedName/action"`
          - Entry + triggers: `entry: Concept/action` + `triggers: [Concept/action(arg: ?binding)]`

          ## Surface Queries

          Two forms:
          - Inline: `query name(params) -> Concept/action(args)`
          - Block: `query name(params) { reads: Concept/action(arg: ?binding) }`

          **CRITICAL: Inline queries MUST be on a single line.** The `->` arrow
          must appear on the same line as the closing `)`. A newline before
          `->` causes a parse error.

          ```
          # CORRECT — single line
          query getStatus(id: X) -> Concept/getStatus(id: id)

          # WRONG — multi-line breaks the parser
          query getStatus(id: X)
            -> Concept/getStatus(id: id)
          ```

          ## Principle Block

          **MUST use after/then/and syntax.** Prose-style `"Name": description`
          causes parse errors.

          ```
          # CORRECT
          principle {
            after surfaceAction(arg: value)
            then Concept/action(arg: value) -> ok
            and  OtherConcept/action(arg: value) -> ok
          }

          # WRONG — parser expects 'after', not a quoted string
          principle {
            "My principle": description of what happens
          }
          ```

          ## When to Use Derived Concepts

          Use when a composition produces a user-facing abstraction with its
          own name and purpose (Trash, Registration, TaskBoard).

          Don't use when grouping is purely organizational (use a suite) or
          when the abstraction has independent state (create a concept).
    validation-commands:
      - label: "Generate a derived concept scaffold"
        command: "npx tsx cli/src/index.ts scaffold derived --name Trash --composes Folder,Label"
      - label: "Validate derived concept"
        command: "npx vitest run tests/derived-concepts.test.ts"
    quick-reference:
      heading: "Quick Reference"
      body: |
        | Input | Type | Purpose |
        |-------|------|---------|
        | name | String | PascalCase derived concept name |
        | typeParams | list String | Type parameter letters (e.g., ["T"]) |
        | purpose | String | Emergent purpose prose |
        | composes | list ComposesEntry | Concepts and derived concepts |
        | syncs | list String | Sync names inside the boundary |
        | surfaceActions | list SurfaceAction | Actions with matches clauses |
        | surfaceQueries | list SurfaceQuery | Queries delegating to concepts |
        | principle | list String | Operational principle steps |
    related-workflows:
      - name: create-concept
        description: "Generate concept specs composed by the derived concept"
      - name: create-sync
        description: "Generate sync rules claimed by the derived concept"
      - name: create-suite
        description: "Bundle derived concepts into a distributable suite"
    anti-patterns:
      - title: "Derived concept with independent state"
        description: "If the abstraction needs its own state, it should be a concept, not a derived concept."
        bad: |
          derived TaskBoard [T] {
            state { columns: set String }  // ERROR: derived concepts have no state
            ...
          }
        good: |
          derived TaskBoard [T] {
            composes { Task [T], Column [T], Assignment [T] }
            ...
          }
      - title: "Over-claiming syncs"
        description: "Claiming syncs that serve a different purpose (audit, search indexing) leaks derivedContext tags."
        bad: |
          syncs { required: [trash-delete, trash-restore, audit-log-record, search-update] }
        good: |
          syncs { required: [trash-delete, trash-restore] }

  # ─── HandlerScaffoldGen: create-handler ──────────
  create-handler:
    concept: HandlerScaffoldGen
    steps:
      - action: register
        title: "Register Generator"
        prose: "Self-register with PluginRegistry so KindSystem can track HandlerConfig → HandlerImpl transformations. Registration is also handled automatically by register-generator-kinds.sync."
      - action: preview
        title: "Preview Changes"
        prose: "Dry-run the generation using Emitter content-addressing to classify each output file as new, changed, or unchanged. No files are written."
      - action: generate
        title: "Generate Handler Implementation"
        prose: "Generate a TypeScript .handler.ts handler with register() action, typed action methods, input extraction, storage patterns, and an optional conformance test. Sync rules then cascade: create-handler-emit.sync routes files through Emitter, create-handler-record-cache.sync records output in BuildCache, and create-handler-observer.sync tracks the run in GenerationPlan."
      - action: edit
        title: "Edit the Handler Implementation"
        prose: >
          Refine the generated handler. Default style is FUNCTIONAL (StorageProgram):
          1. Each action returns a StorageProgram<A> built with DSL functions: createProgram(), get(), find(), put(), merge(), del(), branch(), complete(), pure().
          2. CRITICAL — put() vs putFrom(): Use put(p, rel, key, value) ONLY when value is fully known at construction time (static data, input parameters). Use putFrom(p, rel, key, (bindings) => value) when value depends on data read from storage via get()/find(). Same applies to merge() vs mergeFrom(), and complete() vs completeFrom(). The bindings parameter is a Record<string,unknown> containing all values bound by prior get()/find()/mapBindings() calls. Never reference a bindAs name as a direct variable — always access it through the bindings object.
          3. Use mapBindings(p, (bindings) => derivedValue, 'bindAs') to derive new values from accumulated bindings (e.g. computing a count, filtering, sorting).
          4. For external API calls (HTTP, gRPC, GraphQL, WebSocket): use perform(p, 'http', 'POST', { endpoint: 'name', path, body }, 'bindAs'). This routes through the execution layer: EffectHandler → ExternalCall → HttpProvider → instance endpoint. Create a Tier 3 instance provider concept (like OpenAiEndpoint, VercelApiEndpoint) for each specific API.
          5. For local computation (ONNX, WASM, shell): use perform(p, 'onnx', 'infer', { session: 'name', inputs }, 'bindAs'). Routes through: EffectHandler → LocalProcess → OnnxProvider/WasmProvider → instance. Create a LocalModelInstance for each model.
          6. NEVER use direct fetch(), execSync(), or other I/O. All external/internal calls go through perform() so they get: ConnectorCall tracking, RetryPolicy, CircuitBreaker, RateLimiter, PerformanceProfile, ErrorCorrelation, RuntimeCoverage — automatically via sync wiring.
          7. Use branch() for conditionals (not if/else), complete() for terminal values.
          8. Lens-based access with getLens(), putLens(), modifyLens() where possible.
          Imperative style (ConceptHandler with async methods) is ONLY for handlers requiring direct filesystem access (e.g. EmbeddingCache).
    checklists:
      generate:
        - "Handler export name follows convention (camelCase + 'Handler')?"
        - "register() returns correct name, inputKind, outputKind?"
        - "Each action extracts input parameters with correct types?"
        - "Each action returns all declared variants?"
        - "Storage operations use correct relation names?"
        - "No bindAs names referenced as JavaScript variables (must use bindings lambdas)?"
        - "All storage-dependent values use *From variants (putFrom, mergeFrom, completeFrom)?"
        - "All conditionals on storage data use branch() with bindings lambda (not if/else)?"
        - "Error handling catches and wraps exceptions?"
        - "Every error-case fixture in the spec has a matching validation guard in the handler?"
        - "Empty/missing required params return error variant (not ok)?"
        - "Conformance test covers register() and each action?"
        - "All files written through Emitter (not directly to disk)?"
        - "Source provenance attached to each file?"
        - "Generation step recorded in GenerationPlan?"
    design-principles:
      - title: "One Handler per Action"
        rule: "Each action in the concept spec maps to exactly one async method in the handler."
      - title: "Variant Completeness"
        rule: "Every return variant declared in the spec must have a corresponding code path — no missing branches."
      - title: "Success is ok"
        rule: "The happy-path variant must always be named `ok`. Do not use domain-specific success names like `configured`, `created`, `registered`. Domain context belongs in the output fields. Exception: actions with multiple distinct success outcomes that syncs need to distinguish (e.g., `ok`/`miss` for cache lookup)."
      - title: "Storage Sovereignty"
        rule: "Each concept owns its storage exclusively — no shared databases, no cross-concept state access."
      - title: "Input Extraction and Validation"
        rule: "Extract inputs with `as` casts at the top of each method. CRITICAL: validate required fields BEFORE any storage operations. For every error-case fixture in the concept spec (fixtures with `-> error`, `-> invalid`, etc.), the handler MUST have a corresponding guard clause that returns the error variant. Common pattern: `if (!input.name || (input.name as string).trim() === '') return complete(createProgram(), 'error', { message: 'name is required' })`. Empty strings, missing required params, and obviously invalid inputs must be caught early."
      - title: "Functional First"
        rule: "Default to FunctionalConceptHandler returning StorageProgram. Use imperative ConceptHandler only when direct filesystem or FFI access is unavoidable."
      - title: "No Direct I/O"
        rule: "Never use fetch(), execSync(), or other direct I/O in handlers. Use perform() to declare transport effects — the execution layer (ExternalCall/LocalProcess → protocol providers → instance providers) handles resolution with full observability (ConnectorCall, RetryPolicy, CircuitBreaker, RateLimiter, PerformanceProfile, ErrorCorrelation, RuntimeCoverage)."
    references:
      - path: references/handler-implementation-guide.md
        label: "Handler implementation patterns"
        tier: reference
        content: |
          # Handler Implementation Guide

          How to implement CLEF concept handlers in TypeScript.

          ## FunctionalConceptHandler (Default — Preferred)

          ```typescript
          import type { FunctionalConceptHandler } from 'runtime/functional-handler.ts';
          import {
            createProgram, get, put, putFrom, find, del, pure, perform,
            branch, complete, completeFrom, mapBindings,
            type StorageProgram,
          } from 'runtime/storage-program.ts';
          import { autoInterpret } from 'runtime/functional-compat.ts';

          // Simple action — value known at construction (use put/complete)
          const _handler: FunctionalConceptHandler = {
            create(input: Record<string, unknown>) {
              const name = input.name as string;
              let p = createProgram();
              p = put(p, 'items', name, { name, status: 'active' });
              return complete(p, 'ok', { item: name });
            },

            // Action using storage reads — use putFrom/completeFrom
            update(input: Record<string, unknown>) {
              const id = input.id as string;
              const newName = input.name as string;
              let p = createProgram();
              p = get(p, 'items', id, 'existing');
              return branch(p,
                (bindings) => !bindings.existing,
                (b) => complete(b, 'not_found', {}),
                (b) => {
                  let b2 = putFrom(b, 'items', id, (bindings) => {
                    const existing = bindings.existing as Record<string, unknown>;
                    return { ...existing, name: newName };
                  });
                  return complete(b2, 'ok', { item: id });
                },
              );
            },
          };
          export const myHandler = autoInterpret(_handler);
          ```

          ## External API Calls (Execution Layer)

          NEVER use direct fetch(). Use perform() which routes through the
          three-tier execution layer with full observability:

          ```typescript
          // HTTP API call (e.g. OpenAI, Vercel, GitHub)
          p = perform(p, 'http', 'POST', {
            endpoint: 'openai-embeddings',  // Tier 3 instance provider name
            path: '/embeddings',
            body: JSON.stringify({ model: 'text-embedding-3-small', input: text }),
          }, 'apiResponse');

          // Local ML inference (e.g. CodeBERT via ONNX)
          p = perform(p, 'onnx', 'infer', {
            session: 'codebert-base',  // Tier 3 instance provider name
            inputs: JSON.stringify(tokenized),
          }, 'inferResult');

          // Shell command
          p = perform(p, 'shell', 'exec', {
            command: 'echo', args: 'hello',
          }, 'shellResult');
          ```

          Resolution chain: perform() → EffectHandler → ExternalCall/LocalProcess
          → HttpProvider/OnnxProvider/etc → Instance endpoint concept.

          Each call automatically gets: ConnectorCall tracking, RetryPolicy,
          CircuitBreaker, RateLimiter, PerformanceProfile, ErrorCorrelation,
          RuntimeCoverage — via sync wiring.

          For each new API endpoint, create a Tier 3 instance provider concept
          (like OpenAiEndpoint, VercelApiEndpoint, GitHubApiEndpoint) that stores
          credentials and registers with HttpProvider via sync.

          ## Imperative ConceptHandler (Fallback Only)

          Use ONLY when functional style cannot work (direct filesystem, FFI):

          ```typescript
          interface ConceptHandler {
            [actionName: string]: (
              input: Record<string, unknown>,
              storage: ConceptStorage,
            ) => Promise<{ variant: string; [key: string]: unknown }>;
          }
          ```

          ## Storage Patterns (Functional DSL)

          | Operation | DSL Function | When to Use |
          |-----------|-------------|-------------|
          | Create/Update (static) | `put(p, rel, key, value)` | Value known at construction — input params, constants |
          | Create/Update (deferred) | `putFrom(p, rel, key, (bindings) => value)` | Value depends on prior get/find results |
          | Merge (static) | `merge(p, rel, key, fields)` | Partial update with static fields |
          | Merge (deferred) | `mergeFrom(p, rel, key, (bindings) => fields)` | Partial update using prior get/find results |
          | Read | `get(p, rel, key, bindAs)` | Bind result to name for later access |
          | Query | `find(p, rel, criteria, bindAs)` | Bind query results to name |
          | Delete | `del(p, rel, key)` | Remove a record |
          | Branch | `branch(p, cond, thenP, elseP)` | Conditional logic |
          | Complete (static) | `complete(p, variant, output)` | Output known at construction |
          | Complete (deferred) | `completeFrom(p, variant, (bindings) => output)` | Output depends on prior get/find results |
          | Derive value | `mapBindings(p, (bindings) => val, bindAs)` | Compute derived value from accumulated bindings |
          | Transport | `perform(p, proto, op, payload, bindAs)` | External/internal calls |

          ### CRITICAL: put vs putFrom

          ```typescript
          // WRONG — 'existing' is a bindAs name, NOT a variable
          p = get(p, 'items', id, 'existing');
          p = put(p, 'items', id, { ...existing, updated: true }); // ERROR: existing is not defined

          // CORRECT — access bindings through putFrom callback
          p = get(p, 'items', id, 'existing');
          p = putFrom(p, 'items', id, (bindings) => {
            const existing = bindings.existing as Record<string, unknown>;
            return { ...existing, updated: true };
          });
          ```

          Use `put`/`merge`/`complete` when the value is fully static (only uses input params).
          Use `putFrom`/`mergeFrom`/`completeFrom` when the value depends on storage reads.

          ## Type Mapping

          | Concept Type | TypeScript Type |
          |-------------|----------------|
          | String | string |
          | Int | number |
          | Bool | boolean |
          | list T | T[] |
          | set T | Map<string, T> |
          | option T | T \| undefined |
    supplemental-steps:
      - action: test-gen
        title: "Generate Tests from Invariants"
        prose: >
          After implementing the handler, generate tests from the concept's invariants:
          1. Run `TestGen/generate` (MCP: `test_gen_generate`) with the concept_ref and target language.
             TestGen compiles each invariant construct to the appropriate test strategy:
             example → conformance vectors, forall → PBT properties, always → stateful sequences,
             never → violation attempts, eventually → bounded liveness, requires/ensures → contract PBT.
          2. Generated tests import the handler and validate it against the concept's behavioral contract.
             For functional handlers (StorageProgram), tests validate program structure, transport effects
             (perform() declarations), and storage instructions. For imperative handlers, tests validate
             action results via storage execution.
          3. Run `npx vitest run generated/tests/<concept>.*` to verify all generated tests pass.
          4. If a generated test fails, fix the handler (not the test) — the test is the spec's truth.
          5. Run `TestGen/coverage` to verify all invariant constructs are covered.
    validation-commands:
      - label: "Generate a handler scaffold"
        command: "npx tsx cli/src/index.ts scaffold handler --concept User --actions create,update,delete"
      - label: "Run generated conformance test"
        command: "npx vitest run tests/user.conformance.test.ts"
      - label: "Generate tests from invariants"
        command: "npx tsx cli/src/index.ts test-gen --concept User --language typescript"
      - label: "Run scaffold generator tests"
        command: "npx vitest run tests/scaffold-generators.test.ts"
    quick-reference:
      heading: "Quick Reference"
      body: |
        | Input | Type | Purpose |
        |-------|------|---------|
        | conceptName | String | PascalCase concept name |
        | actions | list ActionDef | Action signatures with params and variants |
        | inputKind | String | KindSystem input kind |
        | outputKind | String | KindSystem output kind |
        | capabilities | list String | Generator capabilities |
    related-workflows:
      - name: create-concept
        description: "Generate concept specs before implementing handlers"
      - name: implementation-builder
        description: "Use SchemaGen for more advanced handler generation"
      - name: concept-validator
        description: "Validate concept specs before generating handlers"
      - name: create-view-query
        description: "For view-layer concepts, use QueryProgram pipelines instead of ad-hoc filtering/sorting"
    anti-patterns:
      - title: "Missing error variant"
        description: "Handler doesn't return error variant on failure — caller gets an unstructured exception."
        bad: |
          async create(input, storage) {
            const id = crypto.randomUUID();
            await storage.put('items', id, { name: input.name });
            return { variant: 'ok', item: id };
            // Exception propagates raw if storage.put fails!
          }
        good: |
          async create(input, storage) {
            try {
              const id = crypto.randomUUID();
              await storage.put('items', id, { name: input.name });
              return { variant: 'ok', item: id };
            } catch (err) {
              return { variant: 'error', message: String(err) };
            }
          }
      - title: "_variant convention (DOES NOT WORK)"
        description: "Returning { _variant: 'notfound' } from a completeFrom callback does NOT change the variant. The variant is always the second argument to completeFrom. The _variant field is just ignored data in the output."
        bad: |
          return completeFrom(p, 'ok', (bindings) => {
            const entry = all.find(...);
            if (!entry) return { _variant: 'notfound' };  // BROKEN: variant is still 'ok'
            return { handler: entry.id };
          });
        good: |
          p = mapBindings(p, (b) => (b.all as any[]).find(...) || null, '_found');
          return branch(p,
            (b) => !!b._found,
            (b) => completeFrom(b, 'ok', (b) => ({ handler: (b._found as any).id })),
            (b) => complete(b, 'notfound', {}),
          );
      - title: "_puts convention (DOES NOT WORK)"
        description: "Returning { _puts: [{ rel, key, value }] } from a completeFrom callback does NOT write to storage. The interpreter treats completeFrom results as terminal pure values — it never inspects _puts."
        bad: |
          return completeFrom(p, 'ok', (bindings) => ({
            variant: 'ok',
            _puts: [{ rel: 'items', key: 'abc', value: record }],
            item: id,
          }));
        good: |
          let p2 = putFrom(p, 'items', 'abc', (b) => record);
          return completeFrom(p2, 'ok', (b) => ({ item: id }));
      - title: "Dynamic storage keys in functional style"
        description: "putFrom(p, rel, key, fn) requires key to be a static string known at build time. If the key is computed at runtime (e.g., a generated UUID), you MUST use imperative style for that action. Mix functional and imperative via autoInterpret + override."
        bad: |
          // Cannot use a dynamic key with putFrom
          p = putFrom(p, 'items', generatedId, (b) => record);
        good: |
          const baseHandler = autoInterpret(_handler);
          const handler = { ...baseHandler,
            async myAction(input, storage) {
              const id = generateId();
              await storage.put('items', id, record);
              return { variant: 'ok', item: id };
            },
          };
      - title: "Actions requiring stateful engine calls"
        description: "If an action needs to call methods on a stateful class instance (e.g. SyncEngine, Parser), it cannot be expressed as a pure StorageProgram. Use imperative style for those specific actions while keeping other actions functional."

  # ─── StorageAdapterScaffoldGen: create-storage-adapter ─
  create-storage-adapter:
    concept: StorageAdapterScaffoldGen
    steps:
      - action: register
        title: "Register Generator"
        prose: "Self-register with PluginRegistry so KindSystem can track StorageConfig → StorageAdapter transformations. Registration is also handled automatically by register-generator-kinds.sync."
      - action: preview
        title: "Preview Changes"
        prose: "Dry-run the generation using Emitter content-addressing to classify each output file as new, changed, or unchanged. No files are written."
      - action: generate
        title: "Generate Storage Adapter"
        prose: "Generate a ConceptStorage adapter implementation for the specified backend (SQLite, PostgreSQL, Redis, DynamoDB, or in-memory) with put, get, find, del, and delMany methods. Sync rules then cascade: create-storage-adapter-emit.sync routes files through Emitter, create-storage-adapter-record-cache.sync records output in BuildCache, and create-storage-adapter-observer.sync tracks the run in GenerationPlan."
      - action: edit
        title: "Edit the Storage Adapter"
        prose: "Refine the generated adapter: implement all ConceptStorage interface methods (put, get, find, del, delMany) with backend-specific logic, configure connection pooling and initialization, and add schema migrations for SQL backends."
    checklists:
      generate:
        - "Backend is valid (sqlite, postgresql, redis, dynamodb, memory)?"
        - "Adapter class implements ConceptStorage interface?"
        - "All five methods (put, get, find, del, delMany) are implemented?"
        - "Constructor accepts backend-specific configuration?"
        - "Find method supports criteria-based filtering?"
        - "Proper serialization (JSON.stringify/parse) for non-native types?"
        - "All files written through Emitter (not directly to disk)?"
        - "Source provenance attached to each file?"
        - "Generation step recorded in GenerationPlan?"
    design-principles:
      - title: "Interface Compliance"
        rule: "Every adapter must implement all five ConceptStorage methods — put, get, find, del, delMany. No optional methods."
      - title: "Backend Transparency"
        rule: "Concept handlers use storage through the interface without knowing which backend is active. Swapping backends requires no handler changes."
      - title: "Relation-Key Namespace"
        rule: "Storage is organized by relation name and key. Each concept uses its own relation names, preventing cross-concept conflicts."
      - title: "Secondary Indexes via ensureIndex"
        rule: "Adapters may implement the optional ensureIndex(relation, field) method. When declared, the adapter maintains an inverted index (field value → key set) for O(1) lookup on find(). The in-memory adapter supports this natively. SQL adapters translate to CREATE INDEX. ensureIndex is called during kernel boot, not inside handlers."
      - title: "FindOptions for Pagination"
        rule: "find() accepts optional FindOptions: { limit?, offset?, sort? }. These are applied AFTER criteria filtering. With secondary indexes, the combined cost is O(log N + K) where K is the result set size, not O(N) full scan."
    references:
      - path: references/storage-adapter-guide.md
        label: "Storage adapter implementation guide"
        tier: reference
        content: |
          # Storage Adapter Guide

          How to implement ConceptStorage adapters for different backends.

          ## ConceptStorage Interface

          ```typescript
          interface ConceptStorage {
            put(relation: string, key: string, value: Record<string, unknown>): Promise<void>;
            get(relation: string, key: string): Promise<Record<string, unknown> | null>;
            find(relation: string, criteria?: Record<string, unknown>, options?: FindOptions): Promise<Record<string, unknown>[]>;
            del(relation: string, key: string): Promise<void>;
            delMany(relation: string, criteria: Record<string, unknown>): Promise<number>;
            ensureIndex?(relation: string, field: string): void;  // Optional secondary index
          }

          interface FindOptions {
            limit?: number;
            offset?: number;
            sort?: { field: string; order: 'asc' | 'desc' };
          }
          ```

          ## Secondary Indexes

          Adapters may implement `ensureIndex(relation, field)` for fast lookups:
          - In-memory: maintains `Map<value, Set<key>>` per indexed field
          - SQL: translates to `CREATE INDEX IF NOT EXISTS`
          - Called during kernel boot, not inside handlers
          - `find()` uses index when criteria matches indexed field (O(1) vs O(N))

          ## Backend Comparison

          | Backend | Best For | Persistence | Query Power |
          |---------|----------|-------------|-------------|
          | memory | Tests, prototypes | None | In-memory filter |
          | sqlite | Single-node, embedded | File | SQL |
          | postgresql | Production, multi-node | Server | Full SQL |
          | redis | Caching, sessions | Optional | Key-value |
          | dynamodb | Serverless, high-scale | Managed | Key + query |

          ## SQLite Example

          ```typescript
          class SqliteStorage implements ConceptStorage {
            private db: Database;

            constructor(dbPath: string) {
              this.db = new Database(dbPath);
              this.db.exec(`
                CREATE TABLE IF NOT EXISTS concept_store (
                  relation TEXT NOT NULL,
                  key TEXT NOT NULL,
                  value TEXT NOT NULL,
                  PRIMARY KEY (relation, key)
                )
              `);
            }

            async put(relation, key, value) {
              this.db.prepare(
                'INSERT OR REPLACE INTO concept_store VALUES (?, ?, ?)'
              ).run(relation, key, JSON.stringify(value));
            }
            // ... other methods
          }
          ```
    validation-commands:
      - label: "Generate a storage adapter"
        command: "npx tsx cli/src/index.ts scaffold storage --name AppStorage --backend postgresql"
      - label: "Run scaffold generator tests"
        command: "npx vitest run tests/scaffold-generators.test.ts"
    quick-reference:
      heading: "Quick Reference"
      body: |
        | Input | Type | Purpose |
        |-------|------|---------|
        | name | String | Adapter class name (PascalCase) |
        | backend | String | Backend type (sqlite, postgresql, redis, dynamodb, memory) |

        | Backend | Import | Constructor |
        |---------|--------|-------------|
        | sqlite | better-sqlite3 | `new SqliteStorage(dbPath)` |
        | postgresql | pg | `new PgStorage(connectionString)` |
        | redis | redis | `new RedisStorage(url)` |
        | dynamodb | @aws-sdk/client-dynamodb | `new DynamoStorage(region, table)` |
        | memory | (none) | `new MemoryStorage()` |
    related-workflows:
      - name: deployment-config
        description: "Configure storage backends in deploy manifests"
      - name: create-handler
        description: "Generate handlers that use the storage adapter"
    anti-patterns:
      - title: "Missing find criteria filtering"
        description: "Find method ignores criteria parameter — returns all records regardless."
        bad: |
          async find(relation) {
            return this.db.all('SELECT * FROM store WHERE relation = ?', relation);
          }
        good: |
          async find(relation, criteria?) {
            let results = this.db.all('SELECT * FROM store WHERE relation = ?', relation);
            if (criteria) {
              results = results.filter(r =>
                Object.entries(criteria).every(([k, v]) => r[k] === v)
              );
            }
            return results;
          }

  # ─── TransportAdapterScaffoldGen: create-transport-adapter ─
  create-transport-adapter:
    concept: TransportAdapterScaffoldGen
    steps:
      - action: register
        title: "Register Generator"
        prose: "Self-register with PluginRegistry so KindSystem can track TransportConfig → TransportAdapter transformations. Registration is also handled automatically by register-generator-kinds.sync."
      - action: preview
        title: "Preview Changes"
        prose: "Dry-run the generation using Emitter content-addressing to classify each output file as new, changed, or unchanged. No files are written."
      - action: generate
        title: "Generate Transport Adapter"
        prose: "Generate a transport adapter implementation for the specified protocol (HTTP, WebSocket, Worker, or in-process) with invoke, query, and health methods. Sync rules then cascade: create-transport-adapter-emit.sync routes files through Emitter, create-transport-adapter-record-cache.sync records output in BuildCache, and create-transport-adapter-observer.sync tracks the run in GenerationPlan."
      - action: edit
        title: "Edit the Transport Adapter"
        prose: "Refine the generated adapter: implement send/receive for the target protocol (HTTP fetch, WebSocket messages, Worker postMessage), configure serialization and content types, add retry and timeout logic, and handle connection lifecycle (connect, reconnect, dispose)."
    checklists:
      generate:
        - "Protocol is valid (http, websocket, worker, in-process)?"
        - "Adapter implements invoke(), query(), and health()?"
        - "HTTP adapter uses fetch with proper error handling?"
        - "WebSocket adapter manages connection lifecycle?"
        - "Worker adapter handles message passing?"
        - "In-process adapter dispatches to registered handlers?"
        - "All files written through Emitter (not directly to disk)?"
        - "Source provenance attached to each file?"
        - "Generation step recorded in GenerationPlan?"
    design-principles:
      - title: "Protocol Transparency"
        rule: "Concept handlers call invoke/query without knowing the transport. Swapping from HTTP to WebSocket requires no handler changes."
      - title: "Health Monitoring"
        rule: "Every adapter provides a health() method that returns latency and status — enables the framework to detect and route around failures."
      - title: "Connection Lifecycle"
        rule: "Stateful transports (WebSocket, Worker) manage their own connection lifecycle — connect on first use, reconnect on failure, clean up on dispose."
    references:
      - path: references/transport-adapter-guide.md
        label: "Transport adapter implementation guide"
        tier: reference
        content: |
          # Transport Adapter Guide

          How to implement transport adapters for different protocols.

          ## Transport Interface

          ```typescript
          interface ConceptTransport {
            invoke(concept: string, action: string,
                   input: Record<string, unknown>): Promise<Record<string, unknown>>;
            query(concept: string, relation: string,
                  criteria?: Record<string, unknown>): Promise<Record<string, unknown>[]>;
            health(): Promise<{ ok: boolean; latencyMs: number }>;
          }
          ```

          ## Protocol Comparison

          | Protocol | Bidirectional | Latency | Best For |
          |----------|--------------|---------|----------|
          | http | No | Medium | REST APIs, microservices |
          | websocket | Yes | Low | Real-time, subscriptions |
          | worker | No | Very Low | Same-machine parallelism |
          | in-process | N/A | None | Testing, monoliths |

          ## HTTP Adapter

          ```typescript
          async invoke(concept, action, input) {
            const url = `${this.baseUrl}/concepts/${concept}/${action}`;
            const response = await fetch(url, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(input),
            });
            return response.json();
          }
          ```

          ## WebSocket Adapter

          Uses request/response correlation with message IDs:
          1. Send `{ id, concept, action, input }` as JSON
          2. Receive `{ id, result }` — match by ID
          3. Resolve the pending promise

          ## When to Use Each

          - **Same runtime**: Use `in-process` — zero overhead
          - **Same machine**: Use `worker` — parallel execution
          - **Same network**: Use `http` — simple and reliable
          - **Real-time**: Use `websocket` — bidirectional streaming
    validation-commands:
      - label: "Generate a transport adapter"
        command: "npx tsx cli/src/index.ts scaffold transport --name ApiTransport --protocol http"
      - label: "Run scaffold generator tests"
        command: "npx vitest run tests/scaffold-generators.test.ts"
    quick-reference:
      heading: "Quick Reference"
      body: |
        | Input | Type | Purpose |
        |-------|------|---------|
        | name | String | Adapter class name (PascalCase) |
        | protocol | String | Protocol (http, websocket, worker, in-process) |
        | baseUrl | String | Base URL for HTTP/WS (default: http://localhost:3000) |
    related-workflows:
      - name: deployment-config
        description: "Configure transport adapters in deploy manifests"
      - name: create-storage-adapter
        description: "Generate storage adapters alongside transport adapters"
    anti-patterns:
      - title: "Missing health check"
        description: "Transport adapter has no health() method — framework can't detect failures."
        bad: |
          class MyTransport {
            async invoke(...) { ... }
            async query(...) { ... }
            // No health()!
          }
        good: |
          class MyTransport {
            async invoke(...) { ... }
            async query(...) { ... }
            async health() {
              const start = Date.now();
              try {
                await fetch(`${this.baseUrl}/health`);
                return { ok: true, latencyMs: Date.now() - start };
              } catch {
                return { ok: false, latencyMs: Date.now() - start };
              }
            }
          }

  # ─── InterfaceScaffoldGen: bind-manifest-outbound ──
  bind-manifest-outbound:
    concept: InterfaceScaffoldGen
    steps:
      - action: analyze
        title: "Analyze Interface Manifest"
        prose: "Read the interface manifest and understand current targets, skills, agents, concept projections, and include lists."
      - action: add-target
        title: "Add or Modify a Target"
        prose: "Add or modify a target section (REST, GraphQL, gRPC, CLI, MCP, skills, agents). Configure output directory, include list, copies, and target-specific options."
      - action: add-skill
        title: "Add or Modify a Skill"
        prose: "Add or modify a skill definition with concept mapping, steps (action, title, prose), checklists, design-principles, and references (path, label, tier, inline content)."
      - action: add-agent
        title: "Add or Modify an Agent"
        prose: "Add or modify an agent annotation with model, skills, tools, prompt, workflow, rules, and references."
      - action: add-concept
        title: "Add a Concept to the Manifest"
        prose: "Add a concept or derived concept path to the concepts list. For derived concepts, add the .derived file path."
      - action: regenerate
        title: "Regenerate Output Files"
        prose: "Run `npx tsx --tsconfig tsconfig.json scripts/regen-interface.ts` to produce updated output files from the manifest."
    checklists:
      add-skill:
        - "Concept mapping exists?"
        - "Steps have action + title + prose?"
        - "Checklists reference step actions?"
        - "References have path + label + content?"
        - "Design principles have title + rule?"
      add-agent:
        - "Agent name matches a concept in the concepts list?"
        - "Skills list includes the agent's primary skill?"
        - "Tools include Read, Grep, Glob, Edit, Write, Bash?"
        - "Prompt describes the agent's domain?"
        - "Workflow has ordered steps?"
        - "Rules are actionable constraints?"
    design-principles:
      - title: "Manifest is the single source of truth"
        rule: "All generated files derive from the manifest. Never edit generated files directly."
      - title: "Skills map to concepts"
        rule: "Every skill has a `concept:` field linking it to a concept spec. The concept defines the domain; the skill defines the workflow."
      - title: "Agents compose skills"
        rule: "An agent's expertise comes from its skills list. An agent without skills is just a prompt."
      - title: "References are inline"
        rule: "Reference content lives in the manifest as inline YAML. The regen pipeline writes it to files."
    references:
      - path: references/interface-manifest-guide.md
        label: "Interface manifest format reference"
        tier: reference
        content: |
          # Interface Manifest Format Reference

          Complete reference for authoring and editing Clef interface manifests
          (`*.interface.yaml`). An interface manifest is the single source of
          truth for all generated interfaces — skills, CLI commands, MCP tools,
          REST APIs, GraphQL schemas, agent definitions, and project instructions.

          ## Top-Level Structure

          ```yaml
          # Header
          interface:
            name: my-app          # Interface name (kebab-case)
            version: 0.1.0        # Semver

          # Generation targets
          targets:
            rest: { ... }
            graphql: { ... }
            cli: { ... }
            mcp: { ... }
            claude-skills: { ... }
            claude-agents: { ... }
            openapi: { ... }
            asyncapi: { ... }
            project-instructions: { ... }

          # Concept specs to include
          concepts:
            - specs/my-concept.concept
            - clef-base/derived/my-derived.derived

          # Derived concepts (surface actions become tools/commands)
          derived-concepts:
            - specs/surface/pilot.derived

          # Output configuration
          output:
            dir: ./generated/devtools
            formatting:
              typescript: prettier
            clean: true

          # Workflows (skill definitions)
          workflows:
            my-skill:
              concept: MyConcept
              steps: [...]

          # Annotations (agent definitions, tool permissions)
          annotations:
            MyConcept:
              concept:
                tool-permissions: [...]

          # Agent annotations (model, skills, tools, prompt, workflow, rules)
          agent-annotations:
            MyAgent:
              model: sonnet
              skills: [...]

          # Project instructions (generated CLAUDE.md, AGENTS.md, GEMINI.md)
          project-instructions:
            content: |
              # Project instructions content...
          ```

          ## Targets Section

          Each target configures a generation output. All targets are optional.

          ### claude-skills

          ```yaml
          claude-skills:
            name: my-skills          # Skills collection name
            grouping: per-concept    # One skill file per concept
            outputDir: ./.claude/skills
            copies:                  # Mirror output to other AI assistants
              - ./.codex/skills
              - ./.gemini/skills
          ```

          ### cli

          ```yaml
          cli:
            name: my-cli             # CLI binary name
            outputDir: ./cli/src     # Command files written here
          ```

          ### mcp

          ```yaml
          mcp:
            name: my-mcp-server      # MCP server name
            transport: stdio         # Transport type (stdio, http)
            outputDir: ./.claude/mcp
            description: >           # Shown in MCP client discovery
              Description of the MCP server.
            configOutputs:           # MCP client config files
              - path: ./.mcp.json
                format: claude-mcp-config
              - path: ./.codex/config.toml
                format: codex-mcp-config
              - path: ./.gemini/settings.json
                format: gemini-mcp-config
              - path: ./.claude/settings.json
                format: claude-settings-config
          ```

          ### claude-agents

          ```yaml
          claude-agents:
            name: my-agents          # Agent collection name
            outputDir: ./.claude/agents
            copies:                  # Mirror output
              - ./.codex/agents
              - ./.gemini/agents
            include:                 # Only generate agents for these concepts
              - ConceptScaffoldGen
              - SyncScaffoldGen
          ```

          ### rest

          ```yaml
          rest:
            basePath: /api
            framework: hono
            versioning: url          # url | header | query
          ```

          ### graphql

          ```yaml
          graphql:
            path: /graphql
            relay: true              # Relay-style connections
            subscriptions: true      # WebSocket subscriptions
          ```

          ### openapi

          ```yaml
          openapi:
            name: my-api
            outputDir: ./generated/specs
            version: 0.2.0
            description: >
              OpenAPI 3.1 specification for my API.
          ```

          ### asyncapi

          ```yaml
          asyncapi:
            name: my-events
            outputDir: ./generated/specs
            version: 0.2.0
            description: >
              AsyncAPI 3.0 specification for my events.
          ```

          ### project-instructions

          ```yaml
          project-instructions:
            description: >
              Generate project instruction files for AI coding assistants.
            outputDir: ./
            outputs:
              - path: ./CLAUDE.md
                format: markdown
              - path: ./AGENTS.md
                format: markdown
              - path: ./GEMINI.md
                format: markdown
          ```

          ## Concepts Section

          Lists `.concept` and `.derived` file paths. Every concept listed here
          becomes available for generation across all targets.

          ```yaml
          concepts:
            # Framework concepts
            - specs/framework/spec-parser.concept
            - specs/framework/schema-gen.concept

            # Repertoire concepts
            - repertoire/concepts/identity/authentication.concept

            # Derived concepts
            - clef-base/derived/clef-base.derived

            # Score entities
            - score/semantic/concept-entity.concept

            # View suite
            - specs/view/query-program.concept
          ```

          Derived concepts are listed separately for surface action generation:

          ```yaml
          derived-concepts:
            - specs/surface/pilot.derived
            - clef-base/derived/clef-base.derived
          ```

          ## Workflows Section (Skills)

          Each workflow defines a skill — a step-by-step guide for using a concept.
          The key is the skill name (kebab-case), used as the slash command name.

          ```yaml
          workflows:
            my-skill-name:
              concept: ConceptName           # Links to a concept spec
              steps:
                - action: step-action-name   # Step identifier
                  title: "Human-Readable Title"
                  prose: "Detailed explanation of what to do in this step."
                - action: next-step
                  title: "Next Step"
                  prose: "More instructions..."

              checklists:                    # Keyed by step action names
                step-action-name:
                  - "First check item?"
                  - "Second check item?"
                next-step:
                  - "Check for this step?"

              design-principles:             # Named rules for the skill
                - title: "Principle Name"
                  rule: "Explanation of the principle."
                - title: "Another Principle"
                  rule: "Another rule."

              references:                    # Inline reference documents
                - path: references/my-guide.md
                  label: "Guide title"
                  tier: reference            # reference | tutorial | example
                  content: |
                    # Guide Content

                    Full markdown content written inline.
                    The regen pipeline writes this to the path.

              validation-commands:           # Optional: commands to verify
                - label: "Run tests"
                  command: "npx vitest run tests/my.test.ts"

              quick-reference:               # Optional: summary table
                heading: "Quick Reference"
                body: |
                  | Input | Type | Purpose |
                  |-------|------|---------|
                  | name | String | The name |

              related-workflows:             # Optional: cross-references
                - name: other-skill
                  description: "Related skill description"

              anti-patterns:                 # Optional: what NOT to do
                - title: "Bad Pattern"
                  description: "Why it's bad."
                  bad: |
                    example of bad code
                  good: |
                    example of good code
          ```

          ## Annotations Section

          Per-concept metadata for tool permissions, argument templates,
          trigger descriptions, and companion documentation.

          ```yaml
          annotations:
            ConceptName:
              concept:
                tool-permissions: [Read, Grep, Glob, Edit, Write, Bash]
                argument-template: "$ARGUMENTS"
                trigger-description: >
                  When to invoke this skill.
                intro-template: >
                  What the skill does with $ARGUMENTS.
                companion-docs:
                  - path: examples/my-example.md
                    label: "Example walkthrough"
                    content: |
                      # Example Content
                      Inline markdown...
                code-examples:
                  - description: "Example usage"
                    language: typescript
                    code: |
                      const result = await handler.doSomething();
          ```

          ## Agent Annotations Section

          Configures agent definitions generated into `.claude/agents/`.

          ```yaml
          agent-annotations:
            MyAgent:
              model: sonnet                  # Model: sonnet | opus | haiku
              skills:                        # Skills the agent can use
                - create-concept
                - create-sync
              tools:                         # Tool permissions
                - Read
                - Grep
                - Glob
                - Edit
                - Write
                - Bash
              prompt: >                      # Agent system prompt
                You are an expert at designing concepts
                following Jackson's methodology.
              workflow:                       # Ordered workflow steps
                - "Analyze the requirements"
                - "Decompose into concepts"
                - "Generate specs"
                - "Validate with tests"
              rules:                         # Constraints
                - "Always check the repertoire first"
                - "Never create concepts without purpose blocks"
              references:                    # Optional agent-specific docs
                - path: references/agent-guide.md
                  label: "Agent guide"
                  content: |
                    # Agent-Specific Guide
                    ...
          ```

          ## Regeneration

          After editing the manifest, regenerate all output files:

          ```bash
          npx tsx --tsconfig tsconfig.json scripts/regen-interface.ts
          ```

          This reads the manifest and produces:
          - `.claude/skills/*/SKILL.md` — skill files
          - `.claude/agents/*.md` — agent files
          - `.claude/mcp/*/` — MCP tool definitions
          - `cli/src/*/` — CLI command files
          - `CLAUDE.md`, `AGENTS.md`, `GEMINI.md` — project instructions
          - `generated/specs/` — OpenAPI, AsyncAPI specs

          Generated files have an `<!-- Auto-generated -->` header.
          Never edit them directly — edit the manifest instead.
    validation-commands:
      - label: "Regenerate all interface output"
        command: "npx tsx --tsconfig tsconfig.json scripts/regen-interface.ts"
      - label: "Validate manifest YAML syntax"
        command: "npx tsx cli/src/main.ts interface validate --manifest examples/devtools/devtools.interface.yaml"
    quick-reference:
      heading: "Quick Reference"
      body: |
        | Section | Key | Purpose |
        |---------|-----|---------|
        | interface | name, version | Manifest identity |
        | targets | rest, graphql, cli, mcp, claude-skills, claude-agents, openapi, asyncapi, project-instructions | Generation outputs |
        | concepts | list of .concept paths | Concepts to expose |
        | derived-concepts | list of .derived paths | Derived concepts with surface actions |
        | workflows | skill-name → steps, checklists, design-principles, references | Skill definitions |
        | annotations | ConceptName → tool-permissions, trigger-description, companion-docs | Per-concept metadata |
        | agent-annotations | AgentName → model, skills, tools, prompt, workflow, rules | Agent definitions |
        | output | dir, formatting, clean | Output configuration |
    related-workflows:
      - name: create-interface
        description: "Scaffold a new interface manifest from scratch"
      - name: create-concept
        description: "Create concept specs that the manifest exposes"
      - name: create-sync
        description: "Wire concepts together with sync rules"
    anti-patterns:
      - title: "Editing generated files directly"
        description: "Changes are overwritten on next regen. Edit the manifest instead."
        bad: |
          # Editing .claude/skills/my-skill/SKILL.md directly
          vim .claude/skills/my-skill/SKILL.md
        good: |
          # Edit the manifest, then regenerate
          vim examples/devtools/devtools.interface.yaml
          npx tsx --tsconfig tsconfig.json scripts/regen-interface.ts
      - title: "Skills without concept mappings"
        description: "A skill with no concept: field has no domain grounding."
        bad: |
          workflows:
            my-skill:
              steps:
                - action: do-thing
                  title: "Do Thing"
                  prose: "Just do the thing."
        good: |
          workflows:
            my-skill:
              concept: MyConcept
              steps:
                - action: do-thing
                  title: "Do Thing"
                  prose: "Invoke MyConcept/doThing with..."
      - title: "Agents without skills"
        description: "An agent with no skills list is just a prompt — it has no structured expertise."
        bad: |
          agent-annotations:
            MyAgent:
              model: sonnet
              prompt: "You are an expert."
        good: |
          agent-annotations:
            MyAgent:
              model: sonnet
              skills: [create-concept, create-sync]
              prompt: "You are an expert at concept design."


  # ─── Connection: bind-manifest-inbound ──────────
  bind-manifest-inbound:
    concept: Connection
    steps:
      - action: analyze-api
        title: "Analyze External API"
        prose: "Read an OpenAPI spec, GraphQL schema, or API documentation. Identify endpoints, types, operations, authentication, and rate limits."
      - action: map-to-concepts
        title: "Map to Concepts"
        prose: "Map external API operations to existing concept actions. Create bindings: external endpoint → concept action, external type → concept state."
      - action: configure-transport
        title: "Configure Transport"
        prose: "Set up the transport adapter (HTTP, WebSocket, gRPC) with authentication, base URL, headers, and retry configuration."
      - action: generate-bindings
        title: "Generate Bindings"
        prose: "Generate EffectHandler registrations and transport adapter configuration that bridges external APIs to concept perform() instructions."
    checklists:
      map-to-concepts:
        - "Each external endpoint maps to exactly one concept action?"
        - "Input/output types are compatible?"
        - "Error responses map to concept error variants?"
        - "Authentication/authorization handled at transport level?"
      configure-transport:
        - "Base URL is configurable (not hardcoded)?"
        - "Authentication credentials stored in Credential concept?"
        - "Retry policy configured for transient failures?"
        - "Rate limiting respected?"
    design-principles:
      - title: "Concepts Stay Independent"
        rule: "External API bindings go through transport adapters and EffectHandler. Concept handlers use perform() — they never know about the external API directly."
      - title: "Transport is Pluggable"
        rule: "The same concept action can be served by different external APIs by swapping the transport adapter. No handler changes needed."
      - title: "Credentials are Managed"
        rule: "API keys, tokens, and secrets are stored in the Credential concept and injected by the transport adapter at runtime."
    references:
      - path: references/inbound-binding-guide.md
        label: "Inbound API binding guide"
        tier: reference
        content: |
          # Inbound API Binding Guide

          How to consume external APIs and bind them to existing concepts.

          ## Architecture

          ```
          External API → Transport Adapter → EffectHandler → perform() → Handler
          ```

          The handler calls `perform('http', 'get', { url, headers })`.
          The EffectHandler resolves 'http' to the registered transport adapter.
          The transport adapter makes the HTTP call with credentials from Credential.

          ## Steps

          1. Analyze the external API (OpenAPI spec or docs)
          2. Identify which concept actions map to which endpoints
          3. Create a transport adapter for the protocol
          4. Register EffectHandler mappings
          5. Store credentials in Credential concept
          6. Wire via deploy manifest

  # ─── SurfaceComponentScaffoldGen: create-widget ─
  create-widget:
    concept: SurfaceComponentScaffoldGen
    steps:
      - action: register
        title: "Register Generator"
        prose: "Self-register with PluginRegistry so KindSystem can track ComponentConfig → SurfaceComponent transformations. Registration is also handled automatically by register-generator-kinds.sync."
      - action: preview
        title: "Preview Changes"
        prose: "Dry-run the generation using Emitter content-addressing to classify each output file as new, changed, or unchanged. No files are written."
      - action: generate
        title: "Generate Clef Surface Component"
        prose: "Generate a complete headless component scaffold including widget specification (FSM), anatomy definition (parts contract), machine implementation, and suite manifest. Sync rules then cascade: create-widget-emit.sync routes files through Emitter, create-widget-record-cache.sync records output in BuildCache, and create-widget-observer.sync tracks the run in GenerationPlan."
      - title: "Edit the Widget Specification"
        prose: >
          Open the generated .widget file and refine each section:
          1. Write a purpose block describing what the widget does.
          2. Define anatomy parts with semantic roles (root, trigger, content, etc.).
          3. Design the state machine: states, events, transitions, entry/exit actions.
          4. Add accessibility: ARIA role, keyboard bindings (Enter, Escape, Arrow keys), focus management.
          5. Define affordance bindings: serves purpose, specificity, when conditions.
          6. Add props with types and defaults.
          7. Wire connect block: map anatomy parts to attribute bindings.
          8. Add compose block for nested widgets.
          9. Write invariants describing behavioral guarantees.
    checklists:
      generate:
        - "Component name is PascalCase?"
        - "Parts list defines all structural elements?"
        - "States define all machine states?"
        - "Events define all transitions?"
        - "Anatomy lists all parts and slots?"
        - "Machine implementation has spawn, send, connect, destroy actions?"
        - "Suite manifest declares dependencies on surface-core and surface-component?"
        - "All files written through Emitter (not directly to disk)?"
        - "Source provenance attached to each file?"
        - "Generation step recorded in GenerationPlan?"
        - "Has purpose block?"
        - "State machine has an [initial] state?"
        - "All states are reachable?"
        - "ARIA role is specified?"
        - "Keyboard bindings cover Enter, Escape, Arrow keys?"
        - "Focus management (trap, roving, initial) is defined?"
        - "Props have types and defaults?"
        - "Every structured invariant round-trips through parseWidgetFile? (See MUST-VERIFY below.)"
        - "Invariant block has ≥ 5 structured entries (example/always/never/forall/action), not just prose strings?"
        - "Anatomy, states, props, connect, compose blocks each have balanced braces? (A single imbalance silently eats the invariant block.)"
    must-verify:
      - title: "Parse-verify before committing"
        rule: |
          After writing the .widget file, you MUST parse it and verify the invariant block was captured. Silent drops are the #1 cause of shipped widgets with zero test coverage.

          Run (from repo root):
          ```
          npx tsx --tsconfig tsconfig.json -e "
            import { parseWidgetFile } from './handlers/ts/framework/widget-spec-parser';
            import fs from 'fs';
            const m:any = parseWidgetFile(fs.readFileSync('surface/widgets/YOUR-WIDGET.widget','utf8'));
            console.log('invariants:', (m.invariants||[]).length);
            if (!m.invariants || m.invariants.length < 5) throw new Error('FAIL: invariants not captured (brace imbalance upstream or wrong grammar)');
          "
          ```
          If this prints 0 or fewer than your written count, the parser dropped your invariants. Find and fix the upstream brace imbalance (usually in anatomy/states/props/connect/compose) BEFORE reporting the card done.
    design-principles:
      - title: "Behavior-Rendering Separation"
        rule: "Widget specs define behavior (states, transitions, guards). Rendering is handled by framework adapters. They agree only on part names (anatomy)."
      - title: "Finite State Machine Discipline"
        rule: "Every component is a finite state machine with explicit states, events, transitions, and guards. No implicit state."
      - title: "Anatomy Contract"
        rule: "The anatomy defines named parts (root, trigger, content, etc.) that both the machine and renderer reference. This is the only coupling point."
      - title: "Props API via connect()"
        rule: "The machine's connect() action transforms internal state into framework-neutral props objects — one per anatomy part."
      - title: "Pagination Control Pattern"
        rule: "For paginated views, use the pagination-control.widget pattern: parts (root, prevButton, nextButton, pageIndicator, pageSizeSelector, totalCount), states (idle, loading, firstPage, lastPage, disabled), connect to PaginationSpec/advance and PaginationSpec/retreat. See surface/pagination-control.widget for the reference implementation."
    references:
      - path: references/surface-component-guide.md
        label: "Clef Surface headless component architecture"
        tier: reference
        content: |
          # Clef Surface Component Architecture

          How headless components work in the Clef Surface.

          ## Pipeline

          ```
          Concept Spec → Binding → UISchema → Element Tree
                                                    ↓
                                        Widget Registry (query)
                                                    ↓
                                        Machine (spawn + FSM)
                                                    ↓
                                        connect() → Props API
                                                    ↓
                                        Framework Adapter (React, Vue, etc.)
          ```

          ## Widget Specification

          ```
          widget Dialog {
            anatomy {
              part root
              part trigger
              part backdrop
              part content
              part title
              part description
              part closeTrigger
            }

            machine {
              initial: closed

              state closed {
                on open -> open
              }
              state open {
                on close -> closed
                on escape -> closed
              }
            }

            config {
              closeOnEsc: true
              closeOnOutsideClick: true
              modal: true
            }

            connect {
              rootProps { role: "dialog"; aria-modal: context.modal }
              triggerProps { onClick: actions.open }
              contentProps { data-state: context.state }
              closeTriggerProps { onClick: actions.close }
            }

            accessibility {
              role: "dialog"
              aria-modal: true
              aria-labelledby: titleId
              aria-describedby: descriptionId
            }
          }
          ```

          ## Standard Components

          | Component | Parts | States | Pattern |
          |-----------|-------|--------|---------|
          | Button | root | idle, pressed, disabled | Simple trigger |
          | Dialog | root, trigger, backdrop, content, title, close | closed, open | Overlay |
          | Tabs | root, list, trigger, content, indicator | idle, focused | Selection |
          | Accordion | root, item, trigger, content | collapsed, expanded | Disclosure |
          | Menu | root, trigger, content, item, separator | closed, open | Popup |
          | Tooltip | root, trigger, content, arrow | hidden, visible | Overlay |
          | Select | root, trigger, content, item, indicator | closed, open | Selection |
          | Slider | root, track, range, thumb | idle, dragging | Range |
      - path: references/widget-grammar.md
        label: "Widget specification grammar"
        tier: reference
        content: |
          # Widget Grammar Reference

          ## Top-Level Structure

          ```
          [@version(N)]
          widget widget-name {
            purpose { ... }
            requires @priority { fields { ... } actions { ... } }
            anatomy { partName: role { description } }
            states {
              stateName [initial] {
                on EVENT -> targetState;
                entry [action]; exit [action];
              }
            }
            accessibility {
              role: application;
              keyboard { Key -> ACTION; }
              focus { trap: true; initial: part; roving: true }
              aria { part -> { aria-attr: value; } }
            }
            affordance { serves: purpose; specificity: N; when: condition; bind { field: source; } }
            props { propName: Type (default: value) }
            connect { partName -> { attr: value; } }
            compose { partName: widget("name", { prop: value }) }
            invariant {
              # structured forms (below) + legacy prose strings both allowed
            }
          }
          ```

          ## Invariant Grammar (from handlers/ts/framework/widget-spec-parser.ts)

          The `invariant { }` block accepts FIVE structured kinds plus legacy prose strings. Each structured form generates a WidgetComponentTest conformance test. Prose strings do NOT generate tests — they are documentation only.

          ### Structured forms

          ```
          invariant {
            # example: concrete before/after scenario
            example "name of the scenario" {
              after EVENT_NAME() -> variant_tag
              then OTHER_EVENT() -> variant_tag
            }

            # always: temporal invariant with optional forall quantifier
            always "name" {
              forall p in stateSetName:
                p.field = "expected"
            }

            # never: temporal invariant with optional exists quantifier
            never "name" {
              exists p in stateSetName:
                p.field = "forbidden"
            }

            # forall: quantified scenario
            forall "name" {
              given x in {a, b, c}
              after EVENT(arg: x) -> ok
              then OTHER() -> ok
            }

            # action contract: requires/ensures on a named part or event
            action saveButton {
              requires: state.lifecycle = "dirty"
              ensures ok: state.lifecycle = "saving"
            }

            # legacy prose (documentation only, no test generation)
            "A prose string description of a behavioral guarantee."
          }
          ```

          ### Syntax rules the parser enforces (will SILENTLY drop your block if wrong)

          - **After-pattern required inside `example`:** the body must contain `after EVENT() -> variant` — bare assertion bodies are not accepted in example.
          - **Assertions use `=`, not `==`:** `state.mode = "open"` parses; `state.mode == "open"` does not.
          - **Quantifier keywords are specific:**
            - `always` accepts `forall p in ...:` (colon required)
            - `never` accepts `exists p in ...:` (colon required)
            - `forall` top-level uses `given x in {...}`
          - **Action contract target is a bare identifier:** `action saveButton {...}` works; `action saveButton.click {...}` does NOT — drop the `.click`.
          - **Variant tags are bare identifiers after `->`:** `-> ok`, `-> error`, not `-> ok()` or `-> "ok"`.
          - **Semicolons between invariants are optional** but do not break the parser either way.

          ### Common silent failures (the invariant block vanishes from the AST)

          If `parseWidgetFile(...).invariants.length` comes back 0 or smaller than you wrote, check:

          1. **Brace imbalance in anatomy / states / props / connect / compose.** A single `{` without matching `}` in an earlier section causes the parser to sail past the invariant block. Verify each section closes at column 0.
          2. **`example "..." { ... }` body missing `after` keyword.** The parser requires it; without it, the example silently drops.
          3. **Unsupported expressions inside `after` / `then`:** dotted event names like `button.click()`, inline object literals like `{x: 1}` in variant args, em-dashes / smart quotes in prose — all cause parse errors that abort the containing block.
          4. **Non-ASCII punctuation in prose strings** (em-dash `—`, curly quotes `'` / `"`, forward slash outside `//` comments) — the tokenizer skips or mis-classifies these.

          ### Must-verify step (mandatory before reporting done)

          ```
          npx tsx --tsconfig tsconfig.json -e "
            import { parseWidgetFile } from './handlers/ts/framework/widget-spec-parser';
            import fs from 'fs';
            const m:any = parseWidgetFile(fs.readFileSync('<YOUR .widget PATH>','utf8'));
            const n = (m.invariants||[]).length;
            const counts:any = {};
            (m.invariants||[]).forEach((i:any)=>{counts[i.kind]=(counts[i.kind]||0)+1;});
            console.log('total:', n, 'by kind:', counts);
            if (n < 5) throw new Error('FAIL: invariants not captured');
          "
          ```
    validation-commands:
      - label: "Generate a Clef Surface component scaffold"
        command: "npx tsx cli/src/index.ts scaffold component --name Dialog --parts root,trigger,content --states closed,open"
      - label: "Run scaffold generator tests"
        command: "npx vitest run tests/scaffold-generators.test.ts"
    quick-reference:
      heading: "Quick Reference"
      body: |
        | Input | Type | Purpose |
        |-------|------|---------|
        | name | String | PascalCase component name |
        | parts | list String | Anatomy part names (root, trigger, content, etc.) |
        | slots | list String | Named slot insertion points |
        | states | list String | FSM state names |
        | events | list String | FSM event names |
        | a11y | { role, ariaProps } | Accessibility configuration |

        **Output Files:**
        | File | Purpose |
        |------|---------|
        | `{name}-widget.concept` | Widget FSM specification |
        | `{name}-anatomy.concept` | Parts contract definition |
        | `suite.yaml` | Suite manifest with dependencies |
        | `{name}-machine.handler.ts` | Machine handler implementation |
    related-workflows:
      - name: create-theme
        description: "Generate themes to style the component"
      - name: create-concept
        description: "Generate concept specs for custom component concepts"
      - name: create-suite
        description: "Generate suite manifests for component libraries"
    anti-patterns:
      - title: "Rendering logic in widget spec"
        description: "Widget spec includes CSS, HTML, or framework-specific code — violates behavior-rendering separation."
        bad: |
          widget Dialog {
            render {
              <div class="dialog-overlay">  # HTML in spec!
                <div class="dialog-content">...</div>
              </div>
            }
          }
        good: |
          widget Dialog {
            anatomy {
              part root        # Just names — rendering
              part backdrop    # is the adapter's job
              part content
            }
          }
      - title: "Implicit state transitions"
        description: "Component changes state without explicit events — makes behavior unpredictable."
        bad: |
          machine {
            state open {
              # Implicitly closes after 5 seconds — not declarative!
              after 5000ms -> closed
            }
          }
        good: |
          machine {
            state open {
              on close -> closed
              on timeout -> closed  # Explicit event
            }
          }

