suite:
  name: view
  version: 0.1.0
  description: >
    View decomposition suite — breaks a rendered view into independent,
    composable configuration concepts covering filtering, sorting, grouping,
    projection, data sourcing, presentation, interaction, and shell layout.
    Coordination concepts bridge filter state to UI representation, and
    optional query concepts provide DSL compilation and execution.

concepts:
  # --- Configuration concepts (required) ---

  FilterSpec:
    spec: ./filter-spec.concept
    params:
      F: { as: filter, description: "Filter predicate" }

  SortSpec:
    spec: ./sort-spec.concept
    params:
      S: { as: sort, description: "Sort ordering" }

  GroupSpec:
    spec: ./group-spec.concept
    params:
      G: { as: group, description: "Grouping criterion" }

  ProjectionSpec:
    spec: ./projection-spec.concept
    params:
      P: { as: projection, description: "Field projection" }

  DataSourceSpec:
    spec: ./data-source-spec.concept
    params:
      D: { as: datasource, description: "Data source binding" }

  PresentationSpec:
    spec: ./presentation-spec.concept
    params:
      R: { as: presentation, description: "Presentation configuration" }

  InteractionSpec:
    spec: ./interaction-spec.concept
    params:
      I: { as: interaction, description: "Interaction binding" }

  ViewShell:
    spec: ./view-shell.concept
    params:
      V: { as: shell, description: "View shell container" }

  # --- Coordination concepts (recommended) ---

  FilterRepresentation:
    spec: ./filter-representation.concept
    params:
      FR: { as: filter-repr, description: "Filter UI representation" }
    recommended: true

  # --- Query execution concepts ---

  QueryProgram:
    spec: ./query-program.concept
    params:
      Q: { as: query, description: "Compiled query program" }
    recommended: true

  QueryExecution:
    spec: ./query-execution.concept
    params:
      E: { as: execution, description: "Query execution context" }
    recommended: true

syncs:
  required:
    - path: ../../syncs/view/view-resolve.sync
      description: "Assembles FilterSpec, SortSpec, GroupSpec, ProjectionSpec, DataSourceSpec, PresentationSpec, and InteractionSpec into a resolved ViewShell"

  recommended:
    - path: ../../syncs/view/compose-filters.sync
      description: "Composes multiple FilterSpec predicates with FilterRepresentation for UI display"

  optional:
    - path: ../../syncs/view/filter-from-dsl.sync
      description: "Parses a DSL query string into FilterSpec predicates"

    - path: ../../syncs/view/filter-to-dsl.sync
      description: "Serializes FilterSpec predicates back into a DSL query string"

    - path: ../../syncs/view/compile-query.sync
      description: "Builds a QueryProgram from ViewShell specs (filter, sort, group, project)"

    - path: ../../syncs/view/execute-query.sync
      description: "Dispatches sealed QueryPrograms to QueryExecution for execution"

    - path: ../../syncs/view/execute-remote-query.sync
      description: "Dispatches QueryPrograms to RemoteQueryProvider for external API execution"

    - path: ../../syncs/view/compile-remote-query.sync
      description: "Compiles QueryPrograms for remote data sources and routes to remote executor"

    - path: ../../syncs/view/execute-invoke.sync
      description: "Dispatches invoke instructions from QueryExecution to Connection/invoke"

    - path: ../../syncs/view/invoke-complete.sync
      description: "Feeds Connection/invoke completion back to QueryExecution/resumeAfterInvoke"

    - path: ../../syncs/view/analyze-on-seal.sync
      description: "Triggers static analysis providers when a QueryProgram is sealed"

  # --- Remote query execution provider ---

  RemoteQueryProvider:
    spec: ./remote-query-provider.concept
    params:
      R: { as: provider, description: "Remote query execution provider" }
    recommended: true

  # --- Static analysis providers ---

  InvokeEffectProvider:
    spec: ./providers/invoke-effect-provider.concept
    params:
      T: { as: invoke-effect, description: "Invoke effect analysis result" }
    recommended: true

  QueryPurityProvider:
    spec: ./providers/query-purity-provider.concept
    params:
      R: { as: purity, description: "Query purity analysis result" }
    recommended: true

  QueryCompletionCoverage:
    spec: ./providers/query-completion-coverage.concept
    params:
      C: { as: coverage, description: "Query completion coverage result" }
    recommended: true

  # --- View invariant manifests ---

views:
  - path: ./views/content-list.view
    description: "Content listing view — read-only, schema-filtered"

  - path: ./views/content-list-actions.view
    description: "Content listing with inline create — read-write"

  - path: ./views/simple-list.view
    description: "Minimal data listing — read-only, no filtering"
