# Query-Retrieval Suite Manifest
name: query-retrieval
version: 0.2.0
description: "Structured and unstructured data retrieval — queries, unified cross-zone queries, search indexes, and exposed filters for building search pipelines."

concepts:
  - name: Query
    spec: query.concept
  - name: UnifiedQuery
    spec: unified-query.concept
  - name: SearchIndex
    spec: search-index.concept
  - name: ExposedFilter
    spec: exposed-filter.concept
  - name: ContentEmbedding
    spec: content-embedding.concept

syncs:
  - name: search-pipeline
    file: syncs/search-pipeline.sync
    tier: required
  - name: content-node-create-indexes-content-embedding
    file: syncs/content-node-create-indexes-content-embedding.sync
    tier: recommended
  - name: content-node-update-indexes-content-embedding
    file: syncs/content-node-update-indexes-content-embedding.sync
    tier: recommended
  - name: content-node-delete-removes-content-embedding
    file: syncs/content-node-delete-removes-content-embedding.sync
    tier: recommended

dependencies:
  - foundation
