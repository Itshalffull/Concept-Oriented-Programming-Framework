# Schema composition rules for process-human concepts.

compositions:
  # WorkItems are auditable, commentable, and support due-date tracking.
  # Commentable lets assignees and reviewers annotate tasks inline.
  - when_schema: WorkItem
    apply_mixin: Auditable
  - when_schema: WorkItem
    apply_mixin: Commentable
  - when_schema: WorkItem
    apply_mixin: DueAt
  - when_schema: WorkItem
    apply_mixin: HasTags

  # Approvals are auditable and notifiable — decision-makers need
  # to receive prompts when an approval request is pending.
  - when_schema: Approval
    apply_mixin: Auditable
  - when_schema: Approval
    apply_mixin: Notifiable

  # Escalations are auditable so the chain of escalation decisions
  # is fully traceable.
  - when_schema: Escalation
    apply_mixin: Auditable
