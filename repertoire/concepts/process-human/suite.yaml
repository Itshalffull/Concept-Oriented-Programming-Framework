suite:
  name: process-human
  version: 0.1.0
  description: "Human task lifecycle: work items, multi-party approvals, escalation chains"

concepts:
  WorkItem:
    spec: ./work-item.concept
    params: { W: { as: work-item-id } }
  Approval:
    spec: ./approval.concept
    params: { A: { as: approval-id } }
  Escalation:
    spec: ./escalation.concept
    params: { L: { as: escalation-id } }

syncs:
  required:
    - ./syncs/human-step-dispatch.sync
    - ./syncs/work-item-completes.sync
    - ./syncs/approval-step-dispatch.sync
    - ./syncs/approval-granted.sync
    - ./syncs/approval-denied.sync
  recommended:
    - ./syncs/sla-escalation.sync
  integration:
    - ./syncs/work-item-notify.sync

widgets:
  - path: ./widgets/approval-stepper.widget
    description: "Multi-step approval flow with sequential or parallel stages"
  - path: ./widgets/sla-timer.widget
    description: "Five-state countdown timer for SLA tracking with urgency phases"

surface:
  entityAffordances:
    - concept: WorkItem
      detail: approval-stepper
      inline: sla-timer

uses:
  - suite: process-foundation
    concepts: [StepRun, ProcessSpec]
  - suite: process-automation
    optional: true
    concepts: [Timer]
  - suite: notification
    optional: true
    concepts: [Notification]
