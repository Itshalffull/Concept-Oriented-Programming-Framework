# Synthesis Writer persona seed.
# Creates a persona focused on synthesizing research findings into structured
# reports. Used by the "synthesize" step in the deep-research-process.
#
# This persona has fewer tools than the deep-researcher: it works from already-
# gathered evidence (Claims and Snippets already captured) rather than searching
# for new sources. Its strategy is react (single-round synthesis) rather than
# plan_and_execute (multi-round planning).
#
# Referenced by the deep-research-process seed (MAG-533): the "synthesize" step
# uses role="synthesis-writer" to dispatch to this persona.

concept: ContentNode
action: create
entries:
  - node: agent-persona:synthesis-writer
    type: agent-persona
    content: '{"name":"Synthesis Writer","description":"Synthesizes research findings into clear, structured reports organized by theme with complete citation coverage.","default_strategy":"react","model_provider":"anthropic","model_id":"claude-opus-4","temperature":0.5,"status":"published"}'
    createdBy: system

