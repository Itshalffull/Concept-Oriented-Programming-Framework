---

# Routing edges — the full directed graph including revision loops.
# Stored as JSON metadata on the process-spec page.
# ProcessRun reads this to build the execution graph for flow-token routing.
#
# Edge semantics:
#   on_variant      — matches the step completion variant tag (ok, rejected, error, etc.)
#   condition_expr  — evaluated against ProcessVariables for data-based branching
#   priority        — when multiple edges match, highest priority wins (default 0)
#
# Graph shape:
#   plan → approve_plan (ok)
#   approve_plan → gather_sources (ok)         ← forward
#   approve_plan → plan (rejected)             ← revision loop
#   gather_sources → quality_gate (ok)
#   quality_gate → synthesize (pass)
#   quality_gate → gather_sources (fail)       ← retry loop
#   synthesize → verify_cites (ok)
#   verify_cites → human_review (ok)
#   verify_cites → synthesize (error)          ← re-synthesis loop
#   human_review → publish (ok)                ← forward
#   human_review → synthesize (rejected)       ← revision loop

concept: Property
action: set
entries:
  - entity: process-spec:deep-research-process
    key: edges
    value: '[{"from_step":"plan","to_step":"approve_plan","on_variant":"ok","condition_expr":null,"priority":10},{"from_step":"approve_plan","to_step":"gather_sources","on_variant":"ok","condition_expr":null,"priority":10},{"from_step":"approve_plan","to_step":"plan","on_variant":"rejected","condition_expr":null,"priority":5},{"from_step":"gather_sources","to_step":"quality_gate","on_variant":"ok","condition_expr":null,"priority":10},{"from_step":"quality_gate","to_step":"synthesize","on_variant":"ok","condition_expr":"pass","priority":10},{"from_step":"quality_gate","to_step":"gather_sources","on_variant":"ok","condition_expr":"fail","priority":5},{"from_step":"synthesize","to_step":"verify_cites","on_variant":"ok","condition_expr":null,"priority":10},{"from_step":"verify_cites","to_step":"human_review","on_variant":"ok","condition_expr":null,"priority":10},{"from_step":"verify_cites","to_step":"synthesize","on_variant":"error","condition_expr":null,"priority":5},{"from_step":"human_review","to_step":"publish","on_variant":"ok","condition_expr":null,"priority":10},{"from_step":"human_review","to_step":"synthesize","on_variant":"rejected","condition_expr":null,"priority":5}]'

