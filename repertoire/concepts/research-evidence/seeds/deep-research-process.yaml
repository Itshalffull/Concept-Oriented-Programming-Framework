# Deep Research Process — configurable ProcessSpec seed.
# Creates the deep research workflow as a content-native process-spec page.
# Steps are Outline children with the process-step child schema applied.
# Edges are stored as a JSON metadata block on the process-spec page.
#
# This is NOT hardcoded — users can edit the workflow through:
#   - workflow-editor widget (n8n-style node-graph canvas)
#   - process-map-graph widget (visual directed graph)
#   - schema-block-editor (add/remove/reorder Outline children)
#
# Step types used:
#   llm       — dispatches to AgentSession/spawn using step's required_role
#   approval  — gates execution, dispatches to Approval/request
#   automation — runs without human or LLM involvement
#
# The required_role values reference persona page IDs defined in:
#   - deep-researcher-persona.yaml (plan, gather_sources, publish steps)
#   - synthesis-writer-persona.yaml (synthesize step)
#   - fact-checker-persona.yaml (verify_cites step)
#
# Edges encode the full routing graph including revision loops.
# Parallel routing on gather_sources is expressed via routing="parallel"
# which activates the parallel-fork/parallel-join syncs per sub-question.
#
# Referenced by: MAG-533 (Research ProcessSpec Seed)
# PRD sections: §2.5.2, §5

concept: ContentNode
action: create
entries:
  - node: process-spec:deep-research-process
    type: process-spec
    content: '{"spec_name":"Deep Research Process","spec_status":"active","spec_version":1,"spec_description":"Configurable multi-step research workflow: plan, gather, quality-check, synthesize, verify, review, and publish. Each step dispatches to a specialist persona. Supports revision loops at plan, synthesis, and human-review stages.","spec_steps":8,"spec_edges":11}'
    createdBy: system

---

# Apply the process-spec schema to the process page
# (redundant if the content-native-schema sync fires, but safe as a seed guard)

concept: Schema
action: applyTo
entries:
  - entity_id: process-spec:deep-research-process
    schema: process-spec

---

# Set the process-spec Properties on the page

concept: Property
action: set
entries:
  - entity: process-spec:deep-research-process
    key: name
    value: "Deep Research Process"
  - entity: process-spec:deep-research-process
    key: description
    value: "Configurable multi-step deep research workflow. Supports plan revision loops, parallel source gathering, quality gating, synthesis, citation verification, and human review before publish."
  - entity: process-spec:deep-research-process
    key: version
    value: "1"
  - entity: process-spec:deep-research-process
    key: status
    value: active
  - entity: process-spec:deep-research-process
    key: owner
    value: system
  - entity: process-spec:deep-research-process
    key: tags
    value: "research,llm,deep-research"

---

