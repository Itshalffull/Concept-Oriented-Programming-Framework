    key: step_type
    value: llm
  - entity: process-spec:deep-research-process:step:plan
    key: step_key
    value: plan
  - entity: process-spec:deep-research-process:step:plan
    key: required_role
    value: "agent-persona:deep-researcher"
  - entity: process-spec:deep-research-process:step:plan
    key: strategy
    value: plan_and_execute
  - entity: process-spec:deep-research-process:step:plan
