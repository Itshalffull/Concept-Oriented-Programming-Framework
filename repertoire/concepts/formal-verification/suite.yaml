# suites/formal-verification/suite.yaml
suite:
  name: formal-verification
  version: 0.1.0
  description: >
    Composable formal verification: properties, assume-guarantee contracts,
    proof evidence, verification runs, solver dispatch, and reusable
    specification templates. Publishes results to QualitySignal.

concepts:
  FormalProperty:
    spec: ./formal-property.concept
    params:
      P: { as: property-id, description: "Formal property identifier" }

  Contract:
    spec: ./contract.concept
    params:
      C: { as: contract-id, description: "Assume-guarantee contract identifier" }

  Evidence:
    spec: ./evidence.concept
    params:
      E: { as: evidence-id, description: "Verification evidence identifier" }

  VerificationRun:
    spec: ./verification-run.concept
    params:
      V: { as: run-id, description: "Verification run identifier" }

  SolverProvider:
    spec: ./solver-provider.concept
    params:
      S: { as: solver-id, description: "Registered solver provider identifier" }

  SpecificationSchema:
    spec: ./specification-schema.concept
    params:
      SS: { as: schema-id, description: "Specification template identifier" }

syncs:
  required:
    - path: ./syncs/verification-publishes-quality-signal.sync
      description: "VerificationRun/complete -> QualitySignal/record"

    - path: ./syncs/property-from-intent-principles.sync
      description: "Intent/define -> FormalProperty/synthesize"

    - path: ./syncs/solver-dispatch.sync
      description: "FormalProperty/check(solver: auto) -> SolverProvider/dispatch"

    - path: ./syncs/evidence-to-artifact.sync
      description: "Evidence/record -> Artifact/store"

    - path: ./syncs/run-records-evidence.sync
      description: "SolverProvider/dispatch -> Evidence/record + FormalProperty status"

  recommended:
    - path: ./syncs/contract-from-sync-definitions.sync
      name: ContractFromSyncDefinitions
      description: "SyncCompiler/compile -> Contract/define skeleton"

    - path: ./syncs/llm-synthesizes-property.sync
      name: LLMSynthesizesProperty
      description: "FormalProperty/synthesize -> AgentLoop/execute for remaining principles"

    - path: ./syncs/cegis-refinement-loop.sync
      name: CEGISRefinementLoop
      description: "FormalProperty/refute -> AgentLoop/execute for property refinement"

    - path: ./syncs/property-coverage-to-score.sync
      name: PropertyCoverageToScore
      description: "FormalProperty/coverage -> QualitySignal/record coverage info"

    - path: ./syncs/conformance-triggers-reverification.sync
      name: ConformanceTriggersReverification
      description: "Conformance/monitor specChanged -> FormalProperty/invalidate"

    # Workflow trigger syncs
    - path: ./syncs/property-synthesis-starts-process.sync
      name: PropertySynthesisStartsProcess
      description: "FormalProperty/synthesize ok -> ProcessRun/start(property-synthesis-and-validation)"

    - path: ./syncs/counterexample-starts-investigation.sync
      name: CounterexampleStartsInvestigation
      description: "FormalProperty/refute ok -> ProcessRun/start(counterexample-investigation)"

    - path: ./syncs/solver-timeout-starts-escalation.sync
      name: SolverTimeoutStartsEscalation
      description: "FormalProperty/check timeout -> ProcessRun/start(solver-escalation)"

    - path: ./syncs/new-concept-starts-onboarding.sync
      name: NewConceptStartsOnboarding
      description: "Resource/track new .concept -> ProcessRun/start(concept-onboarding-verification)"

    - path: ./syncs/change-starts-reverification.sync
      name: ChangeStartsReverification
      description: "Conformance/monitor specChanged -> ProcessRun/start(reverification-cascade)"

    # Multi-AI validation syncs
    - path: ./syncs/ai-consensus-records-property.sync
      name: AIConsensusRecordsProperty
      description: "StepRun/complete(consensus, ai-validated) -> QualitySignal(warn)"

    - path: ./syncs/human-approval-upgrades-property.sync
      name: HumanApprovalUpgradesProperty
      description: "Approval/approve -> QualitySignal(pass, gate)"

    - path: ./syncs/path-b-request-starts-translation.sync
      name: PathBRequestStartsTranslation
      description: "FormalProperty/check(solver: path-b) -> ProcessRun/start(path-b-handler-verification)"

uses:
  - suite: test
    concepts:
      - name: QualitySignal

  - suite: core
    concepts:
      - name: Intent
      - name: Schema

  - suite: infrastructure
    concepts:
      - name: PluginRegistry
      - name: Validator

  - suite: deploy
    optional: true
    concepts:
      - name: Artifact

  - suite: llm-agent
    optional: true
    concepts:
      - name: AgentLoop

  - suite: llm-core
    optional: true
    concepts:
      - name: LLMProvider

  - suite: process-foundation
    optional: true
    concepts:
      - name: ProcessSpec
      - name: ProcessRun
      - name: StepRun
      - name: FlowToken
      - name: ProcessVariable

widgets:
  - path: ./widgets/verification-status-badge.widget
    description: "Compact status indicator for verification outcomes (proved, refuted, unknown, timeout, running)"
  - path: ./widgets/formula-display.widget
    description: "Read-only renderer for formal logic expressions with syntax highlighting"
  - path: ./widgets/proof-session-tree.widget
    description: "Hierarchical tree view of verification run results by property"
  - path: ./widgets/trace-timeline-viewer.widget
    description: "Horizontal timeline visualization of verification trace data"
  - path: ./widgets/dag-viewer.widget
    description: "Directed acyclic graph viewer for property and contract dependencies"
  - path: ./widgets/status-grid.widget
    description: "Matrix grid displaying verification status across dimensions"
  - path: ./widgets/trace-step-controls.widget
    description: "Playback control toolbar for navigating trace steps"

surface:
  entityAffordances:
    - concept: FormalProperty
      detail: formula-display
      inline: verification-status-badge
    - concept: VerificationRun
      detail: proof-session-tree
      inline: verification-status-badge
    - concept: Evidence
      detail: trace-timeline-viewer
    - concept: SolverProvider
      detail: status-grid
    - concept: Contract
      graph: dag-viewer
