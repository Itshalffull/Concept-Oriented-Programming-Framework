# repertoire/concepts/testing/suite.yaml
suite:
  name: testing
  version: 0.3.0
  description: >
    Cross-layer testing, quality publishing, and automated test generation.
    Seven concepts spanning generation, build, and deploy: snapshot testing
    for generated output stability, conformance testing for spec fidelity,
    test selection for change-aware test optimization, cross-target contract
    testing for interoperability verification, flaky test management for
    reliability tracking and quarantine, quality signal normalization for
    rollups and deploy gates, and test generation from concept invariants.

concepts:
  Snapshot:
    spec: ./snapshot.concept
    params:
      S: { as: snapshot-ref, description: "Reference to a snapshot baseline" }

  Conformance:
    spec: ./conformance.concept
    params:
      C: { as: conformance-suite-ref, description: "Reference to a conformance test suite" }

  TestSelection:
    spec: ./test-selection.concept
    params:
      M: { as: mapping-ref, description: "Reference to a test-to-source coverage mapping" }

  ContractTest:
    spec: ./contract-test.concept
    params:
      P: { as: contract-ref, description: "Reference to a cross-target contract" }

  FlakyTest:
    spec: ./flaky-test.concept
    params:
      F: { as: flaky-ref, description: "Reference to a tracked test with reliability history" }

  # Added in v0.2.0
  QualitySignal:
    spec: ./quality-signal.concept
    params:
      Q: { as: quality-signal-ref, description: "Quality signal reference" }

  # Added in v0.3.0
  TestGen:
    spec: ./test-gen.concept
    params:
      T: { as: test-gen-ref, description: "Test generation record reference" }

syncs:
  required:
    # Generation layer syncs
    - path: ./syncs/compare-snapshot-after-emit.sync
      description: "Emitter/writeBatch -> Snapshot/compare"

    - path: ./syncs/regenerate-conformance-on-spec-change.sync
      description: "Resource/changed -> Conformance/generate"

    # Build layer syncs
    - path: ./syncs/analyze-tests-on-change.sync
      description: "Resource/changed -> TestSelection/analyze"

    - path: ./syncs/record-test-result.sync
      description: "Builder/test -> FlakyTest/record"

    - path: ./syncs/update-coverage-mappings.sync
      description: "Builder/test -> TestSelection/record"

    # QualitySignal publisher syncs (added in v0.2.0)
    - path: ./syncs/snapshot-publishes-quality-signal.sync
      description: "Snapshot/compare -> QualitySignal/record"

    - path: ./syncs/conformance-publishes-quality-signal.sync
      description: "Conformance/verify -> QualitySignal/record"

    - path: ./syncs/contract-publishes-quality-signal.sync
      description: "ContractTest/verify -> QualitySignal/record"

    - path: ./syncs/unit-tests-publish-quality-signal.sync
      description: "Builder/test -> QualitySignal/record"

    # Invariant-to-test pipeline syncs (added in v0.3.0)
    - path: ./syncs/invariant-compiled-to-conformance-vectors.sync
      description: "Resource/track .concept -> Conformance/generate(invariant-driven)"

    - path: ./syncs/invariant-compiled-to-test-gen.sync
      description: "Resource/track .concept -> TestGen/generate"

    - path: ./syncs/test-gen-dispatches-to-provider.sync
      description: "TestGen/generate -> PluginRegistry -> TestGen{Lang}/generate"

    - path: ./syncs/generated-tests-run-by-builder.sync
      description: "TestGen ok -> Builder/test(property)"

    - path: ./syncs/property-test-results-publish-quality-signal.sync
      description: "Builder/test(property) -> QualitySignal/record(property-test)"

    - path: ./syncs/fuzz-results-publish-quality-signal.sync
      description: "Builder/test(fuzz) -> QualitySignal/record(fuzz)"

  recommended:
    - path: ./syncs/verify-conformance-after-build.sync
      name: VerifyConformanceAfterBuild
      description: "Builder/build -> ok -> Conformance/verify"

    - path: ./syncs/verify-contracts-after-multi-build.sync
      name: VerifyContractsAfterMultiBuild
      description: "Builder/buildAll -> ok -> ContractTest/verify"

    - path: ./syncs/check-quarantine-on-failure.sync
      name: CheckQuarantineOnFailure
      description: "Builder/test -> ok (failure) -> FlakyTest/isQuarantined"

    - path: ./syncs/run-selected-tests.sync
      name: RunSelectedTests
      description: "TestSelection/select -> Builder/test with filter"

    # Deploy layer gates
    - path: ./syncs/check-contracts-before-deploy.sync
      name: CheckContractsBeforeDeploy
      description: "DeployPlan/execute -> ContractTest/canDeploy"

    - path: ./syncs/check-conformance-before-deploy.sync
      name: CheckConformanceBeforeDeploy
      description: "DeployPlan/execute -> Conformance/matrix"

    # QualitySignal publisher syncs - recommended (added in v0.2.0)
    - path: ./syncs/flaky-publishes-quality-signal.sync
      name: FlakyPublishesQualitySignal
      description: "FlakyTest detection -> QualitySignal/record"

    - path: ./syncs/selection-publishes-quality-signal.sync
      name: SelectionPublishesQualitySignal
      description: "TestSelection confidence -> QualitySignal/record"

uses:
  - suite: infrastructure
    concepts:
      - name: PluginRegistry

  - suite: codegen
    concepts:
      - name: Emitter
      - name: Resource

  - suite: deployment
    concepts:
      - name: Builder
      - name: Artifact
      - name: DeployPlan
