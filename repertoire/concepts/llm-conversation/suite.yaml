suite:
  name: llm-conversation
  version: 0.1.0
  description: >
    Multi-turn LLM dialogue management with multiversal branching,
    context window strategies, and automatic summarization.

concepts:
  Conversation:
    spec: ./conversation.concept
    params:
      C: { as: conversation-id, description: "Conversation thread identifier" }

syncs:
  required:
    - path: ./syncs/conversation-counts-tokens.sync
      description: "Conversation append triggers token counting via LLMProvider"
  recommended:
    - path: ./syncs/conversation-auto-summarize.sync
      description: "Truncated conversation history triggers automatic summarization"
  integration:
    - path: ./syncs/conversation-collection-provider.sync
      description: "Conversation sets register with Collection for search and filtering"

widgets:
  - path: ./widgets/chat-message.widget
    description: "Role-differentiated message container for LLM conversations"
  - path: ./widgets/stream-text.widget
    description: "Token-by-token streaming text renderer with cursor animation"
  - path: ./widgets/prompt-input.widget
    description: "Auto-expanding textarea for composing LLM prompts"
  - path: ./widgets/message-branch-nav.widget
    description: "Branch navigation control for multiversal conversations"
  - path: ./widgets/conversation-sidebar.widget
    description: "Sidebar listing conversation history with search and grouping"
  - path: ./widgets/inline-citation.widget
    description: "Numbered inline citation with hover preview for RAG responses"
  - path: ./widgets/artifact-panel.widget
    description: "Side panel for generated artifacts with version history"

surface:
  entityAffordances:
    - concept: Conversation
      detail: chat-message
      editor: prompt-input

uses:
  - suite: llm-core
    concepts:
      - name: LLMProvider
  - suite: foundation
    optional: true
    concepts:
      - name: ContentNode
