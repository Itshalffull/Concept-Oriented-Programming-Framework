# suites/test-gen-providers/suite.yaml
suite:
  name: test-gen-providers
  version: 1.0.0
  description: >
    Language-specific test generation providers. Each provider renders
    a language-neutral TestPlan (produced by TestGen) into executable
    test code for its target language and framework.

concepts:
  TestGenTypeScript:
    spec: ./test-gen-typescript.concept
    params:
      R: { as: ResultId, description: "Render result identifier" }
  TestGenRust:
    spec: ./test-gen-rust.concept
    params:
      R: { as: ResultId, description: "Render result identifier" }
  TestGenSwift:
    spec: ./test-gen-swift.concept
    params:
      R: { as: ResultId, description: "Render result identifier" }
  TestGenSolidity:
    spec: ./test-gen-solidity.concept
    params:
      R: { as: ResultId, description: "Render result identifier" }

# Legacy provider specs (prose-only, superseded by concepts above)
providers:
  TestGenTypeScript:
    spec: ./providers/typescript-test-gen.provider
    optional: false
  TestGenRust:
    spec: ./providers/rust-test-gen.provider
    optional: false
  TestGenSwift:
    spec: ./providers/swift-test-gen.provider
    optional: true
  TestGenSolidity:
    spec: ./providers/solidity-test-gen.provider
    optional: true

uses:
  - suite: testing
    concepts:
      - name: TestGen
