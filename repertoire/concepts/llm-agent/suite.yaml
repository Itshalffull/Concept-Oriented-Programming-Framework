suite:
  name: llm-agent
  version: 0.1.0
  description: >
    Autonomous LLM agent reasoning, multi-agent coordination, memory,
    tool use, and alignment. AgentLoop is a coordination concept —
    strategy providers register via PluginRegistry.

concepts:
  StateGraph:
    spec: ./state-graph.concept
    params:
      H: { as: graph-id, description: "Execution graph identifier" }
  AgentMemory:
    spec: ./agent-memory.concept
    params:
      E: { as: memory-id, description: "Memory entry identifier" }
  ToolBinding:
    spec: ./tool-binding.concept
    params:
      T: { as: tool-id, description: "Tool definition identifier" }
  AgentTeam:
    spec: ./agent-team.concept
    params:
      M: { as: team-id, description: "Agent team identifier" }
  AgentRole:
    spec: ./agent-role.concept
    params:
      K: { as: role-id, description: "Agent role identifier" }
  Blackboard:
    spec: ./blackboard.concept
    params:
      B: { as: board-id, description: "Blackboard identifier" }
  AgentHandoff:
    spec: ./agent-handoff.concept
    params:
      D: { as: handoff-id, description: "Handoff identifier" }
  Consensus:
    spec: ./consensus.concept
    params:
      N: { as: consensus-id, description: "Consensus session identifier" }
  Constitution:
    spec: ./constitution.concept
    params:
      W: { as: constitution-id, description: "Constitution identifier" }
  AgentLoop:
    spec: ./agent-loop.concept
    params:
      L: { as: agent-id, description: "Agent instance identifier" }
  AgentSession:
    spec: ./agent-session.concept
    params:
      A: { as: session-id, description: "Agent session identifier" }
  AgentTrigger:
    spec: ./agent-trigger.concept
    params:
      T: { as: trigger-id, description: "Trigger rule identifier" }
  ReactStrategy:
    spec: ./strategies/react.concept
    optional: true
  PlanAndExecuteStrategy:
    spec: ./strategies/plan-and-execute.concept
    optional: true
  TreeOfThoughtStrategy:
    spec: ./strategies/tree-of-thought.concept
    optional: true
  ReflectionStrategy:
    spec: ./strategies/reflection.concept
    optional: true
  CodeActStrategy:
    spec: ./strategies/code-act.concept
    optional: true
  ReWOOStrategy:
    spec: ./strategies/rewoo.concept
    optional: true

syncs:
  required:
    - path: ./syncs/agent-invokes-tool.sync
      description: "AgentLoop action_request triggers ToolBinding/invoke"
    - path: ./syncs/agent-remembers-step.sync
      description: "AgentLoop reasoning steps stored in AgentMemory"
    - path: ./syncs/tool-result-feeds-agent.sync
      description: "ToolBinding/invoke result feeds back to AgentLoop/observe"
    - path: ./syncs/agent-loop-dispatches-to-strategy.sync
      description: "AgentLoop/run resolves strategy via PluginRegistry"
    - path: ./syncs/persona-page-applies-schema.sync
      description: "ContentNode(type:agent-persona) gets Schema overlay and PageAsRecord promotion"
    - path: ./syncs/persona-page-creates-default-blocks.sync
      description: "New persona pages get default instruction block tree via Template"
    - path: ./syncs/persona-block-applies-schema.sync
      description: "Outline children of persona pages get instruction-block schema"
    - path: ./syncs/content-compiler-dispatches.sync
      description: "ContentCompiler dispatches to PluginRegistry for provider resolution"
    - path: ./syncs/session-spawns-from-persona.sync
      description: "AgentSession/spawn triggers ContentCompiler/compile + AgentLoop + Conversation"
    - path: ./syncs/trigger-fires-session.sync
      description: "AgentTrigger/fire spawns AgentSession from bound persona"
  recommended:
    - path: ./syncs/agent-recalls-memory.sync
      description: "AgentLoop/run triggers AgentMemory recall for context"
    - path: ./syncs/constitution-critiques-output.sync
      description: "AgentLoop results pass through Constitution critique-revision"
    - path: ./syncs/team-delegates-via-role.sync
      description: "AgentTeam delegation triggers AgentRole matching"
    - path: ./syncs/blackboard-notifies-subscribers.sync
      description: "Blackboard posts notify subscribed agents"
    - path: ./syncs/consensus-resolves-conflict.sync
      description: "AgentTeam conflict resolution triggers Consensus tally"
    - path: ./syncs/handoff-packages-context.sync
      description: "AgentHandoff context package feeds into AgentLoop/run"
    - path: ./syncs/episodic-memory-archive.sync
      description: "LLMTrace spans archived as episodic memories"
    - path: ./syncs/procedural-memory-update.sync
      description: "Efficient agent runs stored as procedural memory"
    - path: ./syncs/memory-consolidation.sync
      description: "New memories trigger background consolidation"
    - path: ./syncs/persona-block-change-stales-compilation.sync
      description: "Block edits mark ContentCompiler compilations stale"
    - path: ./syncs/synced-content-stales-compilation.sync
      description: "SyncedContent edits propagate staleness to compilations"
    - path: ./syncs/persona-entity-reflection.sync
      description: "Sessions and triggers persisted as content entities with tags and relations"
  integration:
    - path: ./syncs/agent-workflow-provider.sync
      description: "Agent phases map to Workflow states"
    - path: ./syncs/hitl-notification.sync
      description: "Tool approval requests trigger HITL notifications"
    - path: ./syncs/multi-agent-message-passing.sync
      description: "Agent results append to shared Conversation"
    - path: ./syncs/react-routes.sync
      description: "PluginRegistry resolves 'react' to ReactStrategy"
    - path: ./syncs/plan-execute-routes.sync
      description: "PluginRegistry resolves 'plan_and_execute' to PlanAndExecuteStrategy"
    - path: ./syncs/tree-of-thought-routes.sync
      description: "PluginRegistry resolves 'tree_of_thought' to TreeOfThoughtStrategy"
    - path: ./syncs/reflection-routes.sync
      description: "PluginRegistry resolves 'reflection' to ReflectionStrategy"
    - path: ./syncs/code-act-routes.sync
      description: "PluginRegistry resolves 'code_act' to CodeActStrategy"
    - path: ./syncs/rewoo-routes.sync
      description: "PluginRegistry resolves 'rewoo' to ReWOOStrategy"
    - path: ./syncs/persona-compilation-provider.sync
      description: "Registers agent-persona compilation provider and routes to PromptAssembly"
    - path: ./syncs/persona-views.sync
      description: "ViewShell registrations for Agent Library, Active Sessions, Session History"

widgets:
  - path: ./widgets/tool-invocation.widget
    description: "Collapsible card displaying an LLM tool call execution"
  - path: ./widgets/reasoning-block.widget
    description: "Collapsible display for chain-of-thought reasoning content"
  - path: ./widgets/trace-tree.widget
    description: "Hierarchical execution trace viewer for agent loops and verification runs"
  - path: ./widgets/agent-timeline.widget
    description: "Multi-agent communication timeline with delegation indicators"
  - path: ./widgets/task-plan-list.widget
    description: "Hierarchical task plan with status indicators and drag reordering"
  - path: ./widgets/hitl-interrupt.widget
    description: "Human-in-the-loop interrupt banner for agent approval flows"
  - path: ./widgets/memory-inspector.widget
    description: "Inspector panel for viewing and managing agent memory state"
  - path: ./widgets/persona-editor.widget
    description: "Full-page block editor for agent persona pages with property sidebar"
  - path: ./widgets/persona-card.widget
    description: "Compact card for persona grid/gallery views"
  - path: ./widgets/agent-session-panel.widget
    description: "Live session panel with conversation feed, trace, and controls"
  - path: ./widgets/agent-dashboard.widget
    description: "Overview dashboard of personas, sessions, and triggers"
  - path: ./widgets/agent-trigger-config.widget
    description: "Trigger creation and management configuration form"

surface:
  entityAffordances:
    - concept: ToolBinding
      detail: tool-invocation
    - concept: AgentLoop
      detail: trace-tree
    - concept: AgentMemory
      detail: memory-inspector
    - concept: AgentSession
      detail: agent-session-panel
    - concept: AgentTrigger
      detail: agent-trigger-config

uses:
  - suite: llm-core
    concepts:
      - name: LLMProvider
      - name: ModelRouter
  - suite: llm-conversation
    concepts:
      - name: Conversation
  - suite: llm-safety
    optional: true
    concepts:
      - name: Guardrail
  - suite: foundation
    concepts:
      - name: ContentNode
      - name: ContentCompiler
      - name: PageAsRecord
      - name: Outline
      - name: Property
  - suite: classification
    concepts:
      - name: Schema
      - name: Tag
  - suite: content
    concepts:
      - name: SyncedContent
      - name: Template
  - suite: linking
    optional: true
    concepts:
      - name: Relation
  - suite: infrastructure
    concepts:
      - name: PluginRegistry
  - suite: automation
    optional: true
    concepts:
      - name: Workflow
  - suite: notification
    optional: true
    concepts:
      - name: Notification
