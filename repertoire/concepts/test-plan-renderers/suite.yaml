# repertoire/concepts/test-plan-renderers/suite.yaml
suite:
  name: test-plan-renderers
  version: 0.1.0
  description: >
    TestPlanRenderer plugins that translate platform-agnostic TestPlans into
    runnable test files for specific frameworks. Each renderer implements the
    universal register()/render() contract and self-describes its supported
    probe namespace and settlement modalities. v0.1.0 ships React (vitest +
    React Testing Library) and Playwright backends; Vue, Svelte, Vanilla,
    SwiftUI, and Jetpack Compose will be added in future releases.

concepts:
  ReactRenderer:
    spec: ./react-renderer.concept
    params:
      R: { as: react-renderer-ref, description: "Reference to a registered React renderer instance" }

  PlaywrightRenderer:
    spec: ./playwright-renderer.concept
    params:
      R: { as: playwright-renderer-ref, description: "Reference to a registered Playwright renderer instance" }

  ProcessSpecRenderer:
    spec: ./process-spec-renderer.concept
    params:
      R: { as: process-spec-renderer-ref, description: "Reference to a registered ProcessSpec renderer instance" }

  MockHandlerRenderer:
    spec: ./mock-handler-renderer.concept
    params:
      R: { as: mock-handler-renderer-ref, description: "Reference to a registered mock-handler renderer instance" }

  ReplayHandlerRenderer:
    spec: ./replay-handler-renderer.concept
    params:
      R: { as: replay-handler-renderer-ref, description: "Reference to a registered record/replay handler renderer instance" }

  EffectContractRenderer:
    spec: ./effect-contract-renderer.concept
    params:
      R: { as: effect-contract-renderer-ref, description: "Reference to a registered effect-contract renderer instance" }

  FieldTransformFuzzRenderer:
    spec: ./field-transform-fuzz-renderer.concept
    params:
      R: { as: field-transform-fuzz-renderer-ref, description: "Reference to a registered FieldTransform fuzz renderer instance" }

syncs:
  required:
    - path: ./syncs/register-react-renderer.sync
      description: "ReactRenderer/register -> PluginRegistry/register(test-plan-renderer)"

    - path: ./syncs/register-playwright-renderer.sync
      description: "PlaywrightRenderer/register -> PluginRegistry/register(test-plan-renderer)"

    - path: ./syncs/register-process-spec-renderer.sync
      description: "ProcessSpecRenderer/register -> PluginRegistry/register(test-plan-renderer)"

    - path: ./syncs/register-mock-handler-renderer.sync
      description: "MockHandlerRenderer/register -> PluginRegistry/register(test-plan-renderer)"

    - path: ./syncs/register-replay-handler-renderer.sync
      description: "ReplayHandlerRenderer/register -> PluginRegistry/register(test-plan-renderer)"

    - path: ./syncs/register-effect-contract-renderer.sync
      description: "EffectContractRenderer/register -> PluginRegistry/register(test-plan-renderer)"

    - path: ./syncs/register-field-transform-fuzz-renderer.sync
      description: "FieldTransformFuzzRenderer/register -> PluginRegistry/register(test-plan-renderer)"

uses:
  - suite: infrastructure
    concepts:
      - name: PluginRegistry

  - suite: testing
    concepts:
      - name: TestPlan
