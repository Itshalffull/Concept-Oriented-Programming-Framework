suite:
  name: entity-lifecycle
  version: 0.1.0
  description: >
    Cross-cutting lifecycle behaviors for all persistent entities.
    Syncs fire on ContentStorage completions for cache invalidation,
    search indexing, URL alias generation, provenance tracking, backlink
    reindexing, cascade deletion, date-field references to daily notes,
    and schema field lifecycle management (usage tracking, template
    application, form/placement updates).

concepts:
  - name: FieldDefinition
    description: "Typed field within a schema — atomic unit of content structure"
  - name: SchemaTemplate
    description: "Pre-built schema starting points for one-click content model creation"
  - name: SchemaUsage
    description: "Tracks where schema fields are referenced for safe destructive operations"

syncs:
  recommended:
    - path: ./syncs/save-invalidates-cache.sync
      description: "Cache invalidation on save — tags by Schema membership"

    - path: ./syncs/save-indexes-search.sync
      description: "Search indexing on save via queue for async processing"

    - path: ./syncs/save-generates-alias.sync
      description: "URL alias generation on save for Schemas with Pathauto patterns"

    - path: ./syncs/save-tracks-provenance.sync
      description: "Provenance tracking on save with Schema context"

    - path: ./syncs/save-reindexes-backlinks.sync
      description: "Backlink reindexing on save for content with [[links]]"

    - path: ./syncs/delete-cascades.sync
      description: "Cascade cleanup on delete — comments, references, files, backlinks, aliases, cache, search"

    - path: ./syncs/date-fields-reference-daily-notes.sync
      description: "DateTime property values create references to daily note pages"

    - path: ./syncs/field-usage-on-view-create.sync
      description: "Register SchemaUsage when a view references a field"

    - path: ./syncs/field-usage-on-mapping-create.sync
      description: "Register SchemaUsage when a component mapping references a field"

    - path: ./syncs/field-removal-checks-usage.sync
      description: "Block field removal when SchemaUsage records exist"

    - path: ./syncs/schema-template-creates-fields.sync
      description: "Create FieldDefinition records when a SchemaTemplate is applied"

    - path: ./syncs/field-create-updates-form.sync
      description: "Update FormBuilder placement when a field is created"

    - path: ./syncs/field-reorder-updates-placements.sync
      description: "Update FieldPlacement sort orders when a field is reordered"

uses:
  - suite: foundation
    concepts:
      - name: ContentStorage
      - name: Property

  - suite: classification
    concepts:
      - name: Schema

  - suite: infrastructure
    concepts:
      - name: Cache
      - name: Pathauto

  - suite: content
    concepts:
      - name: DailyNote

  - suite: linking
    concepts:
      - name: Backlink
      - name: Reference

  - suite: query-retrieval
    concepts:
      - name: SearchIndex
      - name: Queue

  - suite: data-integration
    concepts:
      - name: Provenance

  - suite: media
    concepts:
      - name: FileManagement

  - suite: content
    concepts:
      - name: Comment
