# Core admin interactors for clef-base display selection.

concept: Interactor
action: define
entries:
  - interactor: records-collection
    name: records-collection
    category: output
    properties: '{"dataType":"entity","cardinality":"many","mutable":false,"multiLine":false,"tags":["admin","collection"]}'

  - interactor: record-detail
    name: record-detail
    category: entity
    properties: '{"dataType":"entity","cardinality":"one","mutable":true,"multiLine":true,"tags":["admin","detail"]}'

  - interactor: record-body
    name: record-body
    category: output
    properties: '{"dataType":"document","cardinality":"one","mutable":true,"multiLine":true,"tags":["admin","body"]}'

  - interactor: record-graph
    name: record-graph
    category: output
    properties: '{"dataType":"graph","cardinality":"many","mutable":false,"multiLine":false,"tags":["admin","graph"]}'

  - interactor: record-metrics
    name: record-metrics
    category: output
    properties: '{"dataType":"metric","cardinality":"many","mutable":false,"multiLine":false,"tags":["admin","metrics"]}'
