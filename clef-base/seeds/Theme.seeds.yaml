# Default theme definitions for clef-base.

concept: Theme
action: create
entries:
  - theme: light
    name: Light
    overrides: '{"mode":"light","sourceType":"core-theme","density":"comfortable","motif":"sidebar","styleProfile":"foundation"}'
  - theme: dark
    name: Dark
    overrides: '{"mode":"dark","sourceType":"core-theme","density":"comfortable","motif":"topbar","styleProfile":"nocturne"}'
  - theme: high-contrast
    name: High Contrast
    overrides: '{"mode":"high-contrast","sourceType":"core-theme","density":"comfortable","motif":"sidebar","styleProfile":"accessibility"}'
  - theme: editorial
    name: Editorial
    overrides: '{"mode":"light","sourceType":"expressive-theme","density":"comfortable","motif":"sidebar","styleProfile":"editorial"}'
  - theme: signal
    name: Signal
    overrides: '{"mode":"dark","sourceType":"expressive-theme","density":"compact","motif":"topbar","styleProfile":"signal"}'

---
# Activate the light theme by default.
concept: Theme
action: activate
entries:
  - theme: light
    priority: 100
