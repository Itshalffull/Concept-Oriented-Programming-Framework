# InteractionSpec seeds extracted from View.seeds.yaml.
# Per-view interaction controls: createForm, rowClick, rowActions, pickerMode.
# Deduplicated where configurations are identical.
#
# INVARIANT: Every seeded list or card view MUST declare a non-empty rowClick.navigateTo
# when the entity it displays has a dedicated edit surface (form-builder, schema-editor,
# view-builder, theme detail, vocabulary detail, etc.).
# Reason: list/card views without row navigation are dead-ends — users can browse but
# cannot drill into or edit any entity.  rowClick: '{}' is only acceptable for read-only
# audit/analytics views (syncs-list, installed-suites, step-checks, etc.) where no
# per-entity edit surface exists.

concept: InteractionSpec
action: create
entries:
  # content-list
  - name: content-list-controls
    createForm: '{"concept":"ContentNode","action":"createWithSchema","schemaId":"","fields":[{"name":"title","label":"Title","required":true,"placeholder":"Enter a title..."}]}'
    rowClick: '{"navigateTo":"/content/{node}"}'
    rowActions: '[]'
    pickerMode: false
  # schemas-list
  - name: schemas-list-controls
    createForm: '{"concept":"Schema","action":"defineSchema","fields":[{"name":"schema","label":"Schema Name","required":true},{"name":"fields","label":"Fields (comma-separated)","required":true}]}'
    rowClick: '{"navigateTo":"/admin/schemas/{schema}"}'
    rowActions: '[]'
    pickerMode: false
    create_surface: schema-editor
    create_mode_hint: page
  # workflows-list
  - name: workflows-list-controls
    createForm: '{"concept":"Workflow","action":"defineState","fields":[{"name":"workflow","label":"Workflow Name","required":true},{"name":"name","label":"Initial State Name","required":true},{"name":"flags","label":"Flags","placeholder":"initial"}]}'
    rowClick: '{"navigateTo":"/admin/workflows/{workflow}"}'
    rowActions: '[]'
    pickerMode: false
    create_surface: workflow-builder
    create_mode_hint: page
  # Shared by: automations-list, automations-rules-list
  # automation-rule-builder is the dedicated bespoke editor for AutomationRule (ECA rule
  # authoring: trigger, conditions, actions). Replaces the generic user-sync-editor which
  # did not model the rule structure accurately.
  - name: automation-rule-create
    createForm: '{"concept":"AutomationRule","action":"define","fields":[{"name":"rule","label":"Rule ID","required":true},{"name":"trigger","label":"Trigger Event","required":true},{"name":"conditions","label":"Conditions"},{"name":"actions","label":"Actions","required":true}]}'
    rowClick: '{"navigateTo":"/admin/automation-rule-builder/{rule}"}'
    rowActions: '[]'
    pickerMode: false
    create_surface: automation-rule-builder
    create_mode_hint: page
  # taxonomy-list
  - name: taxonomy-list-controls
    createForm: '{"concept":"Taxonomy","action":"createVocabulary","fields":[{"name":"vocab","label":"Vocabulary ID","required":true},{"name":"name","label":"Display Name","required":true}]}'
    rowClick: '{"navigateTo":"/admin/taxonomy/{vocab}"}'
    rowActions: '[]'
    pickerMode: false
  # themes-list
  - name: themes-list-controls
    createForm: '{"concept":"Theme","action":"create","fields":[{"name":"theme","label":"Theme ID","required":true},{"name":"name","label":"Display Name","required":true},{"name":"overrides","label":"Token Overrides","type":"key-value-list","placeholder":"token path (e.g. color.primary)"}]}'
    rowClick: '{"navigateTo":"/admin/themes/{id}"}'
    rowActions: '[{"key":"activate","concept":"Theme","action":"activate","params":{"theme":"id"},"label":"Activate","variant":"filled","condition":{"field":"active","equals":false}},{"key":"deactivate","concept":"Theme","action":"deactivate","params":{"theme":"id"},"label":"Deactivate","variant":"outlined","condition":{"field":"active","equals":true}}]'
    pickerMode: false
  # display-modes-list
  - name: display-modes-list-controls
    createForm: '{"concept":"DisplayMode","action":"create","fields":[{"name":"schema","label":"Schema","required":true},{"name":"mode_id","label":"Mode ID","required":true},{"name":"name","label":"Display Name","required":true}]}'
    rowClick: '{"navigateTo":"/admin/display-modes/{mode}"}'
    rowActions: '[]'
    pickerMode: false
  # views-list
  - name: views-list-controls
    createForm: '{"concept":"View","action":"create","fields":[{"name":"view","label":"View ID","required":true},{"name":"dataSource","label":"Data Source (JSON)","required":true,"type":"textarea"},{"name":"layout","label":"Display Type","type":"select","options":["table","card-grid","tree","board","calendar","timeline","graph"]},{"name":"defaultDisplayMode","label":"Item Display Mode","placeholder":"e.g. card, table-row, compact"},{"name":"title","label":"Title"},{"name":"description","label":"Description"}]}'
    rowClick: '{"navigateTo":"/admin/view-builder/{view}"}'
    rowActions: '[]'
    pickerMode: false
    create_surface: view-editor
    create_mode_hint: page
  # mappings-list
  - name: mappings-list-controls
    createForm: '{"concept":"ComponentMapping","action":"create","fields":[{"name":"name","label":"Mapping Name","required":true},{"name":"widget_id","label":"Widget ID","required":true},{"name":"schema","label":"Schema"},{"name":"display_mode","label":"Display Mode"}]}'
    rowClick: '{"navigateTo":"/admin/mappings/{id}"}'
    rowActions: '[]'
    pickerMode: false
  # Shared by: dashboard-stats, syncs-list, installed-suites, entity-properties, entity-content, step-runs-list, process-dashboard-stats, run-dashboard, process-health, step-bottlenecks, check-failures, process-completion-trend, process-step-breakdown
  - name: no-controls
    createForm: '{}'
    rowClick: '{}'
    rowActions: '[]'
    pickerMode: false
  # Shared by: dashboard-concepts, concept-graph, entity-same-schema, entity-all-content, backlinks, similar-entities, unlinked-references, graph-neighbors
  - name: navigate-content-node
    createForm: '{}'
    rowClick: '{"navigateTo":"/content/{node}"}'
    rowActions: '[]'
    pickerMode: false
  # concept-graph: uses navigate-content-node (deduplicated)
  # score-schemas
  - name: score-schemas-controls
    createForm: '{}'
    rowClick: '{"navigateTo":"/content/schema:{schema}"}'
    rowActions: '[]'
    pickerMode: false
  # syncs-list: uses no-controls (deduplicated)
  # installed-suites: uses no-controls (deduplicated)
  # entity-properties: uses no-controls (deduplicated)
  # entity-content: uses no-controls (deduplicated)
  # entity-same-schema: uses navigate-content-node (deduplicated)
  # entity-all-content: uses navigate-content-node (deduplicated)
  # process-catalog
  - name: process-catalog-controls
    createForm: '{"concept":"AutomationRule","action":"define","fields":[{"name":"rule","label":"Rule ID","required":true},{"name":"trigger","label":"Trigger Event","required":true},{"name":"conditions","label":"Conditions"},{"name":"actions","label":"Actions","required":true}]}'
    rowClick: '{"navigateTo":"/admin/automations/rules/{rule}"}'
    rowActions: '[]'
    pickerMode: false
  # automations-rules-list: uses automation-rule-create (deduplicated)
  # version-spaces-list
  - name: version-spaces-list-controls
    createForm: '{"concept":"ContentNode","action":"create","fields":[{"name":"node","label":"Space ID","required":true},{"name":"content","label":"Space Properties","required":true,"type":"key-value-list","placeholder":"e.g. name, status, owner"},{"name":"createdBy","label":"Owner","required":true}]}'
    rowClick: '{"navigateTo":"/admin/branches/{node}"}'
    rowActions: '[]'
    pickerMode: false
  # backlinks: uses navigate-content-node (deduplicated)
  # similar-entities: uses navigate-content-node (deduplicated)
  # unlinked-references: uses navigate-content-node (deduplicated)
  # graph-neighbors: uses navigate-content-node (deduplicated)
  # deployment-overview
  - name: deployment-overview-controls
    createForm: '{"concept":"ContentNode","action":"create","fields":[{"name":"node","label":"Space ID","required":true,"placeholder":"version-space:editorial-pass"},{"name":"content","label":"Space Properties","required":true,"type":"key-value-list","placeholder":"e.g. name, status, owner"},{"name":"createdBy","label":"Owner","required":true,"placeholder":"alice"}]}'
    rowClick: '{"navigateTo":"/admin/branches/{node}"}'
    rowActions: '[]'
    pickerMode: false
  # Shared by: step-checks, check-overview
  - name: navigate-check-cv
    createForm: '{}'
    rowClick: '{"navigateTo":"/content/{cv}"}'
    rowActions: '[]'
    pickerMode: false
  # branch-compare
  - name: branch-compare-navigate
    createForm: 'null'
    rowClick: '{"action":"navigate","destination":"entity-detail"}'
    rowActions: '[]'
    pickerMode: false
  # form-list
  - name: form-list-controls
    createForm: '{}'
    rowClick: '{"navigateTo":"/admin/form-builder/{name}"}'
    rowActions: '[]'
    pickerMode: false
    create_surface: form-builder
    create_mode_hint: page
  # form-editor
  - name: form-editor-controls
    createForm: '{}'
    rowClick: '{}'
    rowActions: '[{"key":"save","label":"Save","concept":"FormSpec","action":"update"}]'
    pickerMode: false
