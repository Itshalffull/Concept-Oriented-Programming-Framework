# KeyBinding seeds — tab group + split layout keyboard navigation (KB-19).
#
# PRD:  docs/plans/keybinding-prd.md §4 Phase H (card 19)
# Card: KB-19
#
# Registers all keyboard bindings for ViewTabBar (scope: app.tabs) and
# SplitLayoutRenderer (scope: app.layout.split).
#
# ViewTabBar bindings (scope: app.tabs):
#   ArrowLeft       → tab-prev      (activate previous tab)
#   ArrowRight      → tab-next      (activate next tab)
#   Cmd+1..Cmd+9    → tab-jump-1..9 (activate tab at 1-based index)
#
# SplitLayoutRenderer bindings (scope: app.layout.split):
#   Cmd+Shift+ArrowLeft  → pane-focus-left
#   Cmd+Shift+ArrowRight → pane-focus-right
#   Cmd+Shift+ArrowUp    → pane-focus-up
#   Cmd+Shift+ArrowDown  → pane-focus-down
#
# Companion ActionBinding seeds:
#   clef-base/seeds/ActionBinding.layout-nav.seeds.yaml
#
# Scopes must match the data-keybinding-scope attributes set on:
#   ViewTabBar root         → data-keybinding-scope="app.tabs"
#   SplitLayoutRenderer root → data-keybinding-scope="app.layout.split"

concept: KeyBinding
action: register
entries:
  # --- ViewTabBar — tab navigation (scope: app.tabs) ---

  - binding: kb-tab-prev
    label: "Previous Tab"
    description: "Activate the tab to the left of the currently active tab"
    category: "Navigation"
    scope: "app.tabs"
    priority: 10
    chord: '[{"mod":[],"key":"ArrowLeft","code":"ArrowLeft"}]'
    phase: "bubble"
    onlyOutsideTextInput: true
    overridesBrowser: false
    actionBinding: "tab-prev"
    params: ""

  - binding: kb-tab-next
    label: "Next Tab"
    description: "Activate the tab to the right of the currently active tab"
    category: "Navigation"
    scope: "app.tabs"
    priority: 10
    chord: '[{"mod":[],"key":"ArrowRight","code":"ArrowRight"}]'
    phase: "bubble"
    onlyOutsideTextInput: true
    overridesBrowser: false
    actionBinding: "tab-next"
    params: ""

  - binding: kb-tab-jump-1
    label: "Jump to Tab 1"
    description: "Activate the first tab in the tab bar"
    category: "Navigation"
    scope: "app.tabs"
    priority: 10
    chord: '[{"mod":["meta"],"key":"1","code":"Digit1"}]'
    phase: "bubble"
    onlyOutsideTextInput: true
    overridesBrowser: false
    actionBinding: "tab-jump"
    params: '{"index":1}'

