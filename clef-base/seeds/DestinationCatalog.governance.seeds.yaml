# Governance + agent destination entries for the shell navigation.

concept: DestinationCatalog
action: register
entries:
  # === Agents ===
  - destination: agent-personas
    name: agent-personas
    targetConcept: ContentNode
    targetView: agent-library
    href: /admin/agents
    icon: "🤖"
    group: Agents
  - destination: agent-sessions
    name: agent-sessions
    targetConcept: AgentSession
    targetView: active-sessions
    href: /admin/agents/sessions
    icon: "▶"
    group: Agents
  - destination: agent-triggers
    name: agent-triggers
    targetConcept: AgentTrigger
    targetView: list
    href: /admin/agents/triggers
    icon: "⚡"
    group: Agents

  # === Processes ===
  - destination: process-specs
    name: process-specs
    targetConcept: ContentNode
    targetView: list
    href: /admin/processes
    icon: "⤷"
    group: Processes
