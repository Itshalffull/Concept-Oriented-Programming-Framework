# PluginRegistry seeds — media resize handle decoration layer plugin (PP-media-resize).
# Registers media-resize-handle as a decoration-layer plugin for image and video
# media blocks. The widget overlays eight directional handles on the focused media
# block and commits new dimensions via MediaAsset/setDimensions on drag-end.
# Registered for both "image" and "media-asset-video" scopes so the decoration
# layer compositor mounts it whenever a media block receives focus.

concept: PluginRegistry
action: register
entries:
  - type: decoration-layer
    name: media-resize-handle
    metadata: >
      {
        "widget": "media-resize-handle",
        "label": "Resize Handles",
        "icon": "resize",
        "availableContexts": ["image", "media-asset-video"],
        "defaultEnabled": true,
        "order": 5,
        "props": {
          "assetId": "$context.assetId",
          "width": "$context.width",
          "height": "$context.height",
          "focused": "$context.focused",
          "aspectRatioLocked": false
        }
      }
