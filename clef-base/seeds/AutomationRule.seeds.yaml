# Automation rule definitions for clef-base.

concept: AutomationRule
action: define
entries:
  - rule: auto-tag-on-create
    trigger: ContentNode/create
    conditions: '[]'
    actions: '[{"type":"invoke-action-binding","binding":"schema-apply","params":{"schema":"default","entity_id":"context.id"}}]'
  - rule: notify-on-publish
    trigger: Workflow/transition
    conditions: '[]'
    actions: '[{"type":"invoke-action-binding","binding":"process-resume","params":{"run":"context.runId"}}]'
  - rule: cache-invalidate-on-save
    trigger: ContentStorage/save
    conditions: '[]'
    actions: '[{"type":"log","message":"Invalidate cache entries when content is saved"}]'
