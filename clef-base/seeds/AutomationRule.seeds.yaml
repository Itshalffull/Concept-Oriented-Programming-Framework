# Automation rule definitions for clef-base.

concept: AutomationRule
action: define
entries:
  - rule: auto-tag-on-create
    trigger: ContentNode/create
    conditions: '[]'
    actions: '[{"type":"invoke-action-binding","binding":"schema-apply","params":{"schema":"default","entity_id":"context.id"}}]'
  - rule: notify-on-publish
    trigger: Workflow/transition
    conditions: '[]'
    actions: '[{"type":"invoke-action-binding","binding":"process-resume","params":{"run":"context.runId"}}]'
  # Cache invalidation on save is already handled by the infrastructure sync
  # clef-base/suites/entity-lifecycle/syncs/save-invalidates-cache.sync, which
  # invokes Cache/invalidateByTags directly. Duplicating it as a user-level
  # AutomationRule would double-fire the invalidation. Add rules here that
  # extend behavior beyond the built-in infrastructure syncs.
