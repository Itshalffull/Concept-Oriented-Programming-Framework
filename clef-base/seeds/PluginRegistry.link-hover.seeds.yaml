# PluginRegistry seed — link-hover-preview decoration-layer plugin (PP-link-hover)
# Registers the link-hover-preview widget as a decoration-layer plugin with
# hover-trigger semantics. The RecursiveBlockEditor's block-content div fires
# onMouseOver / onMouseLeave events; the 300 ms / 100 ms timers are managed
# directly in BlockSlot rather than through the slot resolver, because the
# popover must know the exact anchor DOMRect of the hovered mark element.
# This PluginRegistry entry makes the widget discoverable to Score, surface
# queries, and any future slot resolver that gains hover-trigger support.

concept: PluginRegistry
action: register
entries:
  - type: decoration-layer
    name: link-hover-preview
    metadata: >
      {
        "widget": "link-hover-preview",
        "label": "Link Hover Preview",
        "icon": "link",
        "trigger": "hover",
        "hoverDelayMs": 300,
        "dismissDelayMs": 100,
        "focusTrapped": false,
        "availableContexts": ["markdown", "wiki", "notebook", "persona", "database-record"],
        "defaultEnabled": true,
        "order": 5,
        "props": {
          "targetNodeId": "$hoverTarget.nodeId",
          "anchorRect": "$hoverTarget.rect"
        }
      }
