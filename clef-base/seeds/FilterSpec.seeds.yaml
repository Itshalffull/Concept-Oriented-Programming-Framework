# FilterSpec seeds extracted from View.seeds.yaml.
# Each entry represents a unique filter configuration used by one or more views.
# Views without filters use the shared identity-filter (sourceType: system).
# Interactive toggle-group filters start with tree: '{"type":"true"}' (show all);
# actual filtering happens at runtime when the user clicks toggles.
# Contextual filters derive their value from page context (e.g., current entity).
#
# ── sourceType Classification Rationale (MAG-517) ─────────────────────────────
#
# sourceType routing rules determine which execution tier processes each filter:
#
#   system      → Backend pushdown (all tiers except E2EE)
#                 Always-on invariant filters. Never change per interaction.
#                 Examples: soft-delete exclusion, tenant scoping, identity
#                 pass-through. Backend enforcing them reduces data exposure.
#
#   contextual  → Backend pushdown (all tiers except E2EE)
#                 Derived from URL parameters or navigation context (e.g.,
#                 context.entity). Resolved before the query executes; stable
#                 for the lifetime of the page visit.
#
#   interactive → Local residual (all tiers)
#                 User-driven toggle clicks and facet selections. Change
#                 frequently during a session. Running in-memory avoids a
#                 round-trip per user interaction.
#
#   search      → Local residual by default; backend pushdown if the provider
#                 declares "search" in its pushdownOps.
#
# Classification summary for this file:
#   identity-filter                   → system     (always-on no-op pass-through)
#   *-toggle-filter (6 entries)       → interactive (user toggle-group controls)
#   *-context-filter (4 entries)      → contextual (bound to context.entity)
#
# All entries in this file are correctly classified per the routing rules above.
# ──────────────────────────────────────────────────────────────────────────────

concept: FilterSpec
action: create
entries:
  # --- System default (no filter) ---
  - name: identity-filter
    tree: '{"type":"true"}'
    sourceType: system

  # --- Interactive toggle-group filters ---
  - name: schemas-toggle-filter
    tree: '{"type":"true"}'
    sourceType: interactive
    config: '[{"field":"schemas","label":"Schema","type":"toggle-group"}]'

  - name: schema-toggle-filter
    tree: '{"type":"true"}'
    sourceType: interactive
    config: '[{"field":"schema","label":"Schema","type":"toggle-group"}]'

  - name: suite-tier-toggle-filter
    tree: '{"type":"true"}'
    sourceType: interactive
    config: '[{"field":"suite","label":"Suite","type":"toggle-group"},{"field":"tier","label":"Tier","type":"toggle-group"}]'

  - name: enabled-toggle-filter
    tree: '{"type":"true"}'
    sourceType: interactive
    config: '[{"field":"enabled","label":"Status","type":"toggle-group"}]'

  - name: status-visibility-toggle-filter
    tree: '{"type":"true"}'
    sourceType: interactive
    config: '[{"field":"status","label":"Status","type":"toggle-group"},{"field":"visibility","label":"Visibility","type":"toggle-group"}]'

  - name: status-mode-toggle-filter
    tree: '{"type":"true"}'
    sourceType: interactive
    config: '[{"field":"status","label":"Status","type":"toggle-group"},{"field":"mode","label":"Mode","type":"toggle-group"}]'

  # --- Contextual filters (derived from page context) ---
  - name: backlinks-context-filter
    tree: '{"type":"field","field":"target","operator":"equals","source_type":"contextual","context_binding":"context.entity","fallback_behavior":"hide"}'
    sourceType: contextual

  - name: similar-entities-context-filter
    tree: '{"type":"field","field":"similar_to","operator":"embedding_similarity","source_type":"contextual","context_binding":"context.entity","fallback_behavior":"hide"}'
    sourceType: contextual

  - name: unlinked-references-context-filter
    tree: '{"type":"field","field":"mentions","operator":"contains","source_type":"contextual","context_binding":"context.entity","fallback_behavior":"hide"}'
    sourceType: contextual

  - name: graph-neighbors-context-filter
    tree: '{"type":"field","field":"neighbor_of","operator":"equals","source_type":"contextual","context_binding":"context.entity","fallback_behavior":"hide"}'
    sourceType: contextual
