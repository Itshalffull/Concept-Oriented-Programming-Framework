# Core schema definitions for clef-base.
# Per spec §2.4: Schema IS the subtype. Applying a Schema to a ContentNode
# gives it that Schema's fields. Multiple Schemas compose on one entity.

concept: Schema
action: defineSchema
entries:
  - schema: ContentNode
    fields: 'node,content,metadata,createdBy,createdAt,updatedAt'
  - schema: Concept
    fields: 'name,uri'
  - schema: Sync
    fields: 'suite,tier,pattern'
  - schema: Widget
    fields: 'name,framework'
  - schema: VersionSpace
    fields: 'name,status,owner,overrideCount,lastActivity,visibility,parent,description'
  - schema: VersionOverride
    fields: 'space,entity,operation,fields,summary'
  - schema: Article
    fields: 'title,body,author,publishedAt,status'
  - schema: Page
    fields: 'title,slug,body,template,publishedAt'
  - schema: Media
    fields: 'url,alt,mimeType,size,dimensions'
  - schema: View
    fields: 'view,dataSource,layout,filters,sorts,groups,visibleFields'
  - schema: Workflow
    fields: 'workflow,states,transitions,entities'
  - schema: AutomationRule
    fields: 'rule,trigger,conditions,actions,enabled'
  - schema: TaxonomyTerm
    fields: 'term,vocab,parent'
  - schema: Vocabulary
    fields: 'vocab,name,terms'
  - schema: Schema
    fields: 'schema,fields,extends,associations'
  - schema: DisplayMode
    fields: 'mode,name,mode_id,schema,layout,component_mapping,placements,role_visibility,cacheable'
  - schema: FieldPlacement
    fields: 'placement,source_field,formatter,formatter_options,label_display,label_override,visible,role_visibility,field_mapping'
  - schema: Theme
    fields: 'name,base,overrides,active,priority'
  - schema: ComponentMapping
    fields: 'mapping,widget,concept,action'
  - schema: Comment
    fields: 'comment,author,body,target,createdAt'
  - schema: File
    fields: 'file,path,mimeType,size,hash'
  - schema: Canvas
    fields: 'canvas,name,items,connectors,notation,layout'
  - schema: ConnectorPort
    fields: 'port,owner,direction,type,capacity,position'
  - schema: DiagramNotation
    fields: 'notation,name,nodeTypes,edgeTypes,connectionRules'
  - schema: ConstraintAnchor
    fields: 'anchor,canvasId,type,items,axis,value'
