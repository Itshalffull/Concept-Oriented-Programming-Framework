# ActionBinding seeds -- companion bindings for InputRule.markdown-heading.seeds.yaml
# and InputRule.github-callout.seeds.yaml (LE-22, §3.7).
# Updated VPR-14: markdown-transform-to-github-callout migrated from the retired
# "markdown-github-callout" language slot to language:"markdown" with
# options.extensions:["micromark-extension-github-callout"] per VPR-20 refactor.
#
# markdown-transform-to-heading-{1,3,4,5,6}: dispatched by the corresponding
#   markdown-heading-N InputRule when a paragraph line starts with N hashes + space.
#   Applies schema "heading" to the focused block and sets level=N via Schema/applyTo.
#   The metadata.level value is read by the heading widget at render time.
#   (markdown-transform-to-heading-2 was seeded earlier in ActionBinding.seeds.yaml.)
#
# markdown-transform-to-github-callout: dispatched by the github-callout InputRule
#   when a paragraph line matches ^> \[!(NOTE|TIP|IMPORTANT|WARNING|CAUTION)\].
#   Calls Parse/parse with language "markdown" + extensions:["micromark-extension-
#   github-callout"]. The standalone "markdown-github-callout" provider was retired
#   at commit 13ff5cfa (VPR-20) when all three callout dialects were refactored into
#   micromark extensions on the single "markdown" slot. A downstream sync applies
#   schema "callout" via Schema/applyTo and sets paletteRole from capturedGroup1
#   (the keyword in upper-case, e.g. "NOTE" -> paletteRole "info").
#   The paletteRole mapping is performed by the sync's guard; the ActionBinding
#   passes the raw capturedGroup1 and the focusedBlockId for routing.

concept: ActionBinding
action: bind
entries:

  # ── Heading level 1 ────────────────────────────────────────────────────────

  # Dispatched by the markdown-heading-1 InputRule when a paragraph line starts with "# ".
  - name: markdown-transform-to-heading-1
    binding: markdown-transform-to-heading-1
    target: "Schema/applyTo"
    parameterMap: '{"schema":"heading","entity_id":"context.focusedBlockId","level":1}'
    executionPolicy: "auto"
    slash_command: false
    toolbar_command: false

  # ── Heading level 3 ────────────────────────────────────────────────────────

  # Dispatched by the markdown-heading-3 InputRule when a paragraph line starts with "### ".
  - name: markdown-transform-to-heading-3
    binding: markdown-transform-to-heading-3
    target: "Schema/applyTo"
    parameterMap: '{"schema":"heading","entity_id":"context.focusedBlockId","level":3}'
    executionPolicy: "auto"
    slash_command: false
    toolbar_command: false

  # ── Heading level 4 ────────────────────────────────────────────────────────

  # Dispatched by the markdown-heading-4 InputRule when a paragraph line starts with "#### ".
  - name: markdown-transform-to-heading-4
    binding: markdown-transform-to-heading-4
    target: "Schema/applyTo"
    parameterMap: '{"schema":"heading","entity_id":"context.focusedBlockId","level":4}'
    executionPolicy: "auto"
    slash_command: false
    toolbar_command: false

  # ── Heading level 5 ────────────────────────────────────────────────────────

  # Dispatched by the markdown-heading-5 InputRule when a paragraph line starts with "##### ".
  - name: markdown-transform-to-heading-5
    binding: markdown-transform-to-heading-5
    target: "Schema/applyTo"
    parameterMap: '{"schema":"heading","entity_id":"context.focusedBlockId","level":5}'
    executionPolicy: "auto"
    slash_command: false
    toolbar_command: false

  # ── Heading level 6 ────────────────────────────────────────────────────────

  # Dispatched by the markdown-heading-6 InputRule when a paragraph line starts with "###### ".
  - name: markdown-transform-to-heading-6
    binding: markdown-transform-to-heading-6
    target: "Schema/applyTo"
    parameterMap: '{"schema":"heading","entity_id":"context.focusedBlockId","level":6}'
    executionPolicy: "auto"
    slash_command: false
    toolbar_command: false

  # ── GitHub callout ──────────────────────────────────────────────────────────

  # Dispatched by the github-callout InputRule when a paragraph line matches
  # ^> \[!(NOTE|TIP|IMPORTANT|WARNING|CAUTION)\].
  # Routes to Parse/parse with language "markdown" and
  # options.extensions:["micromark-extension-github-callout"] (VPR-14/VPR-20).
  # The standalone "markdown-github-callout" language slot was retired when the
  # three callout dialects were refactored into micromark extensions on the single
  # "markdown" slot (commit 13ff5cfa).  The micromark-parse provider selects the
  # extension from its KNOWN_EXTENSIONS registry; the completion sync applies
  # Schema/applyTo(schema="callout") and sets paletteRole from capturedGroup1
  # (the keyword in upper-case, e.g. "NOTE" -> paletteRole "info").
  - name: markdown-transform-to-github-callout
    binding: markdown-transform-to-github-callout
    target: "Parse/parse"
    parameterMap: '{"language":"markdown","options":{"extensions":["micromark-extension-github-callout"]},"text":"context.matchedText","keyword":"context.capturedGroup1","entity_id":"context.focusedBlockId"}'
    executionPolicy: "auto"
    slash_command: false
    toolbar_command: false
