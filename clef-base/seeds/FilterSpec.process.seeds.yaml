# FilterSpec seeds extracted from View.process.seeds.yaml.
# Each entry represents a unique filter configuration used by one or more process views.
# Interactive toggle-group filters start with tree: '{"type":"true"}' (show all);
# actual filtering happens at runtime when the user clicks toggles.
# Views without filters (process-dashboard-stats, run-dashboard, process-steps-editor,
# process-edges-editor, process-chat, process-health, process-completion-trend) get no entry.
#
# ── sourceType Classification Rationale (MAG-517) ─────────────────────────────
#
# sourceType routing rules determine which execution tier processes each filter:
#
#   system      → Backend pushdown (all tiers except E2EE)
#                 Always-on invariant filters. Never change per interaction.
#
#   contextual  → Backend pushdown (all tiers except E2EE)
#                 Derived from URL parameters or navigation context.
#                 Resolved before the query executes.
#
#   interactive → Local residual (all tiers)
#                 User-driven toggle clicks and facet selections. Change
#                 frequently during a session; must stay local to avoid
#                 a round-trip per user interaction.
#
#   search      → Local residual by default; backend pushdown if the provider
#                 declares "search" in its pushdownOps.
#
# Classification summary for this file:
#   All 6 entries are toggle-group filters driven by user interaction
#   (spec status, run status, step status/type, work item status/priority,
#   check status/mode, check mode). All are correctly classified as
#   sourceType: interactive — they change per user click and must run
#   in the local residual program, not be pushed to the backend.
#
# All entries in this file are correctly classified per the routing rules above.
# ──────────────────────────────────────────────────────────────────────────────

concept: FilterSpec
action: create
entries:
  # --- spec_status toggle (process-specs-list, process-specs-cards) ---
  - name: spec-status-toggle-filter
    tree: '{"type":"true"}'
    sourceType: interactive
    config: '[{"field":"spec_status","label":"Status","type":"toggle-group"}]'

  # --- status + spec_ref toggle (process-runs-list) ---
  # Fields match ProcessRun/list output: status, spec_ref (not run_status, run_spec_ref).
  - name: run-status-spec-toggle-filter
    tree: '{"type":"true"}'
    sourceType: interactive
    config: '[{"field":"status","label":"Status","type":"toggle-group"},{"field":"spec_ref","label":"Spec","type":"toggle-group"}]'

  # --- step_status + step_type toggle (step-runs-list, step-bottlenecks, process-step-breakdown) ---
  - name: step-status-type-toggle-filter
    tree: '{"type":"true"}'
    sourceType: interactive
    config: '[{"field":"step_status","label":"Status","type":"toggle-group"},{"field":"step_type","label":"Type","type":"toggle-group"}]'

  # --- wi_status (with options) + wi_priority toggle (my-work-items) ---
  - name: work-item-status-priority-toggle-filter
    tree: '{"type":"true"}'
    sourceType: interactive
    config: '[{"field":"wi_status","label":"Status","type":"toggle-group","options":["offered","claimed","active","completed","rejected","delegated"]},{"field":"wi_priority","label":"Priority","type":"toggle-group"}]'

  # --- status (with options) + mode (with options) toggle (check-overview) ---
  - name: check-status-mode-toggle-filter
    tree: '{"type":"true"}'
    sourceType: interactive
    config: '[{"field":"status","label":"Status","type":"toggle-group","options":["passing","failing","pending","waived","error"]},{"field":"mode","label":"Mode","type":"toggle-group","options":["automated","human","llm"]}]'

  # --- mode toggle only (check-failures) ---
  - name: check-mode-toggle-filter
    tree: '{"type":"true"}'
    sourceType: interactive
    config: '[{"field":"mode","label":"Mode","type":"toggle-group"}]'
