# Default ComponentMapping seeds — widget-to-data bindings for built-in display types.
# Each mapping pairs a widget with entity_field slot sources.

concept: ComponentMapping
action: create
entries:
  # Card display — used by ContentNode:card, Schema:card, Theme:card, etc.
  - name: card-default
    widget_id: card-widget
    schema: ContentNode
    display_mode: card

  # Compact display — minimal one-line rendering
  - name: compact-default
    widget_id: inline-widget
    schema: ContentNode
    display_mode: compact

  # Board card — kanban column cards
  - name: board-card-default
    widget_id: card-widget
    schema: ContentNode
    display_mode: board-card

  # Stat card — aggregated metric cards
  - name: stat-card-default
    widget_id: stat-card-widget
    schema: ContentNode
    display_mode: stat-card

  # Table row — tabular list rendering
  - name: table-row-default
    widget_id: table-row-widget
    schema: ContentNode
    display_mode: table-row

  # Detail view — full entity detail page
  - name: detail-default
    widget_id: detail-widget
    schema: ContentNode
    display_mode: detail

  # Content body — prose/markdown content rendering
  - name: content-body-default
    widget_id: content-body-widget
    schema: ContentNode
    display_mode: content-body

  # Schema card
  - name: schema-card
    widget_id: card-widget
    schema: Schema
    display_mode: card

  # Schema table row
  - name: schema-table-row
    widget_id: table-row-widget
    schema: Schema
    display_mode: table-row

  # Workflow table row
  - name: workflow-table-row
    widget_id: table-row-widget
    schema: Workflow
    display_mode: table-row

  # Automation rule table row
  - name: automation-table-row
    widget_id: table-row-widget
    schema: AutomationRule
    display_mode: table-row

  # Taxonomy table row
  - name: taxonomy-table-row
    widget_id: table-row-widget
    schema: Taxonomy
    display_mode: table-row

  # Theme card
  - name: theme-card
    widget_id: card-widget
    schema: Theme
    display_mode: card

  # DisplayMode card
  - name: displaymode-card
    widget_id: card-widget
    schema: DisplayMode
    display_mode: card

  # View table row
  - name: view-table-row
    widget_id: table-row-widget
    schema: View
    display_mode: table-row

  # ComponentMapping table row
  - name: mapping-table-row
    widget_id: table-row-widget
    schema: ComponentMapping
    display_mode: table-row

  # Sync table row
  - name: sync-table-row
    widget_id: table-row-widget
    schema: Sync
    display_mode: table-row

  # VersionSpace card
  - name: versionspace-card
    widget_id: card-widget
    schema: VersionSpace
    display_mode: card

  # ProcessSpec table row
  - name: process-spec-table-row
    widget_id: table-row-widget
    schema: ProcessSpec
    display_mode: table-row

  # ProcessSpec card
  - name: process-spec-card
    widget_id: card-widget
    schema: ProcessSpec
    display_mode: card

  # StepRun table row
  - name: step-run-table-row
    widget_id: table-row-widget
    schema: StepRun
    display_mode: table-row

  # ProcessRun table row
  - name: process-run-table-row
    widget_id: table-row-widget
    schema: ProcessRun
    display_mode: table-row

  # ProcessRun card
  - name: process-run-card
    widget_id: card-widget
    schema: ProcessRun
    display_mode: card

  # Automation process card
  - name: automation-process-card
    widget_id: card-widget
    schema: AutomationRule
    display_mode: process-card

  # Check result inline — compact row for CheckVerification check results
  - name: check-result-inline
    widget_id: inline-widget
    schema: CheckVerification
    display_mode: check-result-inline

  # Process map graph — uses workflow-editor widget in read-only mode for ProcessSpec step display.
  # The process-map-graph.widget spec exists for domain affordance declarations,
  # but rendering is delegated to the shared workflow-editor widget via composition.
  - name: process-map-graph-mapping
    widget_id: workflow-editor
    schema: ProcessSpec
    display_mode: step-graph

  # Process execution overlay — runtime execution status overlay for ProcessRun
  - name: process-execution-overlay-mapping
    widget_id: process-execution-overlay-widget
    schema: ProcessRun
    display_mode: execution-overlay

  # Execution mode tabs — Map/Do/Chat tab switcher for process-run-page
  - name: execution-mode-tabs
    widget_id: execution-mode-tabs-widget
    schema: ProcessRun
    display_mode: execution-tabs

  # Chat execution panel — conversational chat panel for a ProcessRun
  - name: chat-execution-panel
    widget_id: chat-panel-widget
    schema: ProcessRun
    display_mode: chat-panel

  # Chat thread default — thread display for a ProcessConversation
  - name: chat-thread-default
    widget_id: chat-panel-widget
    schema: ProcessConversation
    display_mode: chat-thread

  # Work item table row — inbox row for WorkItem
  - name: work-item-table-row
    widget_id: table-row-widget
    schema: WorkItem
    display_mode: table-row

---
# Bind slots to entity fields for each mapping
