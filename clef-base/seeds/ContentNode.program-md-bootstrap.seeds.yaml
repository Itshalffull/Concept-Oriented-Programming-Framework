# Bootstrap governance content node: program.md Constitution.
# Seeds the canonical governing constitution page so a fresh clef-base
# instance has a content-native starting point for the amendment workflow.
# The AdminSubject auto-created at boot can immediately edit this page
# to author the instance's governing policies without any setup wizard.

concept: ContentNode
action: create
entries:
