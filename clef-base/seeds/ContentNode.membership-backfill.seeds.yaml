# Backfill: mirror all Schema/applyTo memberships into ContentNode's storage namespace.
# This ensures ContentNode/get.schemas reflects every schema that was applied via
# Schema/applyTo, regardless of whether the SchemaApplyRecordsMembership sync
# was active at the time the original seeds ran.
# Idempotent: ContentNode/recordSchema is a no-op for already-present memberships.
# Fixes three-source inconsistency (bugs #101, #105, #107).

