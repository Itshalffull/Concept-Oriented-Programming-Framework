# FormSpec seeds — Phase C audit batch 1: ContentNode, TaxonomyTerm, Article.
#                  Phase C audit batch 2: Canvas, ConnectorPort, ConstraintAnchor, DiagramNotation.
#                  Phase C audit batch 3: Comment, File, Media, Page, Vocabulary.
#                  Phase C continuation: AutomationRule edit-mode property pane.
#                  Phase C continuation (admin/meta schemas): DisplayMode, ComponentMapping,
#                    FieldPlacement, Theme, Suite.
#                  Schemas skipped (Tier 1a — bespoke editor required): Concept, Derived,
#                    Sync, Widget. See clef-base/seeds/TIER_1A_CANDIDATES.md.
# Each FormSpec shell is created then updated with layout JSON and field widgets.
# Field widget mapping uses ComponentMapping.form-field entries.
# Widgets noted as MISSING_WIDGET are placeholders for Phase D — they map to
# the closest existing widget until the real widget is built.
#
# Missing widgets discovered in this batch — see clef-base/seeds/MISSING_WIDGETS.md
# for the canonical Phase C → Phase D handoff list.

# ─────────────────────────────────────────────────────────────────────────────
# Schema 1: ContentNode
# fields: node, content, metadata, createdBy, createdAt, updatedAt
# Layout: tabs — "Content" (node, content) | "Metadata" (metadata, createdBy, createdAt)
# ─────────────────────────────────────────────────────────────────────────────

concept: FormSpec
action: create
entries:
  - form: form-contentnode-create
    schema: ContentNode
    name: create
    mode: create

  - form: form-taxonomyterm-create
    schema: TaxonomyTerm
    name: create
    mode: create

  - form: form-article-create
    schema: Article
    name: create
    mode: create

  - form: form-canvas-create
    schema: Canvas
    name: create
    mode: create

  - form: form-connectorport-create
    schema: ConnectorPort
    name: create
    mode: create

  - form: form-constraintanchor-create
    schema: ConstraintAnchor
    name: create
    mode: create

  - form: form-diagramnotation-create
    schema: DiagramNotation
    name: create
    mode: create

  # ─── Batch 3: content-area schemas ─────────────────────────────────────────

  # Comment — 5 fields after omitting system-managed createdAt from create-mode.
  # create shell covers the authoring flow (body + target + author).
  # edit-mode shell covers post-publish correction (body only).
  - form: form-comment-create
    schema: Comment
    name: create
    mode: create

  - form: form-comment-edit
    schema: Comment
    name: edit
    mode: edit

  # File — 5 fields; hash is handler-computed on ingest so omitted from create-mode.
  - form: form-file-create
    schema: File
    name: create
    mode: create

  - form: form-file-edit
    schema: File
    name: edit
    mode: edit

  # Media — 5 fields; all are user-supplied at upload time.
  # No system-managed timestamps in Media schema.
  - form: form-media-create
    schema: Media
    name: create
    mode: create

  # Page — 5 fields; no displayWidget Property set so Tier 1b does NOT fire.
  # Both create-mode and edit-mode FormSpecs are needed.
  # publishedAt is conditionally shown when template implies a publish workflow.
  - form: form-page-create
    schema: Page
    name: create
    mode: create

  - form: form-page-edit
    schema: Page
    name: edit
    mode: edit

  # Vocabulary — 3 fields → flat layout.
  # "terms" is a JSON array managed by TaxonomyTerm operations; shown in edit
  # as a read-only summary. Omitted from create-mode (handler initialises to []).
  - form: form-vocabulary-create
    schema: Vocabulary
    name: create
    mode: create

  - form: form-vocabulary-edit
    schema: Vocabulary
    name: edit
    mode: edit

  # ─── Phase C continuation: admin/meta schemas ────────────────────────────
  #
  # DisplayMode — create-mode: 3 user-supplied fields (schema, mode_id, name).
  # The remaining fields (layout, component_mapping, placements, role_visibility,
  # cacheable) are set via subsequent actions after the mode is created.
  # 3 fields → flat layout.
  - form: form-displaymode-create
    schema: DisplayMode
    name: create
    mode: create

  # ComponentMapping — create-mode: 6 concept-level fields mapped to the
  # Schema.seeds field list (mapping, widget, concept, action) plus display_mode.
  # The schema.seeds mapping field "concept" corresponds to concept-level "schema" and
  # "action" to "display_mode"; "widget" to widget_id. "mapping" is the auto-generated ID.
  # User-supplied at create time: name (label), widget_id, schema, display_mode,
  # insertable (optional Bool), block_editor_context (optional list).
  # 4 required + 2 optional → groups layout: "Identity" + "Block Editor".
  - form: form-componentmapping-create
    schema: ComponentMapping
    name: create
    mode: create

  # FieldPlacement — create-mode: 2 required concept-level fields (source_field,
  # formatter). Optional configuration (formatter_options, label_display,
  # label_override, visible, role_visibility, field_mapping) is applied via the
  # separate configure/set_visibility/set_field_mapping actions.
  # 2 required + 5 optional → groups layout: "Field" + "Display".
  - form: form-fieldplacement-create
    schema: FieldPlacement
    name: create
    mode: create

  # Theme — 5 schema fields: name, base, overrides, active, priority.
  # "active" and "priority" govern activation state; the concept separates
  # create (name + overrides) from activate (theme + priority).
  # For the create form: name, base (optional extension), overrides (JSON token map).
  # active and priority are set via Theme/activate, not the create action,
  # so they are excluded from the create form.
  # 3 create-mode fields → flat layout.
  - form: form-theme-create
    schema: Theme
    name: create
    mode: create

  # Suite — 6 schema fields: name, version, description, conceptCount, syncCount, dependencies.
  # conceptCount and syncCount are computed by the kernel from installed concepts/syncs
  # and are omitted from the create form.
  # User-supplied: name, version, description, dependencies.
  # 4 fields → flat layout.
  - form: form-suite-create
    schema: Suite
    name: create
    mode: create

  # ─── Phase C continuation: AutomationRule ─────────────────────────────────
  # AutomationRule create flow is Tier 1a (user-sync-editor via CUX-06).
  # This edit-mode shell serves the property pane / detail-view inline editor
  # for already-existing rules — it does NOT replace the bespoke create surface.
  #
  # Fields: label (display name), description, trigger, conditions, actions, enabled.
  # "rule" (the storage key / ID) is read-only identity — excluded from edit forms.
  # system-managed fields (none beyond "rule") are omitted.
  - form: form-automation-rule-edit
    schema: AutomationRule
    name: edit
    mode: edit

  # ─── Phase C continuation: versioning schemas ──────────────────────────────
  #
  # VersionSpace — 8 schema fields; 2 are system-managed and omitted from create:
  #   overrideCount (incremented by handler on each override creation)
  #   lastActivity  (updated by handler on any write to the space)
  # User-editable fields for create: name, owner, status, visibility, parent, description.
  # 6 fields → groups layout (heuristic: 5-7 fields, clear concern clusters).
  # "Identity" group: name, owner — who owns this space.
  # "Settings" group: status, visibility, parent, description — governance & topology.
  - form: form-versionspace-create
    schema: VersionSpace
    name: create
    mode: create

  # VersionOverride — 5 schema fields; all user-supplied at creation time.
  # No system-managed fields in the VersionOverride schema definition.
  # 5 fields → groups layout.
  # "Target" group: space, entity, operation — what is being overridden and how.
  # "Change" group: fields, summary — what fields changed and human rationale.
  - form: form-versionoverride-create
    schema: VersionOverride
    name: create
    mode: create

---
# Apply layout and field-widget overrides to each FormSpec.
# layout JSON shape: {"type":"tabs","tabs":[{"id":string,"label":string,"fieldIds":[...]}]}
#   or flat: {"type":"groups","groups":[{"id":string,"label":string,"fieldIds":[...]}]}
# overrides JSON shape: {"fieldId":{"widget":"<block-widget-id>"}, ...}
#   — identifies which FormBuilder field-block widget renders each field.
#   Widgets marked MISSING_WIDGET are placeholders; real widgets land in Phase D.

concept: FormSpec
action: update
entries:
  # ── ContentNode ─────────────────────────────────────────────────────────────
  # Two-tab layout separating content authoring from metadata administration.
  # "Content" tab: the entity's identity (node ID) and its prose body.
  # "Metadata" tab: provenance fields (creator, timestamps, structured metadata).
  - form: form-contentnode-create
    layout: '{"type":"tabs","tabs":[{"id":"content","label":"Content","fieldIds":["node","content"]},{"id":"metadata","label":"Metadata","fieldIds":["metadata","createdBy","createdAt"]}]}'
    steps: null
    conditions: null
    defaults: '{"createdAt":"{{now}}"}'
    overrides: '{"node":{"widget":"form-field-text-block","label":"Node ID","placeholder":"e.g. article:my-post","required":true},"content":{"widget":"form-field-richtext-block","label":"Content","required":false},"metadata":{"widget":"form-field-json-block","label":"Metadata (JSON)","required":false},"createdBy":{"widget":"form-field-entity-picker-block","label":"Created By","entitySchema":"User","required":false},"createdAt":{"widget":"form-field-datetime-block","label":"Created At","required":false}}'

  # ── TaxonomyTerm ────────────────────────────────────────────────────────────
  # Flat layout — only 3 fields, no grouping needed.
  # "term" is the slug/ID, "vocab" selects the owning Vocabulary,
  # "parent" optionally nests this term under another term in the hierarchy.
  - form: form-taxonomyterm-create
    layout: '{"type":"flat","fieldIds":["term","vocab","parent"]}'
    steps: null
    conditions: null
    defaults: null
    overrides: '{"term":{"widget":"form-field-text-block","label":"Term ID","placeholder":"e.g. programming-languages","required":true},"vocab":{"widget":"form-field-entity-picker-block","label":"Vocabulary","entitySchema":"Vocabulary","required":true},"parent":{"widget":"form-field-entity-picker-block","label":"Parent Term (optional)","entitySchema":"TaxonomyTerm","required":false}}'

  # ── Article ─────────────────────────────────────────────────────────────────
  # Two-section layout: "Content" for the creative work, "Publishing" for workflow.
  # status uses select because Article status is a fixed enum (draft/published/archived).
  # publishedAt and author are publishing-side concerns grouped together.
  - form: form-article-create
    layout: '{"type":"groups","groups":[{"id":"content","label":"Content","fieldIds":["title","body"]},{"id":"publishing","label":"Publishing","fieldIds":["status","author","publishedAt"]}]}'
    steps: null
    conditions: '{"publishedAt":{"show":{"field":"status","eq":"published"}}}'
    defaults: '{"status":"draft"}'
    overrides: '{"title":{"widget":"form-field-text-block","label":"Title","placeholder":"Article title","required":true},"body":{"widget":"form-field-richtext-block","label":"Body","required":true},"status":{"widget":"form-field-select-block","label":"Status","options":["draft","published","archived"],"required":true},"author":{"widget":"form-field-entity-picker-block","label":"Author","entitySchema":"User","required":false},"publishedAt":{"widget":"form-field-datetime-block","label":"Publish Date","required":false}}'

  # ── AutomationRule (edit) ────────────────────────────────────────────────────
  # Edit-mode property pane for already-existing automation rules.
  # The create flow is Tier 1a (user-sync-editor); this FormSpec covers the
  # inline edit surface (detail view / property sidebar) only.
  #
  # Layout: groups — "Basics" (label, description) | "Behavior" (trigger, conditions, actions, enabled)
  # 6 fields total → groups is correct per the 5-7 field heuristic.
  #
  # "rule" (storage key / ID) is intentionally excluded: it is read-only identity,
  # not editable in a detail pane.
  #
  # trigger: String field in the concept, but values are dynamic concept-action
  # references (e.g. "ContentNode/create", "Workflow/transition") chosen at author
  # time from whatever concepts are installed. A fixed-enum form-field-select-block
  # would be too restrictive. Current placeholder is form-field-text-block.
  # FUTURE WIDGET NEEDED: form-field-binding-picker-block — see MISSING_WIDGETS.md.
  #
  # conditions: JSON array of condition objects (e.g. field-equals, schema-matches).
  # Placeholder: form-field-json-block (already in MISSING_WIDGETS.md batch 1).
  #
  # actions: JSON array of action step objects (type + params).
  # Placeholder: form-field-json-block (same widget as conditions).
  #
  # enabled: Bool → form-field-checkbox-block (ships in the 6 baseline blocks).
  - form: form-automation-rule-edit
    layout: '{"type":"groups","groups":[{"id":"basics","label":"Basics","fieldIds":["label","description"]},{"id":"behavior","label":"Behavior","fieldIds":["trigger","conditions","actions","enabled"]}]}'
    steps: null
    conditions: null
    defaults: null
    overrides: '{"label":{"widget":"form-field-text-block","label":"Name","placeholder":"e.g. Notify on publish","required":true},"description":{"widget":"form-field-textarea-block","label":"Description","placeholder":"What does this rule do?","required":false},"trigger":{"widget":"form-field-text-block","label":"Trigger Event","placeholder":"e.g. ContentNode/create","required":true,"note":"PLACEHOLDER — replace with form-field-binding-picker-block when available"},"conditions":{"widget":"form-field-json-block","label":"Conditions (JSON)","placeholder":"[]","required":false,"note":"PLACEHOLDER — replace with form-field-condition-builder-block when available"},"actions":{"widget":"form-field-json-block","label":"Actions (JSON)","placeholder":"[]","required":true,"note":"PLACEHOLDER — replace with form-field-action-builder-block when available"},"enabled":{"widget":"form-field-checkbox-block","label":"Enabled","defaultChecked":false,"required":false}}'

  # ─────────────────────────────────────────────────────────────────────────────
  # Batch 2 — Diagramming schemas
  # ─────────────────────────────────────────────────────────────────────────────

  # ── Canvas ──────────────────────────────────────────────────────────────────
  # Schema fields: canvas, name, items, connectors, notation, layout
  # canvas (system ID) omitted from create-mode.
  # 5 user-facing fields → groups layout (5-7 heuristic).
  # Two groups: "Identity" (name, notation) anchors what the canvas IS;
  # "Content" (items, connectors, layout) holds what it CONTAINS and how it is
  # arranged.
  # notation → entity-picker (single DiagramNotation reference; nullable because
  #   a blank canvas may precede notation selection).
  # items, connectors → entity-multi-picker (multi-valued ContentNode refs;
  #   new widget — see MISSING_WIDGETS.md).
  # layout → json-block (layout algorithm config, e.g. {type:"force",options:{}}).
  - form: form-canvas-create
    layout: '{"type":"groups","groups":[{"id":"identity","label":"Identity","fieldIds":["name","notation"]},{"id":"content","label":"Content","fieldIds":["items","connectors","layout"]}]}'
    steps: null
    conditions: null
    defaults: null
    overrides: '{"name":{"widget":"form-field-text-block","label":"Canvas Name","placeholder":"e.g. System Architecture","required":true},"notation":{"widget":"form-field-entity-picker-block","label":"Notation","entitySchema":"DiagramNotation","nullable":true,"required":false},"items":{"widget":"form-field-entity-multi-picker-block","label":"Items","entitySchema":"ContentNode","required":false},"connectors":{"widget":"form-field-entity-multi-picker-block","label":"Connectors","entitySchema":"ContentNode","required":false},"layout":{"widget":"form-field-json-block","label":"Layout Config (JSON)","required":false}}'

  # ── ConnectorPort ────────────────────────────────────────────────────────────
  # Schema fields: port, owner, direction, type, capacity, position
  # port (system ID) omitted from create-mode.
  # 5 user-facing fields → groups layout (5-7 heuristic).
  # Two groups: "Identity" (owner, type, direction) establishes what the port is
  # and what it belongs to; "Geometry" (capacity, position) captures the
  # connection budget and spatial placement hint.
  # owner → entity-picker (the canvas item ContentNode this port is attached to).
  # direction → select (fixed enum: in / out / both).
  # type → text (opaque capability label, e.g. "data", "control", "trigger").
  # capacity → number (max simultaneous connections; 0 = unlimited convention).
  # position → json-block (placement hint, e.g. {side:"right",offset:0.5}).
  - form: form-connectorport-create
    layout: '{"type":"groups","groups":[{"id":"identity","label":"Identity","fieldIds":["owner","type","direction"]},{"id":"geometry","label":"Geometry","fieldIds":["capacity","position"]}]}'
    steps: null
    conditions: null
    defaults: '{"direction":"out","capacity":1}'
    overrides: '{"owner":{"widget":"form-field-entity-picker-block","label":"Owner (Canvas Item)","entitySchema":"ContentNode","required":true},"type":{"widget":"form-field-text-block","label":"Port Type","placeholder":"e.g. data, control, trigger","required":true},"direction":{"widget":"form-field-select-block","label":"Direction","options":["in","out","both"],"required":true},"capacity":{"widget":"form-field-number-block","label":"Capacity","min":0,"required":false},"position":{"widget":"form-field-json-block","label":"Position (JSON)","required":false}}'

  # ── ConstraintAnchor ─────────────────────────────────────────────────────────
  # Schema fields: anchor, canvasId, type, items, axis, value
  # anchor (system ID) omitted from create-mode.
  # 5 user-facing fields → groups layout (5-7 heuristic).
  # Two groups: "Scope" (canvasId, items) identifies which canvas and items are
  # involved; "Constraint" (type, axis, value) specifies the rule itself.
  # canvasId → entity-picker (the Canvas this anchor lives on).
  # items → entity-multi-picker (canvas items that participate; new widget —
  #   see MISSING_WIDGETS.md).
  # type → select (fixed enum: align / distribute / pin / spacing).
  # axis → select (fixed enum: x / y / both).
  # value → number (pixel offset or gap amount; optional for align/distribute).
  - form: form-constraintanchor-create
    layout: '{"type":"groups","groups":[{"id":"scope","label":"Scope","fieldIds":["canvasId","items"]},{"id":"constraint","label":"Constraint","fieldIds":["type","axis","value"]}]}'
    steps: null
    conditions: null
    defaults: '{"type":"align","axis":"x"}'
    overrides: '{"canvasId":{"widget":"form-field-entity-picker-block","label":"Canvas","entitySchema":"Canvas","required":true},"items":{"widget":"form-field-entity-multi-picker-block","label":"Items","entitySchema":"ContentNode","required":true},"type":{"widget":"form-field-select-block","label":"Constraint Type","options":["align","distribute","pin","spacing"],"required":true},"axis":{"widget":"form-field-select-block","label":"Axis","options":["x","y","both"],"required":true},"value":{"widget":"form-field-number-block","label":"Value (px)","required":false}}'

  # ── DiagramNotation ──────────────────────────────────────────────────────────
  # Schema fields: notation, name, nodeTypes, edgeTypes, connectionRules
  # notation (system ID) omitted from create-mode.
  # 4 user-facing fields → groups layout (just above the flat threshold of 4).
  # Two groups: "Identity" (name only — a notation is fully identified by its
  # name); "Type System" (nodeTypes, edgeTypes, connectionRules) holds the
  # structural rules governing what diagrams using this notation may contain.
  # name → text (human-readable label, e.g. "BPMN 2.0", "C4 Container").
  # nodeTypes → json-block (JSON array of node type descriptors).
  # edgeTypes → json-block (JSON array of edge type descriptors).
  # connectionRules → json-block (JSON rules for valid source→target pairs).
  # All three JSON fields default to empty arrays so the notation is valid
  # but unconstrained immediately after creation.
  - form: form-diagramnotation-create
    layout: '{"type":"groups","groups":[{"id":"identity","label":"Identity","fieldIds":["name"]},{"id":"type-system","label":"Type System","fieldIds":["nodeTypes","edgeTypes","connectionRules"]}]}'
    steps: null
    conditions: null
    defaults: '{"nodeTypes":"[]","edgeTypes":"[]","connectionRules":"[]"}'
    overrides: '{"name":{"widget":"form-field-text-block","label":"Notation Name","placeholder":"e.g. BPMN 2.0, C4 Container","required":true},"nodeTypes":{"widget":"form-field-json-block","label":"Node Types (JSON)","required":false},"edgeTypes":{"widget":"form-field-json-block","label":"Edge Types (JSON)","required":false},"connectionRules":{"widget":"form-field-json-block","label":"Connection Rules (JSON)","required":false}}'

  # ── Batch 3 updates: Comment, File, Media, Page, Vocabulary ─────────────────

  # ── Comment (create) ─────────────────────────────────────────────────────────
  # Schema: comment, author, body, target, createdAt
  # 5 fields; createdAt is system-managed → omitted from create-mode → 4 user fields.
  # Layout: groups (4 user fields fit one group each for authoring vs context).
  # "Authoring" group: who wrote it (author) and the content itself (body).
  # "Context" group: where it lives (target) and its internal ID (comment).
  #
  # author → entity-picker [MISSING_WIDGET: form-field-entity-picker-block; placeholder: form-field-text-block]
  # body   → richtext [MISSING_WIDGET: form-field-richtext-block; placeholder: form-field-textarea-block]
  # target → entity-picker [MISSING_WIDGET: form-field-entity-picker-block; placeholder: form-field-text-block]
  - form: form-comment-create
    layout: '{"type":"groups","groups":[{"id":"authoring","label":"Authoring","fieldIds":["author","body"]},{"id":"context","label":"Context","fieldIds":["target","comment"]}]}'
    steps: null
    conditions: null
    defaults: null
    overrides: '{"comment":{"widget":"form-field-text-block","label":"Comment ID","placeholder":"auto-generated if blank","required":false},"author":{"widget":"form-field-entity-picker-block","label":"Author","entitySchema":"User","required":true},"body":{"widget":"form-field-richtext-block","label":"Body","required":true},"target":{"widget":"form-field-entity-picker-block","label":"Target","entitySchema":"ContentNode","required":true}}'

  # ── Comment (edit) ───────────────────────────────────────────────────────────
  # Post-creation, only body is user-editable. comment ID, author, and target
  # are frozen after creation (identity and provenance are immutable).
  # createdAt shown read-only for reference.
  - form: form-comment-edit
    layout: '{"type":"flat","fieldIds":["body","createdAt"]}'
    steps: null
    conditions: null
    defaults: null
    overrides: '{"body":{"widget":"form-field-richtext-block","label":"Body","required":true},"createdAt":{"widget":"form-field-text-block","label":"Created At","readOnly":true,"required":false}}'

  # ── File (create) ────────────────────────────────────────────────────────────
  # Schema: file, path, mimeType, size, hash
  # 5 fields; hash is handler-computed on ingest → omitted from create-mode → 4 fields.
  # Layout: groups — "Identity" (file ID + path) | "Properties" (MIME + size).
  #
  # size → form-field-number-block (ships in the 6 baseline blocks).
  - form: form-file-create
    layout: '{"type":"groups","groups":[{"id":"identity","label":"Identity","fieldIds":["file","path"]},{"id":"properties","label":"Properties","fieldIds":["mimeType","size"]}]}'
    steps: null
    conditions: null
    defaults: null
    overrides: '{"file":{"widget":"form-field-text-block","label":"File ID","placeholder":"e.g. uploads:logo-2024","required":true},"path":{"widget":"form-field-text-block","label":"File Path","placeholder":"e.g. /uploads/logo-2024.png","required":true},"mimeType":{"widget":"form-field-text-block","label":"MIME Type","placeholder":"e.g. image/png","required":true},"size":{"widget":"form-field-number-block","label":"Size (bytes)","min":0,"required":true}}'

  # ── File (edit) ──────────────────────────────────────────────────────────────
  # path and mimeType may be corrected post-creation. size and hash are read-only
  # once the file exists — changing them requires re-ingesting the binary.
  - form: form-file-edit
    layout: '{"type":"groups","groups":[{"id":"identity","label":"Identity","fieldIds":["file","path"]},{"id":"properties","label":"Properties","fieldIds":["mimeType","size","hash"]}]}'
    steps: null
    conditions: null
    defaults: null
    overrides: '{"file":{"widget":"form-field-text-block","label":"File ID","readOnly":true,"required":false},"path":{"widget":"form-field-text-block","label":"File Path","required":true},"mimeType":{"widget":"form-field-text-block","label":"MIME Type","required":true},"size":{"widget":"form-field-number-block","label":"Size (bytes)","min":0,"readOnly":true,"required":false},"hash":{"widget":"form-field-text-block","label":"Hash","readOnly":true,"required":false}}'

  # ── Media (create) ───────────────────────────────────────────────────────────
  # Schema: url, alt, mimeType, size, dimensions
  # 5 fields; all are user-supplied → no create/edit divergence → one create shell.
  # Layout: groups — "Source" (url + alt) | "Technical" (mimeType + size + dimensions).
  #
  # dimensions → JSON object {"width":N,"height":N}
  # [MISSING_WIDGET: form-field-json-block; placeholder: form-field-textarea-block]
  - form: form-media-create
    layout: '{"type":"groups","groups":[{"id":"source","label":"Source","fieldIds":["url","alt"]},{"id":"technical","label":"Technical","fieldIds":["mimeType","size","dimensions"]}]}'
    steps: null
    conditions: null
    defaults: null
    overrides: '{"url":{"widget":"form-field-text-block","label":"URL","placeholder":"https://...","required":true},"alt":{"widget":"form-field-text-block","label":"Alt Text","placeholder":"Describe the media for screen readers","required":false},"mimeType":{"widget":"form-field-text-block","label":"MIME Type","placeholder":"e.g. image/jpeg","required":true},"size":{"widget":"form-field-number-block","label":"Size (bytes)","min":0,"required":false},"dimensions":{"widget":"form-field-json-block","label":"Dimensions (JSON)","placeholder":"{\"width\":1920,\"height\":1080}","required":false}}'

  # ── Page (create) ────────────────────────────────────────────────────────────
  # Schema: title, slug, body, template, publishedAt
  # 5 fields → groups layout.
  #
  # Tier 1b audit result: no displayWidget Property exists for schema "Page" in
  # Property.content-native.seeds.yaml. The 4-tier dispatcher falls through
  # Tier 1a (no InteractionSpec.create_surface for Page) and Tier 1b (no
  # displayWidget) and reaches Tier 2 (FormSpec). Both create and edit are needed.
  #
  # "Content" group:   title, slug (URL key), body.
  # "Publishing" group: template picker, optional publish date.
  #
  # body        → richtext [MISSING_WIDGET: form-field-richtext-block; placeholder: form-field-textarea-block]
  # template    → entity-picker (entitySchema Template) [MISSING_WIDGET: form-field-entity-picker-block; placeholder: form-field-text-block]
  # publishedAt → datetime [MISSING_WIDGET: form-field-datetime-block; placeholder: form-field-date-block]
  - form: form-page-create
    layout: '{"type":"groups","groups":[{"id":"content","label":"Content","fieldIds":["title","slug","body"]},{"id":"publishing","label":"Publishing","fieldIds":["template","publishedAt"]}]}'
    steps: null
    conditions: null
    defaults: null
