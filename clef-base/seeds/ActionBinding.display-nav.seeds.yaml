# ActionBinding seeds — display widget keyboard navigation (KB-18).
#
# PRD:  docs/plans/keybinding-prd.md Phase H §18
# Card: KB-18
#
# Navigation ActionBindings for the three primary display widgets:
#   DataTable (scope: app.display.table)
#   BoardDisplay (scope: app.display.board)
#   CardGridDisplay (scope: app.display.cardgrid)
#
# Each binding targets a DisplayNav surface action. DisplayNav/dispatch
# fires a `clef:display-nav` CustomEvent on the focused element's
# nearest ancestor with data-keybinding-scope set. The widget's
# useEffect listener receives the event and updates its internal
# selection state (selectedRow / selectedCol / selectedCard indices).
#
# This keeps concept-layer clean — no selection state lives in the
# kernel. Widgets own their cursor state; ActionBindings own the
# key → action mapping; the event bridge is the only coupling.
#
# parameterMap carries `action` — the semantic navigation direction
# string consumed by the widget's event handler. Grid math (wrapping,
# column count for cardgrid) is handled entirely in the widget.
#
# executionPolicy: "auto" — navigation is synchronous and safe to retry.
# No toolbar_command / slash_command / context_menu exposure: these
# are keyboard-only bindings not intended for the command palette.

concept: ActionBinding
action: bind
entries:

  # ==================================================================
  # DataTable navigation (scope: app.display.table)
  # ==================================================================

  # ── Row navigation ────────────────────────────────────────────────

  - name: table-row-prev
    binding: table-row-prev
    target: "DisplayNav/dispatch"
    parameterMap: '{"action":"table-row-prev"}'
    executionPolicy: "auto"
    toolbar_command: false
    slash_command: false
    palette_command: false
    context_menu: false
    section: "Navigation"
    label: "Table: previous row"
    description: "Move keyboard focus to the row above the current selection"

  - name: table-row-next
    binding: table-row-next
    target: "DisplayNav/dispatch"
    parameterMap: '{"action":"table-row-next"}'
    executionPolicy: "auto"
    toolbar_command: false
    slash_command: false
    palette_command: false
    context_menu: false
    section: "Navigation"
    label: "Table: next row"
    description: "Move keyboard focus to the row below the current selection"

  # ── Cell navigation ───────────────────────────────────────────────

  - name: table-cell-prev
