    palette_command: false
    context_menu: false
    section: "Navigation"
    label: "Table: next cell"
    description: "Move keyboard focus to the cell to the right of the current selection"

  # ── Row activation and expand ─────────────────────────────────────

  - name: table-row-activate
    binding: table-row-activate
    target: "DisplayNav/dispatch"
    parameterMap: '{"action":"table-row-activate"}'
    executionPolicy: "auto"
    toolbar_command: false
    slash_command: false
    palette_command: false
    context_menu: false
    section: "Navigation"
    label: "Table: activate row"
    description: "Activate (click) the currently focused table row"

  - name: table-row-toggle-expand
    binding: table-row-toggle-expand
    target: "DisplayNav/dispatch"
