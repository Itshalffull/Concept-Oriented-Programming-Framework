# Content-native Properties for schema entities.
# These are set after Schema/defineSchema and drive the general
# content-native syncs (page promotion, child schema overlay,
# default block tree, compilation provider, staleness tracking).

concept: Property
action: set
entries:
  # === Agent Persona ===
  - entity: agent-persona
    key: childSchema
    value: instruction-block
  - entity: agent-persona
    key: defaultTemplate
    value: standard-agent
  - entity: agent-persona
    key: compilationProvider
    value: PromptAssembly
  - entity: instruction-block
    key: isChildSchema
    value: "true"

  # === Constitution ===
  - entity: constitution
    key: childSchema
    value: principle
  - entity: constitution
    key: defaultTemplate
    value: standard-constitution
  - entity: principle
    key: isChildSchema
    value: "true"

  # === Process Spec ===
  - entity: process-spec
    key: childSchema
    value: process-step
  - entity: process-spec
    key: defaultTemplate
    value: standard-process
  - entity: process-step
    key: isChildSchema
    value: "true"

  # === Proposal ===
  - entity: proposal
    key: childSchema
    value: proposal-section
  - entity: proposal
    key: defaultTemplate
    value: standard-proposal
  - entity: proposal-section
    key: isChildSchema
    value: "true"

  # === Circle ===
  - entity: circle
    key: childSchema
    value: circle-member
  - entity: circle
    key: defaultTemplate
    value: standard-circle
  - entity: circle-member
    key: isChildSchema
    value: "true"

  # === Policy ===
  - entity: policy
    key: childSchema
    value: policy-clause
  - entity: policy
    key: defaultTemplate
    value: standard-policy
  - entity: policy-clause
    key: isChildSchema
    value: "true"

  # === Role ===
  - entity: role
    key: childSchema
    value: role-section
  - entity: role
    key: defaultTemplate
    value: standard-role
  - entity: role-section
    key: isChildSchema
    value: "true"

  # === displayWidget — Tier 1b create routing (CUX-07) ===
  # These activate Tier 1b in the CreateForm dispatcher: when
  # Property/get(schemaId, "displayWidget") returns a non-empty value,
  # the create button fires ContentNode/createWithSchema then navigates
  # to the entity detail page where the named widget (or the block editor
  # for "block-editor") mounts with default Template blocks scaffolded.
  #
  # Tier 1a (InteractionSpec.create_surface) takes precedence over Tier 1b.
  # For process-spec: Tier 1a is already wired via create_surface: flow-builder
  # in InteractionSpec.process.seeds.yaml. Setting displayWidget: flow-builder
  # here gives consistent Tier 1b coverage as a fallback for any code path
  # that reaches Tier 1b resolution without a matching InteractionSpec.
  #
  # No specialized widget components exist for the other six schemas, so
  # "block-editor" is the correct canonical value — it routes to the
  # RecursiveBlockEditor on the entity detail page (see create-surfaces.ts).
  - entity: agent-persona
    key: displayWidget
    value: block-editor
  - entity: constitution
    key: displayWidget
    value: block-editor
  - entity: process-spec
    key: displayWidget
    value: flow-builder
  - entity: proposal
    key: displayWidget
    value: block-editor
  - entity: circle
    key: displayWidget
    value: block-editor
  - entity: policy
    key: displayWidget
    value: block-editor
  - entity: role
    key: displayWidget
    value: block-editor
