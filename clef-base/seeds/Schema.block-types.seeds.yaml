# Schema seeds — block types the RecursiveBlockEditor supports.
# The slash menu queries Schema/list and renders these as insertable options.
# Each entry is a minimal Schema definition; the actual render is handled by
# the editor's CSS + inline style keyed on data-schema, not field lists.

concept: Schema
action: defineSchema
entries:
