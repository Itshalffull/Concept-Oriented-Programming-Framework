# InputRule seeds — block-editor input-plane rules for markdown shortcuts and paste handlers.
# Each rule maps a kind-tagged pattern to an ActionBinding reference (action_ref).
# Priority 100 is used for Phase 1 block-editor rules; higher values win on conflict.
# scope: null means global — active in any block-editor context.
# See PRD §2.4 and §3 (docs/plans/block-editor-recursive-views-prd.md).

concept: InputRule
action: register
entries:
  # --- Markdown shortcut rules ---
  - name: markdown-heading-2
    rule: markdown-heading-2
    kind: pattern
    pattern: "^## "
    action_ref: markdown-transform-to-heading-2
    priority: 100
    scope: null

  # --- Block-type conversion rules (MAG-726) ---
  - name: markdown-quote
    rule: markdown-quote
    kind: pattern
    pattern: "^> "
    action_ref: markdown-transform-to-quote
    priority: 100
    scope: null

  - name: markdown-divider
    rule: markdown-divider
    kind: pattern
    pattern: "^---"
    action_ref: markdown-transform-to-divider
    priority: 100
    scope: null

  # --- Trigger-char rules (MAG-730) ---
  # trigger-wikilink: fires when the user types [[ in any block-editor context.
  # Dispatches entity-picker-open-for-wikilink which mounts the entity-picker
  # tool-plane; on completion the selected entity is wrapped in a wikilink mark.
  - name: trigger-wikilink
    rule: trigger-wikilink
    kind: trigger-char
    pattern: "[["
    action_ref: entity-picker-open-for-wikilink
    priority: 100
    scope: null

  # trigger-at-mention: fires when the user types @ in any block-editor context.
  # Dispatches entity-picker-open-for-mention with schemaFilter for agent-persona
  # or user; on completion inserts an inline @mention (same mark as wikilink with
  # @ prefix convention).
  - name: trigger-at-mention
    rule: trigger-at-mention
    kind: trigger-char
    pattern: "@"
    action_ref: entity-picker-open-for-mention
    priority: 100
    scope: null

  # --- Paste handler rules ---
  - name: media-upload-from-clipboard
    rule: media-upload-from-clipboard
    kind: paste
    pattern: "^image/"
    action_ref: media-upload-from-clipboard
    priority: 100
    scope: null

  # paste-url-to-selection (MAG-728): when the clipboard contains a bare URL
  # matching ^https?:// and there is an active text selection, wrap the selection
  # as a link mark using the pasted URL via link-wrap-selection-with-url.
  # If no selection exists the action falls through to default paste behaviour
  # so the URL is inserted as literal text. Priority 90 (lower than image/100)
  # so image paste takes precedence when both rules could match.
  - name: paste-url-to-selection
    rule: paste-url-to-selection
    kind: paste
    pattern: "^https?://"
    action_ref: link-wrap-selection-with-url
    priority: 90
    scope: null

  # --- List block conversion rules (MAG-725) ---
  # markdown-bullet: fires when a line starts with "- " (dash space) in any block context.
  # Dispatches markdown-transform-to-bullet which applies schema "bullet-list" via Schema/applyTo.
  - name: markdown-bullet
    rule: markdown-bullet
    kind: pattern
    pattern: "^- "
    action_ref: markdown-transform-to-bullet
    priority: 100
    scope: null

  # markdown-numbered: fires when a line starts with "1. " in any block context.
  # Dispatches markdown-transform-to-numbered which applies schema "numbered-list" via Schema/applyTo.
  - name: markdown-numbered
    rule: markdown-numbered
    kind: pattern
    pattern: "^1\\. "
    action_ref: markdown-transform-to-numbered
    priority: 100
    scope: null

  # --- Code fence markdown shortcut (MAG-727) ---
  # Triggered when a line starts with triple backtick followed by optional word chars.
  # The captured group (\w*) carries the language identifier (e.g. "typescript").
  # scope: null = active globally, but the code-block widget's body part suppresses
  # all InputRules internally via the literal block scope property.
  - name: markdown-code-fence
    rule: markdown-code-fence
    kind: pattern
    pattern: "^```(\\w*)"
    action_ref: markdown-transform-to-code
    priority: 100
    scope: null
