# ActionBinding seeds — pre-created binding records for all action triggers
# used in Clef Base views. Grouped by domain: theme, schema, workspace,
# concept browser, process, version space, and content.

concept: ActionBinding
action: bind
entries:
  # --- Theme actions ---
  - name: theme-activate
    binding: theme-activate
    target: "Theme/activate"
    parameterMap: '{"theme":"row.id"}'
    executionPolicy: "auto"
    label: "Activate"

  - name: theme-deactivate
    binding: theme-deactivate
    target: "Theme/deactivate"
    parameterMap: '{"theme":"row.id"}'
    executionPolicy: "auto"
    label: "Deactivate"

  # --- Schema actions ---
  - name: schema-apply
    binding: schema-apply
    target: "Schema/applyTo"
    parameterMap: '{"schema":"row.schema","entity_id":"context.id"}'
    executionPolicy: "auto"
    label: "+ Schema"

  - name: schema-remove
    binding: schema-remove
    target: "Schema/removeFrom"
    parameterMap: '{"schema":"row.schema","entity_id":"context.id"}'
    executionPolicy: "pessimistic"
    confirmWhen: "true"
    label: "Remove"
    buttonVariant: "destructive"

  # --- Workspace actions ---
  - name: workspace-set-default
    binding: workspace-set-default
    target: "Workspace/setDefault"
    parameterMap: '{"workspace":"row.id"}'
    executionPolicy: "auto"
    label: "Set Default"

  - name: workspace-delete
    binding: workspace-delete
    target: "Workspace/delete"
    parameterMap: '{"workspace":"row.id"}'
    executionPolicy: "pessimistic"
    confirmWhen: "true"
    label: "Delete"
    buttonVariant: "destructive"

  - name: workspace-duplicate
    binding: workspace-duplicate
    target: "Workspace/duplicate"
    parameterMap: '{"workspace":"row.id"}'
    executionPolicy: "auto"
    label: "Duplicate"

  - name: workspace-restore
    binding: workspace-restore
    target: "Workspace/restore"
    parameterMap: '{"workspace":"row.id"}'
    executionPolicy: "auto"
    label: "Restore"

  # --- Concept browser actions ---
  - name: concept-install
    binding: concept-install
    target: "ConceptBrowser/install"
    parameterMap: '{"package":"row.name"}'
    executionPolicy: "pessimistic"
    label: "Install"

  - name: concept-remove
    binding: concept-remove
    target: "ConceptBrowser/remove"
    parameterMap: '{"package":"row.name"}'
    executionPolicy: "pessimistic"
    confirmWhen: "true"
    label: "Remove"
    buttonVariant: "destructive"

  # --- Process actions ---
  - name: process-resume
    binding: process-resume
    target: "ProcessRun/resume"
    parameterMap: '{"run":"context.runId"}'
    executionPolicy: "pessimistic"
    label: "Resume"

  - name: process-cancel
    binding: process-cancel
    target: "ProcessRun/cancel"
    parameterMap: '{"run":"context.runId"}'
    executionPolicy: "pessimistic"
    confirmWhen: "true"
    label: "Cancel"
    buttonVariant: "destructive"

  # --- Version space actions ---
  - name: version-fork
    binding: version-fork
    target: "VersionSpace/fork"
    parameterMap: '{"space":"context.spaceId"}'
    executionPolicy: "pessimistic"
    label: "Fork Reality"

  - name: version-merge
    binding: version-merge
    target: "VersionSpace/merge"
    parameterMap: '{"space":"context.spaceId"}'
    executionPolicy: "pessimistic"
    confirmWhen: "true"
    label: "Merge"

  # --- Content actions ---
  - name: content-delete
    binding: content-delete
    target: "ContentNode/delete"
    parameterMap: '{"node":"row.id"}'
    executionPolicy: "pessimistic"
    confirmWhen: "true"
    reversalAction: "none"
    label: "Delete"
    buttonVariant: "destructive"

  # --- FormSpec actions ---
  - name: formspec-update
    binding: formspec-update
    target: "FormSpec/update"
    parameterMap: '{"name":"row.name"}'
    executionPolicy: "auto"
    label: "Save"

  # --- ProcessSpec actions ---
  - name: processstep-update
    binding: processstep-update
    target: "ProcessSpec/updateStep"
    parameterMap: '{"spec":"row.spec","step":"row.step"}'
    executionPolicy: "auto"
    label: "Update Step"

  - name: processstep-remove
    binding: processstep-remove
    target: "ProcessSpec/removeStep"
    parameterMap: '{"spec":"row.spec","step":"row.step"}'
    executionPolicy: "pessimistic"
    confirmWhen: "true"
    label: "Remove Step"
    buttonVariant: "destructive"

  - name: processedge-remove
    binding: processedge-remove
    target: "ProcessSpec/removeEdge"
    parameterMap: '{"spec":"row.spec","edge":"row.edge"}'
    executionPolicy: "pessimistic"
    confirmWhen: "true"
    label: "Remove Edge"
    buttonVariant: "destructive"

  # --- User sync lifecycle actions ---
  - name: user-sync-define
    binding: user-sync-define
    target: "SyncAutomationProvider/define"
    parameterMap: '{"name":"context.name","source_text":"context.sourceText","author":"context.author"}'
    executionPolicy: "auto"
    label: "Save"

  - name: user-sync-validate
    binding: user-sync-validate
    target: "SyncAutomationProvider/validate"
    parameterMap: '{"sync_def":"context.syncId"}'
    executionPolicy: "auto"
    label: "Validate"

  - name: user-sync-activate
    binding: user-sync-activate
    target: "SyncAutomationProvider/activate"
    parameterMap: '{"sync_def":"context.syncId"}'
    executionPolicy: "pessimistic"
    label: "Activate"

  - name: user-sync-suspend
    binding: user-sync-suspend
    target: "SyncAutomationProvider/suspend"
    parameterMap: '{"sync_def":"context.syncId"}'
    executionPolicy: "pessimistic"
    confirmWhen: "true"
    label: "Suspend"
    buttonVariant: "destructive"

  # --- AI actions ---
  - name: ai-continue-writing
    binding: ai-continue-writing
    target: "AgentSession/spawn"
    parameterMap: '{"personaPageId":"persona:continuation","strategy":"react","tools":"[]","context":"${currentBlock.body}"}'
    executionPolicy: "auto"
    slash_command: true
    toolbar_command: false
    context_menu: false
    section: "AI"
    label: "AI: continue writing"
    icon: "sparkles"

  # --- WorkItem actions ---
  - name: workitem-claim
    binding: workitem-claim
    target: "WorkItem/claim"
    parameterMap: '{"item":"row.id"}'
    executionPolicy: "auto"
    label: "Claim"

  - name: workitem-complete
    binding: workitem-complete
    target: "WorkItem/complete"
    parameterMap: '{"item":"row.id"}'
    executionPolicy: "auto"
    label: "Complete"

  - name: workitem-delegate
    binding: workitem-delegate
    target: "WorkItem/delegate"
    parameterMap: '{"item":"row.id"}'
    executionPolicy: "auto"
    label: "Delegate"

  # --- Entity embed + wikilink / mention actions (MAG-730) ---
  # entity-picker-open-for-wikilink: dispatched by the trigger-wikilink InputRule
  # when the user types [[. Mounts the entity-picker tool-plane (schemaFilter unset
  # — all entities searchable). On completion the selection is wrapped in a
  # data-mark="wikilink" data-entity-ref span (the wikilink RenderTransform
  # applies the accent.wikilink colour token automatically).
  # API gap note: EntityPicker/open is an anticipated action; a follow-up card
  # should introduce that concept and update the target at that time. The
  # executionPolicy is "auto" because the picker opens immediately on trigger.
  - name: entity-picker-open-for-wikilink
    binding: entity-picker-open-for-wikilink
    target: "EntityPicker/open"
    parameterMap: '{"onComplete":"insert-wikilink-mark","context":"context.selection"}'
    executionPolicy: "auto"
    slash_command: false
    toolbar_command: false
    context_menu: false
    label: "Insert link"
    icon: "link"

  # entity-picker-open-for-mention: dispatched by the trigger-at-mention InputRule
  # when the user types @. Mounts the entity-picker with schemaFilter restricted to
  # agent-persona and user entities. On completion inserts an @mention mark (same
  # wikilink mark structure but with @ display prefix).
  - name: entity-picker-open-for-mention
    binding: entity-picker-open-for-mention
    target: "EntityPicker/open"
    parameterMap: '{"schemaFilter":"agent-persona,user","onComplete":"insert-mention-mark","context":"context.selection"}'
    executionPolicy: "auto"
    slash_command: false
    toolbar_command: false
    context_menu: false
    label: "Mention"
    icon: "at-sign"

  # entity-follow: navigates to the referenced entity's detail view.
  # Triggered by Enter or double-click on an entity-embed-block.
  # API gap note: Navigator/navigate is the expected target; adjust once
  # the Navigator concept surface action is finalised for entity deep-links.
  - name: entity-follow
    binding: entity-follow
    target: "Navigator/navigate"
    parameterMap: '{"destination":"entity-detail","params":{"id":"context.entityRef"}}'
    executionPolicy: "auto"
    toolbar_command: false
    context_menu: false
    label: "Open"
    icon: "arrow-up-right"

  # entity-display-mode-switch: opens a mini-picker to switch between card,
  # compact, and full display modes for the focused entity-embed-block.
  # Appears as a toolbar command in the entity-embed EditSurface.
  # API gap note: EntityEmbedBlock/setDisplayMode is anticipated; for now the
  # target references the synthetic action. Update when the concept ships.
  - name: entity-display-mode-switch
    binding: entity-display-mode-switch
    target: "EntityEmbedBlock/setDisplayMode"
    parameterMap: '{"blockId":"context.blockId","mode":"context.selectedMode"}'
    executionPolicy: "auto"
    toolbar_command: true
    context_menu: false
    section: "Embed"
    label: "Display mode"
    icon: "layout"

  # entity-remove: removes the entity-embed-block from the Outline.
  # Available via context menu and keyboard Delete on the focused block.
  - name: entity-remove
    binding: entity-remove
    target: "Outline/removeChild"
    parameterMap: '{"parent":"context.parentId","child":"context.blockId"}'
    executionPolicy: "pessimistic"
    confirmWhen: "false"
    toolbar_command: false
    context_menu: true
    label: "Remove embed"
    buttonVariant: "destructive"
    icon: "trash"

  # --- Block editor input-rule dispatch actions (MAG-720) ---
  # Both are triggered via InputRule dispatch — not slash menu or toolbar.
  #
  # API gap note: Outline has no action to change a child block's schema type
  # directly (no "updateChild" or "setSchema" action). Schema/applyTo is the
  # closest available primitive: it overlays the "heading" schema onto an
  # existing ContentNode, effectively retyping the block without moving it in
  # the outline. The metadata.level value is carried in parameterMap and read
  # by the heading widget; it is not a typed field on the Schema action.
  - name: markdown-transform-to-heading-2
    binding: markdown-transform-to-heading-2
    target: "Schema/applyTo"
    parameterMap: '{"schema":"heading","entity_id":"context.focusedBlockId","level":2}'
    executionPolicy: "auto"
    slash_command: false
    toolbar_command: false

  # Dispatched by the paste InputRule when clipboard MIME matches ^image/.
  # context.clipboardFile carries the raw blob reference from the paste event.
  # After MediaAsset/createMedia completes -> ok, the paste-image-to-block.sync
  # fires and inserts a new Outline child referencing the created asset.
  - name: media-upload-from-clipboard
    binding: media-upload-from-clipboard
    target: "MediaAsset/createMedia"
    parameterMap: '{"asset":"uuid()","source":"local-fs","file":"context.clipboardFile"}'
    executionPolicy: "auto"
    slash_command: false
    toolbar_command: false

  # --- Inline mark toggle actions (MAG-718) ---
  # API gap note: No concept currently provides a dedicated "toggle inline mark
  # on selection" action. InlineAnnotation/annotate is the closest primitive but
  # targets change-tracking, not presentational marks. Outline has no wrapMark /
  # toggleMark action. A future follow-up card should introduce an InlineMark
  # concept (or extend Outline) with a toggleMark(selection, markKind) action;
  # at that point these bindings' targets can be updated from the synthetic
  # reference below to the real action.
  #
  # For now, the target references "InlineMark/toggleMark" as a placeholder
  # matching the expected future API shape. The bindings are valid seed records
  # and will resolve once that concept is available.
  - name: bold-toggle
    binding: bold-toggle
    target: "InlineMark/toggleMark"
    parameterMap: '{"markKind":"bold","selection":"context.selection"}'
    executionPolicy: "auto"
    toolbar_command: true
    keyboard: "Ctrl+B"
    section: "Format"
    label: "Bold"
    icon: "bold"

  - name: italic-toggle
    binding: italic-toggle
    target: "InlineMark/toggleMark"
    parameterMap: '{"markKind":"italic","selection":"context.selection"}'
    executionPolicy: "auto"
    toolbar_command: true
    keyboard: "Ctrl+I"
    section: "Format"
    label: "Italic"
    icon: "italic"

  - name: code-toggle
    binding: code-toggle
    target: "InlineMark/toggleMark"
    parameterMap: '{"markKind":"code","selection":"context.selection"}'
    executionPolicy: "auto"
    toolbar_command: true
    keyboard: "Ctrl+E"
    section: "Format"
    label: "Code"
    icon: "code"

  # --- Inline link actions (MAG-728) ---
  # API gap note: No concept currently provides a dedicated "toggle inline link
  # mark on selection" action. InlineMark/toggleMark is the placeholder target
  # from MAG-718 (same InlineMark gap). A future follow-up card should introduce
  # an InlineMark concept (or extend Outline) with a toggleMark(selection, markKind)
  # action; link-open-editor invokes the link-editor widget via a synthetic
  # InlineMark/openEditor surface action (anticipated API shape).
  #
  # link-toggle: opens the link-editor widget to collect URL/label (Ctrl+K).
  # link-open-editor: invokes link-editor.widget on the current selection.
  # link-remove: removes the link mark from the current selection.
  # link-wrap-selection-with-url: wraps active selection with link mark using
  #   a pasted URL. Used by the paste-url-to-selection InputRule.
  - name: link-toggle
    binding: link-toggle
    target: "InlineMark/toggleMark"
    parameterMap: '{"markKind":"link","selection":"context.selection"}'
    executionPolicy: "auto"
    toolbar_command: true
    keyboard: "Ctrl+K"
    section: "Format"
    label: "Link"
    icon: "link"

  - name: link-open-editor
    binding: link-open-editor
    target: "InlineMark/openEditor"
    parameterMap: '{"selection":"context.selection","widget":"link-editor"}'
    executionPolicy: "auto"
    toolbar_command: true
    context_menu: true
    section: "Format"
    label: "Edit link"
    icon: "link"

  - name: link-remove
    binding: link-remove
    target: "InlineMark/toggleMark"
    parameterMap: '{"markKind":"link","selection":"context.selection","force":"off"}'
    executionPolicy: "auto"
    toolbar_command: true
    visibleWhen: "context.selectionHasLinkMark"
    section: "Format"
    label: "Remove link"
    icon: "link-off"

  - name: link-wrap-selection-with-url
    binding: link-wrap-selection-with-url
    target: "InlineMark/toggleMark"
    parameterMap: '{"markKind":"link","selection":"context.selection","href":"context.pastedText","force":"on"}'
    executionPolicy: "auto"
    slash_command: false
    toolbar_command: false
    context_menu: false

  # --- Agent-persona compile actions (MAG-723) ---
  # persona-compile: initial compilation of the agent-persona page.
  # Placed in the page-level EditSurface toolbar via compile_action_ref.
  - name: persona-compile
    binding: persona-compile
    target: "ContentCompiler/compile"
    parameterMap: '{"page":"context.pageId","schemaHint":"agent-persona"}'
    executionPolicy: "pessimistic"
    toolbar_command: true
    section: "Persona"
    label: "Compile"
    icon: "zap"

  # persona-recompile: re-run compilation after edits. Used as the
  # compile_action_ref in the agent-persona EditSurface entry.
  - name: persona-recompile
    binding: persona-recompile
    target: "ContentCompiler/recompile"
    parameterMap: '{"page":"context.pageId"}'
    executionPolicy: "pessimistic"
    toolbar_command: true
    section: "Persona"
    label: "Recompile"
    icon: "refresh-cw"

  # persona-duplicate: deep-clone of the persona page + outline.
  # API gap note: ContentNode has no clone or duplicate action in the
  # current concept spec (repertoire/concepts/foundation/content-node.concept).
  # The closest available primitive is ContentNode/create followed by
  # Outline/addChild for each child block, but there is no atomic
  # ContentNode/clone action that copies the full block tree in a single
  # kernel call. This binding references the anticipated future action
  # "ContentNode/clone"; a follow-up card should introduce that action
  # (or a DuplicatePage derived action) and update this target at that time.
  - name: persona-duplicate
    binding: persona-duplicate
    target: "ContentNode/clone"
    parameterMap: '{"node":"context.pageId","newName":"context.pageName + \" (copy)\""}'
    executionPolicy: "pessimistic"
    toolbar_command: false
    section: "Persona"
    label: "Duplicate"
    icon: "copy"

  # --- Block-type markdown transform actions (MAG-726) ---
  # API gap note: Outline/Schema have no dedicated "convert block to quote/divider"
  # action. Schema/applyTo is the closest primitive: it overlays the target schema
  # onto the focused ContentNode, effectively retyping the block without moving it
  # in the outline. The parameterMap carries the schema name and the focusedBlockId
  # from context, exactly as markdown-transform-to-heading-2 does above.
  - name: markdown-transform-to-quote
    binding: markdown-transform-to-quote
    target: "Schema/applyTo"
    parameterMap: '{"schema":"quote","entity_id":"context.focusedBlockId"}'
    executionPolicy: "auto"
    slash_command: false
    toolbar_command: false

  - name: markdown-transform-to-divider
    binding: markdown-transform-to-divider
    target: "Schema/applyTo"
    parameterMap: '{"schema":"divider","entity_id":"context.focusedBlockId"}'
    executionPolicy: "auto"
    slash_command: false
    toolbar_command: false

  # --- Toggle disclosure actions (MAG-726) ---
  # Sent by the toggle-block EditSurface command_bindings.
  # API gap note: No dedicated Toggle/expand or Toggle/collapse action exists in
  # the current repertoire. ContentNode/update is the closest existing primitive
  # for persisting the expanded state field. A follow-up card should introduce a
  # ToggleBlock concept with expand/collapse actions; these bindings reference the
  # anticipated future API and will resolve once that concept is available.
  - name: toggle-disclosure-expand
    binding: toggle-disclosure-expand
    target: "ContentNode/update"
    parameterMap: '{"node":"context.focusedBlockId","field":"expanded","value":true}'
    executionPolicy: "auto"
    slash_command: false
    toolbar_command: true
    section: "Toggle"
    label: "Expand"
    icon: "chevron-down"

  - name: toggle-disclosure-collapse
    binding: toggle-disclosure-collapse
    target: "ContentNode/update"
    parameterMap: '{"node":"context.focusedBlockId","field":"expanded","value":false}'
    executionPolicy: "auto"
    slash_command: false
    toolbar_command: true
    section: "Toggle"
    label: "Collapse"
    icon: "chevron-right"

  # --- List block input-rule dispatch actions (MAG-725) ---
  # markdown-transform-to-bullet: dispatched by the markdown-bullet InputRule
  # when the user types "- " at the start of a block. Applies the bullet-list
  # schema via Schema/applyTo, retyping the current block in place.
  - name: markdown-transform-to-bullet
    binding: markdown-transform-to-bullet
    target: "Schema/applyTo"
    parameterMap: '{"schema":"bullet-list","entity_id":"context.focusedBlockId"}'
    executionPolicy: "auto"
    slash_command: false
    toolbar_command: false

  # markdown-transform-to-numbered: dispatched by the markdown-numbered InputRule
  # when the user types "1. " at the start of a block. Applies the numbered-list
  # schema via Schema/applyTo, retyping the current block in place.
  - name: markdown-transform-to-numbered
    binding: markdown-transform-to-numbered
    target: "Schema/applyTo"
    parameterMap: '{"schema":"numbered-list","entity_id":"context.focusedBlockId"}'
    executionPolicy: "auto"
    slash_command: false
    toolbar_command: false

  # indent: moves the focused block one level deeper in the Outline hierarchy
  # via Outline/indent. Reachable from the Tab key in list block widgets and
  # from the inline-toolbar indent button.
  - name: indent
    binding: indent
    target: "Outline/indent"
    parameterMap: '{"node":"context.focusedBlockId"}'
    executionPolicy: "auto"
    toolbar_command: true
    section: "List"
    label: "Indent"
    icon: "indent"

  # outdent: moves the focused block one level up in the Outline hierarchy
  # via Outline/outdent. Reachable from the Shift+Tab key in list block widgets
  # and from the inline-toolbar outdent button.
  - name: outdent
    binding: outdent
    target: "Outline/outdent"
    parameterMap: '{"node":"context.focusedBlockId"}'
    executionPolicy: "auto"
    toolbar_command: true
    section: "List"
    label: "Outdent"
    icon: "outdent"

  # convert-to-paragraph: applies the paragraph schema to the focused block,
  # converting a list item back to a plain paragraph block. Triggered by
  # Backspace at the start of an empty list item.
  - name: convert-to-paragraph
    binding: convert-to-paragraph
    target: "Schema/applyTo"
    parameterMap: '{"schema":"paragraph","entity_id":"context.focusedBlockId"}'
    executionPolicy: "auto"
    slash_command: false
    toolbar_command: false

  # --- Additional inline mark toggle actions (MAG-729) ---
  # API gap note: Same InlineMark gap as bold/italic/code (MAG-718). These
  # bindings use "InlineMark/toggleMark" as a placeholder matching the expected
  # future API shape. They will resolve once the InlineMark concept is available.
  - name: strikethrough-toggle
    binding: strikethrough-toggle
    target: "InlineMark/toggleMark"
    parameterMap: '{"markKind":"strikethrough","selection":"context.selection"}'
    executionPolicy: "auto"
    toolbar_command: true
    keyboard: "Ctrl+Shift+X"
    section: "Format"
    label: "Strikethrough"
    icon: "strikethrough"

  - name: subscript-toggle
    binding: subscript-toggle
    target: "InlineMark/toggleMark"
    parameterMap: '{"markKind":"subscript","selection":"context.selection"}'
    executionPolicy: "auto"
    toolbar_command: false
    keyboard: "Ctrl+Shift+-"
    section: "Format"
    label: "Subscript"
    icon: "subscript"

  - name: superscript-toggle
    binding: superscript-toggle
    target: "InlineMark/toggleMark"
    parameterMap: '{"markKind":"superscript","selection":"context.selection"}'
    executionPolicy: "auto"
    toolbar_command: false
    keyboard: "Ctrl+Shift+="
    section: "Format"
    label: "Superscript"
    icon: "superscript"

  # --- View-embed block actions (MAG-731) ---
  # view-embed-configure: opens the config panel inside view-embed-block to let
  # the author pick a different ViewShell and edit filter overrides.
  # API gap note: ViewEmbedBlock/configure is an anticipated surface action; a
  # follow-up card should introduce that concept. For now references the synthetic
  # action shape.
  - name: view-embed-configure
    binding: view-embed-configure
    target: "ViewEmbedBlock/configure"
    parameterMap: '{"blockId":"context.blockId"}'
    executionPolicy: "auto"
    toolbar_command: true
    context_menu: false
    section: "View"
    label: "Configure"
    icon: "settings"

  # view-embed-open-source: navigates to the source ViewShell's canonical page.
  # Available via context menu and the toolbar on a focused view-embed-block.
  # API gap note: Navigator/navigate is the expected target; same gap noted for
  # entity-follow. The parameterMap carries the viewShellRef from context.
  - name: view-embed-open-source
    binding: view-embed-open-source
    target: "Navigator/navigate"
    parameterMap: '{"destination":"view-shell-detail","params":{"id":"context.viewShellRef"}}'
    executionPolicy: "auto"
    toolbar_command: false
    context_menu: true
    label: "Open source view"
    icon: "arrow-up-right"

  # view-embed-refresh: re-invokes ViewShell/refresh on the embedded ViewShell,
  # causing the widget to re-resolve and re-mount the view with fresh data.
  # API gap note: ViewShell/refresh does not currently exist in the ViewShell
  # concept spec (specs/view/). A follow-up card should add that action. The
  # binding is registered now so the command slot is reserved.
  - name: view-embed-refresh
    binding: view-embed-refresh
    target: "ViewShell/refresh"
    parameterMap: '{"shell":"context.viewShellRef"}'
    executionPolicy: "auto"
    toolbar_command: true
    context_menu: false
    section: "View"
    label: "Refresh"
    icon: "refresh-cw"

  # --- Drop file upload action (MAG-733) ---
  # Dispatched by the drop-file-generic InputRule when a file is dropped onto the
  # block editor. context.droppedFile carries the raw File reference from the drop
  # event. source:"local-fs" is set so the drop-file-to-block.sync trigger pattern
  # (source = "local-fs") fires after createMedia completes -> ok.
  # After MediaAsset/createMedia completes -> ok, the drop-file-to-block.sync fires
  # and inserts a new Outline child referencing the created asset.
  # Context-threading gap: the drop position (parent / sibling) is not forwarded
  # through createMedia. The sync therefore appends rather than inserts at the exact
  # drop coordinates. A follow-up card should thread drop context.
  - name: media-upload-from-drop
    binding: media-upload-from-drop
    target: "MediaAsset/createMedia"
    parameterMap: '{"asset":"uuid()","source":"local-fs","file":"context.droppedFile"}'
    executionPolicy: "auto"
    slash_command: false
    toolbar_command: false
