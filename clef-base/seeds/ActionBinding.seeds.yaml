  # --- Comment actions (MAG-738) ---
  # comment-add-to-block: adds a comment anchored to the focused block.
  # Available via context menu and keyboard shortcut on any block whose
  # schema has isCommentable=true. blockId comes from the host EditSurface
  # context. API gap note: Comment/addComment is anticipated; if the concept
  # exposes addComment with (entity, body, author) the parameterMap should
  # match. Update target when the action name is confirmed from the Comment
  # concept spec.
  - name: comment-add-to-block
    binding: comment-add-to-block
    target: "Comment/addComment"
    parameterMap: '{"entity":"context.blockId","author":"context.currentUserId"}'
    executionPolicy: "pessimistic"
    slash_command: false
    toolbar_command: false
    context_menu: true
    keyboard: "Ctrl+Alt+M"
    section: "Comment"
    label: "Add comment"
    icon: "comment"

  # comment-add-to-selection: adds an inline annotation comment to the active
  # text selection. Only visible when the focused schema has commentScope in
  # [inline, both]. Creates an InlineAnnotation first, then binds the new
  # comment to that annotation's id. Two-step action; both targets are noted;
  # a follow-up sync wires InlineAnnotation/create -> Comment/addComment.
  # API gap note: InlineAnnotation/create is anticipated from the
  # InlineAnnotation concept spec shipped in commit a4585cc1.
  - name: comment-add-to-selection
    binding: comment-add-to-selection
    target: "InlineAnnotation/create"
    parameterMap: '{"kind":"comment","rangeStart":"context.selectionStart","rangeEnd":"context.selectionEnd","blockId":"context.blockId"}'
    executionPolicy: "pessimistic"
    slash_command: false
    toolbar_command: true
    visibleWhen: "context.schema.commentScope in ['inline','both']"
    section: "Comment"
    label: "Comment on selection"
    icon: "comment-text"

  # comment-resolve: marks the focused comment thread resolved.
  # API gap note: Comment/resolve is anticipated; if the concept instead
  # exposes Comment/publish with resolved=true adjust target accordingly.
  # A gap note is intentionally left here for the concept author to confirm.
  - name: comment-resolve
    binding: comment-resolve
    target: "Comment/resolve"
    parameterMap: '{"comment":"context.threadId","actor":"context.currentUserId"}'
    executionPolicy: "pessimistic"
    slash_command: false
    toolbar_command: false
    context_menu: true
    section: "Comment"
    label: "Resolve"
    icon: "check-circle"

  # comment-reply: opens the reply input in the comments-panel for the focused
  # thread. Triggers START_REPLY FSM event on the comments-panel widget.
  # API gap note: Comment/reply is anticipated; update target once confirmed.
  - name: comment-reply
    binding: comment-reply
    target: "Comment/reply"
    parameterMap: '{"comment":"context.threadId","body":"context.replyBody","author":"context.currentUserId"}'
    executionPolicy: "pessimistic"
    slash_command: false
    toolbar_command: false
    context_menu: true
    section: "Comment"
    label: "Reply"
    icon: "reply"

  # --- AI slash-command actions (MAG-749) ---
  # Five AI editing commands available in the slash menu only (slash_command: true,
  # toolbar_command: false). Each spawns an AgentSession with the corresponding
  # built-in persona and the current selection as context. The selection toolbar
  # covers formatting; AI operations are intentionally restricted to the slash menu.

  # ai-summarize-selection: compresses the selected content into 2-3 sentences.
  # Persona: persona:summarize (ContentNode.agent-persona.seeds.yaml).
  - name: ai-summarize-selection
    binding: ai-summarize-selection
    target: "AgentSession/spawn"
    parameterMap: '{"personaPageId":"persona:summarize","strategy":"react","tools":"[]","context":"${context.selection}"}'
    executionPolicy: "auto"
    slash_command: true
    toolbar_command: false
    context_menu: false
    section: "AI"
    label: "AI: summarize selection"
    icon: "sparkles"

  # ai-translate-selection: translates selection to target language (prompted).
  # Persona: persona:translate. The target language is collected via a context
  # parameter prompt before spawning; parameterMap forwards it as context.language.
  - name: ai-translate-selection
    binding: ai-translate-selection
    target: "AgentSession/spawn"
    parameterMap: '{"personaPageId":"persona:translate","strategy":"react","tools":"[]","context":"${context.selection}","language":"${context.language}"}'
    executionPolicy: "pessimistic"
    slash_command: true
    toolbar_command: false
    context_menu: false
    section: "AI"
    label: "AI: translate selection"
    icon: "languages"

  # ai-rewrite-selection: rewrites selection in a chosen style (formal/casual/concise/friendly).
  # Persona: persona:rewrite. The style is collected via a context parameter prompt
  # before spawning; parameterMap forwards it as context.style.
  - name: ai-rewrite-selection
    binding: ai-rewrite-selection
    target: "AgentSession/spawn"
    parameterMap: '{"personaPageId":"persona:rewrite","strategy":"react","tools":"[]","context":"${context.selection}","style":"${context.style}"}'
    executionPolicy: "pessimistic"
    slash_command: true
    toolbar_command: false
    context_menu: false
    section: "AI"
    label: "AI: rewrite selection"
    icon: "pencil"

  # ai-explain-selection: explains the selection in plain language.
  # Persona: persona:explain. No additional context parameters required.
  - name: ai-explain-selection
    binding: ai-explain-selection
    target: "AgentSession/spawn"
    parameterMap: '{"personaPageId":"persona:explain","strategy":"react","tools":"[]","context":"${context.selection}"}'
    executionPolicy: "auto"
    slash_command: true
    toolbar_command: false
    context_menu: false
    section: "AI"
    label: "AI: explain selection"
    icon: "info"

  # ai-expand-selection: lengthens short or telegraphic text into full prose.
  # Persona: persona:expand. No additional context parameters required.
  - name: ai-expand-selection
    binding: ai-expand-selection
    target: "AgentSession/spawn"
    parameterMap: '{"personaPageId":"persona:expand","strategy":"react","tools":"[]","context":"${context.selection}"}'
    executionPolicy: "auto"
    slash_command: true
    toolbar_command: false
    context_menu: false
    section: "AI"
    label: "AI: expand selection"
    icon: "expand"

  # --- Template insertion slash command (MAG-749) ---
  # template-insert: opens template-picker.widget as a tool-plane modal. On picker
  # confirm, the expanded template text is inserted at the cursor via Template/expand.
  # The picker passes the filled variable map as context.variables and the selected
  # template id as context.templateId before firing the onComplete binding
  # (template-expand-confirmed, already seeded above in MAG-732 section).
  # API gap note: TemplatePicker/open is an anticipated surface action that mounts
  # the template-picker.widget. A follow-up card should introduce that concept.
  - name: template-insert
    binding: template-insert
    target: "TemplatePicker/open"
    parameterMap: '{"widget":"template-picker","onComplete":"template-expand-confirmed","context":"context.focusedBlockId"}'
    executionPolicy: "auto"
    slash_command: true
    toolbar_command: false
    context_menu: false
    section: "Advanced"
    label: "Insert template"
    icon: "layout-template"
