# ComponentMapping seeds — pin every block schema's "block-subtree"
# display mode to the block-subtree-view widget.
#
# The block-subtree widget renders a live recursive subtree rooted at
# the bound ContentNode: the node itself in its original schema's
# display mode, each descendant as a nested BlockSlot, a per-parent
# view-settings gear anywhere hasChildren is true.
#
# Used by the RecursiveBlockEditor's nested view shells (outline /
# list / gallery / board / table) so every "card", "row", or "item"
# renders recursively instead of as a summary string.

concept: ComponentMapping
action: create
entries:
  - id: paragraph-block-subtree
    name: paragraph-block-subtree
    widget_id: block-subtree-view
    schema: paragraph
    display_mode: block-subtree

