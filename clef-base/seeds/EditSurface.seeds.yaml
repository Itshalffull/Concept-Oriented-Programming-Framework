# EditSurface seeds — block-type editor surface registrations.
# Each entry declares the editing surface for a given (schema, context) pair,
# wiring toolbar widget, command bindings, input rules, and panel widgets.

concept: EditSurface
action: register
entries:
  # Paragraph block editor surface
  # Toolbar: inline-toolbar (shared mark toolbar)
  # Command bindings: bold-toggle, italic-toggle, code-toggle (seeded in P1.10)
  # Input rules: markdown-heading-2 (seeded in P1.12)
  - id: paragraph-block-editor
    schema_ref: paragraph
    context: block-editor
    toolbar_widget: inline-toolbar
    command_bindings:
      - bold-toggle
      - italic-toggle
      - code-toggle
    panel_widgets: []
    context_menu_bindings: []
    input_rule_refs:
      - markdown-heading-2
    picker_refs: []
    compile_action_ref: null
    compile_bundle_ref: null
    compile_status_field: null

  # Heading block editor surface
  # Toolbar: inline-toolbar (shared mark toolbar)
  # Command bindings: bold/italic/code mark toggles, heading-level-picker, link-toggle
  # Input rules: markdown-heading-2 seeded in P1.12; heading-1/3/4/5/6 are anticipatory
  # Panel widgets: anchor-link-panel is anticipatory (ships in Phase 2/3)
  - id: heading-block-editor
    schema_ref: heading
    context: block-editor
    toolbar_widget: inline-toolbar
    command_bindings:
      - bold-toggle
      - italic-toggle
      - code-toggle
      - heading-level-picker
      - link-toggle
    panel_widgets:
      - anchor-link-panel
    context_menu_bindings: []
    input_rule_refs:
      - markdown-heading-1
      - markdown-heading-2
      - markdown-heading-3
      - markdown-heading-4
      - markdown-heading-5
      - markdown-heading-6
    picker_refs: []
    compile_action_ref: null
    compile_bundle_ref: null
    compile_status_field: null

  # Entity-embed block editor surface (MAG-730)
  # Toolbar: inline-toolbar (shared mark toolbar)
  # Bindings: entity-follow (Enter/double-click), entity-display-mode-switch (toolbar),
  #           entity-remove (context menu).
  # Panel widgets: entity-metadata-panel is anticipatory — ships when the
  #   entity detail side-panel concept is available.
  - id: entity-embed-block-editor
    schema_ref: entity-embed
    context: block-editor
    toolbar_widget: inline-toolbar
    command_bindings:
      - entity-follow
      - entity-display-mode-switch
      - entity-remove
    panel_widgets:
      - entity-metadata-panel
    context_menu_bindings:
      - entity-remove
    input_rule_refs: []
    picker_refs: []
    compile_action_ref: null
    compile_bundle_ref: null
    compile_status_field: null

  # Quote block editor surface (MAG-726)
  # Toolbar: inline-toolbar (shared mark toolbar)
  # Input rules: markdown-quote seeded below
  - id: quote-block-editor
    schema_ref: quote
    context: block-editor
    toolbar_widget: inline-toolbar
    command_bindings:
      - bold-toggle
      - italic-toggle
    panel_widgets: []
    context_menu_bindings: []
    input_rule_refs:
      - markdown-quote
    picker_refs: []
    compile_action_ref: null
    compile_bundle_ref: null
    compile_status_field: null

  # Divider block editor surface (MAG-726)
  # No toolbar, no bindings, no panels — purely decorative non-editable block.
  - id: divider-block-editor
    schema_ref: divider
    context: block-editor
    toolbar_widget: null
    command_bindings: []
    panel_widgets: []
    context_menu_bindings: []
    input_rule_refs:
      - markdown-divider
    picker_refs: []
    compile_action_ref: null
    compile_bundle_ref: null
    compile_status_field: null

  # Toggle block editor surface (MAG-726)
  # Toolbar: inline-toolbar for summary inline marks.
  # Action bindings: toggle-disclosure-expand + toggle-disclosure-collapse.
  - id: toggle-block-editor
    schema_ref: toggle
    context: block-editor
    toolbar_widget: inline-toolbar
    command_bindings:
      - toggle-disclosure-expand
      - toggle-disclosure-collapse
    panel_widgets: []
    context_menu_bindings: []
    input_rule_refs: []
    picker_refs: []
    compile_action_ref: null
    compile_bundle_ref: null
    compile_status_field: null

  # Bullet-list block editor surface (MAG-725)
  # Toolbar: inline-toolbar (shared mark toolbar)
  # Command bindings: bold-toggle, italic-toggle, code-toggle, indent, outdent, convert-to-paragraph
  # Input rules: markdown-bullet
  - id: bullet-list-block-editor
    schema_ref: bullet-list
    context: block-editor
    toolbar_widget: inline-toolbar
    command_bindings:
      - bold-toggle
      - italic-toggle
      - code-toggle
      - indent
      - outdent
      - convert-to-paragraph
    panel_widgets: []
    context_menu_bindings: []
    input_rule_refs:
      - markdown-bullet
    picker_refs: []
    compile_action_ref: null
    compile_bundle_ref: null
    compile_status_field: null

  # Numbered-list block editor surface (MAG-725)
  # Toolbar: inline-toolbar (shared mark toolbar)
  # Command bindings: bold-toggle, italic-toggle, code-toggle, indent, outdent, convert-to-paragraph
  # Input rules: markdown-numbered
  - id: numbered-list-block-editor
    schema_ref: numbered-list
    context: block-editor
    toolbar_widget: inline-toolbar
    command_bindings:
      - bold-toggle
      - italic-toggle
      - code-toggle
      - indent
      - outdent
      - convert-to-paragraph
    panel_widgets: []
    context_menu_bindings: []
    input_rule_refs:
      - markdown-numbered
    picker_refs: []
    compile_action_ref: null
    compile_bundle_ref: null
    compile_status_field: null

  # Agent-persona page-level editor surface (MAG-723)
  # Proves ContentCompiler integration end-to-end: compile_action_ref +
  # status_decoration_ref + output_preview_ref + consumers_panel_ref.
  # backlinks-panel (MAG-741) is included in panel_widgets to show all
  # ContentNodes that reference this persona via the Reference/Backlink graph.
  # PP-default-panels adds outline-panel for body structure navigation.
  - id: agent-persona-page-editor
    schema_ref: agent-persona
    context: page-level
    toolbar_widget: persona-compile-toolbar
    command_bindings:
      - persona-compile
      - persona-recompile
      - persona-duplicate
    panel_widgets:
      - outline-panel
      - prompt-assembly-preview
      - persona-consumers-panel
      - backlinks-panel
    context_menu_bindings: []
    input_rule_refs: []
    picker_refs: []
    compile_action_ref: persona-recompile
    compile_bundle_ref: null
    compile_status_field: null
    status_decoration_ref: persona-status-badge
    output_preview_ref: prompt-assembly-preview
    consumers_panel_ref: persona-consumers-panel

  # Workflow page-level editor surface (MAG-747)
  # Formalises the FlowBuilderView (MAG-689) as a declarative EditSurface seed.
  # compile_action_ref: workflow-compile triggers ContentCompiler/compile(schemaHint:"workflow").
  # status_decoration_ref: persona-status-badge is reused as the generic compile-status
  #   decoration until a dedicated compile-status-badge widget is created (follow-up card).
  # output_preview_ref: flowchart-editor embeds the MAG-689 FlowchartEditor widget as an
  #   inline graph preview when the surface is rendered at page-level.
  # consumers_panel_ref: backlinks-panel (MAG-741) filtered to "runs-spec" relation kind
  #   surfaces ProcessRuns that reference this workflow's compiled ProcessSpec.
  # PP-default-panels adds outline-panel for body structure navigation.
  - id: workflow-page-editor
    schema_ref: workflow
    context: page-level
    toolbar_widget: inline-toolbar
    command_bindings:
      - workflow-compile
      - workflow-start-run
    panel_widgets:
      - outline-panel
      - flowchart-editor
      - backlinks-panel
    context_menu_bindings: []
    input_rule_refs: []
    picker_refs: []
    compile_action_ref: workflow-compile
    compile_bundle_ref: null
    compile_status_field: null
    status_decoration_ref: persona-status-badge
    output_preview_ref: flowchart-editor
    consumers_panel_ref: backlinks-panel

  # Markdown article page-level editor surface (PP-default-panels)
  # Generic MarkdownEditor surface for Article-schema content nodes.
  # panel_widgets defaults: outline-panel (document structure) +
  #   comments-panel (inline annotation threads).
  - id: article-page-editor
    schema_ref: article
    context: page-level
    toolbar_widget: inline-toolbar
    command_bindings: []
    panel_widgets:
      - outline-panel
      - comments-panel
    context_menu_bindings: []
    input_rule_refs: []
    picker_refs: []
    compile_action_ref: null
    compile_bundle_ref: null
    compile_status_field: null

  # Generic wiki-page page-level editor surface (MAG-741)
  # Any content page authored as a wiki page gets a backlinks panel
  # showing all other pages that link to it via wikilink, mention, or embed.
  # PP-default-panels adds outline-panel (document structure) and
  # comments-panel (inline annotation threads) to the default right-rail.
  - id: wiki-page-editor
    schema_ref: wiki-page
    context: page-level
    toolbar_widget: inline-toolbar
    command_bindings: []
    panel_widgets:
      - outline-panel
      - backlinks-panel
      - comments-panel
    context_menu_bindings: []
    input_rule_refs: []
    picker_refs: []
    compile_action_ref: null
    compile_bundle_ref: null
    compile_status_field: null

  # Filter-draft page-level editor surface (MAG-748)
  # Toolbar: inline-toolbar (shared mark toolbar) + compile-status-badge
  # Command bindings: filter-draft-compile (invoke ContentCompiler/compile),
  #   filter-draft-install (register compiled FilterNode as a FilterSpec and
  #   apply it to the target ViewShell via ViewShell/update).
  # Panel widgets: filter-preview (output_preview_ref, renders compiled
  #   FilterNode as read-only pill chain), backlinks-panel filtered to
  #   Reference kind="uses-filter" (consumers_panel_ref, lists views that
  #   have installed this draft as their active filter).
  # Block schemas: predicate-group, predicate, operator-value (seed-only;
  #   registered by filter-draft-block-schemas-registered.sync).
  # PP-default-panels adds outline-panel for body structure navigation.
  - id: filter-draft-page-editor
    schema_ref: filter-draft
    context: page-level
    toolbar_widget: inline-toolbar
    command_bindings:
      - filter-draft-compile
      - filter-draft-install
    panel_widgets:
      - outline-panel
      - filter-preview
      - backlinks-panel
    context_menu_bindings: []
    input_rule_refs: []
    picker_refs: []
    compile_action_ref: filter-draft-compile
    compile_bundle_ref: null
    compile_status_field: null
    output_preview_ref: filter-preview
    consumers_panel_ref: backlinks-panel

  # View-embed block editor surface (MAG-731)
  # Toolbar: inline-toolbar (shared mark toolbar)
  # Command bindings: view-embed-configure (pick ViewShell + filter overrides),
  #   view-embed-open-source (navigate to the source ViewShell's canonical page),
  #   view-embed-refresh (invoke ViewShell/refresh).
  # Panel widgets: view-embed-filter-override-panel is anticipatory -- ships when
  #   a dedicated filter-override editing panel concept is available.
  - id: view-embed-block-editor
    schema_ref: view-embed
    context: block-editor
    toolbar_widget: inline-toolbar
    command_bindings:
      - view-embed-configure
      - view-embed-open-source
      - view-embed-refresh
    panel_widgets:
      - view-embed-filter-override-panel
    context_menu_bindings:
      - view-embed-open-source
    input_rule_refs: []
    picker_refs: []
    compile_action_ref: null
    compile_bundle_ref: null
    compile_status_field: null

  # Video block editor surface (MAG-750)
  # Widget: video-block. Plays YouTube, Vimeo, local-fs, and S3 assets.
  # Command bindings: video-create-clip (create Clip at current playhead),
  #   video-seek-to-cue (jump playhead to a cue-point timestamp),
  #   video-toggle-captions (toggle caption track visibility),
  #   video-replace (replace the referenced MediaAsset with a new pick).
  # Picker refs: media-picker (select replacement video asset).
  # input_rule_refs intentionally empty -- video blocks have no inline markdown scope.
  - id: video-block-editor
    schema_ref: video-asset
    context: block-editor
    toolbar_widget: inline-toolbar
    command_bindings:
      - video-create-clip
      - video-seek-to-cue
      - video-toggle-captions
      - video-replace
    panel_widgets: []
    context_menu_bindings:
      - video-replace
    input_rule_refs: []
    picker_refs:
      - media-picker
    compile_action_ref: null
    compile_bundle_ref: null
    compile_status_field: null

  # Code block editor surface (MAG-727)
  # Literal block scope: input_rule_refs is intentionally empty because
  # all markdown shortcuts and snippet triggers are suppressed inside code blocks.
  # Panel widgets: code-syntax-error-panel is anticipatory -- ships with the
  # language-server integration in a later card.
  # Language picker (code-language-picker) invokes language-picker.widget which
  # also ships later; the binding is registered now so the command slot is reserved.
  - id: code-block-editor
    schema_ref: code
    context: block-editor
    toolbar_widget: inline-toolbar
    command_bindings:
      - code-language-picker
      - code-format
      - code-copy
      - code-toggle-line-numbers
    panel_widgets:
      - code-syntax-error-panel
    context_menu_bindings: []
    input_rule_refs: []
    picker_refs: []
    compile_action_ref: null
    compile_bundle_ref: null
    compile_status_field: null

  # Table block editor surface (MAG-735)
  # Toolbar: inline-toolbar for cell-level inline marks.
  # Command bindings: full row/column CRUD plus sort and header toggle.
  # Context menu bindings: insert/delete row, insert/delete column, sort, toggle header.
  # input_rule_refs intentionally empty -- table cells have their own block-slot scopes.
  - id: table-block-editor
    schema_ref: table
    context: block-editor
    toolbar_widget: inline-toolbar
    command_bindings:
      - table-insert-row-above
      - table-insert-row-below
      - table-insert-column-left
      - table-insert-column-right
      - table-delete-row
      - table-delete-column
      - table-sort-column
      - table-toggle-header
    panel_widgets: []
    context_menu_bindings:
      - table-insert-row-above
      - table-insert-row-below
      - table-insert-column-left
      - table-insert-column-right
      - table-delete-row
      - table-delete-column
      - table-sort-column
      - table-toggle-header
    input_rule_refs: []
    picker_refs: []
    compile_action_ref: null
    compile_bundle_ref: null
    compile_status_field: null

  # Columns block editor surface (MAG-736)
  # Toolbar: inline-toolbar (shared mark toolbar)
  # Command bindings: columns-add (insert a new column), columns-remove (delete
  #   the focused column), columns-reorder (drag-to-reorder), columns-set-widths
  #   (set pixel/percent widths via number inputs), columns-toggle-stack-on-narrow
  #   (toggle responsive stacking).
  # NOTE: columns-add and columns-remove have no resolved concept target yet
  #   (Columns concept not created as of MAG-736). ActionBinding targets are
  #   placeholder strings pending MAG-<TBD>.
  # Panel widgets: columns-layout-panel is anticipatory -- ships when the
  #   columns layout settings side-panel concept is available.
  # input_rule_refs intentionally empty -- column cells have their own block-slot scopes.
  - id: columns-block-editor
    schema_ref: columns
    context: block-editor
    toolbar_widget: inline-toolbar
    command_bindings:
      - columns-add
      - columns-remove
      - columns-reorder
      - columns-set-widths
      - columns-toggle-stack-on-narrow
    panel_widgets:
      - columns-layout-panel
    context_menu_bindings:
      - columns-add
      - columns-remove
    input_rule_refs: []
    picker_refs: []
    compile_action_ref: null
    compile_bundle_ref: null
    compile_status_field: null

  # Callout block editor surface (MAG-756)
  # Toolbar: inline-toolbar (shared mark toolbar) for inline marks inside callout prose.
  # Command bindings: callout-variant-picker (select info/warning/danger/success/accent),
  #   callout-dismiss (remove the callout block from the stream).
  # Input rules: markdown-callout is anticipatory -- no markdown shortcut for callout
  #   exists yet; the entry is reserved for a future /!note or /!warn shortcut.
  - id: callout-block-editor
    schema_ref: callout
    context: block-editor
    toolbar_widget: inline-toolbar
    command_bindings:
      - callout-variant-picker
      - callout-dismiss
    panel_widgets: []
    context_menu_bindings:
      - callout-variant-picker
      - callout-dismiss
    input_rule_refs: []
    picker_refs: []
    compile_action_ref: null
    compile_bundle_ref: null
    compile_status_field: null

  # Block-embed block editor surface (MAG-756)
  # Non-editable embed of a specific block from another ContentNode.
  # Command bindings: block-embed-navigate (Enter to open source context),
  #   block-embed-refresh (reload resolved block content),
  #   block-embed-remove (delete the embed block).
  # Picker refs: entity-picker (re-link block to a different source).
  # input_rule_refs intentionally empty -- block-embed blocks are not editable.
  - id: block-embed-block-editor
    schema_ref: block-embed
    context: block-editor
    toolbar_widget: inline-toolbar
    command_bindings:
      - block-embed-navigate
      - block-embed-refresh
      - block-embed-remove
    panel_widgets: []
    context_menu_bindings:
      - block-embed-navigate
      - block-embed-remove
    input_rule_refs: []
    picker_refs:
      - entity-picker
    compile_action_ref: null
    compile_bundle_ref: null
    compile_status_field: null

  # Snippet-embed block editor surface (MAG-756)
  # Non-editable embed of a TextSpan excerpt from another ContentNode.
  # Command bindings: snippet-embed-view-in-context (navigate to source entity
  #   anchored at the span), snippet-embed-refresh (re-resolve span anchor text),
  #   snippet-embed-remove (delete the snippet block).
  # input_rule_refs intentionally empty -- snippet-embed blocks are not editable.
  - id: snippet-embed-block-editor
    schema_ref: snippet-embed
    context: block-editor
    toolbar_widget: inline-toolbar
    command_bindings:
      - snippet-embed-view-in-context
      - snippet-embed-refresh
      - snippet-embed-remove
    panel_widgets: []
    context_menu_bindings:
      - snippet-embed-view-in-context
      - snippet-embed-remove
    input_rule_refs: []
    picker_refs: []
    compile_action_ref: null
    compile_bundle_ref: null
    compile_status_field: null

  # Control block editor surface (MAG-756)
  # Inline action button block that invokes a concept action from the kernel.
  # Command bindings: control-invoke (trigger the configured action),
  #   control-configure (open the config panel to edit label/concept/action/variant),
  #   control-remove (delete the control block from the stream).
  # Panel widgets: control-action-picker is anticipatory -- ships when an
  #   autocomplete picker for concept/action pairs is available.
  # input_rule_refs intentionally empty -- control blocks are not editable content.
  - id: control-block-editor
    schema_ref: control
    context: block-editor
    toolbar_widget: inline-toolbar
    command_bindings:
      - control-invoke
      - control-configure
      - control-remove
    panel_widgets:
      - control-action-picker
    context_menu_bindings:
      - control-configure
      - control-remove
    input_rule_refs: []
    picker_refs: []
    compile_action_ref: null
    compile_bundle_ref: null
    compile_status_field: null
