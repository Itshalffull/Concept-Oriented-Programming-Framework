# ComponentMapping seeds for block editor block types.
# Each entry registers a (schema x display_mode) -> widget_id mapping for the
# block editor so that the ComponentMapping resolver can look up the correct
# widget when rendering a block of a given schema type.
#
# insertable: true means the block type appears in the slash-menu / block picker.
# section: menu section label in the block inserter.
# icon: icon token for the block picker entry.
# label: human-readable label for the block picker entry.

concept: ComponentMapping
action: create
entries:
  # Heading block -- renders h1-h6 heading content with level selector
  - id: heading-block-mapping
    name: heading-block-mapping
    widget_id: heading-block
    schema: heading
    display_mode: block-editor
    insertable: true
    section: "Basic"
    icon: "heading"
    label: "Heading"

  # Entity reference embed -- resolves a ContentNode id and renders it as
  # a card, compact badge, or full preview inline in the block stream.
  - id: entity-embed-mapping
    name: entity-embed-mapping
    widget_id: entity-embed-block
    schema: entity-embed
    display_mode: block-editor
    insertable: true
    section: "Embeds"
    icon: "link-external"
    label: "Entity reference"

  # Quote block -- blockquote with border-start accent and optional citation (MAG-726)
  - id: quote-block-mapping
    name: quote-block-mapping
    widget_id: quote-block
    schema: quote
    display_mode: block-editor
    insertable: true
    section: "Basic"
    icon: "quote"
    label: "Quote"

  # Divider block -- horizontal rule separator (MAG-726)
  - id: divider-block-mapping
    name: divider-block-mapping
    widget_id: divider-block
    schema: divider
    display_mode: block-editor
    insertable: true
    section: "Basic"
    icon: "minus"
    label: "Divider"

  # Toggle block -- collapsible disclosure block with nested children (MAG-726)
  - id: toggle-block-mapping
    name: toggle-block-mapping
    widget_id: toggle-block
    schema: toggle
    display_mode: block-editor
    insertable: true
    section: "Basic"
    icon: "chevron-right"
    label: "Toggle"

  # Code block -- multi-line literal code editor with syntax highlighting,
  # optional line numbers, and a language badge. InputRules are disabled
  # inside this block (literal block scope). (MAG-727)
  - id: code-block-mapping
    name: code-block-mapping
    widget_id: code-block
    schema: code
    display_mode: block-editor
    insertable: true
    section: "Advanced"
    icon: "code"
    label: "Code"

  # Bullet list block -- unordered list item with level-driven glyph cycle (MAG-725)
  - id: bullet-list-mapping
    name: bullet-list-mapping
    widget_id: bullet-list-block
    schema: bullet-list
    display_mode: block-editor
    insertable: true
    section: "Basic"
    icon: "list-bullet"
    label: "Bulleted list"

  # Numbered list block -- ordered list item with level-driven ordinal format (MAG-725)
  - id: numbered-list-mapping
    name: numbered-list-mapping
    widget_id: numbered-list-block
    schema: numbered-list
    display_mode: block-editor
    insertable: true
    section: "Basic"
    icon: "list-ordered"
    label: "Numbered list"

  # View embed block -- mounts a live ViewShell (table/board/calendar) inline in
  # the block stream. filterOverrides merge with the ViewShell's FilterSpec at
  # render time. (MAG-731)
  - id: view-embed-mapping
    name: view-embed-mapping
    widget_id: view-embed-block
    schema: view-embed
    display_mode: block-editor
    insertable: true
    section: "Embeds"
    icon: "table"
    label: "Embedded view"

  # Table block -- inline editable data grid where each cell hosts a child
  # ContentNode rendered via block-slot. Supports row/column insert/delete,
  # column sorting, and optional header row. (MAG-735)
  - id: table-block-mapping
    name: table-block-mapping
    widget_id: table-block
    schema: table
    display_mode: block-editor
    insertable: true
    section: "Advanced"
    icon: "table"
    label: "Table"

  # Columns block -- multi-column layout block with resizable dividers and
  # recursive ViewShell per column. Responsive: stacks vertically on narrow
  # viewports when stackOnNarrow is true. (MAG-736)
  - id: columns-mapping
    name: columns-mapping
    widget_id: columns-block
    schema: columns
    display_mode: block-editor
    insertable: true
    section: "Advanced"
    icon: "columns"
    label: "Columns"

  # Paragraph block -- default rich-text block; the entry point for all typed
  # content and slash-command invocations. (MAG-756)
  - id: paragraph-block-mapping
    name: paragraph-block-mapping
    widget_id: paragraph-block
    schema: paragraph
    display_mode: block-editor
    insertable: true
    section: "Basic"
    icon: "text"
    label: "Text"

  # Callout block -- themed alert box driven by paletteRole (info/warning/danger/
  # success/accent). SurfaceContract + paletteRole pattern. (MAG-756)
  - id: callout-block-mapping
    name: callout-block-mapping
    widget_id: callout-block
    schema: callout
    display_mode: block-editor
    insertable: true
    section: "Basic"
    icon: "callout"
    label: "Callout"

  # Block-embed block -- embeds a specific block from another ContentNode by
  # (entityId, blockId) pair with VersionPin freshness decoration. (MAG-756)
  - id: block-embed-mapping
    name: block-embed-mapping
    widget_id: block-embed-block
    schema: block-embed
    display_mode: block-editor
    insertable: true
    section: "Embeds"
    icon: "block-ref"
    label: "Block reference"

  # Snippet-embed block -- embeds a TextSpan excerpt from another ContentNode
  # with live/stale/broken span-status decoration. (MAG-756)
  - id: snippet-embed-mapping
    name: snippet-embed-mapping
    widget_id: snippet-embed-block
    schema: snippet-embed
    display_mode: block-editor
    insertable: true
    section: "Embeds"
    icon: "quote-ref"
    label: "Text snippet"

  # Control block -- inline action button that invokes a configured concept action
  # from the kernel with loading/success/error feedback. (MAG-756)
  - id: control-block-mapping
    name: control-block-mapping
    widget_id: control-block
    schema: control
    display_mode: block-editor
    insertable: true
    section: "Advanced"
    icon: "button"
    label: "Action button"
