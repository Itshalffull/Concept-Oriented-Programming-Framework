# ComponentMapping seeds for block editor block types.
# Each entry registers a (schema x display_mode) -> widget_id mapping for the
# block editor so that the ComponentMapping resolver can look up the correct
# widget when rendering a block of a given schema type.
#
# insertable: true means the block type appears in the slash-menu / block picker.
# section: menu section label in the block inserter.
# icon: icon token for the block picker entry.
# label: human-readable label for the block picker entry.

concept: ComponentMapping
action: create
entries:
  # Heading block -- renders h1-h6 heading content with level selector
  - id: heading-block-mapping
    name: heading-block-mapping
    widget_id: heading-block
    schema: heading
    display_mode: block-editor
    insertable: true
    section: "Basic"
    icon: "heading"
    label: "Heading"

  # Entity reference embed -- resolves a ContentNode id and renders it as
  # a card, compact badge, or full preview inline in the block stream.
  - id: entity-embed-mapping
    name: entity-embed-mapping
    widget_id: entity-embed-block
    schema: entity-embed
    display_mode: block-editor
    insertable: true
    section: "Embeds"
    icon: "link-external"
    label: "Entity reference"

  # Quote block -- blockquote with border-start accent and optional citation (MAG-726)
  - id: quote-block-mapping
    name: quote-block-mapping
    widget_id: quote-block
    schema: quote
    display_mode: block-editor
    insertable: true
    section: "Basic"
    icon: "quote"
    label: "Quote"

  # Divider block -- horizontal rule separator (MAG-726)
  - id: divider-block-mapping
    name: divider-block-mapping
    widget_id: divider-block
    schema: divider
    display_mode: block-editor
    insertable: true
    section: "Basic"
    icon: "minus"
    label: "Divider"

  # Toggle block -- collapsible disclosure block with nested children (MAG-726)
  - id: toggle-block-mapping
    name: toggle-block-mapping
    widget_id: toggle-block
    schema: toggle
    display_mode: block-editor
    insertable: true
    section: "Basic"
    icon: "chevron-right"
    label: "Toggle"

  # Code block -- multi-line literal code editor with syntax highlighting,
  # optional line numbers, and a language badge. InputRules are disabled
  # inside this block (literal block scope). (MAG-727)
  - id: code-block-mapping
    name: code-block-mapping
    widget_id: code-block
    schema: code
    display_mode: block-editor
    insertable: true
    section: "Advanced"
    icon: "code"
    label: "Code"

  # Bullet list block -- unordered list item with level-driven glyph cycle (MAG-725)
  - id: bullet-list-mapping
    name: bullet-list-mapping
    widget_id: bullet-list-block
    schema: bullet-list
    display_mode: block-editor
    insertable: true
    section: "Basic"
    icon: "list-bullet"
    label: "Bulleted list"

  # Numbered list block -- ordered list item with level-driven ordinal format (MAG-725)
  - id: numbered-list-mapping
    name: numbered-list-mapping
    widget_id: numbered-list-block
    schema: numbered-list
    display_mode: block-editor
    insertable: true
    section: "Basic"
    icon: "list-ordered"
    label: "Numbered list"
