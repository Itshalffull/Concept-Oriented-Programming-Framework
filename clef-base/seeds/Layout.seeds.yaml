# Admin surface layout definitions for clef-base.

concept: Layout
action: create
entries:
  - layout: dashboard
    name: Dashboard
    kind: stack
    title: Dashboard
    description: System overview with live stats and registered concepts.
    children: '[{"type":"view","id":"dashboard-stats"},{"type":"view","id":"dashboard-concepts"},{"type":"view","id":"content-list"}]'
  - layout: score
    name: Score
    kind: stack
    title: Score
    description: Code-as-data analysis: concept dependencies, sync chains, graph analysis, and schema browsing.
    children: '[{"type":"view","id":"concept-graph"},{"type":"view","id":"score-schemas"}]'
  - layout: syncs
    name: Syncs
    kind: stack
    title: Syncs
    description: Sync rules wire concepts together through pattern matching on completions.
    children: '[{"type":"view","id":"syncs-list"}]'
  - layout: concept-browser
    name: Concept Browser
    kind: stack
    title: Concept Browser
    description: Browse and manage concept suite packages.
    children: '[{"type":"view","id":"installed-suites"},{"type":"view","id":"concept-graph"}]'
  - layout: entity-detail
    name: Entity Detail
    kind: stack
    title: ''
    description: ''
    children: '[{"type":"view","id":"entity-properties"},{"type":"view","id":"entity-content"},{"type":"view","id":"entity-same-schema"},{"type":"view","id":"backlinks"},{"type":"view","id":"similar-entities"},{"type":"view","id":"unlinked-references"},{"type":"view","id":"graph-neighbors"}]'
  - layout: multiverse
    name: Version Spaces
    kind: stack
    title: Version Spaces
    description: Named content variations — like git branches for content. Each space can override any ContentNode.
    children: '[{"type":"view","id":"version-spaces-list"}]'
  - layout: triple-zone-default
    name: Triple Zone Default
    kind: stack
    title: ''
    description: Standard entity page layout with three zones — structured fields, unstructured content, and related entities.
    children: '[{"type":"area","id":"fields","content_mode":"structured","content_refs":[]},{"type":"area","id":"content","content_mode":"unstructured"},{"type":"area","id":"related","content_mode":"structured","content_refs":[{"type":"view_embed","view":"backlinks"},{"type":"view_embed","view":"similar-entities"},{"type":"view_embed","view":"unlinked-references"},{"type":"view_embed","view":"graph-neighbors"}]}]'
  - layout: flat-default
    name: Flat Default
    kind: stack
    title: ''
    description: Single structured area for simple display modes like teaser and card.
    children: '[{"type":"area","id":"fields","content_mode":"structured","content_refs":[]}]'
  - layout: two-column-sidebar
    name: Two Column Sidebar
    kind: grid
    title: ''
    description: Main content with a structured sidebar. Alternative to triple-zone for entity pages.
    children: '[{"type":"area","id":"main","content_mode":"structured","content_refs":[]},{"type":"area","id":"content","content_mode":"unstructured"},{"type":"area","id":"sidebar","content_mode":"structured","content_refs":[]}]'
  - layout: step-full-layout
    name: Step Full Detail
    kind: stack
    title: ''
    description: Full-detail layout for a single StepRun — shows step identity, status, attempt count, timestamps, captured I/O, and any error message.
    children: '[{"type":"area","id":"header","content_mode":"structured","content_refs":[]},{"type":"area","id":"lifecycle","content_mode":"structured","content_refs":[]},{"type":"area","id":"input","content_mode":"structured","content_refs":[]},{"type":"area","id":"output","content_mode":"structured","content_refs":[]},{"type":"area","id":"error","content_mode":"structured","content_refs":[]}]'
  - layout: process-spec-page
    name: Process Spec Page
    kind: stack
    title: ''
    description: Full-page layout for a ProcessSpec — shows spec metadata header, a directed step graph canvas, collapsible raw step/edge JSON, and a list of linked active runs.
    children: '[{"type":"area","id":"header","content_mode":"structured","content_refs":[]},{"type":"area","id":"step-graph","content_mode":"unstructured"},{"type":"area","id":"definitions","content_mode":"structured","content_refs":[{"type":"view_embed","view":"process-steps-editor"},{"type":"view_embed","view":"process-edges-editor"}]},{"type":"area","id":"runs","content_mode":"structured","content_refs":[{"type":"view_embed","view":"process-runs-list"}]}]'
  - layout: process-run-page
    name: Process Run Page
    kind: stack
    title: ''
    description: Full-page layout for a single ProcessRun — three-mode tabs covering the run overview, step-by-step execution timeline, raw I/O variables, and a chat interface for conversational process execution.
    children: '[{"type":"view","id":"step-runs-list"},{"type":"view","id":"process-chat"}]'
  - layout: process-analytics
    name: Process Analytics
    kind: stack
    title: Process Analytics
    description: Analytics dashboard for process execution health — stat overview, step bottlenecks, check failures, and completion trends.
    children: '[{"type":"view","id":"process-health"},{"type":"view","id":"step-bottlenecks"},{"type":"view","id":"check-failures"},{"type":"view","id":"process-completion-trend"},{"type":"view","id":"process-step-breakdown"}]'
  - layout: four-zone-default
    name: Four Zone Default
    kind: four-zone
    title: ''
    description: Four-zone entity page — three structural zones (entity properties, entity content, related entities) plus an explicit fourth layout region for sections, tabs, sidebars, and controls.
    children: '[{"type":"area","id":"fields","content_mode":"structured","content_refs":[]},{"type":"area","id":"content","content_mode":"unstructured"},{"type":"area","id":"related","content_mode":"structured","content_refs":[{"type":"view_embed","view":"backlinks"},{"type":"view_embed","view":"similar-entities"},{"type":"view_embed","view":"unlinked-references"},{"type":"view_embed","view":"graph-neighbors"}]},{"type":"region","id":"page-layout","content_mode":"composed","region_kind":"section","region_refs":[]}]'
  - layout: layout-builder
    name: Layout Builder
    kind: stack
    title: Layout Builder
    description: Visual canvas for composing SplitLayout trees — add panes, adjust split ratios, assign view slots, and save named layouts.
    children: '[{"type":"view","id":"layouts-list"}]'
