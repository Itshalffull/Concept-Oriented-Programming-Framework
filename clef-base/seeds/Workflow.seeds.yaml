# Workflow state definitions for clef-base.

concept: Workflow
action: defineState
entries:
  - workflow: content-lifecycle
    name: draft
    flags: initial
  - workflow: content-lifecycle
    name: review
    flags: ''
  - workflow: content-lifecycle
    name: published
    flags: ''
  - workflow: content-lifecycle
    name: archived
    flags: ''
  - workflow: schema-evolution
    name: draft
    flags: initial
  - workflow: schema-evolution
    name: active
    flags: ''
  - workflow: schema-evolution
    name: deprecated
    flags: ''

---
concept: Workflow
action: defineTransition
entries:
  - workflow: content-lifecycle
    from: draft
    to: review
    label: submit
    guard: always
  - workflow: content-lifecycle
    from: review
    to: published
    label: approve
    guard: approved
  - workflow: content-lifecycle
    from: review
    to: draft
    label: reject
    guard: always
  - workflow: content-lifecycle
    from: published
    to: archived
    label: archive
    guard: always
  - workflow: schema-evolution
    from: draft
    to: active
    label: activate
    guard: always
  - workflow: schema-evolution
    from: active
    to: deprecated
    label: deprecate
    guard: always
