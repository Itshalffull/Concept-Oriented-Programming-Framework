# Frame schema entity config
schema: frame
version: 1
display_name: "Frame"
icon: "square"
fields:
  id:
    type: String
    required: true
    description: "Unique identifier for the frame"
  name:
    type: String
    required: false
    description: "Optional label for the frame"
  x:
    type: Number
    required: true
    description: "X coordinate of the frame origin"
  y:
    type: Number
    required: true
    description: "Y coordinate of the frame origin"
  width:
    type: Number
    required: true
    description: "Width of the frame"
  height:
    type: Number
    required: true
    description: "Height of the frame"
  clip_content:
    type: Boolean
    required: false
    description: "Whether content overflowing the frame is clipped"
  children:
    type: "list Reference"
    required: false
    description: "References to shapes and nested frames contained within"
