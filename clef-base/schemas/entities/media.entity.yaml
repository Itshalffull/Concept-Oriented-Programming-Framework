# Media schema entity config
schema: media
version: 1
display_name: "Media Asset"
icon: "image"
fields:
  id:
    type: String
    required: true
    description: "Unique identifier for the media asset"
  file_reference:
    type: Reference
    required: true
    description: "Reference to the underlying file record"
  mime_type:
    type: String
    required: true
    description: "MIME type of the media asset"
  alt_text:
    type: String
    required: false
    description: "Accessibility alt text for the media"
  dimensions:
    type: JSON
    required: false
    description: "Width and height for image/video assets"
  duration:
    type: Number
    required: false
    description: "Duration in seconds for audio/video assets"
  thumbnail_url:
    type: String
    required: false
    description: "URL to a generated thumbnail"
