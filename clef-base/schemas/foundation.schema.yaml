# Foundation schema definitions
# See Architecture doc Section 2.1.1

schema: foundation
version: 1

entities:
  ContentNode:
    fields:
      id:
        type: String
        required: true
        description: "Unique identifier for the content node"
      title:
        type: String
        required: true
        description: "Display title of the content node"
      created_at:
        type: DateTime
        required: true
        description: "Timestamp when the node was created"
      updated_at:
        type: DateTime
        required: true
        description: "Timestamp of the most recent modification"
      created_by:
        type: Reference
        required: true
        description: "Reference to the user who created this node"
    from:
      concept: ContentNode
      actions:
        create: [id, title, created_at, updated_at, created_by]
        read: [id, title, created_at, updated_at, created_by]
