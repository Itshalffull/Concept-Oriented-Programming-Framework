# ── Highlight ─────────────────────────────────────────────────────────────────
#
# Providers registered here handle AST / source text → token annotations.
# shiki covers the broad mainstream language set using TextMate grammars
# with themed output.  clef-dsl-highlight emits keyword/identifier/string/
# operator/comment annotations by walking the framework parsers' ASTs (VPR-10).
# katex-highlight covers LaTeX display blocks.
# textmate is registered as a wildcard fallback: the vscode-extension reader
# discovers installed extension grammars at boot and registers them here; any
# language slot not already claimed by shiki or clef-dsl-highlight falls through
# to textmate using the grammar path the extension declared (VPR-12, VPR-07).

highlight:
  # Shiki — curated extended language set (TextMate grammars, themeable output).
  #
  # This covers the ~70 most common real-world languages so that virtually
  # any code block in user content gets proper syntax highlighting without
  # paying the startup cost of all 303 bundled shiki grammars.
  #
  # IMPORTANT: shiki lazy-loads grammars on first use — listing more languages
  # here only registers them as available; it does NOT bloat startup time.
  # Only grammars that are actually rendered are loaded into memory.
  #
  # To add further languages (e.g. niche DSLs, enterprise languages), create
  # a project-level .clef/providers.yaml that extends this manifest with
  # additional highlight slot-group entries referencing shiki's full 303-language
  # bundled set. Project-level entries take priority over this default manifest.
  - slot-group: shiki-extended
    provider: shiki
    languages:
      # ── Web / scripting (mainstream core) ──────────────────────────────────
      - typescript
      - javascript
      - python
      - ruby
      - php
      - elixir
      - lua
      - perl
      - tcl
      # ── Systems / compiled ─────────────────────────────────────────────────
      - rust
      - go
      - cpp
      - c
      - swift
      - java
      - kotlin
      - csharp
      - scala
      - dart
      - zig
      - nim
      - crystal
      - objective-c
      # ── Functional ─────────────────────────────────────────────────────────
      - haskell
      - ocaml
      - fsharp
      - clojure
      - scheme
      - common-lisp
      - erlang
      - julia
      - r
      - wolfram
      # ── Smart contracts / blockchain ───────────────────────────────────────
      - solidity
      # ── Data / query ───────────────────────────────────────────────────────
      - sql
      - graphql
      - proto
      - prisma
      # ── Data formats / config ──────────────────────────────────────────────
      - json
      - jsonc
      - json5
      - yaml
      - toml
      - xml
      - csv
      - tsv
      - ini
      - hcl
      - terraform
      # ── Markup / document ──────────────────────────────────────────────────
      - html
      - css
      - markdown
      - latex
      - bibtex
      # ── Shell / scripting ──────────────────────────────────────────────────
      - bash
      - shellscript
      - powershell
      # ── Build / infra ──────────────────────────────────────────────────────
      - docker
      - nginx
      - apache
      - make
      - cmake
      # ── Version control / patch ────────────────────────────────────────────
      - diff
      - git-commit
      - git-rebase
      # ── Low-level / hardware ───────────────────────────────────────────────
      - asm
      - wasm
      - verilog
      - vhdl
      - system-verilog
      # ── Groovy / JVM adjacent ──────────────────────────────────────────────
      - groovy
      - vb
      - fortran-fixed-form
      - fortran-free-form
      # ── Misc ───────────────────────────────────────────────────────────────
      - regexp
      - viml

  # Clef DSL highlighter — token annotations from framework parser ASTs (VPR-10).
  # Output shape matches shiki (start/end/kind/scope) so downstream widgets
  # render both uniformly.  Token kinds: keyword | identifier | string | number
  # | operator | comment | type | attribute (PRD §4.7).
  - slot-group: clef-dsls
    provider: clef-dsl-highlight
    languages:
      - clef-concept
      - clef-sync
      - clef-widget
      - clef-theme
      - clef-derived
      - clef-view
      - clef-schema
      - clef-composition

  # LaTeX display rendering via KaTeX highlight pass.
  - slot: latex
    provider: katex-highlight

  # TextMate fallback — covers any language slot discovered by the
  # vscode-extension ManifestReader from installed extension grammars.
  # Registered last so shiki-extended and clef-dsl-highlight always take
  # priority on the slots they own (PRD §4.3 slot-group order wins).
  - slot: "*"
    provider: textmate
    options:
      fallbackOnly: true

# ── Format ────────────────────────────────────────────────────────────────────
#
# Providers registered here handle source text → Patch (line-diff) transformations.
# prettier covers web-tier languages.  Language-specific formatters handle the
# codegen targets.  micromark-format provides a lossless round-trip formatter for
# markdown (normalizes whitespace, fence styles, list markers) without touching prose.
# All Format providers return a Patch via the same line-diff pipeline (PRD §4.9).

format:
  # Prettier — web-tier languages via a single plugin (VPR-05 reads .prettierrc
  # and package.json prettier field to overlay user options at runtime).
  - slot-group: prettier-web
    provider: prettier
    languages:
      - javascript
      - typescript
      - json
      - css
      - html
      - markdown

  # Solidity — prettier with prettier-plugin-solidity (VPR-16). Routed
  # through the shared `prettier` provider; the embedded options select the
  # solidity-parse parser and the prettier-plugin-solidity plugin at format
  # time. format-dispatch.ts loads the plugin from the JSON config Bytes.
  - slot: solidity
    provider: prettier
    options:
      parser: solidity-parse
      plugins:
        - prettier-plugin-solidity

  # Rust — rustfmt (VPR-06).  Prefers wasm rustfmt; falls back to subprocess
  # if the binary is in PATH.  Missing binary → warn + skip per PRD §8.3.
  - slot: rust
    provider: rustfmt

  # Swift — swift-format (VPR-18) via subprocess.  Requires swift-format in PATH.
  - slot: swift
    provider: swift-format

  # Markdown round-trip normalizer.  Runs after micromark-parse to reconstruct
  # canonical markdown from the AST — normalizes fence styles, list markers,
  # and heading whitespace without altering prose content.
  - slot: markdown
    provider: micromark-format

# ── ContentSerializer ──────────────────────────────────────────────────────────
#
# Providers registered here handle ContentNode trees → serialized output in a
# target format.  Each slot corresponds to a target format identifier.

content-serializer:
  # Markdown — default export for most content (lossless for block content).
  # Provider name matches the runtime registration in
  # handlers/ts/providers/content-serializer-md.provider.ts.
  - slot: markdown
    provider: micromark-serialize

  # HTML — for web export and clipboard copy with rich formatting.
  - slot: html
    provider: html-serialize

  # JSON — for API responses and inter-service transfer.
  - slot: json
    provider: json-serialize

  # PDF — for print/export workflows.
  - slot: pdf
    provider: pdf-serialize
