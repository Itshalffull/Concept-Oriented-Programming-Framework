# Clef Base — Default Provider Manifest
# VPR-14: Default manifest covering all built-in provider slots.
#
# Three-layer architecture (PRD §2):
#   Layer A  ManifestReader registry  — format-specific config readers
#   Layer B  ProviderManifest         — aggregates readers, emits PluginRegistry/register per entry
#   Layer C  Four generic syncs       — fan out to Parse / Format / Highlight / ContentSerializer
#
# ManifestReader priority order (highest wins on slot collision):
#   clef-yaml > prettier-config > editorconfig > package-json > vscode-settings
#   > vscode-extension > tree-sitter (auto-discovery, lowest priority)
#
# Slot naming:
#   parse / format / highlight  →  slot = language identifier
#   content-serializer          →  slot = target format identifier
#
# slot-group is a manifest-level convenience: expands to N individual
# PluginRegistry/register calls (one per language) at load time (PRD §4.3).
# The registry itself only sees individual slots.
#
# options are provider-opaque and passed verbatim to the provider function (PRD §4.4).
# extensions compose provider capability; providers that don't support the field
# ignore it with no opt-in ceremony required (PRD §4.8).

version: 1

# ── Parse ─────────────────────────────────────────────────────────────────────
#
# Providers registered here handle raw-text → AST transformations.
# micromark-parse is the markdown host; the three callout dialects are
# micromark extensions composed onto the single "markdown" slot (VPR-20).
# Standalone per-dialect slots (markdown-github-callout, etc.) were retired.
# clef-framework-parse meta-provider wraps the five framework parsers so
# Clef DSL code blocks get a real AST, not just tokenized text (VPR-09).

parse:
  # Markdown with composable dialect extensions (VPR-20 callout refactor).
  # github-callout  → > [!NOTE|TIP|IMPORTANT|WARNING|CAUTION]
  # mkdocs-callout  → !!! keyword "Optional title"
  # obsidian-callout → > [!keyword]+/- (foldable)
  - slot: markdown
    provider: micromark-parse
    options:
      extensions:
        - micromark-extension-github-callout
        - micromark-extension-mkdocs-callout
        - micromark-extension-obsidian-callout

  # LaTeX math via KaTeX (no extensions needed).
  - slot: latex
    provider: katex-parse

  # HTML via the platform DOM parser (browser or server JSDOM).
  - slot: html
    provider: domparser-parse

  # Five Clef DSLs — meta-provider wrapping the framework parsers (VPR-09).
  # Each sub-slot gets the full AST from the corresponding parser:
  #   handlers/ts/framework/{parser,sync-parser,widget-parser,theme-parser,derived-parser}.ts
  - slot-group: clef-dsls
    provider: clef-framework-parse
    languages:
      - clef-concept
      - clef-sync
      - clef-widget
      - clef-theme
      - clef-derived
      - clef-view
      - clef-schema
      - clef-composition

  # Tree-sitter WASM grammars (VPR-21).
  #
  # Every grammar shipped by the tree-sitter-wasms npm package is copied into
  # suites/parse/grammars/wasm/ by scripts/copy-tree-sitter-wasm.mjs (postinstall).
  # The tree-sitter Parse provider is grammar-agnostic — each entry selects a
  # grammar via options.grammar (project-relative wasm path).
  #
  # slot naming convention: identical to the wasm file suffix
  #   tree-sitter-<slot>.wasm  →  slot: <slot>
  # Underscores are preserved (c_sharp, embedded_template). Scope name follows
  # TextMate convention: source.<slot>.
  #
  # slot-group is not used here because each entry carries a distinct options
  # block (different grammar path per language).
  #
  # json, yaml, typescript, and tsx are intentionally omitted — they are
  # handled by dedicated higher-priority parse providers elsewhere in the
  # stack (and by the tree-sitter-autodiscover reader as a fallback).
  - slot: bash
    provider: tree-sitter
    options:
      grammar: suites/parse/grammars/wasm/tree-sitter-bash.wasm
      packageName: tree-sitter-wasms
  - slot: c
    provider: tree-sitter
    options:
      grammar: suites/parse/grammars/wasm/tree-sitter-c.wasm
      packageName: tree-sitter-wasms
  - slot: c_sharp
    provider: tree-sitter
    options:
      grammar: suites/parse/grammars/wasm/tree-sitter-c_sharp.wasm
      packageName: tree-sitter-wasms
  - slot: cpp
    provider: tree-sitter
    options:
      grammar: suites/parse/grammars/wasm/tree-sitter-cpp.wasm
      packageName: tree-sitter-wasms
  - slot: css
    provider: tree-sitter
    options:
      grammar: suites/parse/grammars/wasm/tree-sitter-css.wasm
      packageName: tree-sitter-wasms
  - slot: dart
