suite:
  name: score-parse
  version: 0.1.0
  description: >
    Clef-specific grammar providers for parsing concept specs, sync
    specs, widget specs, and theme specs. Extends the general-purpose
    code-parse suite with Clef domain grammars.

concepts:
  # Clef-specific grammar providers
  TreeSitterConceptSpec:
    spec: ./providers/grammars/concept-spec.concept
    optional: true
  TreeSitterSyncSpec:
    spec: ./providers/grammars/sync-spec.concept
    optional: true
  TreeSitterWidgetSpec:
    spec: ./providers/grammars/widget-spec.concept
    optional: true
  TreeSitterThemeSpec:
    spec: ./providers/grammars/theme-spec.concept
    optional: true

syncs:
  required: []
  recommended: []
  integration: []

uses:
  - suite: code-parse
    concepts:
      - name: SyntaxTree
      - name: LanguageGrammar
      - name: FileArtifact
      - name: DefinitionUnit
      - name: ContentDigest
      - name: StructuralPattern

dependencies:
  - suite: code-parse
