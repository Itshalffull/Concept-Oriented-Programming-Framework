suite:
  name: score-analysis
  version: 0.1.0
  description: >
    Clef-specific dependence providers for concept specs, sync specs,
    widget specs, theme specs, selection pipelines, and bindings.
    Extends the general-purpose code-analysis suite with Clef domain
    dependence analysis.

concepts:
  # Clef-specific dependence providers
  ConceptDependenceProvider:
    spec: ./providers/dependence/concept.concept
    optional: true
  SyncDependenceProvider:
    spec: ./providers/dependence/sync.concept
    optional: true
  WidgetDependenceProvider:
    spec: ./providers/dependence/widget.concept
    optional: true
  ThemeDependenceProvider:
    spec: ./providers/dependence/theme.concept
    optional: true
  SelectionPipelineDependenceProvider:
    spec: ./providers/dependence/selection-pipeline.concept
    optional: true
  BindingDependenceProvider:
    spec: ./providers/dependence/binding.concept
    optional: true

syncs:
  required: []
  recommended: []
  integration: []

uses:
  - suite: code-analysis
    concepts:
      - name: DependenceGraph
      - name: DataFlowPath
      - name: ProgramSlice
      - name: AnalysisRule
  - suite: code-parse
    concepts:
      - name: SyntaxTree
      - name: FileArtifact
  - suite: code-symbol
    concepts:
      - name: Symbol
      - name: SymbolOccurrence
      - name: ScopeGraph
  - suite: semantic
    concepts:
      - name: ConceptEntity
      - name: ActionEntity
      - name: SyncEntity
      - name: StateField
      - name: WidgetEntity
      - name: ThemeEntity
      - name: InteractorEntity

dependencies:
  - suite: code-analysis
  - suite: code-parse
  - suite: code-symbol
