suite:
  name: score-symbol
  version: 0.1.0
  description: >
    Clef-specific symbol extractors and scope providers for concept
    specs, sync specs, widget specs, and theme specs. Extends the
    general-purpose code-symbol suite with Clef domain extractors.

concepts:
  # Clef-specific symbol extractor providers
  ConceptSpecSymbolExtractor:
    spec: ./providers/extractors/concept-spec.concept
    optional: true
  SyncSpecSymbolExtractor:
    spec: ./providers/extractors/sync-spec.concept
    optional: true
  WidgetSpecSymbolExtractor:
    spec: ./providers/extractors/widget-spec.concept
    optional: true
  ThemeSpecSymbolExtractor:
    spec: ./providers/extractors/theme-spec.concept
    optional: true

  # Clef-specific scope providers
  ConceptScopeProvider:
    spec: ./providers/scope/concept.concept
    optional: true
  SyncScopeProvider:
    spec: ./providers/scope/sync.concept
    optional: true
  WidgetScopeProvider:
    spec: ./providers/scope/widget.concept
    optional: true

syncs:
  required: []
  recommended: []
  integration: []

uses:
  - suite: code-symbol
    concepts:
      - name: Symbol
      - name: SymbolOccurrence
      - name: ScopeGraph
      - name: SymbolRelationship
  - suite: code-parse
    concepts:
      - name: SyntaxTree
      - name: LanguageGrammar
      - name: FileArtifact

dependencies:
  - suite: code-symbol
  - suite: code-parse
