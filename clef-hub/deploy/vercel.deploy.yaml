app:
  name: clef-hub
  version: "0.1.0"
  uri: urn:clef:hub

runtimes:
  vercel:
    type: VercelRuntime
    engine: true
    transport: http
    storage: vercel-kv
    secrets: vercel-env
    config:
      framework: nextjs
      buildCommand: "next build"
      outputDirectory: ".next"

infrastructure:
  storage:
    vercel-kv:
      type: vercel-kv
      config:
        url: "${KV_REST_API_URL}"
        token: "${KV_REST_API_TOKEN}"

  secrets:
    vercel-env:
      type: vercel-env
      config:
        projectId: "${VERCEL_PROJECT_ID}"

concepts:
  AccountProxy:
    spec: concepts/account-proxy.concept
    implementations:
      - language: typescript
        path: handlers/ts/account-proxy.handler.ts
        runtime: vercel
        storage: memory
        queryMode: lite

  RegistryProxy:
    spec: concepts/registry-proxy.concept
    implementations:
      - language: typescript
        path: handlers/ts/registry-proxy.handler.ts
        runtime: vercel
        storage: memory
        queryMode: lite

  ComponentManifestProxy:
    spec: concepts/component-manifest-proxy.concept
    implementations:
      - language: typescript
        path: handlers/ts/component-manifest-proxy.handler.ts
        runtime: vercel
        storage: memory
        queryMode: lite

  DownloadProxy:
    spec: concepts/download-proxy.concept
    implementations:
      - language: typescript
        path: handlers/ts/download-proxy.handler.ts
        runtime: vercel
        storage: memory
        queryMode: lite

  SchemaProxy:
    spec: concepts/schema-proxy.concept
    implementations:
      - language: typescript
        path: handlers/ts/schema-proxy.handler.ts
        runtime: vercel
        storage: memory
        queryMode: lite

  Session:
    spec: concepts/session.concept
    implementations:
      - language: typescript
        path: handlers/ts/session.handler.ts
        runtime: vercel
        storage: vercel-kv
        queryMode: lite

  Comment:
    spec: concepts/comment.concept
    implementations:
      - language: typescript
        path: handlers/ts/comment.handler.ts
        runtime: vercel
        storage: vercel-kv
        queryMode: lite

  Flag:
    spec: concepts/flag.concept
    implementations:
      - language: typescript
        path: handlers/ts/flag.handler.ts
        runtime: vercel
        storage: vercel-kv
        queryMode: lite

  Attribution:
    spec: concepts/attribution.concept
    implementations:
      - language: typescript
        path: handlers/ts/attribution.handler.ts
        runtime: vercel
        storage: vercel-kv
        queryMode: lite

  ContentNode:
    spec: concepts/content-node.concept
    implementations:
      - language: typescript
        path: handlers/ts/content-node.handler.ts
        runtime: vercel
        storage: vercel-kv
        queryMode: lite

  ContentParser:
    spec: concepts/content-parser.concept
    implementations:
      - language: typescript
        path: handlers/ts/content-parser.handler.ts
        runtime: vercel
        storage: memory
        queryMode: lite

syncs:
  - path: syncs/required/auth-on-login.sync
    engine: engine
    annotations: [eager]

  - path: syncs/required/session-on-auth.sync
    engine: engine
    annotations: [eager]

  - path: syncs/required/render-readme-on-view.sync
    engine: engine
    annotations: [eager]

  - path: syncs/required/flag-on-yank-request.sync
    engine: engine
    annotations: [eager]

dependencies:
  clef-account:
    env: CLEF_ACCOUNT_URL
    transport: http
  clef-registry:
    env: CLEF_REGISTRY_URL
    transport: http

build:
  typescript:
    compiler: tsc
    testRunner: vitest
    testTypes:
      - unit
